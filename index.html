    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

const bibleChapters = [
  { id: "ball", title: "The Ball", icon: "⚽", subtitle: "Physics, Spin & Striking", sections: [
    { title: "The Magnus Effect — Why The Ball Curves", content: "Every curved ball in soccer is the Magnus Effect in action. When a spinning ball moves through air, its rotation drags air around it. On one side airflow speeds up, on the other it slows down. The pressure difference pushes the ball toward the low-pressure side.\n\nThe key rule: a ball curves in the direction it's spinning.\n— Clockwise spin → curves right\n— Counterclockwise spin → curves left\n— Topspin (forward rotation) → dips down\n— Backspin (backward rotation) → floats, travels farther\n\nThe slower the ball travels, the more it curves. Speed reduces the effect." },
    { title: "The Knuckleball — No Spin", content: "Strike the ball with minimal spin and it becomes unpredictable. Without spin, airflow changes constantly as the panel seams rotate. The ball flutters, dips, and moves laterally without warning.\n\nHow to do it: Strike through the dead center of the ball with your laces, follow through stiff and straight. Minimal ankle snap.\n\nUse case: Long range free kicks, shots from outside the box. Ronaldo and Pirlo built careers on this." },
    { title: "Topspin — The Dipping Shot", content: "Topspin makes the ball dip faster than gravity alone.\n\nHow to create topspin:\n— Approach at a slight angle (30 degrees)\n— Plant foot slightly ahead of and beside the ball\n— Strike slightly above center with your laces\n— Keep your body over the ball — lean forward\n— The follow-through goes DOWN, not forward\n\nCommon mistake: Leaning back causes backspin and a ballooning shot. Get your body over the ball." },
    { title: "Backspin — The Chip & Float", content: "Backspin creates lift and a floating effect. Essential for chips over a goalkeeper and lofted through balls.\n\nHow to create backspin:\n— Stab underneath the ball with a stiff ankle\n— Shorter, sharper contact — don't follow through\n— Strike the bottom quarter of the ball\n\nThe chip: Same but more exaggerated. Knife under the ball, quick flick. Used to lob a rushing goalkeeper.\n\nNote: Backspin reduces forward speed. Use for precision, not power." },
    { title: "Sidespin — The Curl", content: "Sidespin bends free kicks around walls and curls crosses into dangerous areas.\n\nFor a right-footed player:\n— Strike the LEFT side with inside of foot → curves left to right (inswinging)\n— Strike the RIGHT side with outside of foot → curves right to left (outswinging)\n\nHow to curl with inside of foot:\n— Approach from the left\n— Plant foot pointing at target\n— Strike the inside-left quarter of the ball\n— Follow through across your body\n\nMore off-center = more curl but less power. Find the balance." },
    { title: "The Driven Shot — Power & Accuracy", content: "The bread and butter shot.\n\nMechanics:\n1. Approach at 30–45 degree angle\n2. Plant foot beside ball, toes pointing at target\n3. Lock your ankle — foot pointed down, firm\n4. Strike through the CENTER with laces\n5. Body OVER the ball — don't lean back\n6. Follow through toward target — leg swings high\n\nPower comes from hip rotation and knee snap. Your leg is the whip. Your locked ankle is the tip." },
    { title: "The Inside Pass — Accuracy First", content: "The foundation of everything.\n\nMechanics:\n1. Point standing foot at the target\n2. Open kicking foot out — toe pointed sideways\n3. Lock your ankle\n4. Strike through the CENTER with the flat inside surface\n5. Follow through toward the target\n\nWall drill: 200 reps each foot daily. Lock ankle, follow through, move target back as accuracy builds." },
  ]},
  { id: "formations", title: "Formations", icon: "📋", subtitle: "Shapes, Systems & How To Break Them", sections: [
    { title: "How To Read A Formation", content: "Formations are listed back to front, goalkeeper excluded.\n4-3-3 = 4 defenders, 3 midfielders, 3 forwards.\n\nBut formations are starting shapes. In possession a 4-3-3 becomes a 3-5-2. Out of possession a 4-2-3-1 becomes a 4-4-2.\n\nNumbers and roles:\n— #4, #5: Center backs\n— #2, #3: Fullbacks\n— #6: Defensive midfielder (holds, screens)\n— #8: Box-to-box midfielder\n— #10: Attacking midfielder / playmaker\n— #7, #11: Wingers\n— #9: Striker" },
    { title: "4-4-2 — The Classic", content: "Four defenders. Four midfielders. Two strikers.\n\nStrengths: Simple structure, two strikers, solid defensive shape.\n\nWeaknesses: Outnumbered in midfield against 3-man setups. Flat midfield struggles to shift quickly.\n\nHow to attack it as a midfielder:\n— Exploit the space BETWEEN their midfield and defensive line\n— Receive there and you have time\n— Overload one side then switch quickly\n— Thread through balls between the central mids" },
    { title: "4-3-3 — Possession & Press", content: "Four defenders. Three midfielders. Three forwards. Barcelona's formation.\n\nStrengths: Three forwards press high, triangles everywhere, wide forwards pin fullbacks.\n\nWeaknesses: Wide forwards must track back or you're exposed. Requires enormous fitness.\n\nHow to attack it:\n— Attack the space BEHIND pressing forwards\n— Switch play quickly — wide areas open with fast movement\n— Striker's movement pulls center backs, creating gaps for midfield runners" },
    { title: "4-2-3-1 — The Dominant Modern Formation", content: "Four defenders. Two defensive midfielders (double pivot). Three attacking mids. One striker.\n\nStrengths: Double pivot gives stability AND possession control. The #10 between the lines is extremely hard to defend. Flexible.\n\nWeaknesses: Lone striker isolated. Fullbacks often exposed.\n\nHow to attack it:\n— Flanks are vulnerable\n— A diamond midfield suffocates the double pivot\n— Quick counters before defensive shape reorganizes" },
    { title: "3-5-2 — Five In Midfield", content: "Three center backs. Two wing-backs. Three central midfielders. Two strikers.\n\nStrengths: Total midfield control, two strikers, extra defensive coverage.\n\nWeaknesses: Wing-backs cover enormous ground. Three center-backs overloaded by width.\n\nHow to attack it:\n— Push wing-backs back — remove their attacking contribution\n— Hit behind wing-backs with fast runs when they push forward\n— Play wide — stretch the three center-backs" },
    { title: "The Low Block — How To Break It", content: "Some teams just park. Nine or ten men behind the ball.\n\n1. Patience. They want you to rush.\n2. Move the ball quickly — short combinations force their shape to shift.\n3. Switch play FAST. Forces the entire block to move.\n4. Get wide and cross — numbers in the box can break it.\n5. Midfield runners arriving late are hard to track.\n6. Through ball into channels between last defender and the 18.\n\nWhat doesn't work: Individual dribbling into a packed defense." },
  ]},
  { id: "defending", title: "Defending", icon: "🛡️", subtitle: "Reading Players, 1v1, Pressure", sections: [
    { title: "The Fundamentals Of Individual Defense", content: "Defense starts before the attacker gets the ball.\n\nCore principles:\n1. Be goal-side. Always position between attacker and goal.\n2. Delay, don't dive. Buy time for teammates.\n3. Stay on your feet. Committed tackles that miss are gifts.\n4. Force a direction. Channel toward sideline or weak foot.\n5. Watch the ball, not the feet. Feints happen with the body. The ball tells the truth.\n\nThe jockeying position: Side-on stance, weight on back foot, low center of gravity." },
    { title: "Defending Fast Players", content: "Fast attackers need space to run into. Eliminate that space.\n\nHow to defend pace:\n1. Get tight EARLY — before they have the ball.\n2. Force them wide. The sideline is your teammate.\n3. Don't turn and chase. Focus on preventing the moment.\n4. Angle your run so they must go wide.\n5. Be physical early — fast players hate physicality.\n\nKey shift: You're not trying to win the ball. You're making them predictable." },
    { title: "Defending Technically Skilled Players", content: "A technically elite dribbler slows down and waits for you to commit.\n\nGolden rule: Do NOT lunge. They're waiting for it.\n\nHow to defend skill:\n1. Patience. Stand them up. Make them make the first move.\n2. Watch the ball, not the body.\n3. Force them onto their weak foot.\n4. Shrink their space — tight enough they can't turn.\n5. Tackle only when they take a heavy touch. Then commit fully." },
    { title: "Defending Physical Players", content: "Strong attackers try to back into you and use their body as a shield.\n\nPrinciples:\n1. Don't engage their back. Stay to the side.\n2. Arms-length positioning: Too close and they spin you. Too far and they turn.\n3. Be first to the ball.\n4. Use your body legally — shoulder to shoulder.\n5. Force wide. Physical strikers are most dangerous centrally." },
    { title: "The Art Of Pressing", content: "Pressing isn't chasing the ball. Uncoordinated pressing creates space.\n\nPress when:\n— Opponent receives with back to goal\n— They take a heavy first touch\n— Ball goes to a weak-footed player\n\nHow to press effectively:\n1. Know where you're forcing the ball BEFORE you press\n2. Cut off the easy pass\n3. Teammates must press in coordination\n4. Don't overcommit\n\nHigh press wins the ball high but is exhausting. Mid press is more sustainable." },
  ]},
  { id: "midfield", title: "The Midfielder", icon: "🧠", subtitle: "Positioning, Vision & The Isagi Principles", sections: [
    { title: "What Makes A Midfielder Elite", content: "The average player has direct possession for only 1–3 minutes in 90.\n\nWhat separates elite midfielders:\n1. Scanning frequency — Xavi scanned 0.83 times per second. Elite: 6–8 times in 10 seconds.\n2. Pre-decisions — By the time the ball arrives, the decision is already made.\n3. Body orientation — Always receive with an open body. 'Play the way you face.'\n4. Movement OFF the ball — Where you position without it determines what balls you get.\n5. Tempo control — Knowing when to play fast and when to slow down." },
    { title: "Scanning — The Skill That Separates Everyone", content: "Scanning is checking your shoulders to gather information BEFORE the ball arrives.\n\nHow to build the habit:\n— Force yourself to check both shoulders before every receive\n— Rule: never receive without at least one shoulder check\n— Target: scan every 3 seconds minimum\n\nWhat to look for:\n— Where is the nearest pressure?\n— Which teammate is open?\n— Where is the space?\n— What is the defensive shape?\n\nYou're taking a photograph of the field. File it instantly. Act on it." },
    { title: "Positioning Between The Lines", content: "The most dangerous position: the space between opponent's midfield and defensive line.\n\nWhy it's dangerous:\n— Midfielders can't press without leaving space behind\n— Defenders can't step out without exposing their line\n— You're facing goal with time and space\n\nHow to get there:\n— Move away from the ball to create angles\n— Time your run to arrive AS the ball is played\n\nThe half-space: Between center and wing. Where Iniesta, Modric, De Bruyne operate." },
    { title: "The Isagi Principles — Spatial Dominance", content: "Isagi's weapon isn't skill or pace — it's meta-vision.\n\n1. Before the ball arrives: where is the SPACE? Not the ball. The space.\n\n2. Predict where space will open: Fullback pushes forward → space opens behind. Read movement to predict the gap, then move there BEFORE it opens.\n\n3. Exploit the transition moment: The 3–5 seconds after possession changes. Strike in this window.\n\n4. Create space for others: Your run doesn't need to end in receiving. Dragging a defender away is a successful action.\n\n5. The chain calculation: Calculate two passes ahead before every touch." },
    { title: "First Touch — The Foundation Of Everything", content: "Your first touch tells everyone on the field who you are.\n\nTypes:\n— Cushion touch: Relax the surface to kill the ball's pace.\n— Directional touch: Redirect with inside or outside as it arrives.\n— First-time pass: The touch IS the pass. Requires pre-scanning.\n\nTraining: Wall work. Control it dead every time. Both feet. 100 reps each surface.\n\nThe test: After receiving, can you immediately look up? Still looking down = touch wasn't good enough." },
    { title: "Tempo — Controlling The Game's Pace", content: "Elite midfielders SET the rhythm.\n\nPlay FAST when:\n— Transition moments\n— Defenders are disorganized\n— A runner is making a timed run\n\nSlow DOWN when:\n— Team needs to reorganize shape\n— No forward option available\n— Pressing is coming\n\nMost common amateur mistake: Playing fast all the time. Top teams play slow to go fast.\n\nYou are the tempo dial. Own it." },
  ]},
  { id: "mental", title: "Mental Game", icon: "🔥", subtitle: "Psychology, Pressure & Domination", sections: [
    { title: "The Psychology Of Competition", content: "Soccer is played twice — once in the body, once in the mind.\n\nWhat separates competitive players:\n— Composure under pressure: Execute technique when heart rate is 160.\n— Short memory: Forget bad touches instantly.\n— Reading opponents: Frustrated? Apply more pressure. Confident? Disrupt their rhythm.\n\nThe composure principle: Your technique only holds under pressure to the level you've practiced it under pressure. Train at speed, under fatigue, with consequences." },
    { title: "Imposing Yourself Mentally", content: "It's not trash talk. It's actions that make opponents feel the game is already decided.\n\n1. Dominate the first five minutes: Win your first header, tackle, and pass.\n2. Visible composure: When you're calm and they're not, it communicates power.\n3. Physicality in legal spaces: Use it early.\n4. Punish every mistake instantly: Transition immediately when they give it away.\n5. Be unpredictable: Change your patterns. Make them feel like they can't read you." },
    { title: "Visualization — Training The Brain", content: "Your brain cannot fully distinguish between a vividly imagined action and a real one.\n\nHow to do it properly:\n1. Be specific. Visualize receiving under pressure, taking a directional touch, threading a through ball.\n2. All senses. See the field, hear the crowd, feel the ball.\n3. Include adversity. Visualize a bad touch — then recovering.\n4. Pre-match: 5–10 minutes before every game or session.\n\nFive minutes every night before sleep. It costs nothing. Over months, it compounds." },
    { title: "The Transition Mindset", content: "The most dangerous moment in soccer: the 3–5 seconds after possession changes.\n\nWhen you WIN the ball: Look forward immediately. Attack before the defense organizes.\n\nWhen you LOSE the ball: Counter-press immediately. Don't sulk. The ball is closest to your team in the moment just after losing it.\n\nYour profile — lean, fast, explosive — is perfectly suited to transition moments. This is where you are most dangerous." },
    { title: "Handling Mistakes & Staying In The Game", content: "The most consequential skill in soccer isn't technical. It's moving on instantly from errors.\n\nThe reset process:\n1. Accept: It happened. That's done.\n2. Analyze: Decision error or execution error? File it for later.\n3. Redirect: Where do I need to be RIGHT NOW?\n4. Go: Move. Don't stand still processing.\n\nThe whole process takes 2 seconds. Long memory is a liability in competition." },
  ]},
  { id: "iq", title: "Soccer IQ", icon: "📡", subtitle: "Reading The Game, Space & Time", sections: [
    { title: "Space — The Real Currency Of Soccer", content: "The ball is secondary. Space is the game.\n\nTypes of space:\n— Behind the defensive line: Most dangerous. Through ball here often leads to goal.\n— Between the lines: Where midfielders operate.\n— Wide space: Stretches defense, opens central areas.\n— Space created by movement: Running without the ball drags defenders.\n\nThe central question before every action: Where is the space, and how do I attack it or create it?" },
    { title: "Reading Defensive Shape", content: "Understanding how the opposition defends tells you exactly where to attack.\n\nHigh defensive line: Vulnerability — space in behind for pace.\nDeep defensive line: Vulnerability — space in front of defense.\nZonal defense: Attack by creating overloads.\nMan marking: Drags defenders out of position with intelligent movement.\n\nBefore every game: Watch how they defend for 10 minutes. Where do they give space? Which player is weakest?" },
    { title: "The Third Man Run", content: "Player A passes to Player B. Player B is marked. But A's pass was a TRIGGER — it signals Player C (the third man) to make a run into space.\n\nThe defender marking B watches the ball. The defender covering C's zone tracks the ball. Neither watches C's run until it's too late.\n\nHow to use it:\n1. Recognize when a teammate is about to play a pass\n2. Time your run so you arrive as the ball reaches the second player\n3. You receive in full stride with space ahead\n\nThis is Isagi's chain calculation in real soccer." },
    { title: "Overloads & Numerical Superiority", content: "Numerical superiority = more of your players than theirs in a specific area.\n\n2v1 anywhere = the defender cannot stop both. One of you is always free.\n\nHow midfielders create overloads:\n— Positional rotation: Move into areas with fewer defenders\n— Overlapping runs: Give and go. Pass, then run.\n— Third man combinations\n\nThe best midfielders manufacture overloads. Don't wait for them." },
    { title: "Transition — The Game Within The Game", content: "Modern soccer is increasingly about transitions.\n\nOffensive transition (just won the ball):\n— Look forward immediately\n— Attack before defense reorganizes\n— Exploit the 5-second window\n\nDefensive transition (just lost the ball):\n— Counter-press immediately\n— Sprint to defensive position\n— Delay their attack\n\nThe gegenpressing principle: Winning the ball back within 5 seconds is statistically the most dangerous way to create a goal-scoring opportunity. Your profile is perfectly suited to this." },
  ]},
];

function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const inputStyle = { width: "100%", background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "12px 14px", color: "#ccc", fontFamily: "'Courier New', monospace", fontSize: 13, outline: "none", marginBottom: 12 };

  const handleSubmit = async () => {
    if (!username.trim() || !password.trim()) { setError("Fill in both fields."); return; }
    setLoading(true); setError("");
    const hash = await hashPassword(password);
    if (mode === "register") {
      const { error: err } = await sb.from("users").insert([{ username: username.trim().toLowerCase(), password_hash: hash }]);
      if (err) { setError(err.code === "23505" ? "Username already taken." : "Error creating account."); setLoading(false); return; }
      const { data } = await sb.from("users").select("id").eq("username", username.trim().toLowerCase()).single();
      await sb.from("goals").insert([
        { user_id: data.id, text: "Win the TSA League", category: "short", done: false },
        { user_id: data.id, text: "Comfortable with both feet", category: "short", done: false },
        { user_id: data.id, text: "Play in a semi-pro league", category: "medium", done: false },
        { user_id: data.id, text: "Become the most dangerous midfielder in every game I play", category: "long", done: false },
      ]);
      await sb.from("juggling_record").insert([{ user_id: data.id, record: 0 }]);
      onLogin(data.id, username.trim().toLowerCase());
    } else {
      const { data, error: err } = await sb.from("users").select("id, password_hash").eq("username", username.trim().toLowerCase()).single();
      if (err || !data) { setError("Username not found."); setLoading(false); return; }
      if (data.password_hash !== hash) { setError("Wrong password."); setLoading(false); return; }
      onLogin(data.id, username.trim().toLowerCase());
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: "#080808", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ width: "100%", maxWidth: 360 }}>
        <div style={{ marginBottom: 40, textAlign: "center" }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>⚽</div>
          <div style={{ fontSize: 10, letterSpacing: 6, color: "#333", marginBottom: 6 }}>PERSONAL HQ</div>
          <div style={{ fontSize: 28, fontWeight: 900, color: "#fff" }}>SOCCER <span style={{ color: "#00FF87" }}>HQ</span></div>
          <div style={{ fontSize: 11, color: "#333", marginTop: 8 }}>The flame is lit. Guard it.</div>
        </div>
        <div style={{ display: "flex", marginBottom: 24, borderBottom: "1px solid #141414" }}>
          {["login", "register"].map(m => (
            <button key={m} onClick={() => { setMode(m); setError(""); }} style={{ flex: 1, padding: "10px", background: "transparent", border: "none", borderBottom: mode === m ? "2px solid #00FF87" : "2px solid transparent", color: mode === m ? "#00FF87" : "#333", cursor: "pointer", fontSize: 10, letterSpacing: 3, fontFamily: "'Courier New', monospace", textTransform: "uppercase", marginBottom: -1 }}>{m}</button>
          ))}
        </div>
        <input placeholder="Username" value={username} onChange={e => setUsername(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()} style={inputStyle} />
        <input placeholder="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()} style={inputStyle} />
        {error && <div style={{ fontSize: 11, color: "#FF4444", marginBottom: 12 }}>{error}</div>}
        <button onClick={handleSubmit} disabled={loading} style={{ width: "100%", background: loading ? "#0d0d0d" : "#00FF87", color: loading ? "#333" : "#000", border: "none", padding: "12px", fontSize: 11, letterSpacing: 3, cursor: loading ? "default" : "pointer", fontFamily: "'Courier New', monospace" }}>
          {loading ? "..." : mode === "login" ? "ENTER" : "CREATE ACCOUNT"}
        </button>
      </div>
    </div>
  );
}

function MatchJournal({ userId }) {
  const [entries, setEntries] = useState([]);
  const [form, setForm] = useState({ date: "", opponent: "", result: "", well: "", exposed: "", next: "" });
  const [adding, setAdding] = useState(false);
  const [loading, setLoading] = useState(true);
  useEffect(() => { sb.from("match_journal").select("*").eq("user_id", userId).order("created_at", { ascending: false }).then(({ data }) => { setEntries(data || []); setLoading(false); }); }, [userId]);
  const addEntry = async () => {
    if (!form.date) return;
    const { data } = await sb.from("match_journal").insert([{ ...form, user_id: userId }]).select().single();
    if (data) { setEntries([data, ...entries]); setForm({ date: "", opponent: "", result: "", well: "", exposed: "", next: "" }); setAdding(false); }

function ProgressLog({ userId }) {
  const [logs, setLogs] = useState([]);
  const [jugglingRecord, setJugglingRecord] = useState(0);
  const [form, setForm] = useState({ date: new Date().toISOString().split("T")[0], type: "Field", duration: "", juggling: "", notes: "", felt: "3" });

  const [loading, setLoading] = useState(true);
  useEffect(() => {
    async function load() {
      const [logsRes, jrRes] = await Promise.all([
        sb.from("progress_logs").select("*").eq("user_id", userId).order("created_at", { ascending: false }),
        sb.from("juggling_record").select("record").eq("user_id", userId).single(),
      ]);
      setLogs(logsRes.data || []); setJugglingRecord(jrRes.data?.record || 0); setLoading(false);
    }
    load();
  }, [userId]);
  const addLog = async () => {
    if (!form.date) return;
    const jugglingVal = parseInt(form.juggling) || 0;
    if (jugglingVal > jugglingRecord) { await sb.from("juggling_record").update({ record: jugglingVal, updated_at: new Date().toISOString() }).eq("user_id", userId); setJugglingRecord(jugglingVal); }
    const { data } = await sb.from("progress_logs").insert([{ ...form, user_id: userId }]).select().single();
    if (data) { setLogs([data, ...logs]); setForm({ date: new Date().toISOString().split("T")[0], type: "Field", duration: "", juggling: "", notes: "", felt: "3" }); setAdding(false); }
  };
  const deleteLog = async (id) => { await sb.from("progress_logs").delete().eq("id", id); setLogs(logs.filter(l => l.id !== id)); };
  const inputStyle = { background: "#0a0a0a", border: "1px solid #1a1a1a", padding: "8px 10px", color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none", width: "100%" };
  const thisWeek = logs.filter(l => { const d = new Date(l.date); const now = new Date(); return (now - d) / (1000 * 60 * 60 * 24) <= 7; }).length;

    <div className="page-padding" style={{ padding: "32px" }}>
      <div className="header-row" style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>

        <button onClick={() => setAdding(!adding)} style={{ background: adding ? "#1a1a1a" : "#00FF87", color: adding ? "#666" : "#000", border: "none", padding: "10px 16px", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>{adding ? "CANCEL" : "+ LOG SESSION"}</button>
      </div>
      <div className="grid-3col" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
        {[{ label: "Total Sessions", value: logs.length, color: "#00FF87" }, { label: "Juggling Record", value: jugglingRecord + " touches", color: "#00BFFF" }, { label: "This Week", value: thisWeek, color: "#FFD700" }].map((s, i) => (
          <div key={i} style={{ padding: "16px", background: "#0d0d0d", borderLeft: `3px solid ${s.color}` }}>
            <div style={{ fontSize: 24, fontWeight: 900, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 10, color: "#444", marginTop: 4, letterSpacing: 2 }}>{s.label.toUpperCase()}</div>
          </div>
        ))}
      </div>
      {adding && (
        <div style={{ background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "20px", marginBottom: 24 }}>
          <div className="form-3col" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 12 }}>
            <div><label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>DATE</label><input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} style={inputStyle} /></div>
            <div><label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>TYPE</label><select value={form.type} onChange={e => setForm({ ...form, type: e.target.value })} style={{ ...inputStyle, cursor: "pointer" }}>{["Field", "Gym", "Conditioning", "Pickup Game", "Indoor/Room"].map(t => <option key={t}>{t}</option>)}</select></div>

          </div>

            <div><label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>JUGGLING (touches)</label><input type="number" placeholder={`Record: ${jugglingRecord}`} value={form.juggling} onChange={e => setForm({ ...form, juggling: e.target.value })} style={inputStyle} /></div>

        </div>
      )}

          <span onClick={() => deleteLog(log.id)} style={{ fontSize: 10, color: "#222", cursor: "pointer", flexShrink: 0 }}>✕</span>
        </div>
      ))}
      {!loading && logs.length === 0 && <div style={{ fontSize: 12, color: "#333", padding: "40px 0", textAlign: "center" }}>No sessions logged yet.</div>}
    </div>
  );
}

function GoalsBoard({ userId }) {
  const [goals, setGoals] = useState([]);
  const [newGoal, setNewGoal] = useState("");
  const [newCat, setNewCat] = useState("short");
  const [loading, setLoading] = useState(true);
  useEffect(() => { sb.from("goals").select("*").eq("user_id", userId).order("created_at", { ascending: true }).then(({ data }) => { setGoals(data || []); setLoading(false); }); }, [userId]);
  const toggleGoal = async (id, done) => { await sb.from("goals").update({ done: !done }).eq("id", id); setGoals(goals.map(g => g.id === id ? { ...g, done: !done } : g)); };
  const addGoal = async () => {
    if (!newGoal.trim()) return;
    const { data } = await sb.from("goals").insert([{ user_id: userId, text: newGoal, category: newCat, done: false }]).select().single();
    if (data) { setGoals([...goals, data]); setNewGoal(""); }
  };
  const deleteGoal = async (id) => { await sb.from("goals").delete().eq("id", id); setGoals(goals.filter(g => g.id !== id)); };
  const cats = [{ key: "short", label: "SHORT TERM", color: "#00FF87", desc: "Next 3 months" }, { key: "medium", label: "MEDIUM TERM", color: "#FFD700", desc: "Next 1–2 years" }, { key: "long", label: "LONG TERM", color: "#FF4444", desc: "The vision" }];
  return (
    <div className="page-padding" style={{ padding: "32px" }}>
      <div style={{ fontSize: 10, letterSpacing: 6, color: "#333", marginBottom: 8 }}>WRITTEN DOWN. VISIBLE.</div>
      <div style={{ fontSize: 24, fontWeight: 900, color: "#fff", marginBottom: 24 }}>GOALS <span style={{ color: "#00FF87" }}>BOARD</span></div>
      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        <input value={newGoal} onChange={e => setNewGoal(e.target.value)} onKeyDown={e => e.key === "Enter" && addGoal()} placeholder="Add a new goal..." style={{ flex: 1, background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "8px 12px", color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none" }} />
        <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{ background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "8px 12px", color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 11, outline: "none", cursor: "pointer" }}>
          {cats.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
        </select>
        <button onClick={addGoal} style={{ background: "#00FF87", color: "#000", border: "none", padding: "8px 16px", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>ADD</button>
      </div>
      {loading && <div style={{ fontSize: 12, color: "#333", padding: "40px 0", textAlign: "center" }}>Loading...</div>}
      <div className="grid-goals" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16 }}>
        {cats.map(cat => (
          <div key={cat.key} style={{ background: "#0a0a0a", border: `1px solid ${cat.color}22` }}>
            <div style={{ padding: "12px 16px", borderBottom: `1px solid ${cat.color}22` }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: cat.color }}>{cat.label}</div>
              <div style={{ fontSize: 10, color: "#333", marginTop: 2 }}>{cat.desc}</div>
            </div>
            <div style={{ padding: "8px" }}>
              {goals.filter(g => g.category === cat.key).map(goal => (
                <div key={goal.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 8px", borderBottom: "1px solid #0d0d0d" }}>
                  <div onClick={() => toggleGoal(goal.id, goal.done)} style={{ width: 14, height: 14, border: `1px solid ${goal.done ? cat.color : "#333"}`, background: goal.done ? cat.color : "transparent", cursor: "pointer", flexShrink: 0 }} />
                  <div style={{ fontSize: 12, color: goal.done ? "#444" : "#888", textDecoration: goal.done ? "line-through" : "none", flex: 1 }}>{goal.text}</div>
                  <span onClick={() => deleteGoal(goal.id)} style={{ fontSize: 10, color: "#222", cursor: "pointer" }}>✕</span>
                </div>
              ))}
              {goals.filter(g => g.category === cat.key).length === 0 && <div style={{ fontSize: 11, color: "#222", padding: "12px 8px" }}>No goals set yet.</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  return (
    <div className="page-padding" style={{ padding: "32px" }}>
      <div style={{ fontSize: 10, letterSpacing: 6, color: "#333", marginBottom: 8 }}>BUILD YOUR TACTICAL LIBRARY</div>
      <div style={{ fontSize: 24, fontWeight: 900, color: "#fff", marginBottom: 24 }}>VIDEO <span style={{ color: "#FFD700" }}>NOTES</span></div>
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 10, letterSpacing: 4, color: "#333", marginBottom: 10 }}>STUDY THESE FIRST</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {suggestions.map((s, i) => <div key={i} style={{ padding: "6px 12px", background: "#0d0d0d", border: "1px solid #1a1a1a", fontSize: 11, color: "#555" }}>{s}</div>)}
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
        <button onClick={() => setAdding(!adding)} style={{ background: adding ? "#1a1a1a" : "#FFD700", color: adding ? "#666" : "#000", border: "none", padding: "10px 16px", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>{adding ? "CANCEL" : "+ ADD NOTES"}</button>
      </div>
      {adding && (
        <div style={{ background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "20px", marginBottom: 24 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 12 }}>
            {[["date", "DATE", "date"], ["player", "PLAYER STUDIED", "text"], ["match", "VIDEO / MATCH", "text"]].map(([key, label, type]) => (
              <div key={key}><label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>{label}</label><input type={type} value={form[key]} onChange={e => setForm({ ...form, [key]: e.target.value })} style={inputStyle} /></div>
            ))}
          </div>
          {[["observations", "WHAT I NOTICED"], ["apply", "HOW I APPLY THIS TO MY GAME"]].map(([key, label]) => (
            <div key={key} style={{ marginBottom: 12 }}><label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>{label}</label><textarea value={form[key]} onChange={e => setForm({ ...form, [key]: e.target.value })} rows={3} style={{ ...inputStyle, resize: "vertical" }} /></div>
          ))}
          <button onClick={addNote} style={{ background: "#FFD700", color: "#000", border: "none", padding: "10px 20px", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>SAVE</button>
        </div>
      )}
      {loading && <div style={{ fontSize: 12, color: "#333", padding: "40px 0", textAlign: "center" }}>Loading...</div>}
      {!loading && notes.length === 0 && !adding && <div style={{ fontSize: 12, color: "#333", padding: "40px 0", textAlign: "center" }}>No video notes yet. Start with Pirlo or Xavi.</div>}
      {notes.map(note => (
        <div key={note.id} style={{ background: "#0d0d0d", borderLeft: "3px solid #FFD700", padding: "16px", marginBottom: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
            <div>{note.player && <span style={{ fontSize: 13, color: "#FFD700", fontWeight: 900 }}>{note.player}</span>}{note.match && <span style={{ fontSize: 11, color: "#555", marginLeft: 10 }}>{note.match}</span>}<span style={{ fontSize: 11, color: "#333", marginLeft: 10 }}>{note.date}</span></div>
            <span onClick={() => deleteNote(note.id)} style={{ fontSize: 10, color: "#333", cursor: "pointer" }}>✕</span>
          </div>
          {note.observations && <div style={{ marginBottom: 10 }}><div style={{ fontSize: 9, letterSpacing: 3, color: "#444", marginBottom: 4 }}>NOTICED</div><div style={{ fontSize: 12, color: "#666", lineHeight: 1.6 }}>{note.observations}</div></div>}
          {note.apply && <div><div style={{ fontSize: 9, letterSpacing: 3, color: "#444", marginBottom: 4 }}>APPLY TO MY GAME</div><div style={{ fontSize: 12, color: "#666", lineHeight: 1.6 }}>{note.apply}</div></div>}
        </div>
      ))}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

// ─── SKILLS CENTER ────────────────────────────────────────────────────────────
const SKILL_CATEGORIES = {
  fundamentals: {
    label: "Fundamentals", color: "#00FF87",
    skills: [
      "Passing — Short", "Passing — Long", "Passing — Through Ball",
      "First Touch — Inside", "First Touch — Outside", "First Touch — Chest",
      "Shooting — Driven", "Shooting — Curl", "Shooting — Knuckleball",
      "Dribbling — Close Control", "Dribbling — Speed",
      "Defending — 1v1", "Defending — Positioning",
      "Heading", "Crossing", "Pressing",
    ]
  },
  leftfoot: {
    label: "Left Foot", color: "#00BFFF",
    skills: [
      "Left Foot — Pass", "Left Foot — Shot", "Left Foot — First Touch",
      "Left Foot — Dribbling", "Left Foot — Cross", "Left Foot — Curl",
    ]
  },
  physical: {
    label: "Physical", color: "#FFD700",
    skills: [
      "Sprint Speed", "Explosive First Step", "Stamina", "Strength",
      "Agility", "Balance", "Jumping",
    ]
  },
  tactical: {
    label: "Tactical IQ", color: "#FF8C00",
    skills: [
      "Scanning / Awareness", "Positioning Between Lines", "Transition Reading",
      "Space Creation", "Pressing Triggers", "Tempo Control",
      "Third Man Runs", "Overload Recognition",
    ]
  },
  flair: {
    label: "Flair & Advanced", color: "#FF4444",
    skills: [
      "Rabona", "Nutmeg", "Rainbow Flick", "Elastico",
      "Roulette (Zidane Turn)", "Cruyff Turn", "Step-Over",
      "Outside of Foot Pass (Trivela)", "Bicycle Kick",
      "No-Look Pass", "Heel Pass", "Chip Shot",
      "Scorpion Kick", "Juggling — Both Feet", "Juggling — Headers",
    ]
  },
  setpieces: {
    label: "Set Pieces", color: "#B87FFF",
    skills: [
      "Free Kick — Direct", "Free Kick — Curl", "Free Kick — Knuckleball",
      "Corner Kick — Inswing", "Corner Kick — Outswing",
      "Penalty", "Throw-In (Long)",
    ]
  },
};

const RATING_LABELS = ["—", "Beginner", "Learning", "Developing", "Competent", "Sharp", "Elite"];
const RATING_COLORS = ["#333", "#FF4444", "#FF8C00", "#FFD700", "#00BFFF", "#00FF87", "#fff"];

function SkillsCenter({ userId }) {
  const [tab, setTab] = useState("overview");
  const [skills, setSkills] = useState({});
  const [goals, setGoals] = useState({});
  const [loading, setLoading] = useState(true);
  const [editingSkill, setEditingSkill] = useState(null);
  const [filterCat, setFilterCat] = useState("all");

  useEffect(() => {
    async function load() {
      const { data } = await sb.from("skills").select("*").eq("user_id", userId);
      const skillMap = {};
      const goalMap = {};
      (data || []).forEach(s => {
        skillMap[s.skill_name] = s.rating || 0;
        if (s.is_goal) goalMap[s.skill_name] = { priority: s.priority || "normal", notes: s.notes || "" };
      });
      setSkills(skillMap);
      setGoals(goalMap);
      setLoading(false);
    }
    load();
  }, [userId]);

  const updateRating = async (skillName, rating) => {
    const existing = await sb.from("skills").select("id").eq("user_id", userId).eq("skill_name", skillName).single();
    if (existing.data) {
      await sb.from("skills").update({ rating }).eq("id", existing.data.id);
    } else {
      await sb.from("skills").insert([{ user_id: userId, skill_name: skillName, rating, is_goal: false }]);
    }
    setSkills(prev => ({ ...prev, [skillName]: rating }));
    setEditingSkill(null);
  };

  const toggleGoal = async (skillName) => {
    const isGoal = !!goals[skillName];
    const existing = await sb.from("skills").select("id").eq("user_id", userId).eq("skill_name", skillName).single();
    if (existing.data) {
      await sb.from("skills").update({ is_goal: !isGoal }).eq("id", existing.data.id);
    } else {
      await sb.from("skills").insert([{ user_id: userId, skill_name: skillName, rating: 0, is_goal: true }]);
    }
    if (isGoal) {
      const newGoals = { ...goals };
      delete newGoals[skillName];
      setGoals(newGoals);
    } else {
      setGoals(prev => ({ ...prev, [skillName]: { priority: "normal", notes: "" } }));
    }
  };

  const allSkillsFlat = Object.entries(SKILL_CATEGORIES).flatMap(([cat, { skills }]) =>
    skills.map(s => ({ name: s, cat }))
  );

  const goalSkills = allSkillsFlat.filter(s => goals[s.name]);

  const inputStyle = {
    background: "#0a0a0a", border: "1px solid #1a1a1a", padding: "8px 10px",
    color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none", width: "100%"
  };

  const tabs = [
    { id: "overview", label: "My Skills" },
    { id: "goals", label: "To Master" },
  ];

  if (loading) return <div style={{ padding: 32, fontSize: 12, color: "#333" }}>Loading...</div>;

  const avgRating = () => {
    const rated = Object.values(skills).filter(r => r > 0);
    if (!rated.length) return 0;
    return (rated.reduce((a, b) => a + b, 0) / rated.length).toFixed(1);
  };

  const topSkills = allSkillsFlat.filter(s => (skills[s.name] || 0) >= 5).slice(0, 4);
  const weakSkills = allSkillsFlat.filter(s => (skills[s.name] || 0) > 0 && (skills[s.name] || 0) <= 2).slice(0, 4);

  return (
    <div>
      <div className="page-padding" style={{ padding: "32px 32px 0" }}>
        <div style={{ fontSize: 10, letterSpacing: 6, color: "#333", marginBottom: 8 }}>KNOW WHERE YOU STAND</div>
        <div style={{ fontSize: 24, fontWeight: 900, color: "#fff", marginBottom: 20 }}>SKILLS <span style={{ color: "#00FF87" }}>CENTER</span></div>

        {/* Quick stats */}
        <div className="grid-stats" style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10, marginBottom: 24 }}>
          {[
            { label: "Avg Rating", value: avgRating(), color: "#00FF87" },
            { label: "Skills Rated", value: Object.values(skills).filter(r => r > 0).length, color: "#00BFFF" },
            { label: "To Master", value: goalSkills.length, color: "#FFD700" },
            { label: "Elite (6)", value: Object.values(skills).filter(r => r === 6).length, color: "#FF4444" },
          ].map((s, i) => (
            <div key={i} style={{ padding: "14px 12px", background: "#0d0d0d", borderLeft: `2px solid ${s.color}` }}>
              <div style={{ fontSize: 20, fontWeight: 900, color: s.color }}>{s.value}</div>
              <div style={{ fontSize: 9, color: "#444", marginTop: 3, letterSpacing: 1 }}>{s.label.toUpperCase()}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", borderBottom: "1px solid #141414", marginBottom: 0 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding: "10px 20px", background: "transparent", border: "none",
              borderBottom: tab === t.id ? "2px solid #00FF87" : "2px solid transparent",
              color: tab === t.id ? "#00FF87" : "#444", cursor: "pointer",
              fontSize: 11, letterSpacing: 3, fontFamily: "'Courier New', monospace",
              textTransform: "uppercase", marginBottom: -1,
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      {/* OVERVIEW TAB */}
      {tab === "overview" && (
        <div className="page-padding" style={{ padding: "20px 32px 32px" }}>

          {/* Strengths / Weaknesses summary */}
          {(topSkills.length > 0 || weakSkills.length > 0) && (
            <div className="grid-stats" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 24 }}>
              {topSkills.length > 0 && (
                <div style={{ padding: "14px", background: "#0d0d0d", borderLeft: "2px solid #00FF87" }}>
                  <div style={{ fontSize: 9, letterSpacing: 3, color: "#00FF87", marginBottom: 8 }}>STRENGTHS</div>
                  {topSkills.map(s => (
                    <div key={s.name} style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>
                      {s.name.split("—")[1]?.trim() || s.name.split(" ")[0]} <span style={{ color: "#00FF87" }}>{"★".repeat(skills[s.name])}</span>
                    </div>
                  ))}
                </div>
              )}
              {weakSkills.length > 0 && (
                <div style={{ padding: "14px", background: "#0d0d0d", borderLeft: "2px solid #FF4444" }}>
                  <div style={{ fontSize: 9, letterSpacing: 3, color: "#FF4444", marginBottom: 8 }}>NEEDS WORK</div>
                  {weakSkills.map(s => (
                    <div key={s.name} style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>
                      {s.name.split("—")[1]?.trim() || s.name.split(" ")[0]} <span style={{ color: "#FF4444" }}>{"▪".repeat(skills[s.name])}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Category filter */}
          <div style={{ display: "flex", gap: 8, overflowX: "auto", marginBottom: 20, paddingBottom: 4 }}>
            {[{ id: "all", label: "All" }, ...Object.entries(SKILL_CATEGORIES).map(([id, { label }]) => ({ id, label }))].map(cat => (
              <button key={cat.id} onClick={() => setFilterCat(cat.id)} style={{
                padding: "6px 12px", background: "transparent", border: `1px solid ${filterCat === cat.id ? "#00FF87" : "#1a1a1a"}`,
                color: filterCat === cat.id ? "#00FF87" : "#444", cursor: "pointer", fontSize: 9,
                letterSpacing: 2, fontFamily: "'Courier New', monospace", whiteSpace: "nowrap", flexShrink: 0,
              }}>{cat.label.toUpperCase()}</button>
            ))}
          </div>

          {/* Skills by category */}
          {Object.entries(SKILL_CATEGORIES)
            .filter(([catId]) => filterCat === "all" || filterCat === catId)
            .map(([catId, { label, color, skills: catSkills }]) => (
            <div key={catId} style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 9, letterSpacing: 4, color, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ width: 16, height: 1, background: color }} />
                {label.toUpperCase()}
                <div style={{ flex: 1, height: 1, background: "#141414" }} />
              </div>
              {catSkills.map(skillName => {
                const rating = skills[skillName] || 0;
                const isEditing = editingSkill === skillName;
                const isGoal = !!goals[skillName];
                return (
                  <div key={skillName} style={{ marginBottom: 6 }}>
                    <div style={{
                      padding: "10px 12px", background: isEditing ? "#111" : "#0d0d0d",
                      border: `1px solid ${isEditing ? color : "#141414"}`,
                      cursor: "pointer", transition: "all 0.15s",
                    }} onClick={() => setEditingSkill(isEditing ? null : skillName)}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <span style={{ fontSize: 11, color: "#888" }}>{skillName}</span>
                          {isGoal && <span style={{ fontSize: 8, letterSpacing: 2, color: "#FFD700", border: "1px solid #FFD70044", padding: "1px 5px" }}>GOAL</span>}
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          {rating > 0 && (
                            <span style={{ fontSize: 9, color: RATING_COLORS[rating], letterSpacing: 1 }}>{RATING_LABELS[rating].toUpperCase()}</span>
                          )}
                          <div style={{ display: "flex", gap: 2 }}>
                            {[1,2,3,4,5,6].map(i => (
                              <div key={i} style={{ width: 6, height: 6, background: i <= rating ? RATING_COLORS[rating] : "#1a1a1a", borderRadius: 1 }} />
                            ))}
                          </div>
                          <span style={{ fontSize: 10, color: "#333", marginLeft: 4 }}>{isEditing ? "▲" : "▼"}</span>
                        </div>
                      </div>
                    </div>

                    {isEditing && (
                      <div style={{ background: "#0a0a0a", border: `1px solid ${color}22`, borderTop: "none", padding: "12px" }}>
                        <div style={{ fontSize: 9, letterSpacing: 3, color: "#444", marginBottom: 10 }}>SET RATING</div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                          {RATING_LABELS.map((label, i) => i === 0 ? null : (
                            <button key={i} onClick={() => updateRating(skillName, i)} style={{
                              padding: "6px 10px", background: rating === i ? RATING_COLORS[i] : "transparent",
                              border: `1px solid ${rating === i ? RATING_COLORS[i] : "#222"}`,
                              color: rating === i ? "#000" : RATING_COLORS[i],
                              cursor: "pointer", fontSize: 9, letterSpacing: 1,
                              fontFamily: "'Courier New', monospace",
                            }}>{label.toUpperCase()}</button>
                          ))}
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <div onClick={() => toggleGoal(skillName)} style={{
                            padding: "6px 12px", background: isGoal ? "#FFD70022" : "transparent",
                            border: `1px solid ${isGoal ? "#FFD700" : "#222"}`,
                            color: isGoal ? "#FFD700" : "#444", cursor: "pointer",
                            fontSize: 9, letterSpacing: 2, fontFamily: "'Courier New', monospace",
                          }}>{isGoal ? "✓ IN GOALS" : "+ ADD TO GOALS"}</div>
                          <div onClick={() => updateRating(skillName, 0)} style={{ fontSize: 9, color: "#333", cursor: "pointer", letterSpacing: 1 }}>CLEAR</div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      )}

      {/* TO MASTER TAB */}
      {tab === "goals" && (
        <div className="page-padding" style={{ padding: "20px 32px 32px" }}>
          {goalSkills.length === 0 ? (
            <div style={{ fontSize: 12, color: "#333", padding: "40px 0", textAlign: "center" }}>
              No skills marked as goals yet.<br />
              <span style={{ fontSize: 11, color: "#222" }}>Go to My Skills → tap any skill → Add to Goals</span>
            </div>
          ) : (
            Object.entries(SKILL_CATEGORIES).map(([catId, { label, color, skills: catSkills }]) => {
              const catGoals = catSkills.filter(s => goals[s]);
              if (!catGoals.length) return null;
              return (
                <div key={catId} style={{ marginBottom: 28 }}>
                  <div style={{ fontSize: 9, letterSpacing: 4, color, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                    <div style={{ width: 16, height: 1, background: color }} />
                    {label.toUpperCase()}
                    <div style={{ flex: 1, height: 1, background: "#141414" }} />
                  </div>
                  {catGoals.map(skillName => {
                    const rating = skills[skillName] || 0;
                    return (
                      <div key={skillName} style={{ padding: "14px 12px", background: "#0d0d0d", borderLeft: `2px solid ${color}`, marginBottom: 8 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                          <span style={{ fontSize: 12, color: "#ccc" }}>{skillName}</span>
                          <div onClick={() => toggleGoal(skillName)} style={{ fontSize: 9, color: "#333", cursor: "pointer", letterSpacing: 1 }}>REMOVE</div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <div style={{ flex: 1, height: 3, background: "#141414", borderRadius: 2, overflow: "hidden" }}>
                            <div style={{ width: `${(rating / 6) * 100}%`, height: "100%", background: RATING_COLORS[rating] || "#333", transition: "width 0.3s", borderRadius: 2 }} />
                          </div>
                          <span style={{ fontSize: 9, color: RATING_COLORS[rating] || "#333", minWidth: 60, textAlign: "right" }}>
                            {rating > 0 ? RATING_LABELS[rating].toUpperCase() : "NOT RATED"}
                          </span>
                        </div>
                        {rating === 0 && (
                          <div style={{ fontSize: 10, color: "#2a2a2a", marginTop: 6 }}>Go to My Skills to set your current level →</div>
                        )}
                        {rating === 6 && (
                          <div style={{ fontSize: 10, color: "#00FF87", marginTop: 6 }}>✓ MASTERED</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

</script>
</body>
</html>
