    { name: "Outside Touch Narrow Space", how: "Two cones 2 yards apart as a corridor. Receive passes inside the corridor and take outside-foot touches that redirect within the corridor without going outside the cones. Tight directional control.", avoid: "Don't knock the ball outside the corridor. Tight space means tight touch. Soften the outer foot contact and keep it compact." },
    { name: "Outside Touch Into 1v1", how: "Receive a pass and take an outside-foot first touch to beat a passive defender standing 1 yard away. The touch opens up space in one direction, and you exploit it immediately with a dribble.", avoid: "Don't take the outside touch and then hesitate. The touch and the forward movement should be one fluid motion — touch, accelerate." },
    { name: "Outside Touch to Change Angles", how: "Receive passes from 6 different positions around you (as if a clock). For each angle, use an outside-foot touch to reposition toward the 'goal' (a cone 10 yards away). Practice the adjustment from any angle.", avoid: "Don't use inside foot when the geometry calls for outside. Certain angles genuinely require the outside touch — train to recognize those." },
    { name: "Outside Touch from a Cross", how: "Partner whips in a hard low cross from the right. Receive it with the outside of your left foot at pace. This is the most realistic context for outside touches — receiving balls driven from wide positions.", avoid: "Don't reach for it — position your body to receive it centrally. Outside foot touch on a hard cross requires precise body positioning, not arm-stretching." },
    { name: "Outside Touch as Fake Pass", how: "Shape to pass left. Instead, take an outside-right-foot touch to go right. The 'pass shape' is the deception, the outside touch is the escape. Works beautifully against aggressive pressers.", avoid: "Don't overuse this — defenders adapt. In practice, drill it so it's available when needed." },
    { name: "Outside Touch to Square Ball", how: "Receive a pass, take an outside-foot touch that redirects the ball square (90 degrees), and immediately play a pass in the new direction. Changes your angle instantly and cleanly.", avoid: "Don't take the outside touch and then wait — the square pass should follow immediately. Touch → pass is the one sequence." },
    { name: "Outside Touch Perfection Reps", how: "20 minutes of pure outside-foot touch practice. No other drills, just receive and take outside touches in every direction imaginable. High volume, focus on quality. This surface gets neglected — fix that.", avoid: "Don't phone it in. Every touch must have intention. If you're losing focus, take a water break and come back. Mindless reps build mindless habits." },
  ],

  "First Touch — Chest": [
    { name: "Throw and Chest Down", how: "Throw the ball up 10 feet straight above you. As it falls, puff your chest out, lean slightly back, make contact with your pectoral muscle, and deflect it down at your feet. Your chest is the surface — use it like a cushion.", avoid: "Don't suck your chest in or hunch forward. An open chest creates the cushioning surface. Don't let the ball bounce too far away — aim to land it within 1 yard of your feet." },
    { name: "Partner Throw and Control", how: "Partner throws to your chest from 8 yards. Control it to your feet with one chest touch. Vary the throw height — waist height, shoulder height, head height. Each requires a slight body tilt adjustment.", avoid: "Don't move into the ball too aggressively. Let it come to you and cushion by leaning back and withdrawing on contact. Don't try to redirect it too far — just get it to your feet first." },
    { name: "Chest Touch Directional Control", how: "Partner throws to your chest. Your chest touch sends the ball to either your left or right foot (by angling your chest). 10 reps to the left, 10 to the right, 10 alternating. Train both directions equally.", avoid: "Don't use your arms to redirect the ball — your whole upper body rotates to angle the chest surface. Arm interference is a foul in a game." },
    { name: "Chest to Volley", how: "Partner throws chest-high. Take a chest touch to pop it up, and volley it back on the second touch. The chest touch must pop it to a perfect height for the volley — neither too high nor too low.", avoid: "Don't chest it directly back as a pass — let it pop upward so you have time for the volley. The chest touch angle determines the volley height." },
    { name: "Chest to Thigh to Foot", how: "From a throw, chest the ball down to your thigh, then let it drop to your foot. 3-touch sequence builds full aerial control coordination. Practice until all 3 touches are smooth and predictable.", avoid: "Don't rush the sequence — let each touch happen naturally. If the chest touch is too hard, the thigh touch goes wrong, and the sequence falls apart." },
    { name: "Chest Control Under Pressure", how: "A partner applies passive pressure from behind. You receive a thrown ball on your chest and must control it quickly and move away from the pressure in one smooth sequence. Chest touch is the first action in an escape.", avoid: "Don't take a heavy chest touch when a defender is behind you — it just goes toward them. Take it away from pressure, not straight down." },
    { name: "Chest Control to Instant Pass", how: "Receive a thrown ball on your chest, control it to feet, and immediately play a pass to a second partner within 2 seconds of the chest touch. Builds the transition from receiving a long ball to playing quickly.", avoid: "Don't dawdle after the chest touch. In a game, the time between your chest touch and your pass determines whether you get tackled or stay in possession." },
    { name: "Chest Touch for Height", how: "Practice controlling chest-high balls so they land at exactly the height you want: once to land at your knee, once to land at your foot, once to pop up for a volley. The same ball, three different chest touch angles.", avoid: "Don't be satisfied with just getting it down. The landing height of a chest touch is something you can control — work on it consciously." },
    { name: "Moving Chest Control", how: "While jogging forward, a partner throws a ball ahead of you at chest height. Chest it forward to maintain your running momentum — the touch goes ahead of you, not down at your feet.", avoid: "Don't stop to control it. A moving chest touch is different from a stationary one — lean forward slightly so the ball deflects forward with your momentum." },
    { name: "Chest Control From Crosses", how: "Partner crosses a ball from the wing (thrown or kicked from wide). Control the ball from cross height on your chest and bring it down to your feet as if a striker or midfielder receiving in the box.", avoid: "Don't watch the ball all the way into your chest. Look up quickly after the touch to identify your next move. Receiving a cross is always followed immediately by another action." },
    { name: "Back to Goal Chest Control", how: "Stand with your back to goal. Partner throws over your shoulder. Chest it, turn, and shoot or pass. The sequence — back to goal, aerial receive, turn — is one of the most important attacking sequences in soccer.", avoid: "Don't try to chest it sideways or backward. Let it come over your shoulder, chest it down in front of you, then turn. Two separate movements." },
    { name: "Chest Control in Rain", how: "Practice on wet days specifically. A wet ball on the chest behaves differently — it slides rather than cushions. Slightly firmer chest position to account for the reduced friction.", avoid: "Don't use the same technique in the rain as in dry conditions. The ball slides off a wet chest much faster — you need to angle more deliberately to direct it." },
    { name: "Chest to Head Flick", how: "Partner throws at chest height. Instead of controlling it down, head the ball back on one bounce of the chest. The chest touch slows it and pops it up, the header returns it. Coordination drill.", avoid: "Don't head it aggressively — this is a technical coordination drill. The header should be soft and accurate, not a clearance." },
    { name: "Chest Touch Accuracy", how: "Partner throws to your chest from 10 yards. Land every chest touch within a hoop placed at your feet. The hoop forces you to control the directional precision of your touch, not just get it down 'somewhere near you.'", avoid: "Don't move the hoop after a miss — the miss is the data point. If you're constantly missing left, your chest surface is angled left. Adjust and correct." },
    { name: "Rapid Chest Reps", how: "Partner throws 20 consecutive balls to your chest with minimal pause. You must control each one quickly enough to be ready for the next. Simulates receiving multiple aerial balls in a tight window, like set pieces or goal mouth scrambles.", avoid: "Don't let the pace overwhelm your technique. If 20 reps degrades your touch, do 10 and build up. Quality at pace beats quantity with poor touches." },
    { name: "Chest Down to Volley on Turn", how: "Receive a throw, chest it, and as it pops up slightly, turn and volley in a different direction from where the throw came. The full sequence: receive aerial ball, control, turn, strike.", avoid: "Don't rush the turn. Let the chest touch settle for a fraction of a second before turning. A rushed turn off a chest touch usually sends the ball wide." },
    { name: "Chest to Weak Foot", how: "Specifically practice chest-controlling the ball down to your left (weak) foot. After the touch, the ball lands at your left foot for a pass or shot. Forces left-foot development into your aerial control sequence.", avoid: "Don't let the ball naturally favor your right foot after the chest touch. Consciously angle your chest to the left. Practice until it feels as natural as the right." },
    { name: "Long Ball Chest Control", how: "Partner drives a long aerial ball — 30+ yards. The ball has much more pace and spin on it. Control it with your chest under the extra pace. Higher incoming pace requires more cushioning — lean back more.", avoid: "Don't brace against a fast aerial ball. The more pace it has, the more you need to open up and cushion. A stiff chest sends a fast ball flying 10 yards." },
    { name: "Chest Control Decision Making", how: "Partner throws either to your chest or at your feet randomly. When it's chest height, control it. When it's at feet, don't use your chest. Builds your quick recognition of ball height and appropriate technique.", avoid: "Don't use your chest for everything aerial. If it's below your waist, use your feet. The decision has to be instant." },
    { name: "Chest Touch then 1v1 Dribble", how: "Receive a throw on your chest, control it, and immediately take on a passive defender in a 1v1. The chest touch sets you up for a live situation — practice transitioning from receiving into attack instantly.", avoid: "Don't pause after the chest touch before engaging the 1v1. The sequence should flow: receive, control, attack. No hesitation between each stage." },
    { name: "Bounce Chest Control", how: "Kick the ball hard against a wall and as it bounces back at chest height, control it. The bounce gives you an unpredictable chest ball — variable pace and spin. Simulates real game aerial balls.", avoid: "Don't always expect the ball to bounce at a comfortable height. Adjust your position to get your chest behind whatever height it bounces to." },
    { name: "Overhead Throw Chest", how: "Partner throws a very high overhead ball — almost straight up, 15+ feet. As it drops almost vertically onto your chest, the touch must be soft and precise. Vertical drops require different chest mechanics than linear throws.", avoid: "Don't step away from the dropping ball. Position under it, open your chest upward, and cushion straight down. Moving away causes the ball to pop wildly." },
    { name: "Chest to Spin and Pass", how: "Receive on your chest, spin 180 degrees as it drops to your foot, and pass in the direction you came from (back toward where the throw originated). Complete turnaround on a chest ball.", avoid: "Don't force the spin if the chest touch is loose. A poor chest touch will make the spin sloppy. The sequence only works cleanly if stage one (the chest touch) is clean." },
    { name: "Chest Control as Keeper Throw", how: "Partner throws a goalkeeper-style rolling then rising ball — hard underarm throw that rises to chest height. This specific pace and trajectory mimics goalkeeper distributions. Practice specifically for this type.", avoid: "Don't treat a goalkeeper throw the same as an overhead throw. The trajectory coming upward to chest requires you to lean into it slightly more." },
    { name: "Headers vs Chest Decision", how: "Partner throws at varying heights — sometimes forehead height (header), sometimes chest height (chest touch). You must decide instantly which technique to use and execute cleanly.", avoid: "Don't always choose the same option. At true chest height, use your chest. At forehead height, use your head. Build sharp situational recognition." },
    { name: "Chest Control Under Fatigue", how: "After 10 sprint repetitions (30 meters each), receive 5 chest balls from a partner. Your chest control when fatigued will be messy — train to stabilize it even when tired.", avoid: "Don't wait until you've fully caught your breath before receiving. The drill is about maintaining technique when fatigued, not after recovery." },
    { name: "Chest to Instep Drive", how: "Chest the ball down and as it bounces up from the ground, hit a driven instep shot before it hits the ground again (half-volley). The chest control must be precise for the half-volley to work.", avoid: "Don't rush the shot. Let the chest touch bounce once cleanly before striking. If the first touch is bad, reset and try again — don't keep the sequence going with a poor chest touch." },
    { name: "Chest to Overhead Flick", how: "Receive a chest ball and flick it overhead with the top of your chest (lean back more). Advanced — turns the chest into a flick rather than a control. Used to play balls over close defenders.", avoid: "Don't try this until your basic chest touch is solid. This is an advanced variation. Lean back far enough that the ball pops upward and backward over you." },
    { name: "Two-Player Chest Exchange", how: "You and a partner take turns throwing to each other's chests and controlling. Neither ball should touch the ground. If it does, restart the count. Try to get to 20 consecutive chest exchanges.", avoid: "Don't throw hard at each other — moderate pace makes for better chest control practice. This is about touch, not about testing the other person with power." },
    { name: "Chest Touch Then Dribble Under Pressure", how: "Receive the ball on your chest from a partner. Immediately a second partner closes down. Shield the ball with your body after the chest touch and dribble away from pressure. Full realistic game sequence.", avoid: "Don't forget to shield after the touch. The chest touch puts the ball at your feet — your body position immediately after should already be between ball and defender." },
  ],

  "Shooting — Driven": [
    { name: "Stationary Laces Drive", how: "Ball stationary. Approach at 45 degrees, plant foot beside the ball, and drive through it with your laces. Strike the center of the ball. Follow through toward the target. 4 sets of 10 from the same spot.", avoid: "Don't lean back — it sends the ball over the bar. Keep your head over the ball and your knee over it at contact. Don't use your toe — it's the laces." },
    { name: "Moving Ball Drive", how: "Push the ball forward with one touch, then drive it with the second. The ball is moving when you strike it — this is the more realistic scenario. Practice from roll-forward and sideways-moving balls.", avoid: "Don't rush into the strike. Let the ball settle slightly into your stride. If the ball is too far ahead, your contact will be off. Timing is everything." },
    { name: "Strike From Set Position (Both Sides)", how: "Stand at the edge of the box, 5 shots from left of center, 5 from right, 5 from center. Learn how your accuracy changes by angle. Track which positions and which feet give you the best results.", avoid: "Don't always shoot from your comfortable position. The point of this drill is discovering your weaker angles and fixing them." },
    { name: "Driven Shot After Pass", how: "A partner rolls a pass to you. Control or let it run across your body, then drive the shot. The touch-before-shot sequence is what most finishing chances actually look like.", avoid: "Don't over-touch the ball before shooting. One touch to set, one to shoot. If you're taking 3+ touches before a shot in training, you'll do it in games." },
    { name: "First-Time Driven Shot", how: "Partner plays a firm pass to your shooting foot. Without taking a touch, drive it first time toward goal. Make it low. 20 reps per foot.", avoid: "Don't stab at first-time shots. Plant your foot firmly and swing through properly. Short, jabbing motions on first-time drives are the #1 cause of ballooned shots." },
    { name: "Driven Shot Power Ladder", how: "Start 15 yards from goal and shoot at 60% power — focus on accuracy. Move back to 20 yards at 80% power. Move to 25 yards at full power. The power increases with distance, accuracy remains the goal.", avoid: "Don't sacrifice technique as you move further back. More power comes from a longer backswing and fuller follow-through, not from tensing up." },
    { name: "Driven Low Shot Practice", how: "Aim specifically for the bottom corners. 5 shots bottom-left, 5 bottom-right per set. A driven low shot is the hardest for goalkeepers to stop. Keep your ankle locked and strike through the bottom half of the ball.", avoid: "Don't try to scoop the ball low — that lifts it. Lock your ankle and follow through toward the ground. The trajectory determines where it goes, not your intent." },
    { name: "Volley Drive", how: "Partner throws or tosses a ball at knee-to-waist height. Drive it on the volley — full laces contact, forward follow-through. Volleys require impeccable timing. Do 15 per foot.", avoid: "Don't let the ball drop too low before striking. For a driven volley, contact should happen around knee height. Too low becomes a ground shot, too high goes over." },
    { name: "Pressure Shot (Closing Defender)", how: "A partner walks toward you from 5 yards away. You have 4 seconds before they arrive. Strike a driven shot on goal. Builds composure and quick decision-making under a closing defender.", avoid: "Don't rush the mechanics. The defender approaching makes people shorten their swing. Fight that urge — take your full backswing and follow through." },
    { name: "Driven Shot on the Turn", how: "Stand with back to goal. Partner passes over your shoulder. Control, turn, and drive a shot within 3 touches. The turn happens on touch 1 or 2 — the drive is the final action.", avoid: "Don't over-rotate on the turn and lose your shooting balance. A sharp, efficient turn that leaves you balanced is worth more than a flashy one that puts you off." },
    { name: "Rebound Shooting", how: "Shoot at a wall and shoot the rebound first time. The rebound arrives at awkward pace and angle — you must drive it cleanly regardless. Simulates box rebounds and saves that come back to you.", avoid: "Don't wait for the perfect rebound. If it arrives awkward, adapt and shoot. Half the goals in a game come from imperfect situations." },
    { name: "Dribble and Drive", how: "Dribble 10 yards, cut left or right, and drive a shot on goal. The dribble + cut opens up a shooting angle — practice creating your own space before the shot.", avoid: "Don't slow down before the shot. The dribble into the cut into the shot should be one flowing sequence. Slowing before the shot telegraphs it to the goalkeeper." },
    { name: "Driven Shot Under Fatigue", how: "After 200-meter sprint, receive a pass and drive on goal immediately. Fatigued shooting is where most players fall apart — legs are heavy, knee position drops, ball goes over.", avoid: "Don't slow the approach or shorten the follow-through because you're tired. Fight for proper mechanics every rep." },
    { name: "Weak Foot Driven Shot", how: "20 minutes of left-foot (weak foot) driven shooting only. No right foot in this drill. It will feel unnatural — that's the point. Focus on locking the ankle, striking laces, and following through.", avoid: "Don't give up because it feels bad. The early reps of weak foot driven shots are supposed to feel wrong. Stay technical." },
    { name: "Shooting Angle Roulette", how: "Place cones at 8 different positions around the penalty area. Partner calls a cone — you sprint there and shoot immediately. Tests your ability to shoot accurately from any angle under speed.", avoid: "Don't only sprint to the comfortable positions when given a choice. In a game, you don't choose your shooting position." },
    { name: "Driven Corner Zone", how: "Aim driven shots specifically at each corner of the goal: top-left, top-right, bottom-left, bottom-right. 5 shots per corner. Forced targeting trains your brain to aim for specific zones.", avoid: "Don't just aim 'generally toward goal.' Pick the exact corner before you approach and commit to it. Even misses are more useful when you had a specific target." },
    { name: "Hip Rotation Drill", how: "Take 10 driven shots focusing entirely on hip rotation — as you swing, rotate your hips through the ball in the direction of your target. Exaggerate it. Hip rotation is the source of power on driven shots.", avoid: "Don't generate power only from your leg. If your hips stay square, you're leaving 30% of your power on the table. Rotate them fully through contact." },
    { name: "Driven Shot From Chest Control", how: "Receive a cross or high ball on your chest. Let it drop to feet and drive the shot immediately. Chest → ground → shot in 2 touches. A realistic striker/midfielder sequence.", avoid: "Don't let the chest touch land awkwardly — the chest touch must set up the shot. If the first touch is messy, the shot quality suffers." },
    { name: "Crossbar Challenge", how: "Aim driven shots at the crossbar from 20 yards. This forces accuracy combined with power. Hitting the crossbar consistently means your shot trajectory and pace are both exceptional.", avoid: "Don't lob it at the bar — a driven shot at the crossbar should be flat and fast. It should clip the bar going hard, not arc onto it softly." },
    { name: "3-Touch Finish", how: "Receive a pass from the right, control forward, drive on goal. Exactly 3 touches. The counting forces economy — no extra steps, no extra touches. Common finishing sequence from midfielders arriving into the box.", avoid: "Don't sacrifice quality to hit exactly 3. If the 3rd touch isn't a clean strike, the drill has still failed. Quality within the constraint." },
    { name: "Driven Shot at Moving Keeper (Cone)", how: "Place a cone in goal that moves laterally on a track (or have a partner move a cone). Aim for the side the 'keeper' is moving away from. Trains picking the right side under the instinct to just blast it.", avoid: "Don't always aim at the same side. Track the 'keeper movement' and adjust your target in the final stride. This requires late decision-making." },
    { name: "Half-Volley Power Drive", how: "Drop the ball, let it bounce once, and drive it on the half-volley as it rises. The half-volley generates massive power when timed correctly — ball is on its way up when you strike it.", avoid: "Don't strike it too early (before the bounce) or too late (when it's already dropping again). The timing window is exactly as it's rising from the bounce." },
    { name: "Shooting Under Aerial Pressure", how: "Partner waves an arm over the ball (simulating a block) as you approach. You must adjust your strike angle to avoid the imaginary block while still driving toward goal.", avoid: "Don't always go the same way around the 'block.' Read it and commit — hesitating in a real game with a block means the chance is gone." },
    { name: "Chip vs Drive Decision", how: "A partner plays the role of keeper and stands 2 yards off their line. You must choose: chip over them or drive past them? They alternate between advancing (drive) and holding (chip). Decision-making under realistic conditions.", avoid: "Don't always chip or always drive. Read the keeper's position. A driven shot into a stationary keeper at the right height is saved. Read and decide." },
    { name: "Angled Driven Shot Across Body", how: "From the left channel, drive a shot with your right foot across your body toward the far post. From the right channel, do the same with your left foot. The across-body driven shot is a powerful angle buster.", avoid: "Don't slice the ball with the inside of your foot. This is a laces drive — your foot swings across your body, but contact is still through the center with laces." },
    { name: "Driven Shot Without Stutter Step", how: "Many players stutter-step before shooting when under pressure. Practice driving without any stutter — fluid, confident approach into contact. One-two-three stride, contact, follow through. No extra steps.", avoid: "Don't stutter. If you need to stutter, your timing is off. Back up 2 yards further and work on the approach rhythm." },
    { name: "Full Follow-Through Emphasis", how: "Take driven shots focusing entirely on the follow-through. Your kicking foot should finish pointing at the target, high. If your follow-through is chopped short, you're losing pace on the ball. Exaggerate the follow-through.", avoid: "Don't plant your foot like a statue after contact. The follow-through is part of the strike. A complete, extended follow-through naturally corrects many technical errors." },
    { name: "Driven Shot Finishing Streak", how: "How many consecutive driven shots can you put on target? Count your streak. Miss one, restart the count. Target: 10 on target in a row. Then 15. Then 20. The streak mentality builds clutch finishing.", avoid: "Don't count near-misses. Post only, goalpost counts. Target only. Be strict with yourself on what counts as 'on target.'" },
    { name: "Move Into Shot (Game Simulation)", how: "Start 30 yards from goal. Receive a pass, take 2 touches to move into a shooting position, and drive a shot. Repeat from 6 different starting positions. Simulates arriving late into the box as a midfielder.", avoid: "Don't stop and set yourself up deliberately. Move at game speed and shoot without over-thinking the setup. React, move, shoot." },
    { name: "Driven Shot Decision: Shoot vs Pass", how: "A partner plays the role of a teammate in a better position. Sometimes they're free, sometimes they're marked. Make the decision: drive yourself or pass to them. A missed shooting chance because you passed is fine. A forced shot when the pass was better is bad.", avoid: "Don't always choose the same option. Learn to read the scenario and make the right call. Elite midfielders know exactly when to shoot and when to give it." },
  ],

  "Shooting — Curl": [
    { name: "Inside Curl Technique Reps", how: "Place ball 18 yards from goal. Strike the right side of the ball with the inside of your right foot, wrapping your foot around it. Follow through across your body. The curl comes from your wrap, the power from your follow-through.", avoid: "Don't strike the dead center of the ball — you need to contact the right side to generate curl. Don't just wave your foot at it; firm ankle, controlled swing." },
    { name: "Curl Into Far Corner", how: "From the left channel, curl the ball into the far top corner with your right foot (or far post bottom). 5 attempts per set, 4 sets. This is the classic midfielder's curler — across goal to the far post.", avoid: "Don't hit it straight — the whole point is the curve. If it goes straight, you're striking the center. Find the ball's right side and wrap it." },
    { name: "Near Post Curl Inswinger", how: "From the right side, curl the ball into the near post area — the ball curves away from the goalkeeper into the near post corner. Less common but devastatingly effective.", avoid: "Don't confuse near-post curls with shots at the near post. The ball should curve sharply — starting outside the post and bending in." },
    { name: "Curl Over the Wall (Simulation)", how: "Line up 3 cones at 6 yards as a 'wall.' Practice curling free kick-style shots over the wall and bending them toward goal. The wall forces you to lift and curl rather than just drive.", avoid: "Don't balloon it to clear the wall. The curl should skim just over the wall height. Too much lift means the ball hangs in the air — easy for the keeper." },
    { name: "Curler From Different Distances", how: "Shoot curlers from 15 yards, 20 yards, 25 yards, and 30 yards. At each distance, the technique adjusts — closer in means a sharper, lower curl. Further out means more power with the curl.", avoid: "Don't use the same power for every distance. A 30-yard curler hit with 15-yard power won't reach the goal. Build your power proportional to distance." },
    { name: "Curl to Both Corners", how: "5 shots curling into the top-right corner, 5 into the top-left. From a central position. Forces you to use different feet and different ball contact positions for each corner.", avoid: "Don't only curl into your comfortable corner. The whole drill is about accessing both corners from center. If one direction is weak, stay there." },
    { name: "Running Curl", how: "Approach from a slight angle and take a curl shot without stopping — in stride. Many curlers in games come from a running shot, not a stationary setup.", avoid: "Don't treat every curl like a free kick with a long run-up. Running curls require compact, quick technique while in motion." },
    { name: "Curl vs Driven Decision", how: "A partner plays a pass. They hold up a number: 1 = curl, 2 = drive. You must identify and execute the right shot type within your normal approach. Builds technical switching.", avoid: "Don't start your approach before seeing the number. Read the signal, then approach. Splitting the decision from the action is the skill." },
    { name: "Curl Off Moving Ball", how: "Partner rolls a ball across you at moderate pace. Curl it on the move — the ball is traveling sideways when you strike it, requiring you to find the back-right or back-left of the ball while it moves.", avoid: "Don't only practice curls from stationary balls. Game curls almost always come from moving balls — the technique must adapt." },
    { name: "Outswing Curl Cross", how: "From a wide position, curl a ball outswinging into the box — it curves away from the goalkeeper. Practiced from left wing (right foot curl) and right wing (left foot curl). This is a crossing technique but applies curl mechanics.", avoid: "Don't kick this from too wide or the curl takes it out of play. Find the right position where the outswing curves into danger." },
    { name: "Curl Accuracy Log", how: "15 curl attempts. Count how many are on target, how many hit the corners, how many go in. Log it. Repeat every session. Tracking the numbers makes your curl improvement visible.", avoid: "Don't count easy near-post shots as 'curlers.' A real curler is when the ball visibly changes direction in flight toward the corner." },
    { name: "Low Driven Curl", how: "Curl a ball that stays below 2 feet height the whole flight — a ground-level curler that curves along the turf into the bottom corner. Requires more side-spin, less lift, and perfect lace contact.", avoid: "Don't lift the ball even slightly when trying a low curl. Lean over it more than usual. The ground-level curler is one of the hardest shots to stop." },
    { name: "Curl From Tight Angle", how: "From almost the byline on the right side, curl a shot around the near post and into the far corner. The tighter the angle, the more the curl has to work. Practice the extreme angle curler.", avoid: "Don't try to power it in from a tight angle — you can't. The only realistic shot from a tight angle is the curl that goes around the near post." },
    { name: "Curl Shooting Under Pressure", how: "Partner closes you down from 5 yards. In 3 seconds, you must curl a shot on goal. Curls under pressure tend to go straight because the striker shortcuts their technique. Fight that.", avoid: "Don't shorten your wrap motion under pressure. The curl requires the full inside-of-foot wrap, even under time pressure. Abbreviated technique = no curl." },
    { name: "Backspin Curl", how: "Strike the ball so it curls AND has backspin — this causes the ball to dip sharply after the curl peak. Hit the upper-right portion of the ball, inside of foot, follow through slightly downward.", avoid: "Don't just try to generate curl without thinking about spin axis. Topspin curls rise and go over. Backspin curls dip dangerously. They feel very different on contact." },
    { name: "Curl Free Kick Routine", how: "Set up in a free kick position 22 yards from goal. 5-step run-up. Curl over a wall of cones. Develop a consistent free kick routine — same approach angle, same run-up length, same contact point every time.", avoid: "Don't be inconsistent with your run-up. Consistency in the approach is what makes free kicks repeatable. Every great free kick specialist has an identical run-up." },
    { name: "Partner Mirror Curl", how: "Your partner shoots a curl and you observe. Then you replicate the same curl. Mirror each other's best shots — notice what they do differently with their body when curls are successful.", avoid: "Don't just copy the aesthetic. Observe the actual contact point, follow-through, and approach angle. Those are the technical elements worth copying." },
    { name: "Curl Straight Contrast", how: "Alternate between curls and driven straight shots. Same position, same run-up, different contact point. The contrast sharpens your understanding of exactly where you strike the ball to generate or eliminate curve.", avoid: "Don't let this become 2 mediocre versions of each shot. Do a real curl and a real drive each rep. Force yourself to feel the difference clearly." },
    { name: "Curl After Chest Control", how: "Receive a throw on your chest. Control it to foot, and curl a shot immediately. Combines an aerial receive with a technique-demanding shot.", avoid: "Don't let the chest touch land too far away for the curl. The ball needs to be in a good shooting position after the touch, not 3 yards to your side." },
    { name: "Curl Into Top Bin", how: "Place a small target (water bottle or cone) in the top corner of the goal. Attempt to hit it directly with a curling shot. This is maximum difficulty accuracy training.", avoid: "Don't be demoralised by missing. The top bin target is intentionally hard. Each attempt gets your body dialing in the trajectory. Progress is measured in weeks, not reps." },
    { name: "Curl Both Feet — Equal Reps", how: "Every curl session must have equal time on both feet. Even if your left-foot curl is terrible. Especially if it's terrible. A midfielder who can curl from both feet is twice as dangerous.", avoid: "Don't cut the weak foot session short because it's frustrating. Stay with it. Even a controlled, low-pace curl with the weak foot on target is progress." },
    { name: "Curl Under Fatigue", how: "After repeated sprints, curl shots on goal. Fatigued technique on curls suffers more than any other shot type because the ankle wrap is subtle — tiredness makes it crude.", avoid: "Don't use fatigue as an excuse for poor curls. This drill is specifically for developing fatigue-resistant technique." },
    { name: "Curl Variation: Float vs Snap", how: "A 'float' curler has more air time and dips late. A 'snap' curler is hit with pace and curves sharply. Practice both. Different contact points and follow-through speeds produce each.", avoid: "Don't treat all curls as the same. Learn the difference in feel between a floated curler and a snapped one." },
    { name: "Curl Reaction Shooting", how: "A partner rolls a ball across you at different speeds. You react and curl the shot without a preparation touch. The reaction must be instant — contact is made on the moving ball without setup.", avoid: "Don't wait for the ball to perfectly align before shooting. React to it as it comes. Real game curlers rarely come from a perfectly stationary setup." },
    { name: "Curl in Wind", how: "Practice curlers on windy days — into the wind, with the wind, and crosswind. Wind dramatically changes curl behavior. Into wind = less curl, crosswind = amplified or cancelled curl.", avoid: "Don't ignore conditions. Elite players specifically know how to use wind to enhance a curler or compensate for it. That understanding starts in practice." },
    { name: "30-Minute Curl Session", how: "Dedicate a full 30 minutes to nothing but curlers from varied positions. High volume, consistent technique focus. Curl shots are perishable — they need frequent, dedicated practice.", avoid: "Don't phone in the last 10 minutes. The curl session should end with your best shot of the day, not your worst. Maintain focus throughout." },
    { name: "Curl While Moving Laterally", how: "Run laterally across the box (right to left). Plant and curl without fully stopping. The lateral momentum makes this harder. The curl must work despite the sideways body motion.", avoid: "Don't stop your lateral run before planting. Some deceleration is fine but don't come to a complete stop — the lateral element is the challenge." },
    { name: "Video Analysis of Your Curl", how: "Film your curlers. Watch back in slow motion. Check: contact point on the ball, follow-through direction, body angle at contact, plant foot position. Self-analysis is one of the most powerful tools available.", avoid: "Don't watch the video casually. Look for specific technical details. Compare your technique to a frame of De Bruyne or Xabi Alonso curling. Find the difference." },
    { name: "Curl to Near Post (Instep)", how: "Using your instep (not inside of foot), hit a near-post curler that curves INTO the near post — the opposite direction of the standard curl. Strikes the left side of the ball with your right instep.", avoid: "Don't confuse this with your standard curl. The contact point is completely different. Instep near-post curler is advanced — build your inside-foot curl first." },
    { name: "Curl Set Piece Targeting", how: "From a free kick position with a 'wall' of cones at 9 yards, curve the ball over the wall and aim for specific quadrants of the goal. Keep score across multiple sessions. Build free kick shot chart.", avoid: "Don't aim 'over the wall and somewhere in goal.' Specific quadrant targeting is what separates a good free kick taker from a great one." },
  ],

  "Shooting — Knuckleball": [
    { name: "Basic Knuckleball Contact", how: "Strike the dead center of a stationary ball with the knuckle joint of your big toe — the part of your laces closest to your toes. Lock your ankle completely, point your toes slightly down, and follow through straight. The ball should wobble unpredictably.", avoid: "Don't strike above or below center — the knuckleball only works through the exact middle of the ball. Don't add any side spin or it becomes a regular shot." },
    { name: "Distance Knuckle Practice", how: "Start at 20 yards and hit knuckleballs at goal, moving back to 25 and 30 yards. Knuckleballs need distance to develop their wobble — under 15 yards the movement hasn't built up yet.", avoid: "Don't try knuckleballs from close range expecting movement. The wobble takes 15+ yards to become visible. From close, it just looks like a straight shot." },
    { name: "Ankle Lock Drill", how: "Without a ball, practice locking your ankle completely — toes pointing at 45 degrees down, foot rigid. Hold for 5 seconds. Release. Repeat 20 times. The locked ankle is the fundamental mechanic of every knuckleball.", avoid: "Don't let your ankle flex on contact. Any flex kills the knuckle effect. The locked ankle is non-negotiable for this shot." },
    { name: "Knuckleball Straight Target", how: "From 25 yards, aim knuckleballs at the center of goal. You're not aiming for corners — center of goal is the target because the ball will move on its own. Let the physics do the work.", avoid: "Don't aim for corners when practicing knuckleballs. You can't aim a knuckleball into a corner — aim center, let it swerve unpredictably. Goalkeepers hate this." },
    { name: "Knuckleball Free Kick Position", how: "Set up in a free kick position 25 yards from goal. Practice the exact run-up you'd use in a game. 2-3 steps, plant foot beside the ball, locked ankle contact through center. Same routine every rep.", avoid: "Don't take a long run-up for a knuckleball. The power comes from hip rotation and leg swing, not momentum. Long run-ups add motion that destroys the clean center contact." },
    { name: "Topspin vs Knuckle Contrast", how: "Alternate between deliberate topspin shots (strike slightly above center) and knuckleballs (strike through center). Feel the difference in contact point. The contrast makes your center-contact precision sharper.", avoid: "Don't guess which shot you're hitting. Decide before you approach. The decision shapes your contact point instinctively." },
    { name: "Knuckleball off Moving Ball", how: "Partner rolls a ball toward you slowly. Strike the knuckleball as it arrives. A moving ball is much harder for knuckleball contact — the center shifts with the movement. Trains game-realistic knuckleball striking.", avoid: "Don't wait for the ball to stop. If it stops, take it stationary and that's fine for static practice. But dedicated moving-ball knuckle reps are necessary." },
    { name: "Height Control Knuckleball", how: "Hit 5 knuckleballs aiming to keep them below the crossbar, 5 aiming for the top third of goal. Height is influenced by your contact point — slightly above center rises more, exactly center stays flat.", avoid: "Don't send all knuckleballs at the same height by default. Learn to influence height with contact point location. Variation in height makes them harder to read." },
    { name: "Knuckleball Wet Ball Practice", how: "Practice knuckleballs with a slightly wet ball. Wet balls behave differently on contact — less friction means more unpredictable movement. Perfect conditions for knuckleball training.", avoid: "Don't always practice with a perfectly dry ball. Games are played in all conditions. A knuckleball in the rain moves even more dangerously." },
    { name: "Knuckleball Both Feet", how: "Equal reps on both feet. Left-foot knuckleball practice even when it's uncomfortable. Ronaldo uses both feet for knuckleballs — the principle is the same on both sides.", avoid: "Don't skip the weak foot. A knuckleball is an advanced skill on your dominant foot — training it on the weaker foot seems far away, but the contact principles transfer." },
    { name: "Knuckleball Power Build", how: "From 30 yards, focus on generating maximum power while maintaining center contact. Hips fully through, complete follow-through, locked ankle at maximum force. Power knuckleballs are goal-scoring weapons from distance.", avoid: "Don't sacrifice the center contact for power. More leg swing helps but if the ankle loosens at high force, the knuckle effect disappears. Locked ankle at all power levels." },
    { name: "Knuckleball Film Session", how: "Film 10 knuckleballs in slow motion. Look at the ball flight — is it wobbling? Look at your ankle at contact — is it locked? Look at your follow-through — is it straight? Self-correct from video.", avoid: "Don't skip the film review. The knuckleball is entirely about a tiny mechanical difference. You can't feel it reliably in the early stages — seeing it in video is crucial." },
    { name: "Knuckleball Dipping Practice", how: "Aim knuckleballs over the top of a 4-foot barrier (jump rope or pole) from 20 yards. The ball should dip after clearing the barrier. The dip is what makes knuckleballs dangerous — practice forcing it to dip.", avoid: "Don't try to artificially create a dip. The dip happens naturally when the knuckleball effect is correct. Focus on perfect center contact and let the physics work." },
    { name: "Knuckleball Streak", how: "Count consecutive knuckleballs that visibly wobble in flight (not just go straight). Getting to 5 in a row is solid. Getting to 10 means your technique is consistent. Log your best streak.", avoid: "Don't count shots that go straight as successful knuckleballs. A true knuckleball wobbles noticeably. Be honest about the distinction." },
    { name: "Partner Keeper Knuckleball", how: "Partner stands in goal. Shoot knuckleballs specifically at their body — at their chest and midriff. A knuckleball that doesn't move much is still hard to catch. Let them feel how tricky the ball is to hold even when it's 'straight.'", avoid: "Don't aim at the corners yet. Body-aimed knuckleballs at a keeper is how you build confidence in the shot's effect. See their reactions — it builds your belief in the technique." },
    { name: "Knuckleball Consistency Challenge", how: "20 knuckleballs in a row. Count how many produce visible movement in flight. Goal: 15/20. Track it weekly. This is your knuckleball consistency percentage.", avoid: "Don't rush the 20 reps. Each one deserves a fresh setup and approach. Rushing leads to sloppy contact and inflated numbers that don't reflect real technique." },
    { name: "Hip Rotation Knuckleball", how: "Focus entirely on hip rotation when striking. Hips turn through the ball toward the target. The combination of locked ankle and full hip rotation generates a heavy, unpredictable knuckleball.", avoid: "Don't ignore the hips. Players who struggle with knuckleball power usually have static hips. Open them fully through contact." },
    { name: "Knuckleball in Training Match", how: "In a training game, commit to attempting 1–2 knuckleball shots per game. The game context forces you to apply the technique under real pressure with opponents, goalkeepers, and time pressure.", avoid: "Don't force knuckleballs when the position isn't right. Only attempt them from 20+ yards in game situations. A knuckleball from 10 yards is just a bad technique choice." },
    { name: "Knuckleball Recovery Shot", how: "Receive an imperfect pass that's slightly behind you. Adjust quickly and hit a knuckleball from whatever stance you land in. Trains the technique from non-ideal positions.", avoid: "Don't only practice from a perfect setup. In a game, you won't always have the ideal position before a free kick or long-range opportunity." },
    { name: "Knuckleball Power vs Wobble Trade-off", how: "Try 5 low-power knuckleballs, 5 medium, 5 high power. Observe: do you see more wobble at a specific power level? Most players find a specific power where the knuckle effect is strongest. Identify yours.", avoid: "Don't assume more power always means better knuckleball. Sometimes a medium-pace knuckleball moves more than a blasted one because the cleaner contact produces purer rotation." },
    { name: "Knuckleball After Sprint", how: "Sprint 40 meters. Receive the ball. Strike a knuckleball immediately. Fatigued legs make the ankle lock harder to maintain — your locked-ankle technique must survive the fatigue.", avoid: "Don't let heavy legs unlock your ankle. This is where most players' knuckleballs fall apart. Consciously reinforce the lock before every fatigued strike." },
    { name: "Distance Markers", how: "Place cones at 18, 22, 26, and 30 yards. Hit knuckleballs from each marker, 5 per marker. Note where your technique holds versus where it breaks down. Identify your effective range.", avoid: "Don't claim 30-yard knuckleballs as your range when your contact only works up to 24. Honest self-assessment leads to targeted improvement." },
    { name: "Knuckleball Shot Sequence", how: "Two passes, then knuckleball. Two passes, then knuckleball. Builds the habit of preparing a knuckleball opportunity through combination play — creating the shooting position through passing before striking.", avoid: "Don't practice knuckleballs in isolation every time. The transition from passing to shooting position to knuckleball strike is a real game movement." },
    { name: "Knuckleball Into Top Corner", how: "Advanced: aim knuckleballs for the top corners. The path is not straight — it will go toward the center or opposite side before swerving. You need to account for this in your targeting.", avoid: "Don't try this before your center-of-goal knuckleball is consistent. Aiming for corners with an inconsistent technique just sends everything wide." },
    { name: "Ball Weight Knuckleball Test", how: "Try knuckleballs with different ball inflation levels (slightly under, perfect, slightly over). Note how each affects the ball's movement. Over-inflated balls produce less knuckle. Under-inflated produce more spin and less true knuckle.", avoid: "Don't always train on under-inflated balls as a shortcut to visible movement. Practice on a properly inflated match ball — that's what you'll use in games." },
    { name: "30-Minute Knuckleball Session", how: "Dedicated 30 minutes to knuckleballs exclusively. High repetition, constant focus on center contact and locked ankle. Knuckleballs are a specialty skill that needs undivided practice time.", avoid: "Don't mix this session with other shot types. When training knuckleballs, your entire focus is on the knuckle contact. Mixing dilutes the session." },
    { name: "Partner Reaction Knuckleball", how: "Partner stands in goal with no gloves. Hit body-targeted knuckleballs. Their instinctive reaction to catching the wobbling ball gives you direct feedback on how well the technique is working.", avoid: "Don't aim at the partner's head or face — body only. This is a training drill, not a test of courage." },
    { name: "Knuckleball Disguise", how: "Shape as if striking a curling shot (tilted run-up, shoulder opened). At the last step, square your body and strike a knuckleball. The disguise buys a fraction of a second from the keeper.", avoid: "Don't over-elaborate the disguise and compromise the knuckleball contact. Subtle change is enough. The technique still needs to be perfect." },
    { name: "Knuckleball Match Pressure Simulation", how: "Last shot of the session, every session: one knuckleball attempt from 25 yards. Treat it like a real game shot. Full mental commitment. This cultivates the calm, technical mindset for real game knuckleballs.", avoid: "Don't rush this last shot. Take a breath, set up properly, commit. Make this rep count for something beyond just practice." },
    { name: "Knuckleball vs Stationary Keeper", how: "In a 1v1 against a partner acting as keeper, use only the knuckleball. They know what's coming — their only job is to stop it. This real competition pressure tests if your technique holds when there's actually something at stake.", avoid: "Don't abandon the technique when they save two in a row. Stick with it. If your knuckleball isn't working, fix the technique — don't switch shots." },
  ],

  "Dribbling — Close Control": [
    { name: "Cone Slalom Slow Mastery", how: "Set 10 cones 1 yard apart in a straight line. Dribble through them at walking pace, alternating inside and outside of foot. Every touch must be deliberate and keep the ball within 1 foot of your body. Slowness is intentional.", avoid: "Don't rush this. The entire point is mastery at slow speed. If the ball touches a cone, restart. Perfect slow reps build perfect fast reps." },
    { name: "Box Dribble (4 Cones)", how: "Set 4 cones in a 5×5 yard square. Dribble to each cone, perform a direction change, and move to the next. Use inside foot turns, outside foot turns, and stop-turns. 10 laps of the square per foot.", avoid: "Don't jog through direction changes. The turn at each cone must be sharp — body low, weight over the ball, and explode out of the turn." },
    { name: "Inside-Outside Sequence", how: "Dribble in a straight line alternating: inside of right, outside of right, inside of left, outside of left. Every touch is different and you never use the same surface twice in a row. 20 yards down and back.", avoid: "Don't lose the rhythm of the sequence when the ball runs slightly off-line. Recover and maintain the alternating pattern. Consistency of surface use is the goal." },
    { name: "Dribble to Stop on Cone", how: "Dribble toward a cone at speed and stop the ball exactly on top of it using the sole of your foot. Control the deceleration. Builds brake-and-control under momentum.", avoid: "Don't tap the ball at the cone from 3 yards away. Build speed from 10 yards and brake as late as possible. The late, precise stop is the skill." },
    { name: "Mirror Dribble (Partner)", how: "Face a partner 3 yards apart. They dribble in any direction. You mirror them exactly — same direction, same pace, trying to stay directly across from them. Builds reactive close control and body positioning.", avoid: "Don't watch the ball — watch your partner's hips. Their hips tell you where they're going before the ball moves. Ball-watching always puts you a step behind." },
    { name: "Tight Circle Dribble", how: "Place a cone. Dribble in a tight circle around it for 30 seconds using only the inside of one foot. Switch direction every 30 seconds. Builds close control with constant body rotation.", avoid: "Don't let the circle get large. Keep it within 1 yard radius of the cone. If the circle expands, you've lost tight control." },
    { name: "Dribble With Head Up", how: "Dribble through a cone set but must call out the colors of cards held up by a partner standing 10 yards away. Enforces head-up dribbling — the ball must be felt, not watched.", avoid: "Don't look down at the ball between cones. Glance down only once per cone. If the ball runs away because you're looking up, that's the drill working — keep your head up and recover." },
    { name: "Directional Change Drill (L-Shape)", how: "Dribble forward 5 yards, sharp 90-degree turn right, 5 yards, sharp 90-degree turn right again, 5 yards. The L-shape. Do the full L with different turns (inside, outside, drag-back) at each corner.", avoid: "Don't slow to walking pace at the turns. They should be dynamic — drop your hips, transfer weight, and accelerate out. Slow turns train slow turns." },
    { name: "Sole Roll Dribble", how: "Dribble forward using only the sole of your foot — rolling the ball with the flat of your sole, keeping it close. Builds ball familiarity with the least-used surface.", avoid: "Don't let the ball get ahead of you. Sole rolling keeps it very close. This isn't a fast drill — it's for touch and feel development." },
    { name: "Stop-Start Pressure Dribble", how: "Dribble 5 yards fast, stop suddenly (sole on ball), look up, dribble 5 yards in a new direction, stop again. Repeat for 2 minutes. The stop-start with a change of direction mimics game pressure situations.", avoid: "Don't slow down before the stop. The brake should be sudden. Gradual decelerations don't train the same muscle memory as sharp stops." },
    { name: "1v1 Cone Challenge", how: "A partner stands by a gate (2 cones, 2 yards wide). Your job is to dribble through the gate past them. Theirs is to block it. Soft defending — not aggressive. But the presence of a body forces realism.", avoid: "Don't just try the same move every time. Read the defender's weight and try different approaches. Even if they block you, learn from the attempt." },
    { name: "Figure-8 Cone Dribble", how: "Place 2 cones 3 yards apart. Dribble in a figure-8 around them. Go for 60 seconds. Then reverse direction for 60 seconds. Building close control in circular, non-linear paths.", avoid: "Don't use only one foot dominantly. Both feet should be touching the ball equally in a figure-8. If one side is always the outside touch, switch your entry angle." },
    { name: "Ball Mastery Circuit", how: "Combination of toe taps (30), sole rolls (30 per foot), inside-outside juggle-taps (30), scissor shadows (20). All stationary. 3 circuits. This is pure ball mastery — building touch without pressure.", avoid: "Don't count sloppy touches. Quality repetitions build quality technique. A sloppy scissor shadow is worse than not doing it at all." },
    { name: "Directional First Touch Dribble", how: "Receive passes while stationary. Every first touch becomes the start of a 5-yard dribble in the direction of that touch. The first touch and dribble are one continuous movement.", avoid: "Don't stop between the first touch and the dribble. One motion: receive, touch, go." },
    { name: "Dribble and Shield (Partner)", how: "Dribble in a 5×5 area with a partner trying to poke the ball away. Your job is to keep possession using your body and tight control. No turns allowed — just shielding and protecting. 30-second rounds.", avoid: "Don't overuse spinning. Shielding is body positioning, not constant spinning. Put your body between ball and opponent and use your arms for balance — not pushing." },
    { name: "Wall Dribble Rebound", how: "Dribble toward a wall, play the ball against it, and take a first touch off the rebound to change direction. Repeat 10 times. The wall creates an unexpected return that tests your close control reactivity.", avoid: "Don't predict where the rebound goes — read it. The rebound direction changes the drill every time. React, don't anticipate." },
    { name: "Soft Ground Dribbling", how: "Practice on softer ground (grass after rain, light mud). Close control on soft ground is much harder — the ball sticks. Forces you to apply more touch force and keep the ball even closer.", avoid: "Don't only ever practice on perfect surfaces. Adaptability to conditions is a real skill. Muddy ground close control translates to better dry ground control." },
    { name: "Dribble With Weak Foot Only", how: "20 minutes: only your left (weak) foot touches the ball during all dribbling drills. No exception. Your weak foot's close control will improve only with forced high-volume use.", avoid: "Don't switch to your strong foot when it gets hard. Every time you default to your strong foot in this drill, you undo the whole point." },
    { name: "Pressure Cone Dribble", how: "Partner chases you through the cone slalom 2 yards behind. You must dribble through the cones at speed without them catching you. The proximity of a chaser forces your close control to work at actual game pace.", avoid: "Don't just sprint away — they're 2 yards behind, close control is still required. If you kick the ball too far ahead to escape them, that's a loss of control." },
    { name: "Touch Reduction Drill", how: "In a 10×5 area, dribble end to end using the minimum number of touches possible. Challenge yourself to reduce it by 1 every session. Fewer touches = more efficient close control.", avoid: "Don't sacrifice control for fewer touches. If your minimum is sloppy, add touches back. Efficiency with control is the goal, not just raw speed with no touch." },
    { name: "Spanish La Croqueta", how: "Moving forward, drag the ball across your body from right to left with the inside of your right foot. Immediately push forward with the inside of your left. One fluid move — creates the illusion of going one way then the other.", avoid: "Don't slow down for the drag. The La Croqueta is most effective at pace. The more seamless the transfer between feet, the better the disguise." },
    { name: "Dribble Through Opposition (Cones as Players)", how: "Set 6 cones in formation like opposing players (a midfield block). Dribble through them at game speed, choosing the real gaps between them. No cone should be touched.", avoid: "Don't dribble around the outside of the formation. Go through the gaps. This simulates the exact scenario of carrying the ball through a congested midfield." },
    { name: "Panna Stance Practice", how: "Face a partner at 1 yard. Take very short, quick touches between your feet while they mirror your movement. Trains the ultra-close touch control needed for tight 1v1 situations and nutmeg setup.", avoid: "Don't let the touches get too big. Tiny, quick touches keep the ball under your control and allow instantaneous direction change." },
    { name: "Dribble and Accelerate", how: "Dribble 5 yards in close control, then explode into a sprint for 10 yards with bigger touches. Repeat. Alternating between tight control and pace dribble trains the transition between both modes.", avoid: "Don't use close-control touch size when sprinting — push the ball further ahead. Don't use sprint-size touches when in tight space. Know which mode you're in." },
    { name: "3-Second Sprint Close Control", how: "Dribble with tight close control, then after 3 seconds sprint flat out (ball further ahead), then back to close control after 3 seconds. Repeat pattern for 2 minutes. Builds the rhythm of a dribbler who can mix pace.", avoid: "Don't transition gradually. The switch between modes should be explosive. Close control — sprint — close control must feel like distinct gear changes." },
    { name: "Half-Pitch Solo Dribble Run", how: "From the halfway line, dribble at full speed to the penalty box using only close control (no big touches). This is a real game run simulation. Time yourself and try to beat your time.", avoid: "Don't sacrifice control for time. A few extra seconds with a tight, controlled dribble is more valuable than a fast run where you lose the ball." },
    { name: "Dribble to Cross", how: "Dribble along the wing with close control, get to the byline, and deliver a precise cross. Combines wing dribbling mechanics with the quality delivery that justifies the run.", avoid: "Don't rush the cross delivery. Take the extra touch to get the ball in the right position before crossing. A poor cross wastes the dribble." },
    { name: "Low Body Position Dribble", how: "Dribble through a cone set while consciously keeping your center of gravity as low as possible — bent knees, wide base. Low body position makes you harder to knock off the ball.", avoid: "Don't stand tall while dribbling. Upright dribblers are easy to unbalance. Your knees should always be slightly bent when you have the ball in a tight area." },
    { name: "Cone Elimination Game", how: "Set 10 cones. Dribble and try to knock over as many as possible in 60 seconds using your feet to kick them over. Sounds simple — the dribble control required to aim your touches is real skill.", avoid: "Don't just kick wildly at cones. Dribble to each one deliberately and use a controlled touch to tip it. Accuracy of touch is the skill." },
    { name: "One-Foot Dribble Circles", how: "Using only your right foot, dribble in a tight 3-yard circle for 30 seconds. Then left foot for 30 seconds. Inside of foot only. Building single-foot mastery in a compact circular path.", avoid: "Don't let the circle grow outward. The circle stays tight. If it grows, your close control is slipping. Pull it back in and maintain the radius." },
  ],

  "Dribbling — Speed": [
    { name: "Sprint Touch Drill", how: "Push the ball 3–4 yards ahead and sprint to it. Push again, sprint again. This is speed dribbling — the ball goes further ahead than close control, but stays within your stride. 5 reps of 30 yards.", avoid: "Don't let the ball get so far ahead you're chasing it. The push should be within your next stride, not 10 yards ahead. You're still controlling it, just with bigger touches." },
    { name: "Speed Dribble Straight Line", how: "40-yard straight sprint with the ball. Get to maximum speed as fast as possible. Timer. Beat your time next session. Pure speed dribbling — the ball is ahead of you, you're running to it, touching, running again.", avoid: "Don't slow down before touching the ball. Touch it in stride at full pace. If the ball gets away from you, your push angle is wrong — push forward, not to the side." },
    { name: "Speed Dribble Change Direction", how: "Speed dribble 15 yards, sharp cut left, 10 yards, sharp cut right, 10 yards to goal. The direction changes at speed with a dragging cut — inside foot dragging the ball in the new direction.", avoid: "Don't slow to a stop before changing direction. The cut must happen at speed. Plant the outside foot, drag the ball, and push off in the new direction — 3 actions in 1 second." },
    { name: "Speed vs Defender (1v1 Sprint)", how: "You and a partner start at the halfway line. Ball rolls forward. First to it gets it. If you get there first, dribble at speed to goal. Defender chases. Raw sprint + speed dribble under chase pressure.", avoid: "Don't shield the ball at the expense of your speed. Once you've gotten ahead of the defender, push the ball further ahead and use your speed advantage." },
    { name: "Speed Dribble to Finish", how: "Start 35 yards from goal. Speed dribble toward goal and finish. The challenge is maintaining ball control at sprint pace AND producing a quality finish. Don't decelerate too early before the shot.", avoid: "Don't slow way down 10 yards from goal for the shot. In a real game you have defenders. Learn to shoot from near full pace." },
    { name: "Acceleration Touch Drill", how: "Ball stationary. Explosive push with outside of foot to set it ahead, then sprint after it. Builds the initial explosive touch that starts a speed dribble run.", avoid: "Don't push the ball too far sideways on the first touch. The acceleration push should go forward-diagonal — a few yards ahead and slightly to the side. Not wide." },
    { name: "Speed Dribble Between Poles", how: "Place 4 poles or cones 5 yards apart in a line. Speed dribble through them — not a slalom, but driving between them in straight lines at full pace. The gaps are generous but the pace tests control.", avoid: "Don't slow for each pole. Keep full pace between them. If you lose the ball, it means your touch angle is off — adjust how you're pushing the ball." },
    { name: "Speed Dribble to Cross", how: "Sprint dribble down the right wing and whip in a cross as you hit the byline. Partner makes a near-post run. The speed of the dribble makes the cross harder but more dangerous. 5 reps each wing.", avoid: "Don't slow down entirely before crossing. Take one touch to adjust and cross in motion. A cross from a speed dribble that maintains pace beats most defenders." },
    { name: "Speed Change Drill (3 Zones)", how: "Divide a 30-yard run into 3 zones. Zone 1: slow close control. Zone 2: medium pace. Zone 3: full sprint dribble. Trains your ability to change through different speeds within a single dribbling run.", avoid: "Don't blur the zones. Zone 1 should feel genuinely slow, zone 3 should be flat out. Clear, deliberate shifts between speed modes." },
    { name: "Outside Foot Speed Push", how: "Dribble at speed using only the outside of your foot for each touch. The outside push naturally produces quick, forward-angled movement. 4 sets of 20 yards per foot.", avoid: "Don't let the outside pushes go sideways — they should go slightly forward-diagonal. Sideways outside touches during speed dribbling pull you off your line." },
    { name: "Speed Dribble to 1v1", how: "Speed dribble from 25 yards, arrive at a passive defender 5 yards from goal, and beat them. The speed of your approach should put pressure on the defender — they're reacting to your pace.", avoid: "Don't decelerate too early before the defender. The pace of the approach is itself a weapon. Slow down just enough to execute the skill, not 15 yards before them." },
    { name: "Counter-Attack Simulation", how: "A partner passes into space ahead of you. You sprint, receive at pace, and drive toward goal — counter-attack style. Shoot or cross at the end. Builds the full counter-attack running sequence.", avoid: "Don't stop before receiving the pass into space. Run onto it at full pace. In a real counter-attack, stopping to receive means the defense resets. Keep moving." },
    { name: "Speed Dribble With Weaker Foot", how: "30 yards speed dribble with only your left foot making contact. Weaker foot speed dribbling is dramatically less trained than strong foot. Address it deliberately.", avoid: "Don't let the ball go sideways when pushing with the weak foot — this is the most common error. Train the push angle to go forward, not diagonally wide." },
    { name: "Timed 30-Yard Sprint Dribble", how: "Time a 30-yard speed dribble with the ball and compare it to your 30-yard sprint without the ball. The difference is your 'ball penalty.' Reduce that penalty over weeks by improving your pushing angle and touch efficiency.", avoid: "Don't give up on improving the penalty time. Elite players have almost no time difference between running with and without the ball over 30 yards. It's achievable." },
    { name: "Speed Dribble Reaction", how: "Stand with your back to a partner who rolls the ball forward. On 'go', turn and sprint after the rolling ball, control it at pace, and continue to goal. The reaction + sprint + control sequence is a pure game moment.", avoid: "Don't turn lazily when you hear 'go'. Maximum explosive rotation and sprint. A half-second slow reaction is a defender on your back in a game." },
    { name: "Speed Dribble Corridor", how: "Mark a 2-yard wide corridor 30 yards long. Speed dribble within the corridor — the ball cannot leave the corridor width. Forces pace AND directional accuracy.", avoid: "Don't run outside the corridor to catch an errant touch. If the ball goes outside, it's a loss of control — restart. The corridor demands precision at speed." },
    { name: "Speed Dribble Obstacle", how: "Place 3 flat cones on the ground as 'obstacles' at 10, 20, and 25 yards. Speed dribble around them without slowing. The obstacles require slight directional nudges at pace.", avoid: "Don't telegraph your direction change at the obstacle. Subtle pushes at speed — not a full direction change, just a slight angle redirect." },
    { name: "First Step Explosion", how: "Ball at your feet, stationary. Drive the first push with maximum explosive force — the first touch starts at sprint speed immediately. 10 explosive starts from standstill. Your first step after touching the ball is everything in transition.", avoid: "Don't ease into speed. The whole drill is the explosive start. A slow first step means a defender recovers. The first touch must detonate the sprint." },
    { name: "Speed Dribble Hills", how: "If available, find a slight downhill and uphill. Speed dribble uphill (builds power and stride length) and downhill (builds control at pace faster than you'd normally go). Different gradients train different aspects.", avoid: "Don't sprint downhill uncontrollably — control at above-normal pace is the goal, not falling over. Steep hills are dangerous, use gentle gradients." },
    { name: "Speed to Shot Under Fatigue", how: "After a full circuit of drills, end with a speed dribble and shot from 25 yards. Fatigued speed dribbling is where most players lose efficiency — the push touches get sloppy. Maintain crispness even when tired.", avoid: "Don't shortcut the speed when tired. If you can't maintain pace at the end of a session, build your fitness. The technical quality at the end of a session is your real game quality." },
    { name: "Speed Dribble Finish Both Feet", how: "Speed dribble from the right, finish with your left. Speed dribble from the left, finish with your right. The non-dominant foot finish after a speed approach is a real game scenario that needs specific practice.", avoid: "Don't adjust your dribbling approach to give yourself more time for the weak foot finish. Take it at speed from whatever angle you arrive at." },
    { name: "Partner Chase Speed Dribble", how: "You have a 3-yard head start. Partner chases. You must maintain enough speed with the ball to keep your advantage over 30 yards. Pure competitive speed dribbling under chase pressure.", avoid: "Don't just run with the ball — if it gets too far ahead, the chasing partner gets it. Keep it in touch while maintaining pace." },
    { name: "Speed Dribble Between Legs", how: "Set cones as 'defenders' at intervals. At each cone, execute a quick move (step-over, la croqueta) to go 'past' it, then burst forward. Speed dribble interrupted by skill execution.", avoid: "Don't slow dramatically for the skill. The burst after each skill is the key — the deceleration for the move should be minimal, the acceleration after maximal." },
    { name: "Burst to Top of Box", how: "From the halfway line, speed dribble to the top of the penalty box as fast as possible. When you hit the box line, shoot on goal. Arrival pace, transition to shot, in one continuous action.", avoid: "Don't slow dramatically before the shot. From speed dribble to shot should feel connected. The shot takes 1 extra touch of adjustment at most." },
    { name: "Speed Dribble Crossing Game", how: "3 players: speed dribbler, crosser, striker. Speed dribble down wing, cross at the byline, striker finishes. Switch roles every 3 reps. The crossing game rewards speed dribbling that arrives at pace.", avoid: "Don't stop at the byline to set up the cross. Cross in motion at the end of the speed run. A moving cross under pressure is more valuable practice than a stopped one." },
    { name: "Speed Dribble to Shield", how: "Speed dribble 20 yards. When you reach a defender (cone or person), immediately shift to a shielded close-control position. Trains the gear change from speed mode to protection mode.", avoid: "Don't crash into the defender at full speed. The deceleration and shield transition must be timed — still fast, but controlled enough to protect the ball." },
    { name: "Speed Touch Counting", how: "How many touches do you use to speed dribble 30 yards? Count. Try to achieve fewer touches next rep while maintaining ball control. Fewer touches = faster dribble. Track improvement over weeks.", avoid: "Don't sacrifice control for touch count. If the ball is running away, add touches. The goal is controlled speed, not uncontrolled speed." },
    { name: "Speed Dribble Both Wings Alternating", how: "Speed dribble right wing, cross or shot. Sprint back. Speed dribble left wing, cross or shot. Repeat for 5 minutes. Both wings at game pace. Builds ambidextrous speed dribbling.", avoid: "Don't ease up on the return sprint between reps. The sprint back is part of the drill — it simulates getting back into position after an attack." },
    { name: "Speed Dribble to Reverse Pass", how: "Speed dribble 20 yards forward. Without slowing, play a back-heel or reverse pass to a trailing partner. Maintaining forward speed while playing backward is a deceptive and effective attacking tool.", avoid: "Don't slow down before the back-heel. The reverse pass is meant to surprise — it only works if your forward momentum is maintained." },
    { name: "Progressive Speed Sessions", how: "Week 1: 70% pace speed dribbles. Week 2: 80%. Week 3: 90%. Week 4: 100%. Progressive overload for speed dribbling — your control adapts to higher and higher pace over time.", avoid: "Don't jump to 100% in week 1 and wonder why your touch is messy. Progression through speeds is the most effective way to build controlled speed dribbling." },
  ],

  "Defending — 1v1": [
    { name: "Jockeying Stance Reps", how: "Stand in a defensive stance — sideways-on, low center of gravity, one foot forward, weight on your toes. Practice moving laterally and back in this stance without crossing your feet. 2 minutes of jockeying movement.", avoid: "Don't stand square on — a square stance gets skinned immediately. Stay sideways-on and never cross your feet or you'll trip over yourself when the attacker accelerates." },
    { name: "Show Inside/Outside Drill", how: "A partner dribbles at you. Your job is to show them inside (toward more players) or outside (toward the line) based on a signal from a third person. Practice channeling the attacker where you want them.", avoid: "Don't commit to a side without a reason. Showing inside vs outside is a positional decision, not a reaction. Know before they arrive which side you're defending." },
    { name: "Delay Drill", how: "Dribbler approaches. Defender's only job: delay them as long as possible — no tackle. Stay between them and goal, backpedal, make them slow down. Time how long you can delay without being beaten.", avoid: "Don't dive in. Every time you dive in and miss, the attacker is through. Patience, low stance, delay — only tackle when you're certain." },
    { name: "Poke Tackle Timing", how: "Set up facing a partner who dribbles slowly. Practice timing the poke tackle — the moment they push the ball slightly too far ahead, extend the lead foot and poke it cleanly. Only poke when the window opens.", avoid: "Don't poke randomly — that's how you give up fouls and get dribbled past. The poke tackle only happens on an over-extended touch. Patience." },
    { name: "1v1 Recovery Sprint", how: "Partner starts with the ball 5 yards ahead of you. Sprint to get goalside of them before they reach the box. Once goalside, hold your defensive shape. Builds recovery pace after being caught out of position.", avoid: "Don't try to win the ball immediately on recovery — get goalside first. A recovering defender who dives in gets beaten every time. Get in position, then defend." },
    { name: "Side-On Shuffle", how: "Set cones 10 yards apart. Shuffle from one to the other in a side-on defensive stance — never square, never crossing your feet. 3 sets of 20 yards per direction. Pure defensive movement.", avoid: "Don't stand up during the shuffle. Stay low. A high center of gravity in a defensive shuffle means the first change of direction beats you." },
    { name: "Block Tackle Drill", how: "Partner dribbles at you. At the moment they push the ball forward, drive your foot through the ball from the side — full block tackle, weight through the ball. Square engagement at close range.", avoid: "Don't go to ground unless you're committing to the block. A half-hearted block tackle goes around you. If you go, commit fully with your body weight behind it." },
    { name: "Defensive Footwork Ladder", how: "Use an agility ladder in a side-on defensive stance. Lateral ladder footwork — in and out of every square while facing sideways. Builds the fast, coordinated defensive footwork.", avoid: "Don't stand upright in the ladder. Stay defensive stance height — low. Fast footwork at standing height doesn't transfer to real defensive movement." },
    { name: "1v1 in a Box", how: "5×5 yard box, 1v1. Attacker tries to dribble out. Defender tries to prevent it. 30-second rounds. The small space forces tight, technical defending without giving ground.", avoid: "Don't let the attacker back you out of the box. Stay compact and hold your ground. Being backed into a corner in this drill means you've given too much space." },
    { name: "Arm Position Awareness", how: "Practice defensive stance while keeping your arms wide and low — like balance wings. Arms help you maintain balance during lateral movements and protect from contact. Drill for 5 minutes with a partner mirroring your movement.", avoid: "Don't keep your arms at your sides. They're a balance tool. Don't wave them around either — controlled, low, wide." },
    { name: "Fake and Tackle", how: "A partner performs a step-over or body feint. You must not react to the fake — stay focused on the ball, not their body. When the ball actually moves, defend it. Only the ball's movement triggers your response.", avoid: "Don't react to the body. The attacker's body is designed to trick you. The ball cannot lie — only follow the ball. This takes repetition to train." },
