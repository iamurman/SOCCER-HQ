  <style>

  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── Futuristic palette ── */
    --cyan: #00E5FF;
    --cyan-glow: rgba(0,229,255,0.10);
    --cyan-border: rgba(0,229,255,0.18);
    --cyan-dim: rgba(0,229,255,0.06);
    --magenta: #FF2D78;
    --magenta-glow: rgba(255,45,120,0.10);
    --gold: #FFB800;
    --gold-glow: rgba(255,184,0,0.10);
    --red: #FF3B55;
    --green: #00E5FF;

    /* Keep --green aliases so existing component inline styles still work */
    --green-glow: rgba(0,229,255,0.10);
    --green-border: rgba(0,229,255,0.18);

    /* ── Backgrounds ── */
    --bg: #03050D;
    --surface: #080C18;
    --surface2: #0C1020;
    --surface3: #111526;
    --surface4: #161B2E;

    /* ── Borders ── */
    --border: rgba(0,229,255,0.07);
    --border2: rgba(0,229,255,0.14);

    /* ── Text ── */
    --text: #E8EDF8;
    --text2: #6B7A99;
    --text3: #2E3650;

    /* ── Radii ── */
    --radius: 12px;
    --radius-sm: 8px;

    /* ── Fonts ── */
    --font-display: 'Syne', sans-serif;
    --font-body: 'Space Grotesk', -apple-system, sans-serif;
    --font-mono: 'Space Mono', monospace;

    /* ── Layout ── */
    --sidebar-w: 220px;
    --sidebar-collapsed: 52px;
  }

/* Boot screen fade out */
@keyframes bootFadeOut {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}

/* General fade + slide up */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Fade in only */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* Scale in */
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.92); }
  to   { opacity: 1; transform: scale(1); }
}

/* Stat card entrance — staggered */
@keyframes statSlideIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Skill bar fill */
@keyframes barFill {
  from { width: 0%; }
}

/* GoalMap shot line draw */
@keyframes lineDraw {
  from { stroke-dashoffset: 300; opacity: 0; }
  to   { stroke-dashoffset: 0; opacity: 1; }
}

/* GoalMap spot pulse in */
@keyframes spotPop {
  0%   { opacity: 0; transform: scale(0.4); }
  70%  { transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}

/* Ring chart draw (for initial mount) */
@keyframes ringDraw {
  from { stroke-dasharray: 0 9999; }
}

/* Radar chart draw */
@keyframes radarDraw {
  from { opacity: 0; stroke-dashoffset: 600; }
  to   { opacity: 1; stroke-dashoffset: 0; }
}

/* Glow pulse on active elements */
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 12px rgba(0,229,255,0.15); }
  50%       { box-shadow: 0 0 24px rgba(0,229,255,0.35); }
}

/* Boot scanline sweep */
@keyframes scanline {
  0%   { top: -4%; }
  100% { top: 104%; }
}

/* Boot text blink cursor */
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

/* Boot bar fill */
@keyframes bootBarFill {
  from { width: 0%; }
  to   { width: 100%; }
}

/* Number count flicker */
@keyframes numFlicker {
  0%   { opacity: 0.4; }
  50%  { opacity: 1; }
  75%  { opacity: 0.7; }
  100% { opacity: 1; }
}

/* Page transition */
@keyframes pageEnter {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.anim-fade-up   { animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) both; }

.anim-scale-in  { animation: scaleIn 0.35s cubic-bezier(0.4,0,0.2,1) both; }

    { title: "The Knuckleball — No Spin", content: "Strike the ball with minimal spin and it becomes unpredictable. Without spin, airflow changes constantly as the panel seams rotate. The ball flutters, dips, and moves laterally without warning.\n\nHow to do it: Strike through the dead center of the ball with your laces, follow through stiff and straight. Minimal ankle snap.\n\nUse case: Long range free kicks, shots from outside the box. Ronaldo and Pirlo built careers on this." },
    { title: "Topspin — The Dipping Shot", content: "Topspin makes the ball dip faster than gravity alone.\n\nHow to create topspin:\n— Approach at a slight angle (30 degrees)\n— Plant foot slightly ahead of and beside the ball\n— Strike slightly above center with your laces\n— Keep your body over the ball — lean forward\n— The follow-through goes DOWN, not forward\n\nCommon mistake: Leaning back causes backspin and a ballooning shot. Get your body over the ball." },
    { title: "Backspin — The Chip & Float", content: "Backspin creates lift and a floating effect. Essential for chips over a goalkeeper and lofted through balls.\n\nHow to create backspin:\n— Stab underneath the ball with a stiff ankle\n— Shorter, sharper contact — don't follow through\n— Strike the bottom quarter of the ball\n\nThe chip: Same but more exaggerated. Knife under the ball, quick flick. Used to lob a rushing goalkeeper.\n\nNote: Backspin reduces forward speed. Use for precision, not power." },
    { title: "Sidespin — The Curl", content: "Sidespin bends free kicks around walls and curls crosses into dangerous areas.\n\nFor a right-footed player:\n— Strike the LEFT side with inside of foot → curves left to right (inswinging)\n— Strike the RIGHT side with outside of foot → curves right to left (outswinging)\n\nHow to curl with inside of foot:\n— Approach from the left\n— Plant foot pointing at target\n— Strike the inside-left quarter of the ball\n— Follow through across your body\n\nMore off-center = more curl but less power. Find the balance." },
    { title: "The Driven Shot — Power & Accuracy", content: "The bread and butter shot.\n\nMechanics:\n1. Approach at 30–45 degree angle\n2. Plant foot beside ball, toes pointing at target\n3. Lock your ankle — foot pointed down, firm\n4. Strike through the CENTER with laces\n5. Body OVER the ball — don't lean back\n6. Follow through toward target — leg swings high\n\nPower comes from hip rotation and knee snap. Your leg is the whip. Your locked ankle is the tip." },
    { title: "The Inside Pass — Accuracy First", content: "The foundation of everything.\n\nMechanics:\n1. Point standing foot at the target\n2. Open kicking foot out — toe pointed sideways\n3. Lock your ankle\n4. Strike through the CENTER with the flat inside surface\n5. Follow through toward the target\n\nWall drill: 200 reps each foot daily. Lock ankle, follow through, move target back as accuracy builds." },
  ]},
  { id: "formations", title: "Formations", icon: "📋", subtitle: "Shapes, Systems & How To Break Them", sections: [
    { title: "How To Read A Formation", content: "Formations are listed back to front, goalkeeper excluded.\n4-3-3 = 4 defenders, 3 midfielders, 3 forwards.\n\nBut formations are starting shapes. In possession a 4-3-3 becomes a 3-5-2. Out of possession a 4-2-3-1 becomes a 4-4-2.\n\nNumbers and roles:\n— #4, #5: Center backs\n— #2, #3: Fullbacks\n— #6: Defensive midfielder (holds, screens)\n— #8: Box-to-box midfielder\n— #10: Attacking midfielder / playmaker\n— #7, #11: Wingers\n— #9: Striker" },
    { title: "4-4-2 — The Classic", content: "Four defenders. Four midfielders. Two strikers.\n\nStrengths: Simple structure, two strikers, solid defensive shape.\n\nWeaknesses: Outnumbered in midfield against 3-man setups. Flat midfield struggles to shift quickly.\n\nHow to attack it as a midfielder:\n— Exploit the space BETWEEN their midfield and defensive line\n— Receive there and you have time\n— Overload one side then switch quickly\n— Thread through balls between the central mids" },
    { title: "4-3-3 — Possession & Press", content: "Four defenders. Three midfielders. Three forwards. Barcelona's formation.\n\nStrengths: Three forwards press high, triangles everywhere, wide forwards pin fullbacks.\n\nWeaknesses: Wide forwards must track back or you're exposed. Requires enormous fitness.\n\nHow to attack it:\n— Attack the space BEHIND pressing forwards\n— Switch play quickly — wide areas open with fast movement\n— Striker's movement pulls center backs, creating gaps for midfield runners" },
    { title: "4-2-3-1 — The Dominant Modern Formation", content: "Four defenders. Two defensive midfielders (double pivot). Three attacking mids. One striker.\n\nStrengths: Double pivot gives stability AND possession control. The #10 between the lines is extremely hard to defend. Flexible.\n\nWeaknesses: Lone striker isolated. Fullbacks often exposed.\n\nHow to attack it:\n— Flanks are vulnerable\n— A diamond midfield suffocates the double pivot\n— Quick counters before defensive shape reorganizes" },
    { title: "3-5-2 — Five In Midfield", content: "Three center backs. Two wing-backs. Three central midfielders. Two strikers.\n\nStrengths: Total midfield control, two strikers, extra defensive coverage.\n\nWeaknesses: Wing-backs cover enormous ground. Three center-backs overloaded by width.\n\nHow to attack it:\n— Push wing-backs back — remove their attacking contribution\n— Hit behind wing-backs with fast runs when they push forward\n— Play wide — stretch the three center-backs" },
    { title: "The Low Block — How To Break It", content: "Some teams just park. Nine or ten men behind the ball.\n\n1. Patience. They want you to rush.\n2. Move the ball quickly — short combinations force their shape to shift.\n3. Switch play FAST. Forces the entire block to move.\n4. Get wide and cross — numbers in the box can break it.\n5. Midfield runners arriving late are hard to track.\n6. Through ball into channels between last defender and the 18.\n\nWhat doesn't work: Individual dribbling into a packed defense." },
  ]},
  { id: "defending", title: "Defending", icon: "🛡️", subtitle: "Reading Players, 1v1, Pressure", sections: [
    { title: "The Fundamentals Of Individual Defense", content: "Defense starts before the attacker gets the ball.\n\nCore principles:\n1. Be goal-side. Always position between attacker and goal.\n2. Delay, don't dive. Buy time for teammates.\n3. Stay on your feet. Committed tackles that miss are gifts.\n4. Force a direction. Channel toward sideline or weak foot.\n5. Watch the ball, not the feet. Feints happen with the body. The ball tells the truth.\n\nThe jockeying position: Side-on stance, weight on back foot, low center of gravity." },
    { title: "Defending Fast Players", content: "Fast attackers need space to run into. Eliminate that space.\n\nHow to defend pace:\n1. Get tight EARLY — before they have the ball.\n2. Force them wide. The sideline is your teammate.\n3. Don't turn and chase. Focus on preventing the moment.\n4. Angle your run so they must go wide.\n5. Be physical early — fast players hate physicality.\n\nKey shift: You're not trying to win the ball. You're making them predictable." },
    { title: "Defending Technically Skilled Players", content: "A technically elite dribbler slows down and waits for you to commit.\n\nGolden rule: Do NOT lunge. They're waiting for it.\n\nHow to defend skill:\n1. Patience. Stand them up. Make them make the first move.\n2. Watch the ball, not the body.\n3. Force them onto their weak foot.\n4. Shrink their space — tight enough they can't turn.\n5. Tackle only when they take a heavy touch. Then commit fully." },
    { title: "Defending Physical Players", content: "Strong attackers try to back into you and use their body as a shield.\n\nPrinciples:\n1. Don't engage their back. Stay to the side.\n2. Arms-length positioning: Too close and they spin you. Too far and they turn.\n3. Be first to the ball.\n4. Use your body legally — shoulder to shoulder.\n5. Force wide. Physical strikers are most dangerous centrally." },
    { title: "The Art Of Pressing", content: "Pressing isn't chasing the ball. Uncoordinated pressing creates space.\n\nPress when:\n— Opponent receives with back to goal\n— They take a heavy first touch\n— Ball goes to a weak-footed player\n\nHow to press effectively:\n1. Know where you're forcing the ball BEFORE you press\n2. Cut off the easy pass\n3. Teammates must press in coordination\n4. Don't overcommit\n\nHigh press wins the ball high but is exhausting. Mid press is more sustainable." },
  ]},
  { id: "midfield", title: "The Midfielder", icon: "🧠", subtitle: "Positioning, Vision & The Isagi Principles", sections: [
    { title: "What Makes A Midfielder Elite", content: "The average player has direct possession for only 1–3 minutes in 90.\n\nWhat separates elite midfielders:\n1. Scanning frequency — Xavi scanned 0.83 times per second. Elite: 6–8 times in 10 seconds.\n2. Pre-decisions — By the time the ball arrives, the decision is already made.\n3. Body orientation — Always receive with an open body. 'Play the way you face.'\n4. Movement OFF the ball — Where you position without it determines what balls you get.\n5. Tempo control — Knowing when to play fast and when to slow down." },
    { title: "Scanning — The Skill That Separates Everyone", content: "Scanning is checking your shoulders to gather information BEFORE the ball arrives.\n\nHow to build the habit:\n— Force yourself to check both shoulders before every receive\n— Rule: never receive without at least one shoulder check\n— Target: scan every 3 seconds minimum\n\nWhat to look for:\n— Where is the nearest pressure?\n— Which teammate is open?\n— Where is the space?\n— What is the defensive shape?\n\nYou're taking a photograph of the field. File it instantly. Act on it." },
    { title: "Positioning Between The Lines", content: "The most dangerous position: the space between opponent's midfield and defensive line.\n\nWhy it's dangerous:\n— Midfielders can't press without leaving space behind\n— Defenders can't step out without exposing their line\n— You're facing goal with time and space\n\nHow to get there:\n— Move away from the ball to create angles\n— Time your run to arrive AS the ball is played\n\nThe half-space: Between center and wing. Where Iniesta, Modric, De Bruyne operate." },
    { title: "The Isagi Principles — Spatial Dominance", content: "Isagi's weapon isn't skill or pace — it's meta-vision.\n\n1. Before the ball arrives: where is the SPACE? Not the ball. The space.\n\n2. Predict where space will open: Fullback pushes forward → space opens behind. Read movement to predict the gap, then move there BEFORE it opens.\n\n3. Exploit the transition moment: The 3–5 seconds after possession changes. Strike in this window.\n\n4. Create space for others: Your run doesn't need to end in receiving. Dragging a defender away is a successful action.\n\n5. The chain calculation: Calculate two passes ahead before every touch." },
    { title: "First Touch — The Foundation Of Everything", content: "Your first touch tells everyone on the field who you are.\n\nTypes:\n— Cushion touch: Relax the surface to kill the ball's pace.\n— Directional touch: Redirect with inside or outside as it arrives.\n— First-time pass: The touch IS the pass. Requires pre-scanning.\n\nTraining: Wall work. Control it dead every time. Both feet. 100 reps each surface.\n\nThe test: After receiving, can you immediately look up? Still looking down = touch wasn't good enough." },
    { title: "Tempo — Controlling The Game's Pace", content: "Elite midfielders SET the rhythm.\n\nPlay FAST when:\n— Transition moments\n— Defenders are disorganized\n— A runner is making a timed run\n\nSlow DOWN when:\n— Team needs to reorganize shape\n— No forward option available\n— Pressing is coming\n\nMost common amateur mistake: Playing fast all the time. Top teams play slow to go fast.\n\nYou are the tempo dial. Own it." },
  ]},
  { id: "mental", title: "Mental Game", icon: "🔥", subtitle: "Psychology, Pressure & Domination", sections: [
    { title: "The Psychology Of Competition", content: "Soccer is played twice — once in the body, once in the mind.\n\nWhat separates competitive players:\n— Composure under pressure: Execute technique when heart rate is 160.\n— Short memory: Forget bad touches instantly.\n— Reading opponents: Frustrated? Apply more pressure. Confident? Disrupt their rhythm.\n\nThe composure principle: Your technique only holds under pressure to the level you've practiced it under pressure. Train at speed, under fatigue, with consequences." },
    { title: "Imposing Yourself Mentally", content: "It's not trash talk. It's actions that make opponents feel the game is already decided.\n\n1. Dominate the first five minutes: Win your first header, tackle, and pass.\n2. Visible composure: When you're calm and they're not, it communicates power.\n3. Physicality in legal spaces: Use it early.\n4. Punish every mistake instantly: Transition immediately when they give it away.\n5. Be unpredictable: Change your patterns. Make them feel like they can't read you." },
    { title: "Visualization — Training The Brain", content: "Your brain cannot fully distinguish between a vividly imagined action and a real one.\n\nHow to do it properly:\n1. Be specific. Visualize receiving under pressure, taking a directional touch, threading a through ball.\n2. All senses. See the field, hear the crowd, feel the ball.\n3. Include adversity. Visualize a bad touch — then recovering.\n4. Pre-match: 5–10 minutes before every game or session.\n\nFive minutes every night before sleep. It costs nothing. Over months, it compounds." },
    { title: "The Transition Mindset", content: "The most dangerous moment in soccer: the 3–5 seconds after possession changes.\n\nWhen you WIN the ball: Look forward immediately. Attack before the defense organizes.\n\nWhen you LOSE the ball: Counter-press immediately. Don't sulk. The ball is closest to your team in the moment just after losing it.\n\nYour profile — lean, fast, explosive — is perfectly suited to transition moments. This is where you are most dangerous." },
    { title: "Handling Mistakes & Staying In The Game", content: "The most consequential skill in soccer isn't technical. It's moving on instantly from errors.\n\nThe reset process:\n1. Accept: It happened. That's done.\n2. Analyze: Decision error or execution error? File it for later.\n3. Redirect: Where do I need to be RIGHT NOW?\n4. Go: Move. Don't stand still processing.\n\nThe whole process takes 2 seconds. Long memory is a liability in competition." },
  ]},
  { id: "iq", title: "Soccer IQ", icon: "📡", subtitle: "Reading The Game, Space & Time", sections: [
    { title: "Space — The Real Currency Of Soccer", content: "The ball is secondary. Space is the game.\n\nTypes of space:\n— Behind the defensive line: Most dangerous. Through ball here often leads to goal.\n— Between the lines: Where midfielders operate.\n— Wide space: Stretches defense, opens central areas.\n— Space created by movement: Running without the ball drags defenders.\n\nThe central question before every action: Where is the space, and how do I attack it or create it?" },
    { title: "Reading Defensive Shape", content: "Understanding how the opposition defends tells you exactly where to attack.\n\nHigh defensive line: Vulnerability — space in behind for pace.\nDeep defensive line: Vulnerability — space in front of defense.\nZonal defense: Attack by creating overloads.\nMan marking: Drags defenders out of position with intelligent movement.\n\nBefore every game: Watch how they defend for 10 minutes. Where do they give space? Which player is weakest?" },
    { title: "The Third Man Run", content: "Player A passes to Player B. Player B is marked. But A's pass was a TRIGGER — it signals Player C (the third man) to make a run into space.\n\nThe defender marking B watches the ball. The defender covering C's zone tracks the ball. Neither watches C's run until it's too late.\n\nHow to use it:\n1. Recognize when a teammate is about to play a pass\n2. Time your run so you arrive as the ball reaches the second player\n3. You receive in full stride with space ahead\n\nThis is Isagi's chain calculation in real soccer." },
    { title: "Overloads & Numerical Superiority", content: "Numerical superiority = more of your players than theirs in a specific area.\n\n2v1 anywhere = the defender cannot stop both. One of you is always free.\n\nHow midfielders create overloads:\n— Positional rotation: Move into areas with fewer defenders\n— Overlapping runs: Give and go. Pass, then run.\n— Third man combinations\n\nThe best midfielders manufacture overloads. Don't wait for them." },
    { title: "Transition — The Game Within The Game", content: "Modern soccer is increasingly about transitions.\n\nOffensive transition (just won the ball):\n— Look forward immediately\n— Attack before defense reorganizes\n— Exploit the 5-second window\n\nDefensive transition (just lost the ball):\n— Counter-press immediately\n— Sprint to defensive position\n— Delay their attack\n\nThe gegenpressing principle: Winning the ball back within 5 seconds is statistically the most dangerous way to create a goal-scoring opportunity. Your profile is perfectly suited to this." },
  ]},
];

// DRILLS PART 1 — FUNDAMENTALS
const DRILLS_FUNDAMENTALS = {

  "Passing — Short": [
    { name: "Wall Pass Rapid Fire", how: "Stand 3–5 yards from a wall. Pass with the inside of your foot, let it return, and immediately pass again. Keep a constant rhythm — don't wait for the ball, step into it. 2 sets of 60 seconds per foot.", avoid: "Don't let your ankle go loose on contact — lock it firm. Don't square up statically between passes, stay on your toes and ready to move." },
    { name: "Triangle Passing", how: "Set 3 cones in a triangle 6 yards apart. Pass to the first cone marker, move to receive the next angle, pass again. Focus on weight — every pass should arrive at a pace that requires no stretch to control.", avoid: "Don't hit every pass the same weight. Mix feather-touch passes and firm passes. Don't stand still after releasing — move immediately after every ball." },
    { name: "One-Two Combination", how: "Stand 4 yards from a wall at a slight angle. Play the ball into the wall and shift laterally to receive it as if a teammate returned it. Your first touch should already be setting up the next pass — do this in one fluid motion. 3 sets of 10 reps.", avoid: "Don't kill the ball with your first touch — it should redirect, not stop. Don't stand directly facing the wall or you lose the angle that makes the drill realistic." },
    { name: "Gate Passing", how: "Place two cones 2 feet apart as a gate, stand 8 yards away. Thread every pass cleanly through the gate. Alternate feet each set. Start slow for accuracy, then add pace once you're hitting 8/10 cleanly.", avoid: "Don't aim vaguely at the middle — pick a specific point and commit. Make sure your plant foot points at the target before striking." },
    { name: "Passing in Motion", how: "Walk forward and pass a ball against a wall at different angles while you're moving. Force yourself to time the contact while your body is in motion rather than stopping to set yourself. Mimics real game passing rhythm.", avoid: "Don't slow down before every pass. The whole point is maintaining pace. Don't let the ball get too far ahead of you when receiving." },
    { name: "Eyes-Up Passing", how: "Number 3 cones placed around you 1–4. A partner calls a number and you pass to that cone within 1 second. Trains pre-scanning habit. Solo version: glance up between each wall pass and call out what you see in your environment.", avoid: "Don't look at the ball during the pass once you've set your touch. The pass should feel automatic — eyes up is the skill being trained here." },
    { name: "Curved Pass Along the Line", how: "Use a sideline or painted line as a target. Stand 6 yards away and try to pass so the ball rolls along the line for at least 4 yards. Both feet. Forces precision with your side-foot angle.", avoid: "Don't use too much inside foot — a slight angle through the ball is what keeps it tracking straight. Don't lean back; stay over the ball." },
    { name: "3-Cone Square Passing Circuit", how: "Set 4 cones in a 10-yard square. Dribble to each cone and play a crisp pass to a partner at the next cone before moving. Rotate. Focuses on timing your pass right as you arrive rather than stopping.", avoid: "Don't arrive at the cone and then decide what to do. Decide before you get there. Don't slow to a walk on approach — keep tempo." },
    { name: "Short Pass Pressure Rondo", how: "With 3+ people, play a tight rondo — one person in the middle. Every pass must be first or second touch. The player in the middle wins by forcing a bad touch or interception. The more pressure, the more realistic.", avoid: "Don't play the easy safe ball every time — try to play through the pressure. Don't hold the ball more than 2 touches or you're training bad habits." },
    { name: "Blind Receiving Drill", how: "A partner stands behind you and passes the ball to your feet without warning. You must react, take a clean first touch in a direction, and pass it back accurately. Forces reactive technical sharpness.", avoid: "Don't turn before the ball arrives — that's cheating the point of the drill. Don't poke at it; commit to a proper receiving surface." },
    { name: "Staggered Distance Passing", how: "Set cones at 5, 8, 12, and 6 yards. Pass to each distance in sequence — the change in range forces you to adjust weight on every ball. 3 circuits per foot.", avoid: "Don't use the same leg swing for a 5-yard pass as a 12-yard pass. This drill is specifically about weight regulation — think about it consciously." },
    { name: "Pass and Follow", how: "With a partner, pass and immediately run to the position they were standing in. They pass back and run to yours. Both players are constantly moving. 5-minute block.", avoid: "Don't jog — run to the new position. Don't let passes get sloppy because you're moving; the motion is the challenge, not an excuse." },
    { name: "Back Foot Receiving Pass", how: "A partner plays a ball slightly behind you. Take a touch to your back foot (away from pressure) and play a clean short pass back. Simulates receiving under pressure and protecting the ball.", avoid: "Don't reach for the ball — let it come to your body and take a touch across. Don't hit the return pass before you've fully secured the touch." },
    { name: "Cone Slalom Pass", how: "Set 6 cones in a line 2 yards apart. Dribble through the slalom and play a short pass to a partner at the end, then receive the pass back and repeat the slalom. 4 sets.", avoid: "Don't rush the slalom at the expense of the pass quality. The pass at the end has to be clean. Don't use just your strong foot through the cones." },
    { name: "Tempo Change Passing", how: "Play 5 passes slowly with a partner, then suddenly play 5 as fast and sharp as possible, then slow again. The shift in tempo trains your ability to control pace in a game — slow to fast is when chances are created.", avoid: "Don't let the slow passes get sloppy just because the pace is low. Precision at slow speed carries over. Don't telegraph the tempo change." },
    { name: "First Touch Direction Drill", how: "Receive a pass from a partner and with your first touch, redirect the ball 90 degrees to a target cone before passing back. Forces you to use your first touch as a directional tool, not just a stop.", avoid: "Don't take 2 touches to change direction — the redirection IS the first touch. Don't let the ball run too far away from your body on the redirect." },
    { name: "Low Pass Target Practice", how: "Place a small cone or water bottle as a target 7 yards away. Pass along the ground trying to hit or pass within 6 inches of the target. 20 attempts per foot. Score yourself.", avoid: "Don't rush shots — deliberate aim. Don't ignore misses without thinking about why — was it the angle, the contact point, or the plant foot?" },
    { name: "Relay Passing Circuit", how: "Set up 4 cones in a 15-yard line. Two players pass back and forth while moving laterally along the line of cones. Neither player stops — both are always moving while passing. 4 minutes continuous.", avoid: "Don't slow your lateral movement when the ball is coming to you. Stay athletic. Don't let passes die short because you're moving — put pace on them." },
    { name: "Inside-Outside Alternating Pass", how: "Pass with inside of foot, receive it back, next pass is outside of foot. Alternate every rep. Forces your brain to switch technique quickly and builds confidence with both passing surfaces.", avoid: "Don't let the outside pass be limp — lock the ankle and follow through. Don't use this drill as an excuse to practice bad outside foot passes." },
    { name: "Single Cone Turn and Pass", how: "Receive a ball from a partner, do a single-touch turn around a cone placed 1 yard to your side, then pass to a second partner or wall. Simulates receiving, evading, and distributing.", avoid: "Don't over-elaborate the turn — one clean touch is the goal. Don't complete the turn and then reset before passing; it should be one fluid sequence." },
    { name: "Accuracy Wall Grid", how: "Draw or tape 4 numbered squares on a wall. A partner calls a number right as you pass — you aim for that square. Forced split-second decisions on direction mid-strike.", avoid: "Don't wait for the call before starting your pass — the call should come while you're approaching. This trains reading late information." },
    { name: "Pass Under Fatigue", how: "Do 10 burpees or 30-second sprint, then immediately play 10 short passes against the wall focusing on keeping quality. Training passing when tired is essential — this is when games are decided.", avoid: "Don't slow down after fatigue and call it recovery. The point is maintaining technical quality when gassed. Push through it." },
    { name: "Diamond Rondo (4v1)", how: "4 players on a diamond, 1 in the middle. All passes must be first or second touch, short distance only. The player who gives it away goes in the middle. Competitive element maintains intensity.", avoid: "Don't play only safe square passes. Test the through-ball through the defender when the angle is there. Don't isolate — always think about the player two passes ahead." },
    { name: "Shadow Passing", how: "Two players mirror each other's movement — one leads, one shadows. As they move, they pass back and forth. The moving pattern forces you to constantly recalibrate the pass direction and weight.", avoid: "Don't stop moving to pass — keep moving throughout. The passing should be near-automatic while your focus is on tracking your partner's movement." },
    { name: "Bounce and Release", how: "Throw the ball against the wall yourself — it bounces back awkwardly. Control the bounce and immediately play a clean short pass to a target. Mimics imperfect ball delivery in games.", avoid: "Don't wait for a perfect setup — that defeats the purpose. Take whatever bounce comes and clean it up with your first touch." },
    { name: "Receive Across Body", how: "A partner passes to your right side — take the touch with your left foot across your body to the left, and vice versa. Forces directional first touch and body shielding awareness.", avoid: "Don't just redirect the ball — the touch should put the ball where you want it for the next action. Don't over-reach across your body; let it come to a comfortable range." },
    { name: "Passing With Verbal Pressure", how: "A partner stands behind you and shouts 'press' randomly. When you hear it, you must play the ball immediately regardless of what touch you were on. Simulates mental pressure and urgency.", avoid: "Don't panic and just kick it anywhere — even under pressure, the pass must have direction and purpose. This is about calm decision-making under pressure, not panic." },
    { name: "Long Rondo Transition", how: "5 players across 20 yards — 4 vs 1. But the space is long and narrow. Passes must stay along the line, the defender must work the line. Builds short passing in tight corridors.", avoid: "Don't play across the corridor — that gives the defender easy interceptions. Stay linear. Don't lose intensity when it's your turn in the middle." },
    { name: "1-Touch Circuit", how: "Place 5 cones in a circle, 4 yards apart. A partner feeds you from outside the circle. Every ball that enters must be played back 1-touch. Rotate the feed position. 3 sets of 20.", avoid: "Don't guess where the next feed is coming from — scan. Don't jab at 1-touch passes; a proper surface and follow-through still applies." },
    { name: "Stop-Start Weight Control", how: "With a partner 10 yards away, pass with the intention that the ball dies exactly at their feet with no extra bounce. Then pass with the intention the ball reaches them with enough pace they must take a touch back. Alternate purposefully.", avoid: "Don't wing it — each pass should have a deliberate weight intention before you kick it. This is one of the most underrated passing skills: weight control on demand." },
    { name: "Distracted Passing", how: "While juggling the ball with your thigh, a partner throws a ball gently to your feet — control it and pass it back accurately. Divides attention between two tasks simultaneously, building subconscious passing mechanics.", avoid: "Don't drop the juggle just to make the pass — work to maintain both. If this is too hard, simplify by holding a ball in your hands while controlling/passing with your feet." },
  ],

  "Passing — Long": [
    { name: "Distance Ladder Passing", how: "Start 15 yards from a partner and hit 5 clean passes each. Both step back 5 yards to 20, hit 5 more. Step back to 25, 30, 35. You're working progressively longer passes, adjusting your mechanics at each distance.", avoid: "Don't use the same swing for every distance. At longer distances, you need more hip rotation and follow-through. Don't balloon the ball — aim flat and driven." },
    { name: "Driven Long Pass Technique Reps", how: "Place a cone 30 yards away. Drive passes to it with your laces — firm plant foot slightly beside the ball, strike through the middle-lower half, lean slightly over the ball to keep it down. 4 sets of 10.", avoid: "Don't lean back — that lofts the ball unnecessarily. Don't use your toe. The laces contact should be clean through the center of the ball." },
    { name: "Switch of Play Drill", how: "Set up on the left side of a pitch or open area. A target player stands on the right side 35–45 yards away. Practice switching the ball from left to right with your non-dominant foot too. This mimics a real midfielder switching play.", avoid: "Don't loop the pass — it takes too long in a game. Aim for a flat driven ball that reaches the target within 3 seconds of leaving your foot. Don't always use your dominant side." },
    { name: "Lofted Long Ball to Zone", how: "Mark a 5×5 yard target zone 35 yards away. Practice hitting lofted passes that land inside the zone. The loft is deliberate — over a defensive line, not just because you can't hit it low.", avoid: "Don't confuse lofted with loopy. A good lofted long ball has trajectory and lands with purpose. Don't strike under the ball — hit through it at a slight upward angle." },
    { name: "Long Pass to Chest Control", how: "Partner stands 30 yards away. You hit a long ball and they must control it with their chest. Focus on loft height — not too low (hard to chest) and not too high (hangs in the air too long). 3 sets each.", avoid: "Don't just blast the ball. Think about the height trajectory for the receiver's comfort. Don't send flat passes for chest control — it defeats the purpose." },
    { name: "Moving Target Long Pass", how: "A partner starts running from one cone to another 25 yards away. You must time and weight your long pass to arrive as they arrive at the second cone. This is threading a ball into space, not at a person.", avoid: "Don't pass to where they are — pass to where they will be. Don't ignore the weight; if it's too hard the player runs past it, too soft and they have to wait." },
    { name: "Long Pass Both Feet", how: "Alternate long passes with right and left foot to a target 30 yards away. Left foot one, right foot next, 20 total. Forces equal development and makes you work on non-dominant mechanics explicitly.", avoid: "Don't give up on the weaker foot when it's bad. The whole point is improving it. Don't over-correct with your dominant foot — they should feel as similar as possible." },
    { name: "Disguised Long Ball", how: "Shape as if playing a short pass to one side, then redirect and hit a long ball to the opposite direction at the last second. Practices disguise with your body before the long pass — crucial for breaking lines in a real game.", avoid: "Don't make the fake obvious. Sell the short pass with your body, eyes, and shoulder angle. Don't compromise the actual long pass quality in trying to be theatrical." },
    { name: "Long Pass Under Pressure", how: "A partner applies passive pressure — walking toward you. You must hit a clean long pass before they close you down (5 seconds max). Builds composure when there's a body coming at you.", avoid: "Don't rush and shank the ball. Pressure should make you more deliberate, not panicked. Don't watch the defender — keep your head up and pick the target first." },
    { name: "Crossfield String Drill", how: "Lay a piece of rope or string at 3-foot height between two poles 10 yards apart. Practice hitting long passes that fly over the string but don't go more than 6 feet above it. Controls the trajectory window.", avoid: "Don't smash the ball over the top carelessly. The window is the challenge. Don't let the string become irrelevant by going way over — hit it tight." },
    { name: "Long Pass to Penalty Spot", how: "From the halfway line, try to land long passes on the penalty spot of a full-size goal — roughly 35–40 yards. This gives you a specific precision target rather than a vague zone.", avoid: "Don't aim just in the general area of goal — that's too easy a target. Make it the spot specifically. Track your makes/misses and try to beat your record each session." },
    { name: "Long Ball Curve Practice", how: "Hit a long ball with slight curl — strike the side of the ball with your laces to bend it around a cone placed in the middle of the pass lane. Not a full curl, just enough arc to go around an obstacle.", avoid: "Don't try to bend it like a free kick — this is a subtle curve on a driven pass. Too much curve loses pace and purpose. Strike through the ball, not around it." },
    { name: "Long Ball From Back Foot", how: "Receive a pass rolling behind you. Without taking an extra touch to settle, strike a long ball from your back foot to a target. Simulates clearing or distributing from an awkward touch in a game.", avoid: "Don't adjust your whole body before striking — that's an extra touch. Take it from whatever position you receive it, even if uncomfortable." },
    { name: "First-Time Long Pass", how: "A partner plays a firm short pass to you — you redirect it long with one touch to a target 30 yards away. No control touch — pure first-time redirection of a moving ball over a long distance.", avoid: "Don't let the ball come to a stop — it must be struck first time. This requires you to read the pass coming in and adjust your body position before it arrives." },
    { name: "Long Ball Accuracy Log", how: "Hit 20 long passes to a specific target. Log your score. Repeat every session and track improvement over weeks. Simple but having the data makes you competitive with yourself.", avoid: "Don't count near misses as hits. Be honest. Don't skip sessions — this is a skill that degrades quickly without consistent practice." },
    { name: "Two-Touch Long Switch", how: "Receive a ball on your left, take one touch to set it on your right, and then drive a long pass to the right. This two-touch switch is one of the most common actions for a midfielder distributing under pressure.", avoid: "Don't let the setting touch go too far — the second touch long pass needs to be taken quickly. Don't take 3 touches. Force yourself to the two-touch limit." },
    { name: "Long Ball With Eyes Closed (Setup Only)", how: "Before striking, close your eyes for 3 seconds, visualize the target clearly, then open and pass. Trains mental targeting and commitment before the physical action.", avoid: "Don't open your eyes and look at your foot before striking — that breaks the pattern. Commit to the image you formed with eyes closed." },
    { name: "Long Pass Fatigue Drill", how: "Sprint 20 yards, stop, receive a ball, and immediately hit a long pass to a target 30 yards away. Your body will be fatigued and your mechanics will break down — fight through it.", avoid: "Don't slow everything down after the sprint to recover fully. The game doesn't give you recovery time. Hit the pass with whatever energy you have." },
    { name: "Long Pass Angle Variety", how: "Stand in the center of a pitch. Place 5 targets at different angles — left, right, ahead-left, ahead-right, straight. Rotate hitting each angle with accurate long passes. Makes sure you can pass long in any direction.", avoid: "Don't just practice straight-on long passes. The most important ones in games are diagonal switches and angled through-balls." },
    { name: "Rain Gutter Drill", how: "Mark two parallel lines 3 feet apart extending 35 yards. Your long pass must land between the lines — width is the precision challenge, not just distance. This trains narrow accuracy over distance.", avoid: "Don't go for extreme power. Accuracy within the channel first, then build pace. A gutter pass that misses the channel is useless in a game." },
    { name: "Long Pass Over Defender Simulation", how: "Place a cone or pole at 10 yards height if possible (use a tall pole or jumprope held up). Hit long balls that fly over the obstacle but land between 30–40 yards ahead. Mimics chipping over a pressing defender.", avoid: "Don't sky the ball just to clear the obstacle. The trajectory must be purposeful — over the obstacle AND accurate to landing zone." },
    { name: "Driving Low Long Pass", how: "Hit long passes that stay below knee height the entire flight — these are laser-driven flat passes that cut through space at pace. Strike the lower-middle of the ball hard with laces, follow through completely.", avoid: "Don't let the ball bounce more than once in the first 20 yards — it should skid through. Don't lean back. Drive through the ball aggressively." },
    { name: "Long Pass Shooting Combo", how: "Receive a long ball, control with one touch, then immediately strike on goal from long range. Links your long pass receiving with shooting — the sequence that ends many dangerous moves.", avoid: "Don't take 3+ touches to shoot after receiving. Control — shoot. Two actions. If the first touch is poor, still try the shot — it teaches you to shoot from imperfect setups." },
    { name: "Partner Mirror Switching", how: "You and a partner stand 40 yards apart but both move laterally. You must continuously switch the ball left and right while both of you are moving. The target keeps changing.", avoid: "Don't pass to where your partner was — watch them and lead them slightly. Don't stop moving just to pass; the lateral movement IS part of the drill." },
    { name: "Long Pass Into Box Run", how: "A third player sprints from the halfway line into the box. You must time a long pass to arrive as they enter the danger zone. This is a specific in-game scenario: the midfielder-to-striker through ball over the top.", avoid: "Don't loop the ball too high — a flat driven ball over 35 yards is harder to defend and easier for the runner to collect at pace." },
    { name: "Instep Power Builder", how: "Focus on pure long ball power. Strike the ball as hard as you accurately can, 50 reps. No target needed. Just developing raw power through proper instep contact and full follow-through.", avoid: "Don't sacrifice technique for power. If your ankle rolls on contact or your plant foot is off, the power means nothing. Good mechanics first, then add power." },
    { name: "Long Pass vs Wind", how: "Specifically practice on windy days. Hit long balls into the wind and with the wind. Adjust your contact point and trajectory to account for conditions. Weather awareness is real game IQ.", avoid: "Don't skip sessions because of wind — use it as a training variable. Don't hit your normal pass into a headwind expecting the same result. Adjust." },
    { name: "Long Ball Possession Drill", how: "3 players in a triangle 30 yards each side. One player must always hit a long pass — no short passes allowed in this drill. Forces accurate long passing under movement and positioning pressure.", avoid: "Don't make this drill slow and comfortable. All 3 players must be moving constantly. The long pass should be hit to space where the player is running, not where they stood." },
    { name: "Chip vs Drive Contrast", how: "Alternate between chipping the ball (underneath contact, loft) and driving it (through contact, flat) to the same target. Feel the difference in body position, contact point, and follow-through on every alternate rep.", avoid: "Don't do them identically — the contrast IS the drill. If your chip and drive feel similar, you're not differentiating your contact point enough." },
    { name: "Long Pass Receiving Under Pressure", how: "Receive a long ball with a defender applying pressure from behind. Control it away from them in one touch, then immediately play another long ball. The sequence of receive → control → long pass under pressure is a complete game scenario.", avoid: "Don't take too many touches under pressure before distributing. In a game, that second touch must be quick. Control — protect — release." },
  ],

  "Passing — Through Ball": [
    { name: "Threading Cones", how: "Set two cones 3 feet apart as a gate, 15 yards away at a diagonal. Practice threading through balls between the cones to a moving partner. The partner must receive it in stride without breaking their run.", avoid: "Don't pass to the player — pass to the space. Aim for a point 2 yards ahead of where they currently are. Don't underhit; a through ball that dies is an easy interception." },
    { name: "Timing the Run Drill", how: "Partner starts a diagonal run on your signal. You must wait 1 beat before playing the through ball — the ball must meet them as they're running, not before. Practice the pause. That 1-beat delay is what separates good through balls from overhit ones.", avoid: "Don't play it immediately when you see the run — learn the timing. Don't watch the ball after you've played it. Watch where the run is going." },
    { name: "Angled Through Ball Reps", how: "From the center of a field, play angled through balls to a partner making diagonal runs — both left and right channels. Alternate channels every 3 passes. Builds versatility in your through ball directions.", avoid: "Don't always chip the through ball — work on flat driven ones too. Most elite through balls are low and fast, not looping." },
    { name: "Through Ball Under Pressure", how: "A partner applies passive pressure behind you. With 3 seconds on the clock, you must read a third player's run and play a through ball before time. Builds urgency and clarity under pressure.", avoid: "Don't look down at the ball while thinking. Keep your head up, read the run, feel the ball at your feet. Don't over-think — commit to the pass." },
    { name: "Line Breaking Drill", how: "Set up two cones as a defensive line at 15 yards. Practice playing through balls that pass through the line gap (2 yards wide) to a moving partner on the other side. The line represents a midfield block.", avoid: "Don't always use the same gap. Vary the angle of the through ball. Don't be neat — this drill should be hard. If you're threading every one, the gap is too wide." },
    { name: "Through Ball Weight Practice", how: "Three cones in a line: one at 10 yards, one at 20, one at 30. Hit through balls to each distance, alternating. At each distance, the weight changes. The 10-yard one needs a firm soft touch; the 30-yard needs a driven ball.", avoid: "Don't hit all three with similar pace — they'll all be wrong. Weight control on through balls is as important as direction." },
    { name: "No-Look Through Ball", how: "Pre-scan the field before receiving. When you get the ball, play the through ball without looking up again — your pre-scan information guides the pass. 3 sets of 10.", avoid: "Don't fake the no-look — actually commit to the information you got before. If you look up again mid-pass you're cheating the mental skill this builds." },
    { name: "Curved Through Ball", how: "Practice bending a through ball around a cone placed in the direct pass lane. The ball must curve away from the cone and find the player making a diagonal run. Uses the outside or inside of the foot with a whipping motion.", avoid: "Don't over-bend it — a slight arc is enough. Too much curve kills the pace. Don't use this as your default through ball — it's a specific tool." },
    { name: "First-Time Through Ball", how: "Receive a pass from a partner and without taking a settling touch, redirect it as a through ball for a third player making a run. The timing of all three players must align perfectly.", avoid: "Don't let the ball stop before playing it forward — it must be one-touch. This demands you see the run before you receive the ball." },
    { name: "Through Ball Decision Making", how: "Set up scenarios: sometimes the run is on, sometimes a cone 'defender' blocks the lane. You must decide whether to play the through ball or keep possession. Play the through ball only when the lane is genuinely open.", avoid: "Don't force the through ball when the lane is blocked — that's how you get intercepted. The decision not to play it is as important as the pass itself." },
    { name: "Lofted Through Ball", how: "Practice chipping through balls over a cone representing a defensive line to a partner running onto it behind the line. The loft clears the line, the weight means it drops into the runner's path.", avoid: "Don't chip it too high — it should skim over the line height and drop quickly. A high lob gives defenders time to recover. Quick chip, quick drop." },
    { name: "Through Ball Into Box", how: "Partner makes a diagonal run into the penalty box. You play through balls from various positions — left channel, center, right — always aiming to thread it into the space ahead of their run.", avoid: "Don't put it too close to the goalkeeper's feet. The ideal through ball into the box is aimed at the far post area so the runner can strike across goal." },
    { name: "Offside Trap Practice", how: "Set up 3 cones as defenders in a flat line. A partner starts behind the line (offside). On a signal, the cones 'step up' (you move them 2 yards forward) and the partner sprints. Play the through ball to time with their run from onside.", avoid: "Don't play the ball while they're offside. The whole point is learning to hold the pass for the right moment. This is about timing, not power." },
    { name: "Wall Redirect Through Ball", how: "Pass the ball against a wall at an angle. As it returns, redirect it as a through ball to a moving partner 20 yards away. The wall simulates a give-and-go — you're converting a return pass into a through ball.", avoid: "Don't let the redirect off the wall go loose. Control the redirection with intent — the wall is the one-two partner." },
    { name: "3-Zone Through Ball Game", how: "Divide a 30×20 area into 3 zones. Attackers must play a through ball to advance to the next zone. One defender in each zone. The challenge is threading the ball past 3 successive 'lines' to reach the final zone.", avoid: "Don't rush every through ball — sometimes holding and repositioning creates a better angle. Don't force diagonal passes when a straight one creates more space." },
    { name: "Through Ball at Different Speeds", how: "Hit 10 through balls at 50% power, 10 at 75%, 10 at 100%. The target stays at the same position. This makes you feel how drastically weight changes the playability of the same pass.", avoid: "Don't do this drill without thinking about what each weight means. 50% = slow layoff into space. 100% = cutting pass behind a high defensive line." },
    { name: "Receive and Thread", how: "Receive a pass from one partner, take one touch to set yourself, and play a through ball to a second partner's run. The touch sets your angle — point your body to the space before the touch lands.", avoid: "Don't take the setting touch directly to your feet — take it at an angle that already opens the passing lane. Think about where the through ball needs to go before you touch the ball." },
    { name: "Left Foot Through Ball", how: "Specifically practice all through ball work with your left foot only for 15 minutes. For a central midfielder, being able to play through balls with both feet is non-negotiable — defenders and midfielders always try to force you onto your weaker side.", avoid: "Don't give up when it's imprecise. Left foot through balls take longer to develop. Focus on contact, not power. Quality before pace." },
    { name: "Disguised Through Ball", how: "Shape as if passing to a player on your right. At the last second, play the through ball forward or to the left. The disguise creates the half-second gap in the defender's reaction that makes the pass work.", avoid: "Don't oversell the dummy — it becomes obvious. Subtle shoulder and hip feint is enough. Don't compromise your balance doing the disguise or the actual pass suffers." },
    { name: "Through Ball Finishing Combo", how: "Play a through ball to a partner making a run. They take a touch and finish on goal. Then switch: they play the through ball, you make the run and finish. This combines two key attacking sequences in one drill.", avoid: "Don't stop after the pass. The player who made the through ball should be making a supporting run into the box. Always play the full sequence." },
    { name: "Tight Angle Through Ball", how: "From the corner of a penalty box, try to play a through ball along the byline to the near post area. The angle is extremely tight — this forces you to use the outside of your foot or a whipped pass to bend it along the line.", avoid: "Don't try to hit this with a straight instep — the angle is too tight. Use the outside of the foot or a sidefoot with your toe pointed slightly outward." },
    { name: "Through Ball Decision Under Fatigue", how: "After a 200-meter sprint, receive a ball and immediately choose — through ball or keep possession. A cone in a random position signals 'defender present' or not. Tired brains make bad through ball decisions — train them tired.", avoid: "Don't switch off during the sprint. The decision-making starts before you stop running. Scan while you're sprinting toward the ball." },
    { name: "Reverse Through Ball", how: "Play a through ball backwards — into space behind you for a player making a late run. Used to play in an overlapping fullback or a midfielder arriving late into the box. Strike the ball backward with the heel or inside of the back foot.", avoid: "Don't try this until your regular through ball is solid. This is advanced. Don't be imprecise — a bad reverse through ball is almost always an own goal or interception." },
    { name: "Through Ball Reading Game", how: "In a 4v4 game, award a bonus point every time a team completes a through ball that results in a shot. Forces players to recognize and create through ball opportunities rather than just passing around.", avoid: "Don't force through balls when the defensive shape isn't vulnerable. In the game context, learn to read when the gap exists versus when it doesn't." },
    { name: "Thread to Feet vs Thread to Space", how: "Alternate between playing through balls to a player's feet (they've beaten the line) and to space ahead of them (still running onto it). The contact point and weight are different for each. Learn the distinction.", avoid: "Don't treat them as the same pass. To feet = softer, controlled. To space = harder, driven. The difference is felt by the receiver immediately." },
    { name: "Through Ball in Rain (Conditions)", how: "On wet grass, through balls behave differently — they skip and speed up. Practice specifically in wet conditions and adjust how hard you pass accordingly. Wet grass through balls need 20–30% less pace.", avoid: "Don't ignore conditions. Playing the same weight pass on a wet surface as a dry one is a technical error. Conditions awareness is a real skill." },
    { name: "Wall Through Ball Redirect", how: "Partner stands 5 yards to your side. You play a wall pass to them, they lay it back, and you immediately play a through ball into space 20 yards forward for a third runner. Tests your ability to transition from combination play into a killer pass.", avoid: "Don't slow down between the wall pass and the through ball — it needs to be continuous. The pace of the wall pass sequence is what creates the gap for the through ball to work." },
    { name: "Through Ball Map Session", how: "After a session, draw on paper the through balls you played or attempted: direction, outcome, which foot. Review which angles you're comfortable with and which you avoid. This makes your practice targeted.", avoid: "Don't skip the reflection. Self-aware training beats mindless repetition. Identify your weakest through ball angle and dedicate your next session to it." },
    { name: "Receive — Scan — Thread (10 Reps)", how: "This combines everything: receive a pass, scan left and right (1 second), identify the best through ball option from 3 possible runners, and execute. Trained slowly at first, then sped up over weeks.", avoid: "Don't look after you've scanned — commit to what you saw. The scan must be pre-pass, not mid-pass. Reward yourself for good decisions even when the execution is off." },
    { name: "Through Ball Depth Variation", how: "Practice threading balls 10 yards, 20 yards, and 30 yards through the same sized gap (3 foot gate). At each depth the challenge changes — short through balls need precision, long ones need both precision and power.", avoid: "Don't exclusively train the comfortable depth. If your 30-yard through ball is weak, spend extra time there. Distance on through balls matters as much as any other pass." },
  ],

  "First Touch — Inside": [
    { name: "Wall Receive and Control", how: "Stand 5 yards from a wall. Pass it at medium pace, and as it returns, take a first touch with the inside of your foot that kills the ball dead within 1 foot of your foot. 3 sets of 30 reps per foot.", avoid: "Don't cushion by pulling your foot back too late — the cushion starts before contact. Don't take the touch sideways every time; practice taking it forward, left, right, and diagonally." },
    { name: "Directional First Touch", how: "Receive passes from a partner and take each first touch in a different direction — forward, left, right. A partner calls the direction right as the ball arrives. Forces reactive directional control.", avoid: "Don't take the touch after hearing the call — be ready to take it in any direction before the ball arrives. Pre-position your body to execute any option." },
    { name: "First Touch Away From Pressure", how: "A partner passes to you while jogging toward you applying light pressure. Your first touch must take the ball away from them — 2 yards in the opposite direction of their approach. This is the game-realistic touch.", avoid: "Don't take the touch straight back or you're passing into the pressure. The touch should go diagonally away. Don't reach for the ball; let it come to you then take the touch." },
    { name: "First Touch Into Space", how: "A partner stands 15 yards away. They pass and point left or right simultaneously. Your first touch should be in that direction — as if moving into the space they indicated. Builds habitual directional first touch.", avoid: "Don't look at your foot when taking the touch. Look at where you're going. The ball will follow if your body is oriented correctly." },
    { name: "Varied Pace Receiving", how: "Partner alternates between soft, medium, and hard passes without warning. You must adjust your first touch firmness for each pace. A soft touch to a soft pass leaves the ball too far away. A hard touch to a hard pass sends it flying.", avoid: "Don't apply the same touch firmness to every ball. Read the pace of the incoming pass and calibrate your cushion before contact." },
    { name: "One-Touch Wall Circuit", how: "Pass to the wall, take a first touch in a pre-decided direction (e.g., always left), then pass back. Switch direction after 20 reps. Simple but high-volume repetition builds muscle memory.", avoid: "Don't rush to volume at the expense of quality. Every touch should go exactly where you intend. If it's going wrong, slow down and feel the mechanics." },
    { name: "High Ball Inside Touch", how: "Throw the ball up 10 feet, let it fall, and take a cushioning first touch with the inside of your foot. Focus on dropping your heel and softening the ankle to absorb the pace of the falling ball.", avoid: "Don't try to kill it with a hard touch — the ball is already coming with pace from the height. Meet it and withdraw the foot to cushion." },
    { name: "Receive and Shoot (1 Touch Setup)", how: "Partner rolls a pass to you at different angles. Your inside-foot first touch sets the ball up for an immediate shot on goal. The quality of your touch determines the quality of your shot. Alternate angles.", avoid: "Don't take the first touch and then set up for the shot separately. The touch IS the setup — it should leave the ball in your shooting position in one move." },
    { name: "Inside Touch Across Body", how: "Receive a pass on your right side with your left inside foot — across your body — directing the ball to the left. And vice versa. This cross-body first touch is one of the most useful tools for evading a pressing defender.", avoid: "Don't reach too far across your body. Step slightly toward the ball so the touch is comfortable. Overstretching causes a mis-hit touch." },
    { name: "First Touch Under Aerial Ball", how: "A partner throws or chips a ball to chest height. Take an inside-foot first touch as it drops — essentially volleying it softly to the ground in a controlled direction. Simulates receiving crosses and chips.", avoid: "Don't kick at it aggressively. Gentle, purposeful contact. The point is softness and control — meet the ball, redirect it, don't attack it." },
    { name: "Turn on the Touch", how: "Receive a ball coming from behind you (partner passes from 5 yards behind). Use your inside foot to cushion and turn simultaneously — one motion. End up facing the direction the ball traveled from.", avoid: "Don't take 2 touches to turn. The cushion and the turn happen together. Don't take the touch so wide it leaves you off-balance." },
    { name: "First Touch Accuracy Target", how: "Place a hoop or small square 2 yards to your left. Every inside-foot first touch should drop the ball inside the hoop. 30 reps from different pass angles. Adds precision accountability.", avoid: "Don't move the hoop to wherever your bad touches go. The hoop is the standard — if you miss it, it was a bad touch. Be honest with your scoring." },
    { name: "Juggle to Inside Touch", how: "Juggle the ball 5 times, then on the 6th, take a controlled inside-foot first touch to the ground in a specific direction. Builds the transition from aerial control to ground control.", avoid: "Don't rush the directional touch after the juggles. The point is the controlled landing, not speed." },
    { name: "Receive From Wide Angle", how: "Partner passes from a very wide angle (nearly behind you). Take the inside-foot first touch to reorient yourself forward. These extreme-angle passes require body rotation combined with the touch.", avoid: "Don't let your body stay sideways after the touch. The touch should spin you into a forward-facing position in one motion." },
    { name: "First Touch in Traffic (Cones)", how: "Set 6 cones in a cluster around you. Receive passes and take first touches that avoid all cones. Simulates receiving in tight spaces where every touch must have precise direction.", avoid: "Don't take 'safe' touches straight back — work with the angles the cones create. If you keep hitting cones, your first touch is too heavy." },
    { name: "Receive and Hold (Shield)", how: "Receive a ball from a partner and take a first touch to shield it — body between ball and a chasing partner. Control it with inside of foot close to your body, protect possession.", avoid: "Don't let the ball get too far from your body during the touch. A shielding first touch should land at 6–12 inches from your feet, not 3 yards away." },
    { name: "Hard Pass Cushion", how: "Partner passes hard from 8 yards — harder than comfortable. Take a clean inside-foot cushion. This builds your ability to control difficult passes. Games don't give you easy passes.", avoid: "Don't brace against the ball. Absorb it by moving your foot back on contact. Don't panic at the pace — stay calm and meet it early." },
    { name: "First Touch on the Run", how: "Run from one cone to another at medium pace. A partner passes the ball to your feet while you're running. Take a first touch that keeps your momentum going — the touch goes in front of you so you can keep running.", avoid: "Don't stop to receive the ball — you're on the run the whole time. The touch should be in front of you, not under your feet." },
    { name: "First Touch Combination Circuit", how: "5-yard pass to a partner, they pass back, inside-foot first touch sets you up for a pass to a third player, third player passes back to partner, repeat. 3 circuits per person.", avoid: "Don't slow the circuit down between touches. The pace of combination play in a game is constant — practice at game speed." },
    { name: "First Touch From Long Ball", how: "Partner hits long balls from 30 yards. Take an inside-foot first touch that kills it instantly, leaving you in a position to immediately pass. Long ball control with the inside foot is harder — the pace is higher.", avoid: "Don't take a big touch on a fast long ball — you'll lose the ball immediately in a game. Stiffen the ankle slightly more for faster incoming balls." },
    { name: "Random Direction Touch", how: "Toss the ball up and call a direction (left, right, forward) as it descends. Take your inside-foot first touch in that direction. Random directions trains reactive control rather than pre-planned patterns.", avoid: "Don't hesitate when you hear the call. Commit instantly. If you often go the wrong direction, your reactions aren't fast enough yet — keep going." },
    { name: "Receive in a Square (4 Cones)", how: "Stand inside a 2-yard square. Take all first touches within the square — the ball must not leave the square after your touch. Partner passes from various angles. Forces compact, controlled first touch.", avoid: "Don't use the edges of the square — try to keep the ball in the center area. A touch to the far edge still exits the square if the pass is firm." },
    { name: "Receiving While Turning Away", how: "Stand with your back to goal. Receive a pass and use an inside-foot first touch to turn. Your touch takes you facing the opposite direction in one smooth motion. Fundamental for strikers and midfielders.", avoid: "Don't separate the turn from the touch. They must happen simultaneously. Don't over-rotate and lose your balance — stay low and controlled." },
    { name: "First Touch Speed Test", how: "Count how many clean inside-foot first touches you can take in 60 seconds — partner feeds you rapid passes. The rule: each touch must put the ball in a new direction. Track weekly and try to beat your score.", avoid: "Don't sacrifice control for speed. A touch that goes 5 yards away doesn't count — it must be controlled within 2 yards of your body." },
    { name: "First Touch Receiving Angles (Clock Drill)", how: "Imagine a clock around you. Partner passes from 12 o'clock (straight ahead). Next pass from 3 o'clock (right side). Then 6 (behind), then 9 (left), then diagonals. Take a first touch from each position.", avoid: "Don't adjust your body position to make all passes feel comfortable — the uncomfortable angles are the point. Adapt your technique to the angle, not your stance to the ball." },
    { name: "Inside Touch in Rondo", how: "In a 5v2 rondo, your rule: every first touch must be with the inside of your foot and in a new direction. Extra constraint makes the rondo a first-touch workout as well as passing practice.", avoid: "Don't drop the constraint when you're under pressure in the rondo. That pressure is what makes it valuable. Easier passes should still use the proper technique." },
    { name: "Feint Then Touch", how: "As a pass arrives, make a body feint (sell a movement in one direction) and then take your inside-foot first touch in the opposite direction. Builds the combination of deception and technical control.", avoid: "Don't over-elaborate the feint at the expense of the touch. One clean shoulder drop, then the touch. Getting fancy is pointless if the touch is loose." },
    { name: "First Touch Pressure Test (30 seconds)", how: "30-second period: partner feeds passes as rapidly as possible. You must take clean inside-foot first touches and play immediately back. Volume, quality, pressure. Time yourself.", avoid: "Don't slow down when a touch goes wrong. Recover and keep up with the pace. Mistakes under fatigue are what this drill is about improving." },
    { name: "First Touch Balance Check", how: "After each inside-foot first touch, pause for 1 second in your landing position. Your weight should be balanced — not falling, not leaning. A good first touch should put you in a neutral athletic stance.", avoid: "Don't ignore the balance check. If you're falling to one side after each touch, your body position going into the touch is wrong. Correct it consciously." },
    { name: "First Touch to Shooting Position", how: "From 8 yards, receive passes at different angles and take inside-foot first touches that set you up perfectly for a driven shot. Then strike. The entire value of a good first touch is what it enables next.", avoid: "Don't be satisfied with first touches that just control the ball. Control it INTO the next action. The touch and the shot should feel connected, not separate." },
  ],

  "First Touch — Outside": [
    { name: "Outside Foot Wall Control", how: "Stand 4 yards from a wall. Pass it, and as it returns, take a first touch with the outside of your foot. Direct it 45 degrees to either side. The outside touch naturally redirects — use that.", avoid: "Don't use a toe-poke. It's the outer edge of the foot — from the little toe area. Keep ankle firm and meet the ball with the outer ridge, not the toe." },
    { name: "Outside Touch Direction Reps", how: "Place two cones left and right, 2 yards apart. Receive wall passes and alternate outside-foot touches — left cone, right cone, left, right. Builds both left and right outside foot touches.", avoid: "Don't take all your outside touches in the same direction. The whole point of this drill is building both directions of outside touch." },
    { name: "Outside Touch Turn", how: "Receive a pass from behind (partner stands behind you). Use an outside-foot touch to spin and turn in one motion. The outside of your right foot takes the ball to the right as you spin right, and vice versa.", avoid: "Don't take the touch too wide — it should land 1 yard to your side, not 3. Too wide and you lose it. Keep it tight to the turning motion." },
    { name: "Outside Touch Speed Drill", how: "Juggle 3 times with your feet. On the 4th, take an outside-foot touch low to the ground in a specific direction. Builds control from aerial to ground with the outer foot.", avoid: "Don't use your instep by mistake — the outside feel is distinctly on the outer edge. Practice the feeling slowly first before adding speed." },
    { name: "Outside Touch Feint Combination", how: "Receive a pass, fake inside with your body, and take the ball outside. The outside touch becomes part of the feint — body goes one way, ball goes the other via the outer foot.", avoid: "Don't fake and then adjust before the touch — the fake and the touch should be one fluid motion. They happen simultaneously." },
    { name: "Outside to Pass Combo", how: "Take an outside-foot first touch and immediately play a pass off the redirected touch. No extra touches between the first touch and the pass. 3 sets of 15.", avoid: "Don't take the outside touch and then reset your stance before passing. Use the momentum of the touch to feed directly into the pass." },
    { name: "High Ball Outside Touch", how: "Throw the ball 8 feet up. As it descends, cushion it with the outside of your foot. The softer and more precise the touch, the better. This is harder than the inside — the surface area is smaller.", avoid: "Don't tense up on contact. Stay relaxed and let the foot absorb the ball's pace. The outside foot touch needs the same cushioning principle as the inside." },
    { name: "Outside Touch in Traffic", how: "Set up 4 cones in a 2-yard square. Receive passes and take outside-foot touches that redirect the ball through a gap between cones. Changes the touch from directional to precision-directional.", avoid: "Don't knock the ball at the cones — read the gaps before the pass arrives. Know which direction your outside touch will go before the ball gets to you." },
    { name: "Outside Touch From Wide Pass", how: "Partner passes from a very wide angle. Take outside-foot first touch to reorient forward. Wide passes that require an outside touch to stay in the right direction are common in wing play and midfield transitions.", avoid: "Don't turn your whole body to make it comfortable — stay athletic and use the outside touch's natural redirecting property." },
    { name: "Right and Left Outside Alternating", how: "Right outside touch for 20 passes, then left outside touch for 20 passes. Both feet. Then alternate every pass. Builds subconscious switching between both outer touches.", avoid: "Don't let the weaker foot (almost always left) get sloppy. Spend extra time on it. If it keeps going wrong, slow down and feel the contact point." },
    { name: "Outside Touch Then Shoot", how: "Receive a pass from the right. Take an outside-left-foot touch that opens you up toward goal. Then shoot. This is a very common scoring sequence — outside touch to create space, shot.", avoid: "Don't take the outside touch too wide or you'll lose your shooting angle. The touch should open you up just enough to see the goal clearly." },
    { name: "Outside Touch Control Run", how: "While jogging, a partner passes the ball to your right side. Take an outside-right-foot touch that keeps the ball in front of you and maintains your running momentum. Touch should go forward-diagonally.", avoid: "Don't slow down before the touch. The outside touch at pace is about maintaining momentum, not stopping to control." },
    { name: "Outside Touch to Switch Direction", how: "You're dribbling right. A partner approaches from the right. Take an outside-left-foot touch across your body to switch direction left, away from the approaching player. High-use real-game skill.", avoid: "Don't exaggerate the cross-body motion. It should be natural and economic. And don't take it too far — you need the ball close enough to maintain control." },
    { name: "Pressure Outside Touch", how: "Partner passes from close range — almost uncomfortably close. You must take a sharp outside-foot first touch to escape the close range and create a yard of space. The fast touch is the escape.", avoid: "Don't freeze when the pass is fast and close. React fast. Outside touch fast and firm to create immediate space." },
    { name: "Outside Touch Accuracy Cone", how: "Place a cone 1.5 yards to your outside. Every outside-foot first touch should land the ball within 1 foot of the cone. Precision objective rather than just direction.", avoid: "Don't be satisfied with landing 'somewhere to the outside.' Precision practice with a specific target is what separates average from sharp." },
    { name: "Outside Touch on Wet Grass", how: "Practice outside touches on wet grass specifically. The outside foot touch on wet grass behaves very differently — the ball skips more. Learn to read the conditions and adjust contact.", avoid: "Don't apply dry-grass weight on a wet pitch. Wet conditions require lighter, more measured touches on the outer foot." },
    { name: "Outside Touch Juggling Switch", how: "Juggle with right foot, then switch to left foot, then take an outside touch with the right to ground level. Switching foot contact in the air before grounding is an advanced coordination drill.", avoid: "Don't rush this — it's a coordination drill, not a fitness drill. Slow it down until the pattern becomes smooth, then speed up." },
    { name: "Outside Touch Turning Under Pressure", how: "Two partners — one passes the ball, one stands close behind you. Use outside-foot first touch to spin away from the one behind you and face the one who passed. One touch, full spin.", avoid: "Don't get tunnel vision on just the ball. Feel where the pressure is behind you before the pass arrives — the touch direction depends on it." },
    { name: "Outside Touch Ball Mastery", how: "Standing still, tap the ball back and forth using just the outside of your right foot, then left. Go for 30 taps per foot without losing control. Builds relationship with the outer surface.", avoid: "Don't rush to 30 immediately — start at 10 clean taps. Add 5 per session. Don't let the ball get loose; tight tapping builds the surface control." },
    { name: "Outside Touch Dribble Start", how: "Ball sitting still. Use outside of your right foot to push it forward at an angle into a sprint — this starts a dribble. Get 5 yards ahead and stop. Repeat 10 times. The outside push-start is an underused skill.", avoid: "Don't shove the ball too far ahead — 2 yards is enough on the first touch. Keep it close enough that you're in control the moment you accelerate." },
    { name: "Outside Touch vs Inside Contrast", how: "Alternate between inside and outside foot first touches on consecutive passes. Feel the difference in surface, direction, and control. Builds awareness of when to use each touch.", avoid: "Don't become comfortable with only one. If the outside feels foreign, you're not using it enough. The contrast drill forces equal reps." },
    { name: "Aerial Cross to Outside Touch", how: "Partner chips a ball to your area from a wide position. Receive it with an outside-foot touch to kill it and set up a shot. Simulates receiving a cross with the outer foot.", avoid: "Don't use instep for this. The outside foot cushion off a crossed ball is a specific skill. Keep the ankle firm and meet the ball early." },
    { name: "Outside Touch Coordination Ladder", how: "Use an agility ladder. As you step through, a partner feeds a ball to your right or left randomly. Take an outside-foot first touch in the appropriate direction without stopping your ladder footwork.", avoid: "Don't stop your ladder movement to receive the ball. The coordination of feet-and-touch simultaneously is the whole skill. Slow down the ladder until it's manageable." },
