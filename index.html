    { name: "4-Cone Diagonal", how: "4 cones in a square, 5 yards each side. Sprint to the diagonal cone, backpedal to start, sprint to the other diagonal cone. Repeated. Combines sprint and backpedal with diagonal directions.", avoid: "Don't jog the backpedal. Run backward at speed. Slow backpedaling trains slow backpedaling." },
    { name: "Agility With Ball", how: "Run the T-drill or cone weave with the ball at your feet. The ball adds a control element to pure agility. This is game-specific agility — all soccer agility happens with the ball.", avoid: "Don't sacrifice agility quality for ball control. Let the ball go slightly wider than normal and chase it. Real game agility with the ball isn't always clean." },
    { name: "Lateral Shuffle 10-Yard Repeats", how: "Shuffle 10 yards laterally, plant and return. 20 reps continuous. 20 yards per rep = 400 yards total lateral shuffling. Builds lateral agility endurance.", avoid: "Don't cross your feet during the shuffle. Side-step pattern: never crossing. Crossing feet slows you and risks tripping." },
    { name: "Agility Ladder Speed Challenge", how: "Maximum speed through a 10-yard ladder — fastest possible foot contacts. Time it. Track improvement. The pure speed of foot contact in the ladder builds fast-twitch foot patterns.", avoid: "Don't sacrifice foot pattern accuracy for speed early. Get the pattern right first, then add speed. Wrong patterns at high speed just build wrong patterns faster." },
    { name: "Reaction Ball Agility", how: "Drop a reaction ball (or a regular ball) from head height and react to the unpredictable bounce — sprint to it, control it. Trains reactive agility to unpredictable stimuli.", avoid: "Don't predict the direction of the bounce. Let it react and then move. The surprise IS the agility training." },
    { name: "Stutter Step Cone Drill", how: "Rapid stutter steps on the spot at each cone in a circuit. 3 stutter steps at cone 1, sprint to cone 2, 3 stutter steps, sprint to cone 3. Builds reactive footwork transitions.", avoid: "Don't turn the stutter steps into a march. They should be fast, light, on your toes. Heavy stutter steps are just hopping." },
    { name: "Zigzag Sprint", how: "6 cones in a zigzag pattern, 3 yards between each. Sprint on the diagonal between cones. The zigzag angle forces lateral explosive steps combined with forward sprint. Full speed.", avoid: "Don't slow to navigate the angles. Plant explosively at each cone and drive out in the new direction immediately." },
    { name: "Jump-Turn Agility", how: "Jump, rotate 90 degrees in the air, land and sprint immediately. 4 reps each direction. The jump-turn is a soccer-specific agility move — aerial challenges require you to land and immediately sprint.", avoid: "Don't hesitate after landing. Land-and-go is the drill. Any pause after landing defeats the point." },
    { name: "Reactive Sprint Gates", how: "Partner stands 3 yards behind you with a ball. They roll it left or right. You turn, find the ball, sprint to it. Trains reactive turn-and-sprint — a constant game action.", avoid: "Don't guess which side. Wait for the ball to move before turning. True reaction, not anticipation." },
    { name: "Multi-Direction Box Sprint", how: "Inside a 5-yard box, sprint to each corner in a random order called by a partner. Never the same corner twice in a row. Full speed to each corner. Tests multi-directional sprint ability.", avoid: "Don't anticipate the call. Wait, hear, react, sprint. Pre-loading a direction makes you slower when the call is different." },
    { name: "Agility Conditioning Finisher", how: "At the end of every training session, 5 minutes of agility ladder or cone work. Even tired, the agility work at session's end builds specific endurance.", avoid: "Don't go through the motions because you're tired. Even at reduced speed, the patterns should be clean." },
    { name: "Agility Test Monthly", how: "Monthly: time the T-drill and pro agility. Log both. Track the numbers over your soccer development period. Agility improvement directly correlates with performance improvement on the field.", avoid: "Don't test when fatigued or immediately after a session. Test fresh, after a proper warm-up, for accurate results." },
  ],

  "Balance": [
    { name: "Single-Leg Stand", how: "Stand on one leg for 60 seconds, eyes open. Then 30 seconds eyes closed. Eyes closed dramatically increases the balance challenge. 3 sets per leg.", avoid: "Don't let your standing foot roll inward. Stand on a neutral foot — not supinated or pronated. Foot alignment matters for real game balance." },
    { name: "Single-Leg Ball Receive", how: "Stand on one leg. Partner throws various balls — head height, chest, low. Receive each without letting the raised foot touch the ground. Balance under distraction.", avoid: "Don't take easy throws. The throws should challenge your balance. Easy throws make this a catching drill, not a balance drill." },
    { name: "Bosu Ball Balance", how: "Stand on the dome side of a BOSU ball. Hold for 60 seconds. Progress to single leg. The unstable surface dramatically challenges ankle and proprioceptive balance.", avoid: "Don't grip the floor with your toes in shoes. Allow the ankle to work. Toe-gripping compensates for ankle weakness." },
    { name: "Balance Beam Walk", how: "Walk along a narrow line or beam (even a painted line). Forward, backward, sideways. The narrow surface forces precise weight distribution.", avoid: "Don't rush. Balance precision at slow speed is the goal. Speed on a balance beam just becomes shuffling, not balance training." },
    { name: "One-Leg Dribble Juggle", how: "Juggle the ball while standing on one leg. How many touches before the foot touches down? Build from 5 to 20 consecutively. Combines ball skill with balance challenge.", avoid: "Don't stand on your stronger leg every time. Equal time on each leg. Weak-side balance is typically where players have hidden deficits." },
    { name: "Stability Ball Seated Toss", how: "Sit on a stability ball, no back support, feet raised slightly. Partner throws a ball — you catch and return it without feet touching the ground. Core and balance combined.", avoid: "Don't put your feet down between throws. The whole point is maintaining balance on the ball without foot support." },
    { name: "Single-Leg Landing", how: "Jump and land on one leg. Hold the landing for 3 seconds without your body wobbling. 10 landings per leg. Builds the dynamic landing balance critical for aerial situations.", avoid: "Don't skip the 3-second hold. Instant rebalancing after landing is easy. Holding the position reveals true balance control." },
    { name: "Eyes-Closed Receiving", how: "Stand normally, close your eyes, partner touches the ball to your feet from a random direction. Open eyes, control it. Builds proprioceptive balance — feeling the ball without seeing it.", avoid: "Don't peek. Eyes fully closed before the ball touches your feet." },
    { name: "Balance Under Contact", how: "Partner applies light shoulder pushes while you stand on one leg. Resist the pushes without your foot coming down. Game-realistic balance — you're never undisturbed in a real match.", avoid: "Don't brace against the push with your whole body. Let your ankle and hip absorb it. The balance is in the joints, not the whole-body resistance." },
    { name: "Heel-Toe Walk", how: "Walk heel-to-toe in a straight line — each step places heel directly in front of the toe of the back foot. The straight-line challenge of a roadside sobriety test is a genuine balance trainer.", avoid: "Don't look at your feet. Eyes on a point ahead. Balance training with eyes down builds balance with visual dependence — which disappears when the ball demands your attention." },
    { name: "Single-Leg Deadlift (Unweighted)", how: "Standing on one leg, hinge forward at the hip and extend the other leg behind. Find the flat-back hip hinge position and hold. Pure single-leg posterior balance.", avoid: "Don't rush the movement. Slow and controlled. The challenge is the single-leg hinge, not the speed of it." },
    { name: "Balance and Pass", how: "Stand on one leg while passing a ball against a wall — receive the rebound on one leg too. Combine passing practice with balance training. Technical skill under balance challenge.", avoid: "Don't put your foot down between passes. If the balance breaks, reset — but challenge yourself to maintain it for 10 passes consecutively." },
    { name: "Tandem Stance Eyes Closed", how: "Stand with one foot directly in front of the other (tandem stance). Hold 30 seconds eyes open, 30 seconds eyes closed. Progressively harder balance challenge in a narrow base.", avoid: "Don't cheat by widening your stance. Heel directly in front of toe, contact. The narrow base is the challenge." },
    { name: "Dynamic Single-Leg Reach", how: "Stand on one leg. Reach your free leg forward as far as possible, tap the ground, return. Then reach to the side, tap, return. Reach behind, tap, return. The star excursion balance test exercise.", avoid: "Don't let your standing knee buckle inward on the reaches. Keep it neutral. The reach challenge exposes balance weaknesses — use it to identify them." },
    { name: "Balance During Heading", how: "Stand on one leg and head a ball thrown to you. The jump and landing must be balanced on one leg. Advanced drill that combines aerial skill with landing balance.", avoid: "Don't jump off your strong leg every time. Specifically practice one-leg landings on your weaker side." },
    { name: "Wobble Board Dribbling", how: "Stand on a wobble board (balance disc) and juggle or pass the ball. The unstable surface combined with ball skill is as game-realistic as balance training gets.", avoid: "Don't attempt high-pace ball work until you can stand on the board without assistance. Build static balance on the board first." },
    { name: "Hip Circle Balance", how: "Stand on one leg, draw large circles with your free hip — forward, side, back. The rotational movement challenges the standing leg's balance in every plane.", avoid: "Don't rush the circles. Slow, large circles are harder than fast small ones. Maximum range of motion maximizes the balance challenge." },
    { name: "Wall-Lean Balance Holds", how: "Stand 3 feet from a wall, lean forward and support yourself with one hand only, feet on the ground. Remove the hand and hold the tilted position. Challenges balance in a forward-lean position similar to a dribbling stance.", avoid: "Don't support yourself with your fingertips. Palm flat, then release. The moment of release is the balance challenge." },
    { name: "Blind Landing", how: "Close your eyes, jump, land, try to land in the exact spot you started. Track how far off you land over time. Proprioceptive awareness training.", avoid: "Don't open your eyes before landing. The whole point is landing without visual feedback. True proprioceptive balance." },
    { name: "Balance Training Daily Minimum", how: "3 minutes of single-leg balance work every day. Just 3 minutes — one 60-second stand each leg, eyes open and closed. Daily balance training produces the most consistent improvement.", avoid: "Don't skip because 3 minutes seems too short to matter. Daily consistency compounds. Three minutes every day for 3 months produces real balance improvement." },
  ],

  "Jumping": [
    { name: "Vertical Jump Test and Track", how: "Mark your standing reach height on a wall. Jump and mark highest touch. Measure the gap. Test monthly. The vertical jump is the primary benchmark for jumping development.", avoid: "Don't test from a running approach — standing vertical only. Consistent testing conditions are required for accurate tracking." },
    { name: "Counter-Movement Jump", how: "Stand, drop quickly into a quarter squat, immediately explode upward. The quick drop-and-jump uses stored elastic energy to jump higher than a static jump. 4 sets of 6.", avoid: "Don't drop too deep. A quarter squat, not a full squat. Too deep loses the elastic energy — you're grinding up from the bottom instead of bouncing." },
    { name: "Squat Jump", how: "Drop into a squat, hold 2 seconds, then jump. This removes the elastic energy component — it's pure concentric leg power. 3 sets of 6.", avoid: "Don't let yourself bounce at the bottom. Hold the squat still for 2 seconds. Any bounce cheats the drill back to a counter-movement jump." },
    { name: "Bounding", how: "Running bounds — exaggerated running strides that emphasize maximum height on each stride. Drive the knee up, push off hard with the trailing leg. 4 x 20 meters.", avoid: "Don't turn bounding into regular running with slightly higher knees. Exaggerate dramatically — each bound should feel like a small jump." },
    { name: "Tuck Jump", how: "Jump and tuck both knees to your chest at the peak. Land, immediately jump again. 3 sets of 8. Builds explosive jump power and hip flexor speed.", avoid: "Don't land stiff-legged. Absorb the landing with your knees and immediately redirect into the next jump. Stiff landings cause injury and kill the reactive power." },
    { name: "Depth Drop to Jump", how: "Step off a box, land, immediately jump as high as possible. The stretch-reflex from the landing amplifies jump height. 3 sets of 6.", avoid: "Don't jump off the box — step off. The falling velocity from a jump would be too fast for the landing mechanics to handle safely." },
    { name: "Hurdle Jumps", how: "Set low hurdles (12–15 inches). Two-foot jump over each hurdle continuously with minimal ground contact time between. 3 sets of 5 hurdles.", avoid: "Don't pause between hurdles. The minimal ground contact is the skill — in and out as fast as possible. Pausing defeats the reactive jumping purpose." },
    { name: "Single-Leg Jump", how: "Jump off one leg and land on two. 3 sets of 8 per leg. Then progress to jump off one, land on same one. Single-leg jumping mimics real game jumping mechanics — you almost never jump from two feet in a game.", avoid: "Don't neglect the weaker jumping leg. If your right jump is noticeably stronger, specifically emphasize left-leg jump reps." },
    { name: "Jump and Reach Drill", how: "Jump to touch a specific target (a branch, a wall mark, a partner's hand held high). The specific target makes you reach maximum height every jump rather than being satisfied with a partial effort.", avoid: "Don't lower the target because it's hard to reach. A target you can just barely reach on your best jump is exactly the right height." },
    { name: "Lateral Jumps", how: "Jump sideways over a line as fast as possible — left and right alternating. 30 seconds, 4 sets. Builds lateral explosive power and jump frequency.", avoid: "Don't let your jumps get smaller as you fatigue. Maintain jump distance throughout. If your jumps shrink dramatically, rest and reset." },
    { name: "Jump for Heading Practice", how: "Jump to head a ball at the peak of your jump — the timing of your jump must match the ball's arrival. 20 reps. Combines jumping mechanics with real game application.", avoid: "Don't adjust your jump timing to make it easy. Meet the ball at the peak of your jump, not on the way down. Peak is when power is greatest." },
    { name: "Squat Jump Series", how: "10 squat jumps with 20-second rest. 5 sets. Building jump endurance — the ability to jump repeatedly in a game's second-ball and set-piece situations.", avoid: "Don't let jump height drop to nothing by set 4. If your jumps are ineffective, extend rest to 30 seconds. Quality jump endurance beats sloppy volume." },
    { name: "Approach Jump", how: "3-step approach jump — two steps forward, plant foot, jump. The approach adds momentum. Used in heading from a cross, aerial duels with a running start.", avoid: "Don't plant too close to your last running stride. The plant foot should be slightly forward and the body drives over it into the jump." },
    { name: "Ankle Stiffness Jumps", how: "Tiny rapid hops — stiff ankles, minimal air time, maximum frequency. 30 seconds. Builds the ankle stiffness that makes your ground contact time shorter, which directly increases jump efficiency.", avoid: "Don't let your ankles flex. They stay stiff throughout. The energy comes from the achilles tendon's elastic properties, not the ankle joint's range of motion." },
    { name: "Plyometric Circuit", how: "Squat jumps (10) → tuck jumps (8) → lateral jumps (20 seconds) → bounds (20 meters) → rest 2 minutes. Repeat 3 times. A complete jumping power circuit.", avoid: "Don't skip rest between circuits. Plyometric training on fatigued muscles trains fatigue, not power. The rest is mandatory." },
    { name: "Jump Asymmetry Check", how: "Test your single-leg vertical jump on each leg separately. Log both. A difference of more than 15% between legs indicates a strength imbalance that needs addressing.", avoid: "Don't ignore asymmetry. A jump difference between legs predicts injury risk. Address the weaker leg specifically." },
    { name: "Progressive Box Height", how: "Box jump onto a 12-inch box for 2 weeks. Move to 18 inches for 2 weeks. Then 24 inches. Progressive height overload over 6 weeks. Track your maximum comfortable box height.", avoid: "Don't jump to a height that causes a hard landing or requires you to climb the box. Your maximum height is where you land softly." },
    { name: "Jump Landing Mechanics", how: "Practice landing: land on your toes first, let your heel drop, bend your knees, absorb the force through your hips. This landing mechanic prevents ACL injuries and builds the elastic energy return for the next jump.", avoid: "Don't land on your heels. Heel-first landing transmits force directly to your joints without muscular absorption. Always toe-heel in that order." },
    { name: "Jump Endurance Test", how: "How many consecutive vertical jumps can you complete while touching a target above your head? Count until your height drops below the target. This is your jump endurance benchmark. Track monthly.", avoid: "Don't lower the target height as you fatigue. When you can no longer reach the target, the test ends. Honest benchmark measurement." },
    { name: "Game-Context Jump Training", how: "Practice every type of game jump: defensive header (jump then snap neck forward), attacking header (running approach jump), goal celebration (full effort vertical), throw-in (jump on a long throw-in). Context-specific jump training.", avoid: "Don't practice only non-specific jumps. The jumping mechanics for a defensive header are different from a goal celebration jump. Practice the ones you'll use in games." },
  ],
};
// DRILLS PART 3 — TACTICAL IQ
const DRILLS_TACTICAL = {

  "Scanning / Awareness": [
    { name: "Neck Rotation Habit Drill", how: "While standing still with the ball, rotate your head left and right every 2 seconds for 60 seconds. Count the rotations. This builds the physical habit of scanning before it becomes natural.", avoid: "Don't treat this as a head exercise. You're training a behavioral habit — eyes should be genuinely looking at different things with each rotation, not just moving your neck." },
    { name: "Color Card Scanning", how: "Partner holds colored cards in random directions around you. As you dribble or receive passes, call out the colors you see without stopping your ball work. Forces eyes-up scanning under task load.", avoid: "Don't stop your dribble to look for cards. The scan must happen simultaneously with the ball action. That's exactly what game scanning requires." },
    { name: "Blind Rondo", how: "In a 4v2 rondo, you must call out the position of the nearest defender BEFORE you receive the ball. Information must come from your pre-scan, not from looking after the ball arrives.", avoid: "Don't look for the defender after the ball comes to you. Pre-scan means the information was gathered before the pass arrived. Force the timing strictly." },
    { name: "Third Man Awareness", how: "In a 3-player passing sequence, the 'third man' starts making a new run as soon as the second pass is played. The passer must already know where the third man is before the ball arrives back to them.", avoid: "Don't react to the third man's run — anticipate it. The best players know where the run is going before it starts because they've been watching." },
    { name: "Mirror Scanning", how: "Partner moves silently behind you while you dribble away. Periodically turn your head to locate them without stopping. How many times per minute can you accurately report their position?", avoid: "Don't make this into a following drill. You're dribbling forward, they're moving freely. The scan is a brief head check, then eyes forward again." },
    { name: "Information Call-Out Drill", how: "As you receive every pass in a rondo or training game, immediately call out something you saw on your scan: 'defender left', 'free teammate right', 'line open center.' Verbalizing what you see makes the scan conscious.", avoid: "Don't call out obvious things after you've already looked. Pre-scan then call — the sequence is: scan, receive, call, play." },
    { name: "Numbers Game Awareness", how: "In a small-sided game, every player has a number. You must call your number any time you're free. When you receive the ball, call a teammate's number if you see them free. Forces constant awareness.", avoid: "Don't call numbers you haven't confirmed with a scan. The call must follow a real look. This builds accurate scanning, not noise." },
    { name: "Passing Before Looking", how: "Practice playing a pass before you look at the target — aim based on your pre-scan information. Advanced drill. Your brain already knows where the target is; trust that scan.", avoid: "Don't attempt this until your scanning habit is established. Playing blind passes before you've built a reliable scan just means bad passes, not training." },
    { name: "Peripheral Vision Ball", how: "While juggling the ball, count the number of fingers a partner holds up from the edge of your peripheral vision — without turning your head to look directly. Builds peripheral field awareness.", avoid: "Don't turn your head to look at the partner. The whole drill is peripheral. A direct look resets the drill." },
    { name: "Head-Up Cone Dribble", how: "Dribble through 10 cones. A partner changes the color of a flag at each end randomly. You must call the correct color when you arrive at each end. Forces head-up dribbling with genuine purpose.", avoid: "Don't glance up just to satisfy the drill — actually see the flag and recognize the color. Vague upward glances don't train real scanning." },
    { name: "Scanning Before Shooting", how: "Before every shot in training, take a deliberate head check toward the goal — see where the goalkeeper is, where the space is. Build the habit of scanning the goal before committing to a shot.", avoid: "Don't look at the ball after you've decided to shoot. Your head was up — it saw the goalkeeper's position. Trust that scan and execute the shot." },
    { name: "Off-Ball Shadow Check", how: "While a partner dribbles past you, keep your eyes on the ball AND verbally track a third player (cone) moving somewhere behind you — calling out its position from your peripheral scan. Multi-focus awareness.", avoid: "Don't lose the primary (dribbler) while tracking secondary (cone). Elite awareness tracks both simultaneously. If you drop one, slow down until the multi-tracking feels natural." },
    { name: "Positional Memory Game", how: "Look at a scene on a training field for 5 seconds. Look away. Describe where every player is positioned. Weekly. The ability to form a fast, accurate positional snapshot is pure scanning skill.", avoid: "Don't describe vaguely. 'Left side' is not enough. 'Left back third, facing goal, unmarked.' Specific positional memory is what builds game IQ." },
    { name: "Scanning Log", how: "After every training game, count how many times per minute you remember checking over your shoulder. Even counting retrospectively makes you more conscious of scanning in future sessions.", avoid: "Don't exaggerate the count. If you honestly barely scanned, write that down. The honest baseline tells you how much to improve." },
    { name: "Two-Touch Scanning Rule", how: "In any possession game, personal rule: on your first touch, you must have already scanned. By your second touch you must already know where the ball is going. Scan-decide-execute in 2 touches.", avoid: "Don't wait until you have the ball to start scanning. The scan happens when the ball is moving toward you, not when it's at your feet." },
    { name: "Scanning in Front of Goal", how: "Before every cross or dangerous pass in a training game, call out the position of the goalkeeper and the nearest defender. This box-entry scanning is one of the most critical in the game.", avoid: "Don't call positions after you've entered the box. The call must be before you commit to your action. Pre-box scanning." },
    { name: "Defensive Scanning", how: "As a defender, every 3 seconds call out: how many opposition players are in your zone, where the nearest ball carrier is, and where your nearest teammate is. Triple-awareness scanning.", avoid: "Don't only scan when the ball is near you. Defenders who only react to the ball are always caught by runs they didn't see coming." },
    { name: "Transition Scanning", how: "Immediately after your team loses or wins possession, scan 360 degrees. Transition moments — when the ball changes hands — are when the most goals are scored. The team that scans fastest in transitions wins.", avoid: "Don't scan slowly in transition. The scan must happen in 1–2 seconds. A slow scan in transition is no scan at all." },
    { name: "Wall Passing Scan Drill", how: "Pass to the wall, and as the ball travels, turn your head to scan behind you, then look back to receive the return. Every wall pass includes a behind-the-back scan during the ball's travel time.", avoid: "Don't miss the return because you're scanning. Time the scan to the ball's travel time — scan while it's traveling, eyes back before it returns." },
    { name: "Game Film Scanning Study", how: "Watch 10 minutes of a great midfielder (De Bruyne, Kroos, Modric). Count how many times they check their shoulder per minute. Study when they scan — before, during, or after possession. Apply it.", avoid: "Don't just watch passively. Take notes on specific scan moments. What did they see? What decision did that scan enable? This is active studying." },
  ],

  "Positioning Between Lines": [
    { name: "Find the Pocket Walk-Through", how: "Set up a midfield block with cones as 'defenders.' Walk through finding the position between the lines — the pocket of space between the opposition's midfield and defensive lines. Stand there. Feel the position.", avoid: "Don't rush this walk-through into a running drill too early. The spatial understanding must come first. Walk through it until the right position feels instinctive." },
    { name: "Receive Between Lines Rondo", how: "In a possession game with two 'defensive lines' of cones, you score points by receiving a pass in the space between the two lines. Forces you to continuously find and hold the between-the-lines position.", avoid: "Don't stay in the pocket after receiving. Receive it, play it, and move to a new pocket. The pocket is for one touch, not for camping." },
    { name: "Shape Rotation Without Ball", how: "In a team shape without a ball, practice rotating your off-ball position every time the ball changes sides — moving from between-the-lines on the left to the pocket on the right as the ball switches.", avoid: "Don't move after the ball has switched. Move as the ball is switching. Late movement means you arrive too late to be a useful option." },
    { name: "Body Orientation Between Lines", how: "When positioned between the lines, your body should be half-turned — able to see both the ball coming and the space behind the defensive line. Practice holding this half-turned position while receiving.", avoid: "Don't face the ball directly when positioned between lines. A face-on position telegraphs your next action and limits your options. Half-turn always." },
    { name: "Line-Breaking Pass Target", how: "You're positioned between the lines. A partner plays a pass through the midfield line to reach you. Your job: stay between the lines until the ball comes through. Players often drift too close to the first line.", avoid: "Don't drift back toward the ball to make the pass easier. Hold your position between the lines — the pass must be played to find you there, not to wherever you drifted." },
    { name: "Pressure Shadow Positioning", how: "The opposition's nearest midfielder is your shadow — practice positioning yourself just out of their shadow but still between the lines. One step in the wrong direction and you're in their shadow. Find the precise pocket.", avoid: "Don't position too far from the shadow just to be safe. The edge of the shadow is the best position — you're barely uncovered and very close to the action." },
    { name: "Third Man Combination", how: "Two players pass. A third drops between the lines for the third-man run. The pass is played through to the third man. The timing of the drop-in must be as the second pass is played, not after it.", avoid: "Don't make your run too early — the defense adjusts and closes the pocket. The third man run timing is precise: on the second pass, not before." },
    { name: "Width and Depth Positioning", how: "Between the lines doesn't always mean central. Practice finding between-the-lines positions on the half-left and half-right of the field. A central midfielder who only occupies central pockets is predictable.", avoid: "Don't only look for the central pocket. Wide pockets between the lines are equally valuable and less expected." },
    { name: "Position Under Pressure", how: "You're between the lines and a defender is about to close you. Practice the speed of your first touch to get out of pressure — body already half-turned, touch away from the pressure direction.", avoid: "Don't receive the ball square-on when a defender is closing. Your body orientation before the ball arrives determines whether you escape the pressure or get trapped." },
    { name: "Receiving Between Lines Under Aerial Ball", how: "A high ball is played over the midfield line. You must position yourself to receive it between the defensive and midfield lines — anticipating where it will land and arriving there before it does.", avoid: "Don't react to where the ball lands. Anticipate where it's going to land and arrive there first. Reaction is always too slow for aerial between-the-lines receptions." },
    { name: "Line-Break Awareness Game", how: "In a 4v4 with two cone lines across the field, a team gets a point for every successful pass that breaks a line. Forces all players to see and create line-breaking passing angles.", avoid: "Don't count easy passes to players who are already beyond the line. The pass must break the line — receiver starts on the same side as the passer." },
    { name: "Shadow Marking Escape", how: "A defender shadow marks you — always staying between you and the ball. Practice escaping the shadow with a sharp change of direction to appear in a line-breaking pocket.", avoid: "Don't make the escape run too early and then stand in the pocket waiting. The run and the pass must be timed together." },
    { name: "Midfielder Positioning Cue Cards", how: "Write the 5 between-the-lines positioning cues on index cards: (1) half-turned body, (2) check for shadow, (3) move as the ball moves, (4) receive and release quickly, (5) immediately find next pocket. Review before every session.", avoid: "Don't just read the cards — apply one consciously each session. Focused application of one principle per session builds habits faster than trying to do all five at once." },
    { name: "Film Study: Positioning", how: "Find 5 clips of De Bruyne, Bellingham, or Modric operating between the lines. Pause when they find the pocket. What was the defensive shape? Where exactly were they? Overlay onto a diagram.", avoid: "Don't just admire the goal or assist. Focus only on the positioning before the ball arrives. The goal is a consequence of the positioning — study the cause." },
    { name: "Positioning Communication Drill", how: "In every possession game, verbally call when you are between the lines: 'I'm free, pocket left.' The verbal call makes your positioning visible to teammates AND makes you consciously aware of your own position.", avoid: "Don't call it if you're not actually in a clean pocket. False calls create confusion. Only call when genuinely between the lines with a receivable passing angle." },
  ],

  "Transition Reading": [
    { name: "Turnover Reaction Drill", how: "In a possession game, specifically train turnover reactions: the moment your team loses the ball, every player must sprint to their defensive transition position within 3 seconds. Timed, counted, enforced.", avoid: "Don't jog into transition. The 3-second window is real — in a game, a team that presses immediately after winning the ball can score before the opposition resets." },
    { name: "Counter Trigger Identification", how: "In a game, identify the press trigger — the moment when a counter-attack is available. Immediately communicate it: 'counter!'. The communication starts the team's forward transition before everyone has even noticed.", avoid: "Don't wait until you're already on the ball to call the counter. The communication happens as the turnover occurs. A 1-second delayed call loses the counter window." },
    { name: "Transition 3v3", how: "3v3 game. When possession changes, the new defending team has 3 seconds to get into defensive shape. The new attacking team counter-attacks immediately. Transition speed is rewarded.", avoid: "Don't slowly jog into transition. The defensive team that gets into shape quickly removes the attacking team's advantage. Fast transitions both ways." },
    { name: "Defensive Recovery Sprint", how: "Standing in an attacking position, partner shouts 'transition'. You sprint 20 yards to a defensive cone position as fast as possible. Time it. Defensive transition speed is the most physically measurable transition skill.", avoid: "Don't jog defensive transitions. The 5 seconds after losing the ball determines whether you press or get punished on the counter. Sprint." },
    { name: "Counter-Attack Width Drill", how: "3 players. On a turnover, the widest two players immediately sprint wide while the central player carries forward. The width on a counter-attack stretches defenses and creates the space.", avoid: "Don't bunch together on a counter-attack. Spread the field. Bunched counter-attacks are easily defended because the defense doesn't need to cover width." },
    { name: "Reading the Transition Cue", how: "Watch a partner's body language during a pass. If they miscontrol it slightly, read it before it actually turns over — start transitioning mentally 0.5 seconds before it actually happens.", avoid: "Don't wait for the actual turnover to react. Elite transition reading begins before the ball changes hands. The cues (heavy touch, losing balance) are readable." },
    { name: "Transition Numbers Game", how: "4v4 game where both teams must immediately transition directions when possession changes. Scoring is only allowed within 5 seconds of winning possession. Forces rapid transition decisions.", avoid: "Don't take your time settling into possession before trying to score. 5 seconds is the window — use it or lose the point opportunity." },
    { name: "Defensive Transition Body Position", how: "Practice getting your body between the ball and goal immediately in defensive transition. Not chasing the ball — getting goalside of the ball's likely path. 10 reps.", avoid: "Don't chase the ball when it's behind you in transition. Get goalside first, then track the ball. Chasing always puts you in the wrong position." },
    { name: "Transition Into Final Third", how: "On winning possession in your half, two touches maximum before the ball must be in the final third. Trains quick, decisive forward passing in transition.", avoid: "Don't build patiently from a turnover in your own half. Transitions are moments of disorganization in the defense — exploit them fast before they reset." },
    { name: "Press After Winning Possession", how: "When you win the ball, immediately play forward, then sprint to press if the ball is turned over again. Chain: win → play forward → press the reaction. Continuous transition intensity.", avoid: "Don't relax after winning possession. The press continues — if you give it away, immediately press to win it back. The second press after a turnover is often the most effective." },
    { name: "Transition Fitness Drill", how: "Sprint 20 yards in offense simulation, jog back to center, sprint 20 yards in defensive transition simulation. Repeat 15 times. The physical demand of transitions needs specific conditioning.", avoid: "Don't skip this because it's hard. Transition fatigue in a game — being unable to sprint in transition because you're tired — is one of the most costly physical failures." },
    { name: "Video Transition Study", how: "Watch 10 minutes of a high-press team (Liverpool under Klopp era, Atletico Madrid). Study their transition moments — when they win the ball, what happens in the next 3 seconds? Model it.", avoid: "Don't watch just for the press. Study the transition both ways — their transition offense when pressing wins the ball, and their defensive transition when the press is beaten." },
    { name: "Transition Decision Making", how: "In a game situation: when you win the ball, you have 1 second to decide — counter or possess? The criteria: how many teammates are ahead of the ball? How out of position is the defense? Practice the decision.", avoid: "Don't always counter just because it's possible. A poor counter that fails gives the opposition an easy goal. Read whether the counter genuinely has numbers." },
    { name: "Transition Positioning Habit", how: "During any possession game, always track: where am I in relation to the ball? If the ball is lost, can I immediately contribute to pressing or defensive shape? This self-positioning awareness is constant.", avoid: "Don't only think about your position when you have the ball. Your off-ball transition positioning is equally important. Always be in the right place for both transition directions." },
    { name: "Transition Scanning", how: "The moment you receive the ball, immediately scan for transition options — the fastest route to goal. How many opponents are between you and goal? Where are the open spaces? Act on what you see.", avoid: "Don't scan after you've decided what to do. Scan first, decide second, act third. Reversed order produces slow, reactive play." },
  ],

  "Space Creation": [
    { name: "Pull and Go", how: "Stand in a position to receive. As the pass is played, check away from the ball (pull the defender) then check back into space to receive (the 'go'). 20 reps. The classic space-creation movement.", avoid: "Don't fake the pull — actually commit to it. A defender who sees a half-hearted check move doesn't follow it, and the space is never created." },
    { name: "Diagonal Run Creation", how: "Make a diagonal run away from the ball. This pulls a defender out of the central zone. As soon as the defender follows, a central player exploits the space you've vacated. Practice the whole sequence.", avoid: "Don't make the diagonal run slowly. A slow diagonal run doesn't pull a defender — they just stay central. The run must threaten them before they respond." },
    { name: "Overlapping Run Trigger", how: "As a wide midfielder, when the ball goes to your fullback, make an overlapping run behind them. The overlap creates space because the defender must choose — mark the run or mark the fullback. Either way, space opens.", avoid: "Don't overlap every single time — you'll be tracked. Vary when you overlap and when you stay. Unpredictability is what makes the run effective." },
    { name: "Decoy Run", how: "Make a convincing forward run when you're not going to receive the ball. You're creating space for a teammate by pulling your defender. Accept that you won't get the ball — your run still scored.", avoid: "Don't slow down when you realize you're not getting the ball. A slowing decoy run gives the defender time to recover position. Run all the way through even as a decoy." },
    { name: "Space Creation in Rondo", how: "In a 5v2 rondo, the player in possession must move to create a passing angle after playing. No standing still. Every player's off-ball movement opens new spaces in the rondo.", avoid: "Don't stand after passing in the rondo. Move immediately. The standing player is the easiest player to defend." },
    { name: "Width Stretching", how: "In a possession game, personally commit to always holding width when your team has the ball. Stretch the defensive shape wide. You create the space for central players by forcing the defense to cover you wide.", avoid: "Don't drift central because that's where the ball action is. Your width is valuable precisely because it pulls defenders away from the center." },
    { name: "Third Man Run Practice", how: "Player A passes to B. B passes to C. A makes a run for C to play into. The third man run — the player who played the first pass now becomes the most dangerous option two passes later.", avoid: "Don't stop after playing the first pass. The first pass is what starts your attacking run. Play it and immediately sprint for the third man position." },
    { name: "Double Movement", how: "Check toward the ball (first move). The defender steps up. Then burst away from the ball into the space behind (second move). Two movements, one intent: create space behind the defender.", avoid: "Don't rush the second movement before completing the first. The first check must convince the defender before you change direction. Incomplete fakes don't create space." },
    { name: "Half-Turn Space Exploit", how: "Receive the ball in a half-turned position. The half-turn gives you vision of space behind the defensive line. Immediately drive into that space in your first touch.", avoid: "Don't receive square and then turn to find space. The half-turn before receiving is what lets you exploit the space immediately. Turn before the ball arrives." },
    { name: "Spacing Game", how: "4v4 possession game with a rule: no two teammates can be within 5 yards of each other. Forces constant off-ball movement to maintain spacing and create receiving angles.", avoid: "Don't clump together because the ball is there. The 5-yard rule must be enforced by everyone. Bunched players create no space." },
    { name: "Run Beyond the Defense", how: "Every time the ball is played forward to a striker, make a run behind the defensive line. You might not receive it — that's fine. Your run stretches the defense and creates space for others.", avoid: "Don't stop your run because the pass doesn't come. Run all the way until the ball is dead. A run that stops halfway through creates nothing." },
    { name: "Space Awareness Game", how: "Small-sided game where points are only scored from the pocket of space created by an off-ball run. No runs = no points. Forces every player to create space for the scorer.", avoid: "Don't only move when you want the ball. Space creation is selfless — you might create for someone else. The move that doesn't result in you receiving is often the best move." },
    { name: "Blind Side Positioning", how: "In a 3v3, practice positioning yourself on the blind side of defenders — on the side they're not looking. Receive the ball from their blind side where they have to turn to track you.", avoid: "Don't try to stay on the blind side forever. It's a temporary position that must be converted quickly. The moment the defender adjusts, you need a new position." },
    { name: "Space After Set Piece", how: "After a corner kick or free kick, the defense is organized. Space opens immediately if you make a diagonal run before the ball is cleared. Practice these post-set-piece movements.", avoid: "Don't wait to see where the clearance goes before moving. The run must start before the ball is cleared — that's when the space exists." },
    { name: "Film: Space Creation Study", how: "Watch 10 minutes of Busquets, Xavi, or Iniesta. Count how many off-ball movements each makes per minute. Map the spaces they create. The volume of off-ball movement from great players is shocking.", avoid: "Don't only watch when they have the ball. Watch specifically when they don't have it. Their off-ball movement is their greatest skill." },
  ],

  "Pressing Triggers": [
    { name: "Trigger Recognition Session", how: "Watch 10 minutes of a match and pause every time you see a press trigger: a back-pass, a GK in possession, a defender facing backward, a player isolated wide. Count the triggers you spot per minute. Train your eyes.", avoid: "Don't watch passively. Pause the video every time a trigger occurs. Active identification trains the recognition faster than passive watching." },
    { name: "Trigger Response Drill", how: "In a possession game, call 'trigger!' every time a press trigger occurs. You must call it as it happens, not after. Then execute a coordinated press from that call.", avoid: "Don't call triggers late. If you can identify triggers 0.5 seconds late, you've already missed the pressing window. The call must be instant." },
    { name: "Back-Pass Trigger Press", how: "Specifically: every time the ball is played backward in a possession game, immediately press the receiver. The backward ball is the clearest press trigger. Sprint to press the moment the back-pass is played.", avoid: "Don't wait to see where the back-pass lands before running. Start running the moment you see the pass played backward. Arriving before the receiver is the goal." },
    { name: "Isolated Player Press", how: "When a winger receives the ball isolated near the line, press immediately. The winger can't turn easily — they're already facing the line. Press from the angle that cuts off the back-pass and forces them to the line.", avoid: "Don't press the isolated winger straight on. Angle your press to cut off the back-pass option. Straight-on press gets beaten with a simple inside turn." },
    { name: "GK Trigger Press", how: "Every time the goalkeeper has the ball in a possession game, all forward players press. Practice the coordinate movement: every press player takes their assigned pressing lane simultaneously.", avoid: "Don't press disorganized. Random GK pressing without lane coverage just lets the GK find the free player. Coordinate which lanes each player covers." },
    { name: "Trigger vs No-Trigger Decision", how: "Set up 10 scenarios. Half have a clear press trigger, half don't. You must identify which scenarios are pressing moments and which aren't. No trigger = hold shape. Trigger = press.", avoid: "Don't press every scenario. Learning when NOT to press is as important as knowing when to press. Random pressing wastes energy and creates gaps." },
    { name: "Time and Distance to Press", how: "Before pressing, calculate: how far is the ball carrier, how much time do I have, can I realistically get there before they play it? Practice making the calculation in 0.5 seconds.", avoid: "Don't press when the time/distance ratio means you'll arrive too late. A late press that doesn't get close enough is just wasted energy and removes you from position." },
    { name: "Second Press", how: "First press doesn't win the ball — the ball is played away. Immediately identify the new pressing opportunity and sprint to press that player. Chain two consecutive presses without stopping.", avoid: "Don't stop after the first unsuccessful press. The second or third press is often when the ball is actually won. Chain them." },
    { name: "Press Coordination Call", how: "In a team session, the pressing trigger verbal call: 'press!' Everyone hears it and presses their nearest player simultaneously. Practice the synchronization until it becomes automatic.", avoid: "Don't press individually after a team press call. The call means everyone goes, not just the nearest person to the ball. Unsynchronized pressing leaves gaps." },
    { name: "Press Angle Workshop", how: "10 different pressing scenarios. For each, decide: which angle do you press from? The angle determines where the ball carrier is forced. Practice making the angle decision before pressing.", avoid: "Don't press straight at every ball carrier. The angle is the intelligence. Show them right means you've decided that's where you want them to go." },
    { name: "Press Fatigue Management", how: "In a high-intensity game, track when you press and when you hold. Press on genuine triggers only. Preserve energy for the late-game triggers when the opposition is tired and more likely to make mistakes.", avoid: "Don't press relentlessly for 90 minutes. Even the best pressing teams conserve energy between triggers. Selective pressing with full effort is better than constant half-effort pressing." },
    { name: "Transition Press", how: "Immediately after the opposition wins possession, press them before they can reset. The transition press — within 3 seconds of losing the ball — is the most disorganizing press for any team.", avoid: "Don't accept defeat after losing possession. The moment of loss is the moment of the press opportunity. Transitioning instantly to press is a team habit worth training obsessively." },
    { name: "Film Press Trigger Study", how: "Watch Klopp's Liverpool or Guardiola's City for 10 minutes specifically looking for press triggers. What did the ball carrier do before the press was triggered? Backward pass, heavy touch, isolated wide? Map the triggers.", avoid: "Don't just admire the press. Identify the specific trigger that started it. Every successful press starts with a specific cue — find that cue." },
    { name: "Press Angle Approach Running", how: "Sprint 15 yards at the press target from a 30-degree angle. Practice the curved approach that cuts off the most important passing option. Repeat from different starting positions.", avoid: "Don't sprint straight. The curved approach is the technique. Straight sprints give the ball carrier easy escape options." },
    { name: "Post-Press Recovery", how: "Press for 5 seconds. Ball escapes. Immediately sprint back 15 yards into defensive shape. The press-and-recover cycle. Track how quickly you recover defensive position after every press.", avoid: "Don't stand and watch after an unsuccessful press. Recovery speed after a press failure determines whether the team gets exposed. Sprint back immediately." },
  ],

  "Tempo Control": [
    { name: "Slow-Slow-Fast Pattern", how: "In a possession game, deliberately slow the tempo for 3 passes, then suddenly accelerate to a fast vertical pass on the 4th. The sudden change surprises the defense — they've adjusted to the slow pace.", avoid: "Don't make the tempo change obvious. The slow passes must genuinely feel slow — relaxed, comfortable. If they look like you're preparing for something, the element of surprise is lost." },
    { name: "One-Touch Tempo Drill", how: "All players in a rondo must play one-touch for 30 seconds. The speed of one-touch passing is maximal tempo. Then switch to 3-touch maximum. Feel the difference in defensive pressure at each tempo.", avoid: "Don't play one-touch just to make it fast. The one-touch must still be accurate and purposeful. Frantic inaccurate passing isn't high tempo — it's just chaos." },
    { name: "Blind Pass Tempo", how: "Play a blind pass (without looking) to a pre-scanned position. The decision-making was done before the ball arrived. This is how elite players play at high tempo — they've decided before receiving.", avoid: "Don't attempt blind passes without a reliable pre-scan habit. Blind passing without pre-scanning is guessing, not tempo control." },
    { name: "Dictating the Pace", how: "In a possession game, you're the tempo controller. You decide when to slow it down and when to accelerate. Call the changes: 'slow it down' or 'quick!' Practice leading the team's tempo.", avoid: "Don't change tempo randomly. The change must be purposeful — slow when the defense is compact, fast when they're disorganized. Tempo as a strategic tool." },
    { name: "Receiving Under No Pressure", how: "When receiving with no pressure, practice slowing the game down completely — receive, look up, take your time. Players often rush when they have time because they're nervous. Learn to use free time strategically.", avoid: "Don't rush under no pressure. A relaxed, scanning reception when no one is near you is a skill — it's how you rest the ball and reset the team's tempo." },
    { name: "Urgency Recognition", how: "Practice distinguishing: when is urgency needed (counter-attack, pressing opportunity, goal chance) versus when is composure the right choice (deep in your own half with all defenders back)?", avoid: "Don't be urgent in every situation. Urgency at the wrong moment creates errors. Composure when urgency isn't required is a sign of high tactical intelligence." },
    { name: "Change of Pace Dribble", how: "Dribble slowly for 5 yards — defenders adjust to your pace. Then burst for 5 yards at maximum speed. The contrast of pace is the move, not the dribble itself. Repeat in every dribbling session.", avoid: "Don't jog then jog slightly faster. The contrast must be dramatic — genuinely slow, then genuinely explosive. Half-measures produce no reaction from the defender." },
    { name: "Holding the Ball Under Pressure", how: "With a partner pressing from behind, hold the ball with your back to them for 5 seconds, then play it. Train the ability to hold the ball, absorb pressure, and play at the right time — not earlier.", avoid: "Don't panic and play it early when the defender approaches. The 5 seconds of holding is the training. Adjust your shielding position to hold the full time." },
    { name: "Pause and Accelerate", how: "In possession, take one deliberate pause — stop moving for 1 second. Then burst into your next action explosively. The pause freezes defenders before the explosion. Like a shot-clock reset for your movement.", avoid: "Don't be stationary for so long that defenders reposition fully. The pause is 1 second. Long enough to freeze, short enough to exploit." },
    { name: "Tempo Contrast Game", how: "Two halves of 5 minutes. First half: play as fast as possible. Second half: deliberately slow. Compare which creates more goal-scoring opportunities. Most teams create more when tempo is varied.", avoid: "Don't declare one tempo superior. The lesson is contrast. A team that always plays fast is predictable. A team that varies is harder to defend." },
    { name: "Rest on the Ball", how: "Practice using possession to genuinely rest — slower passes, longer hold times, simpler options. In a 90-minute game, tempo management is as much about conserving energy as about strategy.", avoid: "Don't confuse resting with being passive. Resting tempo possession is still purposeful. The ball moves, the team stays organized. You're just not trying to score every second." },
    { name: "Recycle Possession", how: "When no good forward option exists, deliberately recycle the ball backward and reset. Practice this without frustration — recycling is a high-IQ decision, not a failure.", avoid: "Don't force forward passes when recycling is the right answer. The temptation to always play forward causes turnovers in bad positions." },
    { name: "Transition Tempo", how: "Win the ball — immediate high tempo forward. Go forward 5 passes at maximum speed. Then deliberately drop back to slower build-up tempo. Transition from high to low tempo after exploiting the counter-attack moment.", avoid: "Don't maintain counter-attack tempo when the defense has reset. High tempo against a reset defense just runs into organized blocks. Recognize when to drop the pace." },
    { name: "Film: Pirlo Tempo Study", how: "Watch 10 minutes of Andrea Pirlo specifically for tempo management. He is the master of changing the game's speed with one pass. Identify each moment he slows or accelerates the game intentionally.", avoid: "Don't watch for his technique. Watch for his decisions — why did he slow that pass down? Why did that specific pass accelerate the tempo? The decision, not the execution." },
    { name: "Tempo Self-Assessment", how: "After every game, rate 3 moments where you controlled tempo well and 3 where you rushed or were too slow. The review builds conscious awareness of your own game tempo management.", avoid: "Don't skip the review because it's hard to remember. Keep a notes app in your pocket. 30 seconds after the game, write the 3+3 moments while they're fresh." },
  ],

  "Third Man Runs": [
    { name: "Basic Third Man Pattern", how: "Player A passes to B. B passes to C. A immediately makes a run for C to play into. Walk through this 10 times slowly, then increase pace. The triangle — pass, pass, run — is the foundation.", avoid: "Don't wait for C to receive the ball before making your run. A's run starts the moment A plays to B. The run is already happening when the ball reaches C." },
    { name: "Third Man Timing Drill", how: "Same pattern as above but A must time the run so they arrive at the correct position exactly as C plays the third pass. Too early = offside or run too far. Too late = C has to hold the ball.", avoid: "Don't just run as fast as possible. The timing of the run is the skill. Run at the speed that arrives perfectly as C plays. Faster isn't always better." },
    { name: "Blind Third Man", how: "A plays to B. A then turns their back. B plays to C. C plays the ball into space for A's run — without A seeing where C has played it. A must trust the sequence and run into the expected space.", avoid: "Don't peek. If A looks back to find the ball, the drill doesn't develop the trust that makes third man runs work in games. Trust the pattern." },
    { name: "Third Man in a 4v4 Game", how: "In a 4v4 game, award bonus points for goals that come from a third man run. This makes the team consciously create third man run opportunities throughout the game.", avoid: "Don't force the third man run when the right opportunity isn't there. The bonus point encourages it — good decision-making still determines when it's the right moment." },
    { name: "Third Man Width", how: "The third man run doesn't have to be straight. Practice third man runs in diagonal directions — particularly runs that break into wide areas behind the defensive line. Width on the third man run is often more dangerous.", avoid: "Don't only run straight ahead on third man patterns. Diagonal runs across the defensive line are harder to track and create better crossing/shooting angles." },
    { name: "Third Man Depth", how: "Practice third man runs at different depths — some runs go 10 yards, some go 30. The depth of the run depends on the space behind the defensive line. Read the defensive position before committing to depth.", avoid: "Don't always make the same-depth run. Defenders learn to track you at the same depth. Vary the depth each time — some shallow, some deep." },
    { name: "Third Man Without the Ball Goal", how: "A game where only goals from third man runs count. This extreme constraint forces every team to think exclusively in third man patterns. It's surprisingly hard and reveals how rarely players actually execute it.", avoid: "Don't become frustrated when goals are hard to come by. The difficulty is informative — it shows exactly how rarely teams actually create clean third man patterns." },
    { name: "Third Man Late Run", how: "Specifically practice arriving late to the third man position — running into the space as the ball is already in flight toward it. Late arrivals are harder to defend because the defender commits to the space before you arrive.", avoid: "Don't sprint to the third man position and wait there for the ball. The run must arrive with the ball — late and together. Waiting creates an easy defensive read." },
    { name: "Third Man Communication", how: "The player making the third man run calls 'third man!' as they start the run. The player who will play the pass (C) must respond 'got it!' The communication confirms the combination before the ball is played.", avoid: "Don't play the third man pass without confirmation. If C doesn't respond, they haven't seen A's run. Hold the ball and find another option." },
    { name: "Third Man Film Study", how: "Watch 10 minutes of Spain under Pep Guardiola (or any tiki-taka highlights). Count the third man runs per 5 minutes. Map the patterns — which players most often become the third man? Where does the run go?", avoid: "Don't just watch the goal. Rewind 5 seconds and watch the sequence from the first pass. The third man run set up goals that look like they came from nowhere." },
    { name: "Third Man vs Defensive Shape", how: "Set up a 4-player defensive shape. Run third man patterns against it. Sometimes the run works, sometimes the defense covers it. This is game-realistic — third man runs don't always break through.", avoid: "Don't only drill third man runs against no resistance. The patterns must be tested against defensive pressure to understand when they work and when they don't." },
    { name: "Third Man Finishing", how: "The third man run results in a shot on goal. Focus on the finishing touch off the run — arriving at pace and striking cleanly. Third man runs often arrive at full sprint speed, making finishing harder.", avoid: "Don't slow dramatically before striking. Third man run finishes are most dangerous when the momentum of the run carries into the shot." },
    { name: "Third Man in Build-Up", how: "Practice third man runs during build-up from deep — starting from your own third. The third man run isn't just for the final third. A midfielder's third man run through the center can open up the whole pitch.", avoid: "Don't limit third man thinking to the final third. A third man run at the halfway line that breaks the opposition's midfield press is equally valuable." },
    { name: "Double Third Man", how: "Two players simultaneously make third man runs in different directions. C must choose which to play to. The double run forces a defensive split decision — one of the two is always going to be free.", avoid: "Don't make both runs in the same direction. The value of the double third man run is that the defense can only cover one direction. Split left and right." },
    { name: "Third Man Position Awareness", how: "Between sessions: when watching any soccer game on TV, count third man runs per 5 minutes. You'll be amazed how often elite teams execute this pattern. Develop an eye for it before training it.", avoid: "Don't only count successful third man runs. Count the attempts — including ones where the pass wasn't played to the runner. Recognizing the pattern is the first step." },
  ],

  "Overload Recognition": [
    { name: "Count Before You Act", how: "In any possession game, before every pass, count: how many attackers do we have ahead of the ball, how many defenders? If you outnumber them — play forward aggressively. If not — recycle. Build this count into every touch.", avoid: "Don't count after you've already decided. The count is the decision tool. Count first, decide based on the count." },
    { name: "2v1 Exploitation Drill", how: "3 players: 2 attackers, 1 defender. The 2 attackers must exploit the overload — pass and move around the defender without losing the ball. Clean 2v1 exploitation with no mistakes. 20 reps.", avoid: "Don't overcomplicate the 2v1. It's a simple geometry problem: one attacker goes, the other covers. The pass goes behind the defender when they step to one attacker." },
    { name: "Overload Side Identification", how: "In a 4v4 game, call out 'overload left' or 'overload right' every time you see a numerical advantage on one side. The call trains your eye for identifying overloads in real time.", avoid: "Don't call it retrospectively. The call must be as the overload is created — before the defense has time to respond. Late calls are useless." },
    { name: "3v2 Forward", how: "3 attackers vs 2 defenders, playing toward goal. The attackers must identify and exploit the overload — someone is always free. Practice until the free man is found within 2 touches.", avoid: "Don't force the shot before finding the free man. In a 3v2, someone is mathematically free. Find them before trying to create on your own." },
    { name: "Overload Switch", how: "If the overload is on the left but the ball is on the right, switch the ball quickly to exploit the left overload before the defense rebalances. Practice the recognition → switch → exploit sequence.", avoid: "Don't take too long to switch. The overload exists briefly — the defense is compensating and will rebalance in 2–3 seconds. Switch immediately when you identify it." },
    { name: "Numbers Count in Transition", how: "Immediately after winning possession, count the numbers ahead of the ball. If you have more forwards than their defenders — counter-attack. If equal — think carefully. If outnumbered — hold possession.", avoid: "Don't always counter just because you've won the ball. The numbers determine the counter. An equal-numbers counter-attack against organized defenders fails most of the time." },
    { name: "Creating the Overload", how: "Practice deliberately creating an overload: two forwards, one midfielder makes a run to make it 3v2. The run that creates the overload is intentional — it's a tactical decision to commit more players forward.", avoid: "Don't create overloads recklessly. Committing 3 attackers creates a 3-forward team — losing the ball now exposes you to a counter-attack with fewer defenders." },
    { name: "Overload Recognition Game", how: "3v3 game. When one team creates a 3v2 overload on one side (one defender commits to the wrong side), immediately exploit it with the free player. Points awarded for goals from recognized overloads.", avoid: "Don't force overloads that aren't there. The defender commits — then you exploit. Forced overloads are just bad decision-making." },
    { name: "Wide Overload", how: "Fullback overlaps to create 2v1 on the wing. Practice the recognition of this wide overload from the center of the field — look out wide, see the 2v1, play the pass to the overlapping fullback immediately.", avoid: "Don't miss the wide overload because you're looking only centrally. Peripheral and scanning awareness of wide overloads is as important as central ones." },
    { name: "Film: Overload Recognition Study", how: "Watch any possession-based team. Pause on 5 moments where an overload was created. Where was the overload? Who created it? How was it exploited? What created the defensive imbalance?", avoid: "Don't just watch the goal. The overload was created 2–3 passes before the goal. Rewind to find the moment the numbers shifted." },
    { name: "Defensive Overload Prevention", how: "In a defensive session: practice reading when the opposition is creating an overload on your side. Before it's fully formed, communicate and shift your shape to prevent the overload from being exploited.", avoid: "Don't react to overloads after they're fully created. Prevention requires seeing the 2-pass setup before the overload exists. Recognizing the setup is the skill." },
    { name: "Overload Through Lines", how: "A midfield overload (3 midfielders vs 2 opposition midfielders) can be exploited by the third midfielder making a run through the gap. Practice playing the ball to the overloaded midfielder who then plays through the lines.", avoid: "Don't only think about overloads in the final third. Midfield overloads that are exploited with a line-breaking pass are just as valuable." },
    { name: "Counting Game (Numbers Awareness)", how: "In every training game, silently count the numbers in your attacking third before every forward pass: 'We have 3, they have 2.' You must count every time. This habit builds constant overload awareness.", avoid: "Don't skip the count when it seems obvious. The habit of counting every time builds automatic awareness. Skipping 'obvious' counts leaves gaps in the habit." },
    { name: "Creating and Exploiting in One Move", how: "Practice the full sequence: move to create an overload on one side, immediately pass to exploit it, attack goal. The creation and exploitation must be one continuous flowing sequence, not two separate decisions.", avoid: "Don't pause between creating and exploiting. The window for exploitation is brief. Creation → Exploitation must feel like one action." },
    { name: "Overload Training Journal", how: "After every game: write down 3 overload moments — one you created, one you missed, one you prevented defensively. The journal builds overload awareness faster than any drill alone.", avoid: "Don't write vague entries. 'I created an overload on the left' is useless. 'I overlapped the right back, creating 2v1 against their LB, and the cross resulted in a shot' is useful." },
  ],
};
// DRILLS PART 4 — FLAIR
const DRILLS_FLAIR = {

  "Rabona": [
    { name: "Stationary Rabona Contact", how: "Ball stationary. Cross your kicking foot behind your standing leg and make contact with the inside-laces of that crossed foot. Just practice the crossing motion and contact 20 times — no need to hit it hard yet. Get the feel of the crossed-foot contact.", avoid: "Don't try to power it on your first reps. The mechanics of crossing your leg behind you are awkward at first. Focus entirely on the foot position and contact surface." },
    { name: "Rabona Chip", how: "Short distance chip shot using the rabona motion. Standing 5 yards from a target, cross your foot behind and chip the ball with a short, sharp contact. Get the ball in the air. 15 reps.", avoid: "Don't over-swing. The rabona chip needs a compact strike — a long swing makes the balance impossible. Short, controlled contact under the ball." },
    { name: "Rabona Cross", how: "From the right side, cross the ball with the rabona motion using your right foot — the ball curves away with an outswing. The most game-realistic use of the rabona. 10 reps from a wide position.", avoid: "Don't lose your balance on the follow-through. Plant your standing foot firmly beside the ball and keep your core tight through the contact. Balance is the key to a consistent rabona." },
    { name: "Rabona Pass Short", how: "Rabona a short pass to a partner 8 yards away. Soft, controlled rabona contact. This is the intermediate step — using the rabona for a real pass rather than just a solo drill.", avoid: "Don't cross your foot so far behind that you can barely reach the ball. Find the balance point where your crossing foot can comfortably contact the ball with the inside laces." },
    { name: "Rabona Balance Drill", how: "Stand on one foot and hold the crossed-behind position for 10 seconds without the ball. Simply build the balance and flexibility required for the rabona before adding the ball.", avoid: "Don't rush to the ball until the balance feels natural. A player who can't hold the rabona stance for 10 seconds won't execute it cleanly under pressure." },
  ],

  "Nutmeg": [
    { name: "Nutmeg Fundamentals", how: "Stand in front of a partner with their feet slightly apart. Push the ball between their legs with a firm, low touch — the ball must go directly through the middle and emerge behind them. 20 reps from a stationary position.", avoid: "Don't try to force a nutmeg through a fully closed stance. The nutmeg only works when there's a gap. The skill is reading the gap, not creating one by force." },
    { name: "Nutmeg Through Gate", how: "Set two cones 1 foot apart as a gate at ground level. Practice pushing the ball through the gate from 5 yards away. This is the pure precision training — threading the ball through a very tight window.", avoid: "Don't hit it too hard. A nutmeg that goes through fast but pops out 10 yards away is lost. The pass needs enough pace to go through but not so fast you can't collect it." },
    { name: "Nutmeg Setup Move", how: "The best nutmegs come after a setup move. Practice: step-over to the left, then nutmeg right. Or feint to go right, then nutmeg through when the defender shifts weight. The setup creates the gap.", avoid: "Don't nutmeg without a setup move — it rarely works. The setup forces the defender's weight shift, which creates the gap between their legs." },
    { name: "Nutmeg and Go", how: "Nutmeg a passive defender and immediately sprint around them to collect the ball. The nutmeg is only valuable if you collect the ball. Practice the burst around the defender at the same time as the nutmeg.", avoid: "Don't nutmeg and stand still admiring it. The moment the ball goes through, you go around. Ball and you arrive at the other side simultaneously." },
    { name: "1v1 Nutmeg Attempt", how: "1v1 against a passive defender. Attempt to create and execute a nutmeg. They provide slight resistance — enough to be realistic. No full defensive pressure — just enough presence to force the setup.", avoid: "Don't force the nutmeg every attempt. The 1v1 might create a different opportunity — take the one that presents itself. Don't be so committed to the nutmeg that you miss an easier option." },
  ],

  "Rainbow Flick": [
    { name: "Rainbow Mechanics Breakdown", how: "Step 1: Roll the ball up the back of your standing leg using the sole of your foot. Step 2: As it reaches calf height, flick it over your head with the heel of the same foot. Practice each step separately before combining. 10 reps of just the roll, 10 of just the flick.", avoid: "Don't rush to combine the two steps until each feels clean individually. The rainbow flick fails most often at the transition between rolling and flicking." },
    { name: "Rainbow Against Wall", how: "Practice the rainbow flick with a wall in front of you. The ball should arc over your head and hit the wall in front. This confirms the trajectory is forward-over-head, not sideways.", avoid: "Don't flick it sideways. The flick must go directly overhead in the forward direction. Sideways rainbows are ineffective in a game." },
    { name: "Rainbow Progression Height", how: "Start with the ball barely flicked up (1 foot height). Add height each session. The ball should eventually arc 4–5 feet over your head. Build the height progressively over weeks.", avoid: "Don't try maximum height before the mechanics are consistent at low height. A clean low rainbow builds the technique that will produce a high one later." },
    { name: "Rainbow Into Run", how: "Execute the rainbow flick and immediately burst forward to collect the ball as it lands ahead of you. The full sequence — flick, run, collect — is what makes the rainbow a real game skill.", avoid: "Don't stand still after the flick. The run forward is part of the move. Standing still after a rainbow flick means a defender runs around you to collect it." },
    { name: "Rainbow Flick 1v1", how: "Against a passive defender, attempt the rainbow flick to get past them. They must stay facing you (no turning). The rainbow goes over their head and you collect behind them. Very advanced.", avoid: "Don't attempt this in a competitive game until you can hit it 8/10 times in practice. A failed rainbow in a game almost always loses the ball." },
  ],

  "Elastico": [
    { name: "Elastico Foot Position", how: "The elastico: push the ball with the outside of your foot (as if going right), then immediately snap the inside of the same foot to flick it left. No step between — same foot, outside then inside in one snap. Practice the snap motion 30 times without a ball.", avoid: "Don't use two separate touches. The elastico is a single snap — outside contact creates the fake, inside contact creates the actual move. They happen in one fluid motion." },
    { name: "Slow Elastico", how: "At walking pace, perform the elastico past a stationary cone. Slow enough to feel each part of the motion — outside push, snap inside. 20 reps.", avoid: "Don't go fast until the snap feels natural. The elastico at slow speed reveals whether your technique is correct. If it's awkward slowly, it will fail at pace." },
    { name: "Elastico Vs Cone", how: "Set a cone 2 yards ahead. The cone is the defender. Perform the elastico to go around the cone on the inside. Your outside push should go toward the cone's right, your inside snap goes left past them.", avoid: "Don't give the ball too much space with the outside push. The push should be just enough to commit the 'defender' — not so far that the snap can't recover it." },
    { name: "Elastico Speed Build", how: "Same as slow elastico but now at jogging pace. Add pace every 5 reps. Build to near-sprint speed over the course of the drill. Speed makes the elastico believable in a game.", avoid: "Don't rush to game speed before the technique is clean. Elastico at pace with poor mechanics just sends the ball sideways. Clean mechanics first." },
    { name: "Elastico in 1v1", how: "1v1 with a passive defender. Use the elastico to go past them. Real human defenders respond differently than cones — the fake must sell. Body leans slightly outside to sell the initial push.", avoid: "Don't perform the elastico without the body sell. An elastico where your body stays neutral doesn't fool anyone. Commit your body to the outside direction before snapping inside." },
  ],

  "Roulette (Zidane Turn)": [
    { name: "Roulette Mechanics Walk-Through", how: "Step 1: Sole of right foot on top of the ball, roll it sideways. Step 2: Body spins 180 degrees. Step 3: Sole of left foot continues the roll in the same direction as your spin. Walk through at zero pace. Feel each step.", avoid: "Don't rush the mechanics walk-through. The Zidane turn is 3 distinct physical components. Learning them separately makes combining them easier." },
    { name: "Roulette Stationary Reps", how: "Standing still with a cone as a defender, perform the roulette turn around the cone. Right sole rolls the ball, spin, left sole exits. 15 slow reps. Body must complete the full 360-degree turn.", avoid: "Don't shortcut the spin. A half-spin Zidane turn doesn't work in a game — the ball ends up behind you. Complete the full rotation." },
    { name: "Roulette Speed Build", how: "Same stationary reps but add pace each set. Slow → medium → fast. The roulette at speed requires the sole contacts to be more decisive — less deliberate rolling, more snapping.", avoid: "Don't let the ball roll too far away on the first sole contact. Keep it tight to your foot. A ball that rolls 2 yards away before the spin is uncontrolled." },
    { name: "Roulette Away from Pressure", how: "A partner applies pressure from behind. Perform the roulette to spin away from them. The turn must be away from their direction of approach.", avoid: "Don't spin toward the pressure. Read which direction they're coming from and spin away. Spinning into a defender just puts you back in trouble." },
    { name: "Roulette into Space", how: "After the roulette, immediately accelerate into open space. The turn is only as good as what comes after. Roulette → burst into space. Treat the turn as the start of a dribble, not the end.", avoid: "Don't stop after the turn. Stopping negates the advantage — the defender recovers position. Roulette → immediate acceleration." },
