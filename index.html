    { name: "Roulette Under Pressure", how: "1v1 with a semi-active defender. Attempt the roulette when they close down from behind. Full competitive context for the skill.", avoid: "Don't attempt the roulette if they're closing from the front. The roulette works specifically when pressure comes from behind. Front pressure requires a different move." },
  ],

  "Cruyff Turn": [
    { name: "Cruyff Mechanics", how: "Plant your non-kicking foot beside the ball, swing your kicking leg as if crossing — then at the last second, take the ball back behind your standing leg in the opposite direction with the inside of your foot. 20 slow reps.", avoid: "Don't let the selling motion be obvious. The Cruyff only works if the defender believes you're crossing or shooting. The swing must look real before the inside redirect." },
    { name: "Cruyff vs Wall", how: "Face a wall 2 yards away. Sell the cross toward the wall, Cruyff the ball behind your standing leg, and turn away from the wall. The wall represents the defensive pressure.", avoid: "Don't give yourself too much space from the wall. The Cruyff is used when there's pressure close to you. Practice it tight — the tightness is part of the drill." },
    { name: "Cruyff From Dribble", how: "Dribble toward a passive defender at medium pace. As you arrive close to them, execute the Cruyff. The dribble into the Cruyff is the most natural sequence.", avoid: "Don't slow dramatically before the Cruyff. A sudden deceleration signals the Cruyff is coming. Maintain pace until the last step." },
    { name: "Cruyff Left and Right", how: "Practice the Cruyff with both feet. Right foot Cruyff turns left, left foot Cruyff turns right. Both directions from both feet.", avoid: "Don't only practice with your dominant foot. A one-direction Cruyff is half the skill. The left-foot Cruyff is available whenever pressure comes from the left side." },
    { name: "Cruyff Competition", how: "1v1 where the attacker must exit the defensive pressure zone using a Cruyff. Defender knows the Cruyff is coming — the attacker must sell it well enough to beat them anyway.", avoid: "Don't attempt the Cruyff if the defender isn't buying the fake. The Cruyff fails when the defender isn't deceived by the swing. Sell the swing better first." },
  ],

  "Step-Over": [
    { name: "Step-Over Mechanics", how: "Step over the ball with your right foot (circle motion over and around the ball from inside to outside), then push the ball with the outside of your right foot to the right. The step-over is the fake going left, the push is the actual move going right. 20 reps each side.", avoid: "Don't let the step-over become a foot shuffle. The leg must actually arc over the ball in a convincing circular motion. A lazy half-step doesn't sell the fake." },
    { name: "Double Step-Over", how: "Two consecutive step-overs (right over, left over) before pushing in the original direction. The double step-over is more convincing because it changes the timing.", avoid: "Don't rush the double. Both step-overs need to look convincing. A rushed double step-over looks like scrambling, not skill." },
    { name: "Step-Over at Pace", how: "Dribble toward a cone at medium pace and perform the step-over. The motion must look natural at speed.", avoid: "Don't stop before the step-over. The move is most effective when done without slowing — the body deception works best at pace." },
    { name: "Step-Over Body Lean", how: "Specifically add body lean to the step-over. As your leg goes over, lean your entire upper body in that direction. Body lean is what actually sells the fake — the foot circle alone isn't enough.", avoid: "Don't step over with no body movement. Defenders watch hips and shoulders, not feet. The body sell is as important as the foot mechanics." },
    { name: "Step-Over vs Passive Defender", how: "1v1 where you use only the step-over to beat a semi-passive defender. They offer light resistance. The goal is to make the step-over convincing enough to create the space.", avoid: "Don't force the move when the defender isn't biting. Read their weight transfer — the step-over works when they shift toward the fake. If they don't shift, change to another move." },
    { name: "Step-Over Into Sprint", how: "Step-over, push outside, sprint immediately. The acceleration after the step-over is what makes it effective. A step-over without a burst is just a shimmy.", avoid: "Don't hesitate after the push. Step-over → push → sprint must be one continuous action. Any pause gives the defender time to adjust." },
  ],

  "Outside of Foot Pass (Trivela)": [
    { name: "Trivela Contact Point", how: "Strike the ball with the outer two laces — the side of your boot near the little toe. Foot points slightly inward, contact is on the outer ridge. Practice the contact motion without a ball 20 times.", avoid: "Don't confuse the trivela with a side-foot pass. The trivela uses the outer laces, not the inside. Different surface, different feel, different spin." },
    { name: "Short Trivela Pass", how: "From 8 yards, play a trivela pass to a target. The ball should curl slightly away. Inside-right-foot trivela curves left to right. Left foot trivela curves right to left.", avoid: "Don't try to generate heavy curl yet. Short trivela is about contact quality — feel the outer lace contact and get the ball to the target cleanly." },
    { name: "Trivela Cross", how: "From the right, trivela a cross with the right foot — the ball curves outward (outswinging). From the left, trivela with the left. The outswing trivela cross is a dangerous delivery.", avoid: "Don't mishit the trivela as a toe poke. Controlled outer lace contact. A toe poke produces nothing useful — find the lace surface." },
    { name: "Trivela Pass Into Run", how: "Play a trivela through-ball into space for a running partner. The natural curl of the trivela can be used to bend the ball around a defender into a runner's path.", avoid: "Don't use the trivela for straight passes — use your instep for those. The trivela is specifically useful when the ball needs to curve. Use it for its curve, not as a default pass." },
    { name: "Trivela Shooting", how: "From a slight right angle, shoot with the trivela. The ball curves away from the goalkeeper. This is the advanced trivela application.", avoid: "Don't attempt trivela shooting before your trivela pass is reliable. The same contact point applies — outer laces through the ball. Build from passes to shots." },
  ],

  "Bicycle Kick": [
    { name: "Bicycle Kick Safety Setup", how: "Practice ONLY on a soft surface (grass or crash mat). The bicycle kick requires falling backward — learning to fall safely is the first skill. Practice the backward fall 10 times: lean back, kick upward, land on your forearms and upper back. No ball yet.", avoid: "Don't practice bicycle kicks on hard surfaces until the landing is completely natural. One bad landing on a hard surface is a serious injury. Grass or mat only." },
    { name: "Assisted Bicycle", how: "Partner stands beside you and helps support you as you lean back and kick. Their support lets you feel the kicking motion without worrying about falling. 10 assisted reps.", avoid: "Don't rely on the partner's support for more than 2 sessions. The support is for learning the feel — you need to graduate to unassisted as quickly as safely possible." },
    { name: "Bicycle Kick Against Low Ball", how: "A partner tosses the ball at waist height. Lean back and kick it upward. The contact must be with the laces, ball pushed upward. Short height — the ball doesn't need to go far, just up.", avoid: "Don't let the ball drop too low before kicking. Waist-to-chest height is ideal. Trying to bicycle kick a ball at shin height puts you at injury risk." },
    { name: "Bicycle Kick Cross Reception", how: "A partner chips a ball to your side at chest height. Bicycle kick it toward goal. This is the full game context — receiving an aerial ball and redirecting with a bicycle kick.", avoid: "Don't try this until your standalone bicycle kick technique is clean. The cross adds timing complexity. Solo technique must be solid first." },
    { name: "Bicycle Kick Technique Focus", how: "Every bicycle kick rep: focus on the non-kicking leg driving downward as the kicking leg goes up. The downward drive of the non-kicking leg creates the height and power of the bicycle kick.", avoid: "Don't forget the non-kicking leg's role. Many players focus only on the kicking leg. The non-kicking leg's downward drive is what generates height." },
  ],

  "No-Look Pass": [
    { name: "No-Look Pre-Scan Practice", how: "Before every wall pass for 5 minutes, look away from the ball and scan to the left or right. Then pass. This builds the habit of gathering information before committing to the pass. The no-look pass is enabled by excellent pre-scanning.", avoid: "Don't attempt no-look passes without pre-scanning. A no-look pass without pre-scan information is just blind guessing. The pre-scan is what makes the no-look pass intelligent." },
    { name: "No-Look Short Pass", how: "With 2 partners at different angles, make eye contact with one and pass to the other. Your eyes indicate one direction, the ball goes elsewhere. 10 reps switching which partner receives.", avoid: "Don't make the no-look obvious with shoulder rotation or footwork cues. The no-look requires your whole body to be ambiguous about the direction." },
    { name: "No-Look Wall Pass", how: "Pass to the wall and as the ball travels, look away. When it returns, pass again without looking. Builds the habit of passing from non-visual information at the moment of contact.", avoid: "Don't look at your foot during contact on the no-look pass. The point is that the pass is made without looking at the target. Eyes somewhere else — foot contact is technical memory." },
    { name: "No-Look in Rondo", how: "In a 5v2 rondo, attempt one no-look pass per possession. Pre-scan before receiving, make eye contact with a fake target, pass to the scanned player. The competitive context makes it more meaningful.", avoid: "Don't attempt no-look passes without clear pre-scan information. A failed no-look in a rondo turns over possession. Only attempt it when you have reliable pre-scan data." },
    { name: "No-Look Pass Combination", how: "You and a partner set up a pre-agreed combination. They move to a position and you pass to them without looking. Both players execute the pre-agreed run and pass — the combination makes the no-look possible.", avoid: "Don't rely on combinations in games where the runs aren't pre-agreed. Game no-look passes require real-time pre-scanning, not set combinations. Build both abilities." },
  ],

  "Heel Pass": [
    { name: "Standing Heel Pass", how: "Stand with the ball at your feet. Strike the ball backward with your heel. 15 reps at different power levels. The heel pass is a flick — not a hard strike. Short, sharp heel contact.", avoid: "Don't try to power a heel pass. It almost always goes wide or too far. A heel pass is a technique of precision and timing, not power." },
    { name: "Heel Pass in Motion", how: "Walk forward, and as you pass over the ball, heel it backward to a partner behind you. The in-motion heel pass — the most natural game use of the skill.", avoid: "Don't step too far past the ball before heeling. Your heel contacts the ball when your foot is directly above it — not after you've walked past it." },
    { name: "Heel Pass Accuracy", how: "Heel pass to a specific cone target behind you. The accuracy of a heel pass is low for most players — this drill specifically addresses that. 20 reps trying to hit the same cone.", avoid: "Don't count balls that miss the target but go 'generally backward.' A heel pass in a game that goes to the wrong direction gifts possession. Accuracy matters." },
    { name: "Heel Pass Setup Move", how: "Walk forward, fake to shoot or pass forward, heel pass backward to a supporting player. The forward fake makes the heel pass work — defenders are expecting forward, not backward.", avoid: "Don't heel pass without any sell. An obvious heel pass in a game is read easily. The fake is what creates the space for the backward pass to work." },
    { name: "Heel Pass in Training Game", how: "In a training match, attempt one heel pass per half. Just one — forced commitment to using it in a real context. Note if it was the right decision afterward.", avoid: "Don't force the heel pass at the wrong moment just to practice it. Only use it when you're moving forward with a trailing teammate. Context and judgment matter." },
  ],

  "Chip Shot": [
    { name: "Chip Technique Reps", how: "Ball stationary. Strike under the ball with your toe-down laces — the contact is through the bottom third of the ball, creating backspin and lift. Compact swing, no follow-through. 20 reps from 10 yards.", avoid: "Don't sweep under the ball — stab under it. The compact stab creates the backspin that makes the ball rise steeply and drop quickly. A sweeping motion just lobs it." },
    { name: "Distance Chip Accuracy", how: "Place a target (cone, hula hoop) at 15 yards. Chip the ball and try to land it on the target. The chip should drop steeply onto the target — not a looping ball that rolls forward.", avoid: "Don't chip balls that bounce and run forward. A proper chip has backspin — it lands and almost stops. If your chip rolls 5+ yards after landing, it has too much topspin." },
    { name: "Chip Over Keeper", how: "A partner stands as a goalkeeper 3 yards off their line. Chip over them. The key: read the keeper's position, commit early, compact strike. From 12 yards is realistic.", avoid: "Don't try to chip a keeper who's on their line. The chip only works when the keeper is off their line. Reading the keeper's position is part of the skill." },
    { name: "Chip From 1v1", how: "1v1 with a partner as keeper. They advance to close the angle. Chip over them. The advancing keeper creates the opportunity — read their movement and chip as they commit.", avoid: "Don't hesitate when the keeper advances. The chip window opens and closes in a second. See it, commit, chip. Hesitation means the keeper gets back." },
    { name: "Chip Both Feet", how: "Chip from your weaker foot. The weaker foot chip is especially useful when the keeper advances and the ball is on your weaker side.", avoid: "Don't always rely on your stronger foot for chips. In a game the ball is on whichever side it's on — the chip needs to be available on both." },
    { name: "Moving Ball Chip", how: "Partner rolls a ball toward you. Chip it on the move — the ball is still rolling when you chip. Most chips in games come from moving balls, not stationary ones.", avoid: "Don't wait for the ball to stop. Read the speed of the rolling ball and time the chip contact accordingly. A stationary-only chip technique fails on moving balls." },
  ],

  "Scorpion Kick": [
    { name: "Scorpion Kick Safety", how: "Practice the falling motion only: kick your heel toward the back of your head while falling forward. Land on forearms. The scorpion kick requires falling face-forward safely. 10 supervised falls on grass.", avoid: "Don't practice scorpion kicks without a soft surface and without someone present. Face-forward falls risk serious injury. Grass only, never concrete or artificial turf." },
    { name: "Scorpion Contact Drill", how: "A partner holds a ball behind you at head height. Fall forward and try to kick it with your heel. The contact is with the back of the heel reaching upward toward your head.", avoid: "Don't kick toward the ball aggressively on first attempts. Gentle contact practice first — locate the contact point before adding any power." },
    { name: "Scorpion Save (Keeper)", how: "As a goalkeeper specifically: a ball is crossed behind you. Scorpion kick to redirect it away from goal. This is the primary game use. Keepers only for this drill.", avoid: "Don't attempt the scorpion kick for outfield players in game situations. The risk/reward is never worth it outside of a goalkeeper save. For outfield players it remains a training exercise only." },
    { name: "Scorpion Direction", how: "Try to direct the scorpion kick in a specific direction — straight up, or to the left and right. The direction is influenced by which angle your heel faces during the kick.", avoid: "Don't ignore direction. A scorpion kick that goes straight up and lands near you has no game value. Practice directing the contact." },
    { name: "Slow Motion Scorpion", how: "Perform the scorpion kick movement in slow motion to feel every stage: lean forward, kick heel up, contact, fall, forearm landing. Slow motion understanding creates fast execution.", avoid: "Don't skip the slow motion phase. The scorpion kick has multiple physical components. Slow motion understanding prevents bad habits and reduces injury risk." },
  ],

  "Juggling — Both Feet": [
    { name: "Foot Juggle Foundation", how: "Juggle with your right foot only, alternating each time: 3 touches right, then 3 left, then alternating each touch. Build the alternating pattern from equal time on each foot.", avoid: "Don't count juggles where the ball wobbles wildly. A clean juggle keeps the ball within arm's reach. Counting wild juggles inflates your number without building the skill." },
    { name: "Juggle Personal Record", how: "Count your maximum consecutive juggles with alternating feet. Log it weekly. Your personal record is your benchmark — beat it every 2 weeks.", avoid: "Don't count a session where you only used your right foot as a 'both feet' personal record. Both feet means both feet used throughout." },
    { name: "Juggle Height Control", how: "Juggle so that every touch goes to exactly knee height. Then exactly waist height. Then exactly head height. Height control in juggling builds touch control in game situations.", avoid: "Don't just juggle at whatever height is comfortable. The height control drill requires intentional adjustment. Comfortable juggling doesn't build controlled juggling." },
    { name: "Juggle and Move", how: "Juggle while walking forward, then backward, then in a circle. Moving juggling is harder — the ball's trajectory must be adjusted for your own movement.", avoid: "Don't stand still for all your juggling practice. Game first touches happen while you're moving. Stationary juggling is the starting point, not the end goal." },
    { name: "Juggle Combo Sequence", how: "Right foot, left foot, right thigh, left thigh, header, right foot, left foot. The combo sequence builds all aerial surfaces. 5 completed sequences per session.", avoid: "Don't count a sequence where you dropped it and restarted from one touch. The sequence must flow unbroken from the first touch to the last." },
    { name: "Weak Foot Juggle", how: "20 consecutive touches with your left foot only. This is harder than it sounds. Left foot juggling builds the touch sensitivity that transfers to left foot first touches.", avoid: "Don't use your right foot as a 'rescue' when the left foot touch goes wrong. 20 consecutive left foot. If you miss, restart from zero." },
    { name: "Juggle Under Pressure", how: "Juggle while a partner shouts random instructions, throws objects (harmlessly) near you, or makes sudden movements. Distractions while juggling build the concentration that keeps ball control under pressure.", avoid: "Don't get angry at the partner's distractions. The annoyance of distractions while juggling is the point — it builds concentration under chaotic conditions." },
    { name: "Juggle to First Touch", how: "Juggle 5 times and on the 6th touch, take a deliberate first touch to the ground in a specific direction. The transition from juggling to ground control is the real skill.", avoid: "Don't just drop the ball on the 6th touch. The 6th touch must be a controlled directional first touch — not a drop." },
    { name: "Freestyle Juggle Integration", how: "Freestyle juggling — stall the ball on your thigh, flick it up, alternate surfaces, add shoulder stalls. While freestyle isn't directly game-applicable, it builds extraordinary ball confidence.", avoid: "Don't spend more time on freestyle than on technical juggling. Freestyle is supplementary. Technical juggling (both feet, control, height) is primary." },
    { name: "Juggling Record Log", how: "Every session: attempt to beat your juggle personal record. Log the date and count. Over months, watching your record rise from 20 to 200 is one of the most motivating developments in individual training.", avoid: "Don't compare your count to anyone else. Your personal record is your only benchmark. Progress relative to yourself, not others." },
  ],

  "Juggling — Headers": [
    { name: "Wall Heading Juggle", how: "Head the ball against the wall and control the rebound with another header. Continuous heading against the wall for 30 seconds. Each header must be controlled and deliberate.", avoid: "Don't let headers fly off randomly. Each one must be directed at the same spot on the wall. Precision in header juggling transfers to precision in game headers." },
    { name: "Self-Header Juggle", how: "Throw the ball up and head it straight up. Head it again before it drops too far. Count consecutive headers. Target: 10 without the ball touching the ground.", avoid: "Don't head the ball so high it takes 5 seconds to come back. A juggling header should be controlled — 3–4 feet high maximum. Controlled height makes the sequence manageable." },
    { name: "Foot-Header-Foot", how: "Juggle with your feet, head it once, back to feet. The transition between foot and head juggling is the hardest part. 5 complete foot-head-foot transitions per set.", avoid: "Don't rush the foot-to-head transition. Let the ball reach the right height for the header before nodding it. Rushing produces a misheader." },
    { name: "Header Juggle with Partner", how: "Trade headers back and forth with a partner. Each person must keep their header controlled enough for the other to receive. Count consecutive headers between two people.", avoid: "Don't boom headers at your partner. They should be able to receive it comfortably. Juggling headers are controlled, not powered." },
    { name: "Header Direction Control", how: "Head the ball to yourself, redirect it 3 feet to your right, head again, redirect 3 feet to your left. Alternate directions. Builds directional heading control.", avoid: "Don't head straight up every time. The directional change is the drill. Straight-up header juggling is easier but doesn't build the directional control needed in games." },
  ],
};

// ===== LEFT FOOT DRILLS =====

    { name: "Left Foot 30-Pass Challenge", how: "In a passing exercise, make 30 consecutive left-foot passes without the ball leaving play. Reset if one goes wrong.", avoid: "Don't count sloppy passes. A pass your partner has to stretch for doesn't count." },

  "Left Foot — Shot": [

    { name: "Left Foot Low Shot", how: "From 12 yards, hit left-foot driven shots at the bottom corners. Low shots require leaning forward over the ball. 10 attempts bottom-left, 10 bottom-right.", avoid: "Don't try to scoop it low artificially. Lean your body over the ball and follow through." },

    { name: "Left Foot Penalty Practice", how: "Penalty spot, left foot only. 20 attempts. Aim for different corners. A left-foot penalty can be a match-winner.", avoid: "Don't always aim for the same corner. Vary your left-foot penalty targets." },
    { name: "Left Foot After Dribble", how: "Dribble 10 yards and finish with your left foot. The dribble into left-foot finish — you've beaten a defender, now finish with the left.", avoid: "Don't adjust your final touch to set up a right-foot shot. Leave the ball on the left side for the finish." },

    { name: "Left Foot Weekly Progress Test", how: "Every Sunday: 20 left-foot shots from 15 yards. Count on target. Log it. Your weekly target-percentage should trend upward.", avoid: "Don't inflate your count with easy tap-ins. All 20 from 15 yards, driven, at a proper goal. Honest measurement." },

    { name: "Left Foot Shooting Habit", how: "During every shooting session, end with 10 left-foot shots. Non-negotiable. These 10 end-of-session shots add up to hundreds per month.", avoid: "Don't skip the 10 because the session ran long. These are the most important 10 shots." },

    { name: "Free Kick Routine Development", how: "Decide your exact routine: how many steps back, what angle, how many steps in the run-up, which foot. Write it down. Execute it identically every single rep. Consistency of approach produces consistent free kicks.", avoid: "Don't change your routine every session. A free kick routine only becomes reliable through hundreds of reps with exactly the same approach. Change it only deliberately, not randomly." },

    { name: "Over and Under the Wall", how: "Practice two types: a curler that goes over the top of the wall AND a low driven free kick that goes under/around the wall (when the wall jumps). Both from the same position.", avoid: "Don't limit yourself to one type. Defenders and goalkeepers study patterns. A free kick taker who mixes height and trajectory is much harder to prepare for." },
    { name: "Free Kick Accuracy Log", how: "20 free kick attempts per session from the same position. Log: on target, off target, hit the wall. Track over months. Your on-target percentage should rise consistently.", avoid: "Don't count near-post shots that dribble wide as 'close.' On target means on target — within the frame. Be honest with your counting." },
    { name: "Right and Left Foot Curlers", how: "5 sessions dedicated specifically to left-foot free kick curlers. Left-foot free kicks curve in the opposite direction — a completely different threat to any goalkeeper.", avoid: "Don't skip left foot free kick work. Most players never practice it. A left-foot free kick from the right side of the box creates a near-post curl that very few keepers face regularly." },
    { name: "Free Kick in Wind", how: "Practice specifically on windy days. Crosswind amplifies or cancels curl. Into wind kills distance. With wind adds pace. Learn to adjust your trajectory and contact for each wind condition.", avoid: "Don't treat every free kick the same in different conditions. The adjustment for wind conditions is a trainable skill that most players ignore entirely." },

    { name: "Free Kick Mental Routine", how: "Before every free kick attempt in training: take 2 breaths, visualize the ball's path to the corner you've chosen, commit fully, execute. The mental routine is as important as the technical one.", avoid: "Don't rush to kick. Free kick takers who rush under pressure are less accurate. The 10 seconds you take to set up and visualize is the most important part of the free kick." },

    { name: "Partner Goalkeeper Practice", how: "A partner stands in goal for all free kick reps. Real goalkeeper feedback — where they are struggling, which corner they're weaker on, what height beats them. Adjust your targeting based on actual keeper positioning.", avoid: "Don't ignore keeper positioning when practicing with a partner in goal. The goal is to score, not just hit the frame. Hit the corners the keeper is covering least." },
    { name: "Free Kick Consistency Block", how: "10 consecutive free kicks. Count how many are on target and from the target zone. Target: 7/10. When you consistently hit 7/10, you're ready to consider yourself a reliable set-piece taker.", avoid: "Don't celebrate individual great free kicks. Consistency over 10 reps is the real measure. One great free kick means nothing if 6 others miss the frame." },
    { name: "Short Free Kick Combination", how: "Practice the short free kick option: pass to a teammate instead of shooting directly. The threat of the direct free kick creates space for a perfectly weighted pass to an arriving player.", avoid: "Don't only practice the direct shot. If the opposition walls get organized and close the shooting angle, the short option must be available. Practice both." },

  "Corner Kick — Inswing / Outswing": [
    { name: "Inswing Corner Mechanics", how: "From the corner flag, right foot corner. Strike the inside of the ball with the inside of your right foot — the ball curves toward goal (inswing). Aim for the 6-yard box. 15 reps.", avoid: "Don't aim it straight at the goalkeeper. The inswing should curve away from the keeper's direct path. Aim for the front post corridor and let it swing in." },
    { name: "Outswing Corner", how: "From the right, use the outside of your right foot (or inside of left foot) — the ball curves away from goal (outswing). Targeted to the far post for a late-arriving runner.", avoid: "Don't outswing it behind the goal. The ball must stay inside the far post. An outswinger that goes behind the goal is a wasted corner." },
    { name: "Near Post Corner", how: "Corner aimed specifically at the near post area — a flick-on opportunity. The ball must arrive at near post height (6–7 feet) for a header to redirect it across goal.", avoid: "Don't aim the near post corner too high. If it's above 8 feet, a near post header can't redirect it downward toward goal. Flat, driven corner at near post height." },
    { name: "Far Post Corner", how: "Corner aimed at the back of the 6-yard box — far post area. Height must be enough to clear the first defender but arrive before the far post runner over-runs it.", avoid: "Don't under-hit the far post corner. It needs to carry the full width of the box. A corner that dies at the penalty spot is easy to defend." },
    { name: "Driven Low Corner", how: "Drive the corner ball low and fast along the ground toward the 6-yard box. Extremely hard to defend — neither keepers nor defenders have time to react. Must be kept below 2 feet height.", avoid: "Don't drive it directly at a defender. The low corner must be aimed at a gap between defenders and the keeper. A defender in direct line will simply clear it." },
    { name: "Penalty Spot Corner", how: "Aim specifically for a ball that drops dead on the penalty spot — this is the prime heading and shooting zone. The ball must have the trajectory to arrive there at heading height.", avoid: "Don't aim for the penalty spot and send it to the near post. Specific targeting needs specific technique. Adjust your contact point and height until you're consistently finding the spot." },
    { name: "Corner Kick Variety Session", how: "In one corner kick session: inswing near post, inswing far post, outswing, low driven, penalty spot. 3 of each in rotation. Forces you to execute different delivery types without setting into one pattern.", avoid: "Don't always practice one corner type. Opposition teams analyze patterns. Variety in training builds the full corner kick repertoire." },
    { name: "Corner With Runners", how: "Set partner runs before taking corners. They make specific runs (near post, far post, penalty spot) and you deliver to their run. Corner timing is only possible when you know where the runner is going.", avoid: "Don't cross into a general area hoping a runner appears. Corner kicks with specific runners require real pre-kick communication. Corner taker and runners must have a clear signal system." },
    { name: "Short Corner", how: "Pass short to a partner, receive back, and cross from a wider position. The short corner creates a different angle and can exploit a defense that commits to blocking a cross.", avoid: "Don't use the short corner as a default when under pressure. It requires a well-timed run from the receiving player. Half-committed short corners get intercepted." },
    { name: "Corner Kick Accuracy Log", how: "15 corners per session, 5 of each type. Log which zone each lands in. Over weeks, your zonal accuracy improves. Tracking makes the improvement visible.", avoid: "Don't just kick corners without logging. The data shows whether you're actually improving or just practicing the same misses repeatedly." },
    { name: "Left Foot Corner Practice", how: "Equal reps from both corners. Right-footed corners from the left create natural inswing. Left-footed corners from the left create outswing. Practice both configurations with both feet.", avoid: "Don't avoid the less natural combination. A player who can take effective corners from both sides with either foot is a premium set piece option." },
    { name: "Corner Kick Role Play", how: "Set up the full scenario: 6 players in the box (4 attack, 2 defense), corner taker, goalkeeper. Take corners at full competition intensity. Corner kicks in training should occasionally be practiced at game realism.", avoid: "Don't practice corners only in empty-net solo reps. The presence of bodies in the box completely changes the delivery requirements. Practice with bodies in the box." },
  ],

  "Penalty": [
    { name: "Penalty Routine Development", how: "Decide your routine: where you place the ball, how many steps back, which direction you step, what your run-up looks like. Commit to it completely. Practice the routine 20 times without varying a single element.", avoid: "Don't change your penalty routine because one miss. Every penalty taker misses occasionally. The routine becomes reliable through hundreds of identical reps. Change it only as a deliberate decision, not a reaction." },
    { name: "Penalty to All Corners", how: "5 penalties to each corner: top-left, top-right, bottom-left, bottom-right. 20 total. You must be able to score in all 4 corners. Most players are heavily biased to 1–2 corners. Find and fix the weak corners.", avoid: "Don't only practice your favorite corner. Goalkeepers study penalty records. A player who always shoots bottom-right is easy to save against. Full corner range is essential." },
    { name: "Penalty Under Pressure", how: "A partner watches closely from 3 yards — staring at you. Take 10 penalties with eyes on you. Social pressure significantly affects technique. Train to execute your routine despite being watched.", avoid: "Don't ignore the psychological element. Most penalty misses are technical breakdowns caused by pressure. Practice with pressure to build pressure resilience." },
    { name: "Penalty Deciding Moment Drill", how: "Before each penalty attempt, decide in your head: corner, left or right. Commit fully. Step back. Execute. The deciding must happen before you start your run-up and never be changed mid-run.", avoid: "Don't change your mind mid-run-up. The most dangerous moment in a penalty is changing the target after you've started moving. Commit before you start." },
    { name: "Goalkeeper-Reading Penalty", how: "A partner stands in goal and moves early (before or during the run-up). You have a choice: go the chosen corner OR read their movement and go where they've moved away from. Practice both decisions.", avoid: "Don't always go the opposite way from where the keeper moves. Sometimes the keeper moves and dives back. Read their full movement, don't just react to the first step." },
    { name: "Penalty Power vs Placement", how: "5 penalties at maximum power (any corner), 5 penalties at lower pace but precision placement (specific zone). Track which approach gives you higher success. Most players score more with placement than power.", avoid: "Don't assume power is better. A well-placed low-pace penalty hits the corner every time. A powerful penalty that misses the corner hits the keeper or the post." },
    { name: "Penalty After Physical Exertion", how: "After a 400m sprint, take a penalty immediately. Heart rate high, legs heavy — exactly like a real match penalty shoot-out situation. The technical routine must survive the fatigue.", avoid: "Don't only practice penalties from fresh. Shoot-outs happen at the end of 120 minutes. Penalty technique must be reliable when exhausted." },
    { name: "Penalty Shoot-Out Simulation", how: "5 alternating penalties vs a partner as goalkeeper. First to 3 scored wins. Add: if you miss your first, what's your approach on the second? Mental resilience after a miss is a critical penalty skill.", avoid: "Don't avoid shoot-out simulations because they're uncomfortable. The discomfort of a shoot-out is specifically what you need to expose yourself to in training." },
    { name: "Penalty Technique Focus", how: "10 penalties purely focused on technique: ankle lock, plant foot beside the ball, head over the ball, strike through the center-lower part with laces, follow-through. Technique-only reps with no keeper.", avoid: "Don't practice penalties with a keeper until your technique is clean. A keeper distracts from technical development in early penalty practice." },
    { name: "Penalty Comfort Level Session", how: "30 penalties in one session. By rep 20, the penalty becomes routine — the tension of the single penalty fades. High-volume sessions build the mental familiarity that reduces penalty anxiety.", avoid: "Don't stop at 10 penalties per session and expect to feel comfortable. The comfort comes from volume. 30 in one session achieves more than 10 in 3 sessions." },
    { name: "Chip Penalty", how: "Practice the chipped penalty (Panenka) — chip the ball softly down the center as the goalkeeper dives to a side. This requires maximum confidence and is used only when you're certain the keeper will dive early.", avoid: "Don't attempt a Panenka without thousands of standard penalty reps first. The Panenka is the last resort of the highly confident penalty taker, not a beginner's shortcut." },
    { name: "Penalty Both Feet", how: "10 right foot penalties, 10 left foot penalties per session. Equal rep commitment. A player who can score penalties with both feet is unguardable.", avoid: "Don't use the dominant foot as a crutch. The week you dedicate to left-foot penalties will feel uncomfortable — that discomfort produces development." },
    { name: "Post-Miss Mental Reset", how: "After a missed penalty in training, pause, reset your stance, breathe, and take the next one with the same routine. The mental reset after a miss is a penalty skill. Practice it deliberately.", avoid: "Don't rush to take the next penalty after a miss in frustration. Rushing is how you miss again. The pause-and-reset is mandatory." },
    { name: "Goalkeeper Behavior Study", how: "Watch 10 penalty shoot-outs. Study how different goalkeepers behave: some dive early, some wait, some try to distract. Know which behaviors mean what. Goalkeeper reading is a learnable skill.", avoid: "Don't only study the kicker in penalty shoot-out film. Study the goalkeeper. Their pre-dive movement, their stance, their starting position — all readable." },
    { name: "Penalty Accuracy Streak", how: "How many consecutive penalties can you score? Count and track your streak. Missing at 8 in a row teaches you what happened differently on rep 9. Build the streak over months — get to 15 in a row.", avoid: "Don't count 'almost in' penalties. On the post, wide by an inch — missed. Be strict. A penalty streak of 15 where half were post-hits is not 15 in a row." },
  ],

  "Throw-In (Long)": [
    { name: "Throw-In Mechanics", how: "Both feet on the ground (both heels must stay down). Ball released from directly above and behind the head. Symmetrical arm swing. Practice the motion 20 times standing still. Rule-legal throw-in mechanics first.", avoid: "Don't lift either heel. A heel-lifted throw-in is a foul throw. If your heel lifts naturally on the throw, step back so the approach is shorter." },
    { name: "Distance Building", how: "Start with throws from 5 yards and build to maximum distance over the session. Note your maximum distance and track weekly. Distance in throw-ins is built through wrist snap and hip rotation, not just arm strength.", avoid: "Don't try for maximum distance on every throw. Build up through the session. Fatigued throw-in mechanics become foul throws." },
    { name: "Accuracy Throw-In", how: "Throw to a partner at 10, 20, and 30 yards. Each must land within 1 yard of their feet. Throw-in accuracy is as important as distance — a long throw that's uncontrollable is a wasted opportunity.", avoid: "Don't sacrifice accuracy for distance. A 30-yard throw to your partner's feet is far more useful than a 35-yard throw they have to chase." },
    { name: "Run-Up Long Throw", how: "Take a 3-step run-up and throw. The momentum of the run-up adds significant distance to the throw. Feet must both be on or behind the line when releasing.", avoid: "Don't let forward momentum carry your foot over the line. Run to the line, plant both feet behind it, throw. Any part of the foot over the line is a foul." },
    { name: "Long Throw Into Box", how: "From 35+ yards, throw directly into the penalty box. A long throw into the box is a dead-ball goal threat — it functions like a corner kick. Practice the distance to reach the box and the delivery height.", avoid: "Don't throw it flat into the box. A flat long throw at height 3 feet is easy for defenders to clear. Throw it with an arc that drops at the near post or far post area." },
    { name: "Flick-On Throw Practice", how: "Throw to a teammate at 20 yards whose job is to flick it on. The throw must arrive at their forehead height — not too low (can't head it) and not too high (too difficult to redirect).", avoid: "Don't throw at their chest expecting a flick-on. A chest height throw gets controlled, not flicked. Head height — just above the receiver's head — is the flick-on target." },
    { name: "Throw and Follow", how: "Throw the ball and immediately sprint into a position to receive the return ball. The throw is the start of an attacking movement — you're a player after throwing, not a spectator.", avoid: "Don't stand and watch after the throw. Throw and sprint into a useful position immediately. The throw is just the start of the attacking sequence." },
    { name: "Throw-In to Feet Under Pressure", how: "Throw to a partner with a simulated opponent beside them. The accuracy of the throw must put it exactly at their feet — not to where the opponent can intercept it.", avoid: "Don't throw to the general area of your teammate. To their feet means to their feet. A few yards off gives the defender the chance to intercept." },
    { name: "Wrist Snap Training", how: "Practice the throw with exaggerated wrist snap at the release point. The wrist snap at the end of the throwing motion is what generates distance. 30 reps focusing only on the snap.", avoid: "Don't just use arm strength. Shoulder-driven throws without wrist snap plateau at shorter distances. The wrist snap at release is the distance multiplier." },
    { name: "Throw-In Decision Making", how: "In a game scenario, decide: short throw to feet, medium throw to space, or long throw into box? The decision is based on defensive positioning. Practice reading the right throw for the situation.", avoid: "Don't always attempt the long throw just because you've trained it. Context determines the best throw. A short accurate throw to a free teammate beats a long throw into a crowded box." },
  ],
};

function BootScreen({ onDone }) {
  const [phase, setPhase] = useState(0); // 0=init 1=loading 2=done
  const [progress, setProgress] = useState(0);
  const [lines, setLines] = useState([]);

  const bootLines = [
    "// SOCCER HQ v2.0",
    "// INITIALIZING SYSTEMS...",
    "// LOADING TRAINING PROTOCOLS",
    "// SYNCING PERFORMANCE DATA",
    "// CALIBRATING SHOT ANALYSIS",
    "// SYSTEMS ONLINE",
  ];

  useEffect(() => {
    let lineIdx = 0;
    let prog = 0;

    const lineTimer = setInterval(() => {
      if (lineIdx < bootLines.length) {
        setLines(prev => [...prev, bootLines[lineIdx]]);
        lineIdx++;
      }
    }, 280);

    const progTimer = setInterval(() => {
      prog += Math.random() * 18 + 4;
      if (prog >= 100) {
        prog = 100;
        clearInterval(progTimer);
        setTimeout(() => {
          setPhase(2);
          setTimeout(onDone, 650);
        }, 300);
      }
      setProgress(Math.min(prog, 100));
    }, 120);

    setTimeout(() => setPhase(1), 100);

    return () => { clearInterval(lineTimer); clearInterval(progTimer); };
  }, []);

  return (
    <div className={"boot-screen" + (phase === 2 ? " fading" : "")}>
      <div className="boot-scanline"/>

      {/* Grid overlay */}
      <div style={{
        position:"absolute", inset:0, opacity:0.4,
        backgroundImage:"linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px)",
        backgroundSize:"40px 40px", pointerEvents:"none"
      }}/>

      {/* Logo */}
      <div style={{ position:"relative", zIndex:1, textAlign:"center", marginBottom:40 }}>
        <div style={{
          fontFamily:"var(--font-display)", fontSize:42, fontWeight:900,
          color:"var(--text)", letterSpacing:4, marginBottom:6,
          animation:"fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) both"
        }}>
          SOCCER <span style={{ color:"var(--cyan)" }}>HQ</span>
        </div>
        <div style={{
          fontFamily:"var(--font-mono)", fontSize:10, color:"rgba(0,229,255,0.4)",
          letterSpacing:3, animation:"fadeUp 0.5s 0.15s cubic-bezier(0.4,0,0.2,1) both"
        }}>
          PERFORMANCE SYSTEM
        </div>
      </div>

      {/* Terminal lines */}
      <div style={{
        position:"relative", zIndex:1,
        fontFamily:"var(--font-mono)", fontSize:11,
        color:"rgba(0,229,255,0.55)", lineHeight:1.9,
        width:280, marginBottom:32,
        minHeight:120,
      }}>
        {lines.map((line, i) => (
          <div key={i} style={{
            animation:"fadeUp 0.3s cubic-bezier(0.4,0,0.2,1) both",
            opacity: i < lines.length - 1 ? 0.4 : 1,
          }}>
            {line}{i === lines.length - 1 && (
              <span style={{ animation:"blink 0.8s step-end infinite", marginLeft:2 }}>_</span>
            )}
          </div>
        ))}
      </div>

      {/* Progress bar */}
      <div style={{ position:"relative", zIndex:1, width:280 }}>
        <div style={{
          height:2, background:"rgba(0,229,255,0.1)", borderRadius:99,
          overflow:"hidden", marginBottom:8
        }}>
          <div style={{
            height:"100%", width:`${progress}%`,
            background:"linear-gradient(90deg, var(--cyan), rgba(0,229,255,0.6))",
            borderRadius:99, transition:"width 0.1s linear",
            boxShadow:"0 0 8px rgba(0,229,255,0.5)"
          }}/>
        </div>
        <div style={{
          fontFamily:"var(--font-mono)", fontSize:9,
          color:"rgba(0,229,255,0.3)", letterSpacing:2,
          display:"flex", justifyContent:"space-between"
        }}>
          <span>LOADING</span>
          <span>{Math.round(progress)}%</span>
        </div>
      </div>
    </div>
  );
}

function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const inputStyle = { width: "100%", background: "var(--surface)", border: "1px solid var(--border)", padding: "12px 14px", color: "var(--text)", fontFamily: "'DM Mono', monospace", fontSize: 13, outline: "none", marginBottom: 12 };

  const handleSubmit = async () => {
    if (!username.trim() || !password.trim()) { setError("Fill in both fields."); return; }
    setLoading(true); setError("");
    const hash = await hashPassword(password);
    if (mode === "register") {
      const { error: err } = await sb.from("users").insert([{ username: username.trim().toLowerCase(), password_hash: hash }]);
      if (err) { setError(err.code === "23505" ? "Username already taken." : "Error creating account."); setLoading(false); return; }
      const { data } = await sb.from("users").select("id").eq("username", username.trim().toLowerCase()).single();
      await sb.from("goals").insert([
        { user_id: data.id, text: "Win the TSA League", category: "short", done: false },
        { user_id: data.id, text: "Comfortable with both feet", category: "short", done: false },
        { user_id: data.id, text: "Play in a semi-pro league", category: "medium", done: false },
        { user_id: data.id, text: "Become the most dangerous midfielder in every game I play", category: "long", done: false },
      ]);
      await sb.from("juggling_record").insert([{ user_id: data.id, record: 0 }]);
      onLogin(data.id, username.trim().toLowerCase());
    } else {
      const { data, error: err } = await sb.from("users").select("id, password_hash").eq("username", username.trim().toLowerCase()).single();
      if (err || !data) { setError("Username not found."); setLoading(false); return; }
      if (data.password_hash !== hash) { setError("Wrong password."); setLoading(false); return; }
      onLogin(data.id, username.trim().toLowerCase());
    }
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ width: "100%", maxWidth: 360 }}>
        <div style={{ marginBottom: 40, textAlign: "center" }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>⚽</div>
          <div style={{ fontSize: 10, letterSpacing: 0.5, color: "var(--text3)", marginBottom: 6 }}>PERSONAL HQ</div>
          <div style={{ fontSize: 28, fontWeight: 900, color: "var(--text)" }}>SOCCER <span style={{ color: "var(--cyan)" }}>HQ</span></div>
          <div style={{ fontSize: 11, color: "var(--text3)", marginTop: 8 }}>The flame is lit. Guard it.</div>
        </div>
        <div style={{ display: "flex", marginBottom: 24, borderBottom: "1px solid var(--border)" }}>
          {["login", "register"].map(m => (
            <button key={m} onClick={() => { setMode(m); setError(""); }} style={{ flex: 1, padding: "10px", background: "transparent", border: "none", borderBottom: mode === m ? "2px solid #33EEFF" : "2px solid transparent", color: mode === m ? "var(--cyan)" : "var(--text3)", cursor: "pointer", fontSize: 10, letterSpacing: 0.3, fontFamily: "'DM Mono', monospace", textTransform: "uppercase", marginBottom: -1 }}>{m}</button>
          ))}
        </div>
        <input placeholder="Username" value={username} onChange={e => setUsername(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()} style={inputStyle} />
        <input placeholder="Password" type="password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && handleSubmit()} style={inputStyle} />
        {error && <div style={{ fontSize: 11, color: "var(--red)", marginBottom: 12 }}>{error}</div>}
        <button onClick={handleSubmit} disabled={loading} style={{ width: "100%", background: loading ? "var(--surface)" : "var(--cyan)", color: loading ? "var(--text3)" : "#000", border: "none", padding: "12px", fontSize: 11, letterSpacing: 0.3, cursor: loading ? "default" : "pointer", fontFamily: "'DM Mono', monospace" }}>
          {loading ? "..." : mode === "login" ? "ENTER" : "CREATE ACCOUNT"}
        </button>
      </div>
    </div>
  );
}

function RingChart({ value, max, size, color, label, sublabel, onClick }) {
  const r = (size - 10) / 2;
  const circ = 2 * Math.PI * r;
  const pct = max > 0 ? Math.min(value / max, 1) : 0;
  const [animPct, setAnimPct] = useState(0);

  useEffect(() => {
    const t = setTimeout(() => setAnimPct(pct), 80);
    return () => clearTimeout(t);
  }, [pct]);

  const dash = animPct * circ;

  return (
    <div onClick={onClick} style={{ display: "flex", flexDirection: "column", alignItems: "center", cursor: onClick ? "pointer" : "default" }}>
      <div style={{ position: "relative", width: size, height: size, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ position: "absolute", top: 0, left: 0, transform: "rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surface3)" strokeWidth="7"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="7"
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{ transition: "stroke-dasharray 1.2s cubic-bezier(0.4,0,0.2,1)", filter: `drop-shadow(0 0 10px ${color}88)` }}/>
        </svg>
        <div style={{ position: "relative", textAlign: "center", zIndex: 1 }}>
          <div style={{ fontFamily: "var(--font-display)", fontSize: size > 100 ? 17 : 14, fontWeight: 800, color, lineHeight: 1,
            animation: "numFlicker 0.6s ease both", animationDelay: "0.3s" }}>{label}</div>
          {sublabel && <div style={{ fontSize: 9, color: "var(--text3)", marginTop: 3, fontWeight: 500 }}>{sublabel}</div>}
        </div>
      </div>
      {onClick && <div style={{ fontSize: 9, color: "var(--text3)", marginTop: 4, letterSpacing: 1, fontWeight: 600 }}>TAP</div>}
    </div>
  );
}

function RadarChart({ categories, size }) {
  const cx = size / 2, cy = size / 2;
  const r = size * 0.36;
  const n = categories.length;
  const angles = categories.map((_, i) => (i / n) * 2 * Math.PI - Math.PI / 2);
  const getPoint = (angle, radius) => ({ x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) });
  const dataPoints = categories.map((cat, i) => getPoint(angles[i], (cat.value / 6) * r));
  const dataPath = dataPoints.map((p, i) => `${i === 0 ? "M" : "L"} ${p.x} ${p.y}`).join(" ") + " Z";
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>
        <radialGradient id="rf" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="var(--cyan)" stopOpacity="0.25"/>
          <stop offset="100%" stopColor="var(--cyan)" stopOpacity="0.03"/>
        </radialGradient>
      </defs>
      {[1,2,3,4,5,6].map(level => {
        const pts = angles.map(a => getPoint(a, (level/6)*r));
        const path = pts.map((p,i) => `${i===0?"M":"L"} ${p.x} ${p.y}`).join(" ") + " Z";
        return <path key={level} d={path} fill="none" stroke="var(--border)" strokeWidth="1"/>;
      })}
      {angles.map((angle, i) => { const outer = getPoint(angle, r); return <line key={i} x1={cx} y1={cy} x2={outer.x} y2={outer.y} stroke="var(--border)" strokeWidth="1"/>; })}
      <path d={dataPath} fill="url(#rf)" stroke="var(--cyan)" strokeWidth="2" style={{ filter: "drop-shadow(0 0 6px rgba(0,229,255,0.4))" }}/>
      {dataPoints.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3.5" fill="var(--cyan)" style={{ filter: "drop-shadow(0 0 4px var(--cyan))" }}/>)}
      {categories.map((cat, i) => {
        const labelPt = getPoint(angles[i], r * 1.25);
        return <text key={i} x={labelPt.x} y={labelPt.y} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill="var(--text2)" fontFamily="var(--font-body)" fontWeight="600">{cat.label.toUpperCase()}</text>;
      })}
    </svg>
  );
}

function Dashboard({ userId, setPage }) {
  const [stats, setStats] = useState({ sessions: 0, juggling: 0, goals: "0/0", weakFoot: 0 });
  const [recentLog, setRecentLog] = useState(null);
  const [skillAvg, setSkillAvg] = useState(0);
  const [categoryAvgs, setCategoryAvgs] = useState([]);
  const [shootingStats, setShootingStats] = useState({ right: 0, rightTotal: 0, left: 0, leftTotal: 0 });
  const [showRadar, setShowRadar] = useState(false);

  useEffect(() => {
    async function load() {
      const [logs, goals, weakFoot, jugRec, skillData, shotData, recent] = await Promise.all([
        cached(`logs_${userId}`, () => sb.from("progress_logs").select("id").eq("user_id", userId)),
        cached(`goals_${userId}`, () => sb.from("goals").select("done").eq("user_id", userId)),
        cached(`weakfoot_${userId}`, () => sb.from("weak_foot_log").select("id").eq("user_id", userId)),
        cached(`jugrec_${userId}`, () => sb.from("juggling_record").select("record").eq("user_id", userId).single()),
        cached(`skills_${userId}`, () => sb.from("skills").select("*").eq("user_id", userId)),
        cached(`shots_${userId}`, () => sb.from("shot_logs").select("*").eq("user_id", userId)),
        cached(`recent_log_${userId}`, () => sb.from("progress_logs").select("*").eq("user_id", userId).order("created_at", { ascending: false }).limit(1).single()),
      ]);
      const done = (goals.data||[]).filter(g=>g.done).length;
      setStats({ sessions:(logs.data||[]).length, juggling:jugRec.data?.record||0, goals:`${done}/${(goals.data||[]).length}`, weakFoot:(weakFoot.data||[]).length });
      if (recent.data) setRecentLog(recent.data);
      const skillMap = {};
      (skillData.data||[]).forEach(s => { if (s.rating>0) skillMap[s.skill_name]=s.rating; });
      const catAvgs = Object.entries(SKILL_CATEGORIES).map(([id,{label,skills}]) => {
        const rated = skills.filter(s=>skillMap[s]).map(s=>skillMap[s]);
        return { id, label:label.split(" ")[0], value:rated.length>0?rated.reduce((a,b)=>a+b,0)/rated.length:0 };
      });
      setCategoryAvgs(catAvgs);
      const allRated = Object.values(skillMap);
      setSkillAvg(allRated.length>0?allRated.reduce((a,b)=>a+b,0)/allRated.length:0);
      const shots = shotData.data||[];
      const r = shots.filter(s=>s.foot==="Right"), l = shots.filter(s=>s.foot==="Left");
      const rm=r.reduce((a,s)=>a+s.makes,0),rt=r.reduce((a,s)=>a+s.total,0);
      const lm=l.reduce((a,s)=>a+s.makes,0),lt=l.reduce((a,s)=>a+s.total,0);
      setShootingStats({ right:rt>0?rm/rt:0,rightTotal:rt,left:lt>0?lm/lt:0,leftTotal:lt });
    }
    load();
  }, [userId]);

  const ringSize = 112;

  return (
    <div style={{ padding: "28px 28px 40px" }} className="page-padding anim-page">
      {/* Header */}
      <div style={{ marginBottom: 28 }}>
        <div className="page-eyebrow">Overview</div>
        <div className="page-title">Your <span>Dashboard</span></div>
      </div>

      {/* Rings */}
      <div className="anim-fade-up" style={{ display: "flex", gap: 20, marginBottom: 28, flexWrap: "wrap", alignItems: "flex-start" }}>
        {/* Skills ring */}
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
          <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text3)", letterSpacing: 2 }}>SKILLS</div>
          <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", width: ringSize, height: ringSize }}>
            <RingChart value={skillAvg} max={6} size={ringSize} color="var(--cyan)"
              label={skillAvg>0?`${Math.round((skillAvg/6)*100)}%`:"—"}
              sublabel={skillAvg>0?`${skillAvg.toFixed(1)}/6`:"no data"}
              onClick={() => setShowRadar(true)}/>
          </div>
        </div>
        {/* Shooting rings */}
        <div style={{ display: "flex", gap: 14 }}>
          {[
            { label: "RIGHT FOOT", value: shootingStats.right, total: shootingStats.rightTotal, color: "var(--cyan)" },
            { label: "LEFT FOOT", value: shootingStats.left, total: shootingStats.leftTotal, color: "var(--cyan)" },
          ].map(s => (
            <div key={s.label} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: "var(--text3)", letterSpacing: 2 }}>{s.label}</div>
              <div style={{ position: "relative", display: "flex", alignItems: "center", justifyContent: "center", width: 96, height: 96 }}>
                <RingChart value={s.value} max={1} size={96} color={s.color}
                  label={s.total>0?`${Math.round(s.value*100)}%`:"—"}
                  sublabel={s.total>0?`${s.total} shots`:"no data"}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Radar modal */}
      {showRadar && categoryAvgs.length > 0 && (
        <div onClick={() => setShowRadar(false)} style={{ position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"var(--surface)",border:"1px solid var(--border2)",borderRadius:20,padding:28,maxWidth:360,width:"100%" }}>
            <div style={{ fontFamily:"var(--font-display)",fontSize:18,fontWeight:800,marginBottom:4 }}>Skill Radar</div>
            <div style={{ fontSize:12,color:"var(--text3)",marginBottom:20 }}>Average rating by category</div>
            <RadarChart categories={categoryAvgs} size={280}/>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:20 }}>
              {categoryAvgs.map(cat => (
                <div key={cat.id} style={{ display:"flex",justifyContent:"space-between",padding:"8px 12px",background:"var(--surface2)",borderRadius:8 }}>
                  <span style={{ fontSize:11,color:"var(--text2)",fontWeight:500 }}>{cat.label}</span>
                  <span style={{ fontSize:11,color:"var(--cyan)",fontWeight:700 }}>{cat.value>0?cat.value.toFixed(1):"—"}</span>

            </div>
            <div style={{ fontSize:11,color:"var(--text3)",textAlign:"center",marginTop:16 }}>Tap outside to close</div>
          </div>
        </div>
      )}

      {/* Stat cards */}
      <div className="anim-fade-up delay-2 grid-stats" style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:24 }}>
        {[
          { label:"Sessions", value:stats.sessions, color:"var(--cyan)" },
          { label:"Juggling PB", value:stats.juggling, color:"var(--cyan)" },
          { label:"Goals", value:stats.goals, color:"var(--gold)" },
          { label:"Weak Foot", value:stats.weakFoot, color:"#B06EFF" },
        ].map((s,i) => (
          <div key={i} className="stat-card" style={{ borderTop:`2px solid ${s.color}` }}>
            <div className="stat-value" style={{ color:s.color }}>{s.value}</div>
            <div className="stat-label">{s.label}</div>
          </div>
        ))}
      </div>

      {/* Last session */}
      {recentLog && (
        <div className="card" style={{ padding:"16px",marginBottom:20 }}>
          <div style={{ fontSize:10,fontWeight:600,letterSpacing:2,color:"var(--text3)",marginBottom:10 }}>LAST SESSION</div>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
            <div>
              <div style={{ fontSize:14,fontWeight:600,color:"var(--text)",marginBottom:3 }}>{recentLog.type} · {recentLog.duration}</div>
              <div style={{ fontSize:12,color:"var(--text3)" }}>{recentLog.date}</div>
            </div>
            <div style={{ display:"flex",gap:4 }}>
              {[1,2,3,4,5].map(i => (
                <div key={i} style={{ width:7,height:7,borderRadius:"50%",background:i<=parseInt(recentLog.felt)?"var(--cyan)":"var(--surface3)" }}/>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Quick nav */}
      <div style={{ fontSize:10,fontWeight:600,letterSpacing:2,color:"var(--text3)",marginBottom:12 }}>QUICK NAV</div>
      <div className="anim-fade-up delay-4 quick-nav" style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8 }}>
        {navItems.filter(n=>n.id!=="dashboard").map(item => (
          <div key={item.id} onClick={() => setPage(item.id)} className="card" style={{ padding:"14px 10px",cursor:"pointer",textAlign:"center",transition:"all 0.15s" }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--green-border)"; e.currentTarget.style.background="var(--green-glow)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--border)"; e.currentTarget.style.background="var(--surface)"; }}>
            <div style={{ display:"flex",justifyContent:"center",marginBottom:6,opacity:0.7 }} dangerouslySetInnerHTML={{ __html: NAV_ICONS[item.icon] }}/>
            <div style={{ fontSize:10,fontWeight:600,color:"var(--text2)" }}>{item.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

            <div style={{
              padding:"10px 16px", borderBottom:"1px solid var(--border)",
              display:"flex", alignItems:"center", gap:8
            }}>
              <button onClick={() => goBack("sections")} style={{
                background:"none", border:"none", cursor:"pointer",
                color:"var(--text3)", padding:0, fontSize:13,
                display:"flex", alignItems:"center", gap:4, fontFamily:"var(--font-body)"
              }}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                  <polyline points="15 18 9 12 15 6"/>
                </svg>
                {chapter?.title}
              </button>
            </div>
            <ArticleBody />
          </div>
        )}
      </div>
    </div>
  );
}

function ProgressLog({ userId }) {
  const [logs, setLogs] = useState([]);
  const [jugglingRecord, setJugglingRecord] = useState(0);
  const [form, setForm] = useState({ date: new Date().toISOString().split("T")[0], type: "Field", duration: "", juggling: "", notes: "", felt: "3" });

    async function load() {
      const [logsRes, jrRes] = await Promise.all([
        sb.from("progress_logs").select("*").eq("user_id", userId).order("created_at", { ascending: false }),

      ]);
      setLogs(logsRes.data || []); setJugglingRecord(jrRes.data?.record || 0); setLoading(false);

        <button onClick={() => setAdding(!adding)} style={{ background: adding ? "var(--border)" : "var(--cyan)", color: adding ? "#666" : "#000", border: "none", padding: "10px 16px", fontSize: 11, letterSpacing: 0.2, cursor: "pointer", fontFamily: "'DM Mono', monospace" }}>{adding ? "CANCEL" : "+ LOG SESSION"}</button>
      </div>
      <div className="grid-3col" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
        {[{ label: "Total Sessions", value: logs.length, color: "var(--cyan)" }, { label: "Juggling Record", value: jugglingRecord + " touches", color: "var(--cyan)" }, { label: "This Week", value: thisWeek, color: "var(--gold)" }].map((s, i) => (
          <div key={i} style={{ padding: "16px", background: "var(--surface)", borderLeft: `3px solid ${s.color}` }}>
            <div style={{ fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 800, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 10, color: "var(--text3)", marginTop: 4, letterSpacing: 0.2 }}>{s.label.toUpperCase()}</div>
          </div>

      {adding && (
        <div style={{ background: "var(--surface)", border: "1px solid var(--border)", padding: "20px", marginBottom: 24 }}>
          <div className="form-3col" style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 12 }}>

          </div>

            <div><label style={{ fontSize: 10, letterSpacing: 0.3, color: "var(--text3)", marginBottom: 4, display: "block" }}>JUGGLING (touches)</label><input type="number" placeholder={`Record: ${jugglingRecord}`} value={form.juggling} onChange={e => setForm({ ...form, juggling: e.target.value })} style={inputStyle} /></div>

        </div>
      )}
      {loading && <div style={{ fontSize: 12, color: "var(--text3)", padding: "40px 0", textAlign: "center" }}>Loading...</div>}
      {logs.map(log => (
        <div key={log.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: "1px solid #0d0d0d" }}>

            {log.juggling && <div style={{ fontSize: 11, color: "var(--cyan)" }}>⚽ {log.juggling}</div>}
            {log.felt && <div style={{ fontSize: 11, color: "var(--text3)" }}>{"★".repeat(parseInt(log.felt))}</div>}
          </div>
          <span onClick={() => deleteLog(log.id)} style={{ fontSize: 10, color: "#222", cursor: "pointer", flexShrink: 0 }}>✕</span>
        </div>
      ))}
      {!loading && logs.length === 0 && <div style={{ fontSize: 12, color: "var(--text3)", padding: "40px 0", textAlign: "center" }}>No sessions logged yet.</div>}
    </div>
  );
}

function GoalsBoard({ userId }) {
  const [goals, setGoals] = useState([]);
  const [newGoal, setNewGoal] = useState("");
  const [newCat, setNewCat] = useState("short");
  const [loading, setLoading] = useState(true);
  useEffect(() => { sb.from("goals").select("*").eq("user_id", userId).order("created_at", { ascending: true }).then(({ data }) => { setGoals(data || []); setLoading(false); }); }, [userId]);
  const toggleGoal = async (id, done) => { await sb.from("goals").update({ done: !done }).eq("id", id); setGoals(goals.map(g => g.id === id ? { ...g, done: !done } : g)); };
  const addGoal = async () => {
    if (!newGoal.trim()) return;
    const { data } = await sb.from("goals").insert([{ user_id: userId, text: newGoal, category: newCat, done: false }]).select().single();
    if (data) { setGoals([...goals, data]); setNewGoal(""); }
  };
  const deleteGoal = async (id) => { await sb.from("goals").delete().eq("id", id); setGoals(goals.filter(g => g.id !== id)); };
  const cats = [{ key: "short", label: "SHORT TERM", color: "var(--cyan)", desc: "Next 3 months" }, { key: "medium", label: "MEDIUM TERM", color: "var(--gold)", desc: "Next 1–2 years" }, { key: "long", label: "LONG TERM", color: "var(--red)", desc: "The vision" }];
  return (
    <div className="page-padding anim-page" style={{ padding: "32px" }}>
      <div style={{ fontSize: 10, letterSpacing: 0.5, color: "var(--text3)", marginBottom: 8 }}>WRITTEN DOWN. VISIBLE.</div>
      <div style={{ fontFamily: "var(--font-display)", fontSize: 24, fontWeight: 800, color: "var(--text)", marginBottom: 24 }}>GOALS <span style={{ color: "var(--cyan)" }}>BOARD</span></div>
      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        <input value={newGoal} onChange={e => setNewGoal(e.target.value)} onKeyDown={e => e.key === "Enter" && addGoal()} placeholder="Add a new goal..." style={{ flex: 1, background: "var(--surface)", border: "1px solid var(--border)", padding: "8px 12px", color: "var(--text2)", fontFamily: "'DM Mono', monospace", fontSize: 12, outline: "none" }} />
        <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{ background: "var(--surface)", border: "1px solid var(--border)", padding: "8px 12px", color: "var(--text2)", fontFamily: "'DM Mono', monospace", fontSize: 11, outline: "none", cursor: "pointer" }}>
          {cats.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
        </select>
        <button onClick={addGoal} style={{ background: "var(--cyan)", color: "#000", border: "none", padding: "8px 16px", fontSize: 11, letterSpacing: 0.2, cursor: "pointer", fontFamily: "'DM Mono', monospace" }}>ADD</button>
      </div>
      {loading && <div style={{ fontSize: 12, color: "var(--text3)", padding: "40px 0", textAlign: "center" }}>Loading...</div>}
      <div className="grid-goals" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16 }}>
        {cats.map(cat => (
          <div key={cat.key} style={{ background: "var(--bg)", border: `1px solid ${cat.color}22` }}>
            <div style={{ padding: "12px 16px", borderBottom: `1px solid ${cat.color}22` }}>
              <div style={{ fontSize: 10, letterSpacing: 0.3, color: cat.color }}>{cat.label}</div>
              <div style={{ fontSize: 10, color: "var(--text3)", marginTop: 2 }}>{cat.desc}</div>
            </div>
            <div style={{ padding: "8px" }}>
              {goals.filter(g => g.category === cat.key).map(goal => (
                <div key={goal.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 8px", borderBottom: "1px solid #0d0d0d" }}>
                  <div onClick={() => toggleGoal(goal.id, goal.done)} style={{ width: 14, height: 14, border: `1px solid ${goal.done ? cat.color : "var(--text3)"}`, background: goal.done ? cat.color : "transparent", cursor: "pointer", flexShrink: 0 }} />
                  <div style={{ fontSize: 12, color: goal.done ? "var(--text3)" : "var(--text2)", textDecoration: goal.done ? "line-through" : "none", flex: 1 }}>{goal.text}</div>
                  <span onClick={() => deleteGoal(goal.id)} style={{ fontSize: 10, color: "#222", cursor: "pointer" }}>✕</span>
                </div>
              ))}
              {goals.filter(g => g.category === cat.key).length === 0 && <div style={{ fontSize: 11, color: "#222", padding: "12px 8px" }}>No goals set yet.</div>}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}
