    { name: "Force to Weak Foot Drill", how: "A right-footed dribbler approaches. Your job is to stand so they can only go to their left foot — show right, block left. Guide them onto their weaker side. Then practice actually forcing a weak-foot shot or pass.", avoid: "Don't just show the side — you have to maintain that pressure the entire 1v1. If they turn back to their strong foot, you've been beaten positionally." },
    { name: "Tackle From Behind (Angles)", how: "Practice legal recovery tackles from a trailing position — angled so you reach the ball from the side, not directly behind. Simulate a sprint recovery and arrive at the ball at an angle to poke it away cleanly.", avoid: "Don't dive into the back of the player. Approach from the side. A recovery tackle should reach the ball — not the player. Timing and angle, not brute force." },
    { name: "1v1 to Shooting Position", how: "1v1 starting 20 yards from goal. Attacker wins = they shoot. Defender wins = they clear. Competition adds intensity. End of every defensive training should include competitive 1v1 scenarios.", avoid: "Don't be passive in competition drills. Real competitive intensity makes training transfer to games. If you're training to 'not embarrass yourself,' you're not training to improve." },
    { name: "Defending Wide Players", how: "Practice defending wide against a winger type — they want to cut inside or go past you on the outside. Force them toward the corner (outside), cut off the inside. Lateral defending footwork.", avoid: "Don't back up endlessly toward goal. The further you retreat, the more space the winger has to move into. Press, delay, and force the direction." },
    { name: "1v1 No Pressure", how: "Partner slowly dribbles. You focus entirely on your stance: sideways, low, weight on toes. No actual defending — just maintaining perfect stance while they slowly move. Isolates the positional skill.", avoid: "Don't use the slow pace as an excuse to stand upright. The stance training is the point — be as strict about it in this drill as in a fast 1v1." },
    { name: "Defending Against Speed", how: "Partner sprints at you with the ball. You must get your body between them and goal by backpedaling. Don't try to tackle a sprinting player — get goalside and let them run into you. Builds composure against pace.", avoid: "Don't dive in when a fast player runs at you. Pace players want you to commit so they can go around you. Backpedal, get goalside, and wait." },
    { name: "Ball-Watching vs Player-Tracking", how: "Partner passes to a third player and you must track the third player's run rather than watching the ball. Heads-up defensive awareness. You must track the runner without losing awareness of the ball.", avoid: "Don't ball-watch and forget the runner. In a 1v1 context, knowing where a runner is before they receive the ball is everything." },
    { name: "Defending in Transition", how: "Your team loses possession. Sprint 10 yards to get between the ball and goal. Arrive in defensive stance. Practice the moment of transition — from attack mindset to defensive sprint and shape.", avoid: "Don't jog into defensive position. Sprint. The first 3 seconds after losing the ball determines whether you recover position or not." },
    { name: "1v1 Confidence Sessions", how: "10 straight 1v1 competitive drills vs a partner who tries different moves. Track your win rate. Track over weeks. Your 1v1 defending improves when you measure it. Aim for 60%+ win rate.", avoid: "Don't get frustrated by losses. Each time an attacker beats you, analyze why — was it your stance, your dive-in, or your positioning? Learn from every loss." },
    { name: "Shoulder-Check Defending", how: "Before a forward receives the ball, glance over your shoulder to check other threats. Practice this in a 3v2 scenario — you're defending against 3, work on constantly shoulder-checking without ball-watching.", avoid: "Don't be so focused on the ball-carrier that you lose awareness of what's around you. Elite defenders have a full mental map of their surroundings at all times." },
    { name: "Defensive Header from 1v1", how: "A cross comes into the box. You're 1v1 with a striker. Head it away. Positioning before the cross — step in front of the striker. Win the header with your forehead, direct it away from goal, not back into the middle.", avoid: "Don't let the striker get their run on you. Step in front of them early. A defender who waits for the cross before moving has already given the striker the advantage." },
    { name: "Pressure Defending at Pace", how: "Partner receives a pass at speed. You must sprint to meet them and slow them down. But you have 4 yards, not 10. The quick set of your defensive stance at pace is key — no time for a slow setup.", avoid: "Don't meet them with square shoulders while still decelerating. Be in defensive stance before contact — even if you only have 3 running steps to set yourself." },
    { name: "Tackle Safety Drill", how: "Practice slide tackles on the training field — specifically the technique of going to ground safely: lead leg extended, trailing leg bent, body leaning back. No opponent, just the technique. 10 reps per leg.", avoid: "Don't practice slide tackles with your full weight going into a player's legs in training. This is for technique refinement, not aggressive use." },
    { name: "Cover Shadow Positioning", how: "Stand in a defensive position that blocks a pass lane AND marks a player. The cover shadow — your body covers the passing lane into the attacker. Practice positioning yourself so the ball cannot be played to them.", avoid: "Don't stand directly behind the player. Stand slightly in front and to the ball-side — this blocks the pass while keeping you goalside." },
    { name: "1v1 Mental Reset Drill", how: "After being beaten in a 1v1, immediately sprint 10 yards and get in the next 1v1 defensive setup without pause. Trains your mental and physical recovery after losing possession.", avoid: "Don't sulk or slow down after being beaten. The best defenders have a zero-second recovery time — they're immediately focused on the next action." },
    { name: "Defensive Low-Block Stance Hold", how: "Hold your defensive stance for 30-second intervals without moving. Isometric hold of the low, wide, sideways defensive position. Builds the strength and balance to hold that stance under fatigue in games.", avoid: "Don't let your stance collapse as you fatigue. That's the point — hold it even when it's burning. Weak defensive stance under fatigue is when strikers get easy goals." },
    { name: "Ankle Mobility for Defending", how: "Practice lateral cuts from a defensive stance with quick direction changes at close range. The ankle mobility required for quick lateral defending is trainable. Cone plant and change, 5 yards, 10 reps per side.", avoid: "Don't make wide, looping direction changes. Defending requires tight, sharp cuts — not the wide turns of an attacker. The tighter the cut, the harder to beat." },
    { name: "1v1 No Arms Rule", how: "1v1 defending with your hands behind your back. No arm-using for balance or pushing. Forces pure footwork and positional defending. When you add your arms back, defending feels significantly easier.", avoid: "Don't cheat and use your arms. They go behind your back, and they stay there. The restriction is what makes this drill valuable." },
    { name: "Timed 1v1 Pressure", how: "1v1 drill. 30-second rounds. Track: how many times is the attacker beaten past you, how many tackles won, how many times you force a bad touch. Rate your performance per round.", avoid: "Don't just track wins. Track the specifics. Understanding whether you're being beaten by dribbles, forward passes, or bad tackles tells you exactly what to work on." },
  ],

  "Defending — Positioning": [
    { name: "Defensive Shape Walk-Through", how: "Without a ball, walk through defensive shape positions — compact lines, staying between ball and goal, correct distance from teammates. Understanding the shape conceptually before applying it athletically.", avoid: "Don't skip the walk-through. Many positioning errors happen because players haven't mentally mapped the right positions. Walk it first, run it second." },
    { name: "Cover and Balance Reps", how: "In a 3v2, practice the principles of cover (one defender in front, one covering behind) and balance (positioning relative to width of attack). Walk through 10 scenarios at slow pace.", avoid: "Don't stay flat across a line in a 2v2 or 3v2. Cover means staggered depth. The second defender provides the cover the first one needs to press." },
    { name: "Defensive Zonal Positioning", how: "Place yourself in a zonal defensive shape without a ball. Partner moves to different areas of the pitch — you reposition appropriately relative to the ball. The triangle: ball, goal, and opponent.", avoid: "Don't just watch the ball. Your positioning is relative to both the ball AND your opponent. If you only track the ball, runs in behind expose you every time." },
    { name: "Compactness Drill", how: "3 defenders, 3 cones representing attackers. As the ball (cone) moves, all 3 defenders shift together maintaining a compact 4-yard distance between each other. Lateral shift as a unit.", avoid: "Don't let gaps appear between defenders as you shift. Compactness is a group discipline — if one person is late, a gap opens. Move together, arrive together." },
    { name: "Press Trigger Reps", how: "Practice recognizing press triggers: a bad touch, a back-pass to feet, a GK in possession. When the trigger happens, sprint forward to press. When no trigger, hold shape. 15 scenarios per session.", avoid: "Don't press randomly. Pressing without a trigger is just chasing — it drains energy and creates spaces. The trigger must be specific and recognized before pressing." },
    { name: "Defensive Line Height", how: "With 2 partners, practice setting and holding a defensive line at the right height. When the ball is high up the pitch, push the line forward (offside trap). When it's in your half, drop deeper. Walk through both.", avoid: "Don't set the line and forget it. The line moves constantly with the ball position. A static line gets played behind easily." },
    { name: "Recovering into Shape", how: "Sprint 20 yards, then immediately find the correct defensive position relative to where a partner points (simulating where the ball is). Repeat 10 times from different sprint directions.", avoid: "Don't sprint and stop. Arrive in position already in motion. Stopping dead when recovering defensively means you're stationary when the next action happens." },
    { name: "Body Angle in Defensive Positions", how: "Practice positioning with the right body angle — half-turned so you can see both ball and runner simultaneously. Take different positions around a pitch, hold the stance, feel which way your body should face.", avoid: "Don't face the ball and ignore the space behind you, or face the space and ignore the ball. The half-turned position is literally designed for both. Practice holding it." },
    { name: "Defensive Transition Speed", how: "Stand in an attacking position. On 'go', sprint to a marked defensive position 20 yards away. Time it. Defensive transition — getting from high up the pitch to your defensive position — is one of the most important physical qualities.", avoid: "Don't jog to your defensive position. Sprint. In a game, the 3 seconds you take jogging back is when the counter-attack goal is scored." },
    { name: "Defensive Positioning in Rondo", how: "Play 4v2 rondo. The 2 defenders focus entirely on positioning — not winning the ball, just optimal defensive shape. Where to stand to cut off the most passing lanes? Game sense from inside the rondo.", avoid: "Don't just chase the ball in the rondo. Active, purposeful positioning. Try to cover two passing options simultaneously with your body angle." },
    { name: "Near Side/Far Side Awareness", how: "With a cross coming in, position yourself for the near-post threat AND be aware of the far-post runner. Repeatedly practice your positioning on crosses — neither too close to the near post nor forgetting the far.", avoid: "Don't pick near or far and ignore the other. The best positioning accounts for both. Read the cross angle and decide which threat is primary." },
    { name: "Defensive Covering Run", how: "Partner sprints in behind your line. Practice your covering run — diagonal backward sprint to get goalside of their run. Angle of sprint must get you between the ball and goal.", avoid: "Don't sprint straight backward — sprint diagonally. Going straight back leaves you on the wrong side of the runner. The diagonal gets you goalside faster." },
    { name: "Second Ball Defensive Position", how: "After a header or clearance, immediately set your defensive shape for the second ball. Where does it likely fall? Take the position that intercepts the second ball. Practice from different clearance scenarios.", avoid: "Don't stand and watch the ball in the air. Move to your second-ball position before it lands. Late reactions to second balls give attackers free chances." },
    { name: "Press Without Committing", how: "Approach a ball-carrier with pace but stop just outside their touch. Apply pressure without diving in. This 'press without committing' forces a bad touch or slows them without giving them an easy dribble.", avoid: "Don't sprint at them and then keep running past the ball. The press is about arrival close enough to force a decision — not sprinting through." },
    { name: "Defensive Positioning vs Crosses", how: "Partner simulates crossing positions. You position yourself appropriately in the box for each type of cross. Near-post cross = get to near post. Far post cross = track back. Driven cross = set centrally. Read and position.", avoid: "Don't pre-position for one type of cross. The cross position changes with the crosser's body angle. Read it late and move." },
    { name: "Defensive Pressure on Goalkeeper", how: "Practice pressuring the goalkeeper's distribution options — position yourself to cut off the throw or the kick to specific zones. Used in high defensive lines. Identify which distribution option you're cutting off.", avoid: "Don't press the goalkeeper and leave a huge gap behind you. High pressing requires everyone to step up together — individual high press while others are deep is catastrophic." },
    { name: "Defensive Mid-Block Practice", how: "In a 4-4 or 4-5 defensive shape, practice sitting in a mid-block. Drop below the ball, make the pitch compact, force the attackers to go wide. 10-minute walk-through of the mid-block positioning principles.", avoid: "Don't be passive in the mid-block. It's active positioning — always adjusting to cut off passing lanes, always tightening as the ball comes closer." },
    { name: "1v1 Defensive Positioning Drill", how: "Before the attacker receives the ball, position yourself correctly: goalside, facing the play, within touching distance but not so close they can spin you. The position before they receive determines the 1v1.", avoid: "Don't get too tight too early. If you're too tight before they receive, they spin you with one touch. Slightly behind them, goalside, is the ideal starting position." },
    { name: "Defensive Anticipation", how: "In a passing drill, before each pass is played, call out where the next pass will go. Train your predictive reading of the game. Over weeks, your anticipatory positioning improves.", avoid: "Don't guess randomly. Base your prediction on body angles, open spaces, and pressure on the current ball carrier. Educated prediction, not guessing." },
    { name: "Tracking a Runner (Non-Ball)", how: "In a 3v3 game, your job is to track one specific player and never let them receive the ball uncontested. You don't play the ball — only track. Focused on 1 person for the entire 5-minute game.", avoid: "Don't lose your runner because the ball is interesting. Your job is tracking one person. Ball events are noise — your job stays the same regardless." },
    { name: "Dropping Into Space Drill", how: "As a midfielder defending, practice dropping into the space between your defensive line and midfield when the opposition plays balls forward. The drop must be timed to cut off the ball before it reaches the striker.", avoid: "Don't drop so late the ball has already gone past. The drop must be before the ball is played — reading the trigger and moving preemptively." },
    { name: "Defensive Shape Under Pressure", how: "3 defenders, 4 attackers. Defensive shape must stay organized under numerical disadvantage. Practice holding compact shape, not chasing, and forcing play wide rather than through the center.", avoid: "Don't panic under numerical disadvantage and press individually. Hold shape. The goal is to make the attack uncomfortable and slow — not to win the ball immediately." },
    { name: "Communication Positioning", how: "In a defensive group, practice constant verbal communication — 'push up', 'drop', 'cover right', 'press'. Communication between defenders improves their collective positioning. Even if training alone, vocalize what you'd say.", avoid: "Don't defend in silence. Defensive communication is a trained habit, not just a personality trait. The loud defender who reads the game shapes the shape of the whole team." },
    { name: "Interception Positioning", how: "Practice positioning yourself just off your marker so you're in the passing lane. When the ball comes, step and intercept rather than letting it through. The shadow position — close enough to intercept, far enough to react.", avoid: "Don't step too early. A step for the interception that arrives too early leaves the attacker in space if you miss it. Wait for the pass to be played before stepping." },
    { name: "Defensive Midfield Block", how: "Practice the central midfielder's defensive role: block passing lanes centrally, press the near-side center back when they have the ball, drop back to protect the 6-space. Full defensive midfield movement pattern.", avoid: "Don't just defend when the ball is directly near you. As a defensive midfielder, every ball movement changes your position. Constant repositioning is the job." },
    { name: "High vs Low Press Decision", how: "Set two scenarios: high ball (GK in possession) = high press triggered. Ball in your half = low defensive shape. Practice reading which scenario applies and setting the appropriate shape.", avoid: "Don't apply the same pressure intensity regardless of ball position. Pressing when you shouldn't is exhausting and leaves gaps. Reading the right moment is 90% of defending." },
    { name: "Defensive Header Positioning", how: "On a cross, practice positioning yourself to win the defensive header: step in front of the attacker, take off from one foot (power header), direct it wide and high, away from danger.", avoid: "Don't position yourself behind the attacker before a cross. You'll always lose that header. The defensive header is won before the cross arrives — positioning is the key." },
    { name: "Full Back Defensive Positioning", how: "Even as a midfielder, understand fullback defending positions. Cut off the winger's inward run, stay goalside, show them toward the corner. Practicing full back positioning makes you understand what teammates need.", avoid: "Don't show the winger inside — that leads toward goal. The fullback channels wide, every time. Goal-side, force wide." },
    { name: "Defending Set Pieces", how: "Mark a specific player in a free kick or corner scenario. Practice your movement from defensive setup: start behind them, step with them on their run, win the first ball. 10 set piece defending reps.", avoid: "Don't ball-watch on set pieces and lose your runner. Your runner, not the ball, is your defensive priority on set pieces." },
    { name: "Defensive IQ Review", how: "After every session and game, review 2 defending moments — one you handled well, one you didn't. Brief mental review. Over time, this builds a library of defensive situations and correct responses.", avoid: "Don't only review mistakes. Reinforcing the good decisions builds confidence. Know what you did right and why — repeat those intentionally." },
  ],

  "Heading": [
    { name: "Stationary Heading", how: "Throw the ball to your own forehead and head it against a wall 3 yards away. Contact should be on the upper part of your forehead (the flat section), neck muscles engaged, eyes open through contact. 30 reps per set.", avoid: "Don't use the top of your head — that's the scalp. Contact on the forehead flat. Don't close your eyes before contact — eyes open so you see exactly where the ball goes." },
    { name: "Partner Throw and Head", how: "Partner throws from 5 yards, gently. Head it back accurately. Focus on attacking the ball — move toward it, meet it at the top of your jump rather than letting it drop to you.", avoid: "Don't wait for the ball to come to you. Powerful headers are made by attacking the ball. Players who wait for the ball to fall lose almost every header." },
    { name: "Defensive Header Distance", how: "Practice heading as far as possible — the defensive clear. Neck back, contact forehead, neck drives forward through the ball, head it upward and wide. Distance and height are both goals.", avoid: "Don't head it back into the box. A defensive header that goes straight down lands in front of attackers. Head it up, wide, and away from the danger zone." },
    { name: "Attacking Header Direction", how: "Partner crosses from different sides. Practice heading the ball down toward different corners of goal. Forehead contact, guide it down with a downward nod. The header should go down, not straight.", avoid: "Don't head the ball upward in front of goal — that gifts it to the goalkeeper. An attacking header goes down toward the corners." },
    { name: "Running Heading Drill", how: "Run from 10 yards to meet a crossed ball at the near post. The momentum of your run carries into the header — you're adding your running speed to the ball. Time the jump so you meet it at the peak of your run.", avoid: "Don't slow down before heading. Your running momentum is a power source. Decelerating before a header wastes that energy." },
    { name: "Corner Kick Header Practice", how: "Partner chips corner-style crosses. Position yourself on the 6-yard box edge. Attack the ball with a powerful downward header toward the near post corner. Classic corner-kick scoring header.", avoid: "Don't stay stationary waiting for the corner. Make a short run to generate momentum. A static near-post header is easily blocked; a running one has power." },
    { name: "Near Post Glancing Header", how: "Cross comes from the right. Glancing header with minimal power — flick the ball's direction by contacting its near side. The ball goes the other way from where it came. Near post delivery, far post target.", avoid: "Don't try to power a glancing header. The glance IS the technique. Contact the near edge of the ball and redirect it with a head turn. Power comes naturally." },
    { name: "Heading Under Defensive Pressure", how: "A partner stands behind you applying light pressure. Head a cross under that pressure — the distraction and contact from behind simulates a real game header duel.", avoid: "Don't collapse when there's contact from behind. Plant your feet wider, engage your core, and focus on the ball. Physical headers require physical stability." },
    { name: "Headed Clearance From Crosses", how: "Set up as a defender. Partner crosses repeatedly. Head every cross away — prioritize clearing the ball, not control. Height, width, and distance are the three criteria of a good defensive header.", avoid: "Don't head it vaguely away. Know where you're heading it — away from the center of the box, ideally to a teammate or at least to safety." },
    { name: "Jump Heading (Power)", how: "Practice jumping headers against a wall. Throw, jump, head at apex. Body coiled back in the air, then snap forward through contact to generate power. The snap of your upper body is where header power comes from.", avoid: "Don't just nod your head at the ball. The power comes from your whole upper body rotating forward. Core snap + forehead contact = power header." },
    { name: "Back Post Header", how: "Cross comes from the right. Position at far post. Head the ball back across goal (toward near post). The far post back-post header redirected across goal is extremely hard for goalkeepers to save.", avoid: "Don't head it straight back where it came from — that goes back to the crosser or wide. Direct it across goal." },
    { name: "Header Accuracy to Cones", how: "Place cones in different areas of goal. Partner feeds from the wing. Try to head the ball to specific cone targets. Accuracy-specific heading practice.", avoid: "Don't just head it generally toward goal. Pick a cone before the cross arrives and commit to that target. Precision training only works with specific targets." },
    { name: "Heading While Backpedaling", how: "Head a ball while moving backward — simulates a defensive header under backward pressure. Throw, step back, head. The backward momentum makes timing harder but trains realistic defensive situations.", avoid: "Don't stop your backward movement before heading. Stay in motion. The backward header at walking pace is much easier — build to faster movement." },
    { name: "Short Throw Headers", how: "Partner throws from 2 yards to simulate a tight in-game header. No run-up — head it from close range. Quick, precise neck-snap header. Used near goal in scramble situations.", avoid: "Don't back up to give yourself more room — 2 yards is the challenge. Close-range headers need to be accurate despite minimal preparation time." },
    { name: "Sustained Heading Endurance", how: "Head a ball continuously against a wall for 60 seconds without it touching the ground. Builds heading consistency and neck endurance.", avoid: "Don't let the ball drop below your chin between contacts — that's too low. Keep it at forehead height or slightly above throughout. Consistency, not just endurance." },
    { name: "First-Contact Heading Direction Change", how: "Ball thrown toward your forehead. Your first contact changes its direction by 90 degrees — a horizontal redirect. Requires precise contact on the side of the ball at an angle.", avoid: "Don't try to power the 90-degree redirect. Precision contact on the side of the ball does the work. Power just sends it wide." },
    { name: "Penalty Box Aerial Duel", how: "Two players go for the same header in a small area. Focus on reading the flight, jumping with one foot (stronger leg), and winning the ball cleanly. Real game aerial duels are constant in the box.", avoid: "Don't lead with your elbow. Elbow-first heading in training creates bad habits that get you booked in games. Jump, arms up for balance, forehead contact." },
    { name: "Goalkeeper Distribution Header", how: "Practice heading from goalkeeper long kicks (or partner kicks from distance). These fast, high balls require fast reaction and precise heading. Different mechanics than a gentle throw — the pace of the ball amplifies any error.", avoid: "Don't try to redirect fast goalkeeper kicks immediately. This is an advanced heading drill. Start with gentle tosses and work up to driven balls." },
    { name: "Heading to Feet of Teammate", how: "Head the ball precisely to a partner's feet — not a full clearance, but a controlled headed layoff. Used to bring the ball down to a teammate in transition.", avoid: "Don't over-power the headed layoff. This is a soft, directed header — touch the ball gently. It's the opposite of a defensive header." },
    { name: "Forehead Juggle", how: "Balance the ball on your forehead and juggle it as many times as possible without using hands. Builds balance, forehead feel, and neck awareness.", avoid: "Don't tilt your head back — keep it slightly forward at neutral. Tilting back unbalances the ball. Eyes forward." },
    { name: "Dive Header Practice", how: "Throw a ball slightly ahead of you and dive forward to head it along the ground. Front dive header. Practice on soft ground. Builds the courage and technique for low crossed headers near goal level.", avoid: "Don't practice dive headers on hard surfaces until technique is sound. Land on your forearms, not your face. Practice on grass or soft ground only." },
    { name: "Flick On Header", how: "A long ball comes from behind. Jump and flick it on with the top of your head to a runner ahead. Minimal contact — redirect the momentum forward. This assists a teammate making a run.", avoid: "Don't nod it down when flicking on. The flick on goes forward with pace. A nod-down kills the momentum; a flick maintains it." },
    { name: "Heading Confidence Sessions", how: "Specifically heading practice when you're avoiding it. If heading feels uncomfortable, that's exactly when to dedicate a session to it. Comfort comes from repetition.", avoid: "Don't avoid heading practice because it's uncomfortable. Discomfort is the signal to do more of it, not less." },
    { name: "Defensive Header to Safety Zone", how: "Designate a 'safety zone' outside the penalty box. All defensive headers must land in or past this zone. Forces genuine defensive heading quality.", avoid: "Don't count short headers as successful clearances. If it lands inside the zone, it's back under attack immediately in a real game. Enforce the standard." },
    { name: "Partner Feed — Varied Height", how: "Partner feeds balls at varied heights: below forehead, exact forehead, above head. You must adjust your jump and body to contact with your forehead regardless of the delivery height.", avoid: "Don't only practice ideal height feeds. Real crosses come at all heights. Adjust your jump — don't refuse to head a ball because the height isn't perfect." },
    { name: "Set Piece Header Runs", how: "Practice your run from different starting positions on a set piece. Short corner run, diagonal near-post run, pull-back far post run. 10 reps of each run. The heading itself is secondary — the run is the skill.", avoid: "Don't wait until the cross before moving. The run must start early — but not so early your momentum is gone when the ball arrives." },
    { name: "Back Heel Header Flick", how: "Ball thrown from behind at head height. Flick it backward with the back of your head — opposite to your momentum. A rare but brilliant skill in tight spaces.", avoid: "Don't try this before your basic heading is solid. This is an advanced skill. The contact is on the back-top of the head, not the forehead." },
    { name: "Headers in Fatigue", how: "After 3 sprint sets, head 10 consecutive balls from partner throws. Heading when fatigued loses precision and power — specifically training it maintains header quality through games.", avoid: "Don't lose your heading technique when tired. The neck engagement and forehead contact must stay the same. Fatigue is not an excuse for bad headers." },
    { name: "Accuracy Wall Heading", how: "Draw a target on a wall at 2 meters height. Head the ball at the target from 3 yards away. Builds precise forehead targeting.", avoid: "Don't head randomly at the wall. Pick the target and hit it. Accuracy practice without a specific target is just exercise." },
    { name: "Header Then Sprint", how: "Head a ball and immediately sprint 10 yards. Builds the habit of not watching the header after you've made it — play the header and immediately get back into the game.", avoid: "Don't stand and watch your header. In a game, the action continues immediately after your header. Sprint to the next position the moment contact is made." },
  ],

  "Crossing": [
    { name: "Standing Cross Both Feet", how: "From a stationary position on the wing, whip crosses into the box with both feet. 10 crosses right foot, 10 left. Focus on your runup, plant foot beside the ball, and strike through the back-lower quarter of the ball to create inswing.", avoid: "Don't chop across the ball for every cross. Feel the difference between driving through it versus wrapping your foot around it. Each generates a different trajectory." },
    { name: "Driven Low Cross", how: "From the byline, drive a low cross hard across the face of goal at knee height. The driven low cross is extremely hard for goalkeepers and defenders to deal with. 4 sets of 5.", avoid: "Don't play it soft. The driven low cross needs pace. A slow ground cross at the byline is easy for a goalkeeper to collect. Pace makes it dangerous." },
    { name: "Far Post Cross", how: "From the right wing, cross to the back post — far from where you're crossing. Aim for the area 6 yards from the far post. Requires more height and distance than a near-post cross.", avoid: "Don't always cross to the near post or center. Far post crosses give attackers a running start and a wider angle on goal." },
    { name: "Near Post Whip", how: "Whip an inswinging cross to the near post area. The ball should swing in and curve toward the near post corridor. Very difficult to defend and goalkeeper can't always claim it.", avoid: "Don't aim it straight at the goalkeeper. The near post cross should swing in from an angle — the swing is what makes it dangerous." },
    { name: "Cross After Dribble", how: "Dribble to the byline and cross from there. The cross after a dribble is harder — your body momentum is forward and you need to rotate into the cross. 4 sets of 5 each wing.", avoid: "Don't stop completely before crossing after a dribble. One adjustment touch and cross. A stopped winger loses the momentum that pressures defenders." },
    { name: "Early Cross", how: "Cross from 15 yards from the byline — before getting to the end line. The early cross catches defenders before they're in position. Different technique: more height to buy time for attackers to arrive.", avoid: "Don't cross early and low — an early cross needs height to give attackers time to reach it. Low and early is just an invitation for interception." },
    { name: "Outswing Cross (Cut-Back)", how: "From the right, swing a cross with the outside of your right foot — the ball curves away from goal. Used to find players at the back post making late runs. Cuts behind the defensive line.", avoid: "Don't try to outswing from too tight an angle. The outswinger needs space to curve. Too close to goal and it swings out of play." },
    { name: "Inswing Cross", how: "From the right, cross with the inside of your right foot (or the opposite wing with outside of right foot). The ball curves toward goal — a goalkeeper's nightmare.", avoid: "Don't over-spin the inswing — it turns into a near-post shot, not a cross. Enough swing to curve, but not so much it reaches the goalkeeper's hands." },
    { name: "Cut-Back Cross", how: "Get to the byline. Instead of crossing forward, drag the ball back across goal at a low angle to a midfielder arriving late. The cut-back bypasses defenders who have goal-lined and finds the onrushing player.", avoid: "Don't cut back too early — get to the byline first. A cut-back from 15 yards out is just a square pass. The byline position is what creates the angle." },
    { name: "Cross Under Pressure", how: "A partner closes you down from behind. Cross within 3 seconds before they arrive. Forces quick assessment of crossing position and committed delivery under pressure.", avoid: "Don't rush your plant foot position under pressure. Even with 2 seconds, a proper plant gives a clean cross. A panicked leg swing produces an uncontrolled ball." },
    { name: "First-Time Cross", how: "A pass is played into the channel. Cross it first time without taking a touch to settle. One-touch crosses surprise defenses. Requires precise judgment of incoming ball speed and trajectory.", avoid: "Don't cross first time off a pass that's behind you or too fast. Use your judgment — if the pass isn't crossable first time, take a touch. Quality over speed." },
    { name: "Cross to Specific Zones", how: "Divide the box into zones: near post, center, far post, penalty spot. Hit 5 crosses to each zone. Forces you to control where the ball goes rather than just hitting it into the box generally.", avoid: "Don't celebrate a cross that 'goes into the box' without landing in the target zone. That's insufficient. Be zone-specific." },
    { name: "Crossing Accuracy Countdown", how: "A partner makes a run from the back of the box. You must time the cross so it arrives as they're arriving at the near post. This is the real game cross — timed to a run.", avoid: "Don't cross when the ball is ready — cross when the run is ready. Ball and player arrive together. That timing is the real skill." },
    { name: "Cross Variety Session", how: "In one 15-minute session: near-post, far-post, driven, whipped, cutback, early cross. One of each in rotation. Forced variety prevents you from defaulting to one cross type.", avoid: "Don't always use the same cross. Defenders adapt to patterns. Real crossers can switch between types based on what the run and space demand." },
    { name: "Weak Foot Crossing", how: "Left foot only crossing session — 20 minutes. A winger or midfielder who can cross with both feet is far more dangerous and less predictable.", avoid: "Don't avoid weak foot crossing. It's uncomfortable — that's why it needs more work, not less. Equal minutes on both feet across a week." },
    { name: "High Delivery for Tall Striker", how: "Cross a high ball to a specific area — far post, above head height — for an imaginary tall striker. Float crosses for aerial threats require a different technique: more underneath contact, more height.", avoid: "Don't float crosses for aerial players with low pace — defenders win those easily. Even a floated cross needs pace to beat the first defender." },
    { name: "Low Cross at Pace for Runners", how: "Fast, low cross for runners at the near post who just need it played across. Firmness and pace are the requirements. It doesn't need to be perfectly placed — just fast and across the goal.",  avoid: "Don't cross it soft when pace is the requirement. A low cross for a runner needs enough pace to beat the goalkeeper if the runner misses it." },
    { name: "Cross After Overlapping Run", how: "Simulate a midfielder's overlapping run down the channel. Receive a pass, run to the byline, and cross. The overlap run adds momentum to the cross and changes the angle.", avoid: "Don't lose the momentum of the overlapping run before crossing. The whole point of an overlap is pace and unpredictability." },
    { name: "Cross Reaction (Variable Runs)", how: "3 partners make different runs: near, far, and penalty spot. Before you cross, you have 1 second to identify which run you're targeting. Then execute that specific cross.", avoid: "Don't cross vaguely hoping one of them gets it. Identify your target, commit, and deliver. Scattershot crosses waste every crossing run." },
    { name: "Crossing With Head Up", how: "Before every cross, hold the ball for 1 second and scan the box. See the runs. Then deliver. No scanning = crossing blind. This deliberate pause builds the habit of seeing before delivering.", avoid: "Don't cross with your head down. This one habit, more than any technical aspect, separates average crossers from great ones." },
    { name: "Cross from Wide Foul Position", how: "Take the crossing position from a foul scenario — 30 yards from goal, near the byline. Hit dead-ball crosses from this position. Develops your delivery from set-piece crossing positions.", avoid: "Don't treat set-piece crosses differently from open-play ones technically. The mechanics are the same — approach, plant, contact, follow-through." },
    { name: "Cross to Penalty Spot Finishing", how: "A specific drill: every cross should land at the penalty spot. A partner collects it and shoots. The penalty spot is the highest-percentage finishing position in the box — practice delivering there.", avoid: "Don't aim for the general box area. Penalty spot, specifically. The partner's finishing quality confirms your accuracy." },
    { name: "Outswing vs Inswing Contrast", how: "Hit 10 inswing crosses then 10 outswing crosses from the same position. Feel the difference in contact point (inside vs outside of foot) and trajectory. Contrast builds technical awareness.", avoid: "Don't let the outswing feel like an afterthought. Both are required. In a game, reading which type of cross the run needs is IQ — knowing how to execute both is technique." },
    { name: "Cross From Setback Position", how: "Ball played slightly behind you. Cross it without taking a forward touch. Forces you to adjust your body angle mid-approach to cross from a slightly back foot position. Common in games.", avoid: "Don't take a forward touch just to make the cross comfortable. Practicing the off-foot cross from behind builds realistic game-skill." },
    { name: "Crossing Into Box vs Past Goal Line", how: "Practice crosses that stay in play between the near post and far post. Work on your maximum width vs minimum width delivery. Don't cross too close to goal (GK collects) or too wide (rolls out).", avoid: "Don't ignore the byline as an out. A cross that rolls behind the far post has done nothing. Stay within the danger zone." },
    { name: "Cross Volume Session", how: "200 crosses in one session — 100 per foot. High volume builds muscle memory. Doesn't need to be precise — this is about touch fatigue, consistency, and feel.", avoid: "Don't count crosses that are technically wrong. 200 poor crosses builds poor crossing. Maintain technique throughout even as the volume accumulates." },
    { name: "Cross After Receiving a Long Ball", how: "Receive a long diagonal ball on the wing on your chest or foot. Control it and cross in 2 touches. Receive, set, cross. Simulates receiving a wide ball and immediately delivering.", avoid: "Don't take 3+ touches before crossing after receiving. 2 touches is the standard. Control and cross. Extra touches give defenders time to recover." },
    { name: "Cross Accountability (Target Partner)", how: "Partner stands in a specific crossing target position. After each cross, they give it a rating: 'Good', 'OK', or 'Poor'. Real-time feedback from a receiving partner is more valuable than self-assessment.", avoid: "Don't dismiss 'Poor' ratings. The receiver's perspective on a cross is the most honest evaluation. If they rate it poor, it was poor — regardless of how it felt." },
    { name: "Cross-Then-Sprint (Overlap Reality)", how: "Cross from the byline, then immediately sprint back into defensive position. Builds the full sequence of an overlapping run — the attack ends when you've crossed and you must immediately get back.", avoid: "Don't admire your cross. Sprint immediately after delivery. In a game, you're exposed if you stand and watch your own cross." },
    { name: "Game Crossing Scenarios", how: "Simulate real game crossing scenarios: wide player 1v1 with a defender, a late run arriving into the box, opposition goalkeeper off their line. Read the scenario and choose the correct cross type.", avoid: "Don't apply the same cross to every scenario. Adapt the type of cross to what the situation demands. Scenario reading before the cross is the highest skill in crossing." },
  ],

  "Pressing": [
    { name: "Sprint to Press Trigger", how: "A partner passes to a cone (representing a player receiving). When the pass is made, sprint immediately to press the cone — arrive within 3 seconds. Practice the explosive sprint that starts a press.", avoid: "Don't jog to press. A press that arrives late has missed its purpose. Explosive sprint from the press trigger to arrival at the player." },
    { name: "Press Angle Drill", how: "Practice pressing from the side rather than straight on. Approach at an angle that blocks one direction and shows the other. The angle determines where the press takes the player — don't press straight at them.", avoid: "Don't run directly at the ball carrier. A straight press is easily beaten — one simple step to either side. Press from an angle that forces a decision." },
    { name: "Pressure and Block Lane", how: "Press a partner while blocking the pass lane to their most dangerous teammate (a cone). Your press should close down AND cover. Combine pressure with lane blocking.", avoid: "Don't just sprint at the player without covering a passing lane. A press with no lane coverage just gets the ball played around you." },
    { name: "Press Off Interception", how: "After reading a pass and winning the ball, immediately press the next player. Interception into immediate press — chain the pressing actions. Two consecutive presses in a row.", avoid: "Don't stop after winning the ball. Momentum from winning the ball can immediately become pressure on the next player. Keep your momentum going." },
    { name: "Press Delay Then Tackle", how: "Press a ball carrier, delay for 2 seconds (jockey), then commit to the tackle only when they take an open touch. The press-to-tackle sequence: press close, jockey briefly, exploit the open touch.", avoid: "Don't dive in on arrival from the press. The arrive-and-immediately-tackle usually fails. Press, delay, wait for the open touch, then win it." },
    { name: "High Press Corner Trap", how: "Force the ball carrier toward the corner flag with your press angle. A partner covers the one back-pass option. The player is cornered — two press triggers combining.", avoid: "Don't try to corner-trap without a partner covering the escape route. A solo corner press that leaves an open pass lane just gets the ball played around you." },
    { name: "Pressing from Rondo", how: "In a 4v2 rondo, when you're one of the 2 in the middle — press aggressively when a pass goes to a specific player (the trigger you agree before). On the press, the other person covers the quick pass option.", avoid: "Don't press randomly in the rondo. Press on the trigger. Random pressing in a rondo is chasing, not pressing." },
    { name: "Fake Press", how: "Simulate a press — run hard at the ball carrier — then slow up just before arriving. The fake press forces the player into a panicked decision without you committing. If they play a bad ball, your partner wins it.", avoid: "Don't overuse fake presses. Once a ball carrier learns you're not committing, they take their time. Mix real presses with fake ones to keep them guessing." },
    { name: "Second Ball Press", how: "After a defensive clearance or headed ball, sprint to the second ball position ahead of the opposition midfielder. Winning the second ball with a press requires superior anticipation and sprint.", avoid: "Don't react after the clearance — anticipate where the second ball falls before the header happens. Take off early." },
    { name: "Press Then Recover", how: "Sprint to press, the ball is played away from your press. Sprint back to defensive position. The press-then-recover cycle is constant in high-press teams — the physical demand is enormous.", avoid: "Don't give up after an unsuccessful press. Recovering immediately to shape is non-negotiable. An unsuccessful press that leads to slow recovery creates the goal-scoring opportunity for the opponent." },
    { name: "Body Feint Press Direction", how: "As you press, use a shoulder feint to show one direction and force the ball carrier the other way. Your body position during the press is a tool for channeling — not just pressure.", avoid: "Don't press with square shoulders. Open one side, close the other. The way you approach forces the player's decision." },
    { name: "Pressing Fitness Reps", how: "10 consecutive pressing sprints: 15 yards each, 20-second recovery between. The physical demand of pressing in a game is underestimated. Build the specific fitness for pressing.", avoid: "Don't skip pressing fitness because it's hard. Teams that can maintain press intensity for 90 minutes dominate. It requires specific training, not just general fitness." },
    { name: "Group Press Movement", how: "With 2 partners, practice group pressing — when you press, they move to cut off the 2 nearest passing options. Walk through the positions before doing it at pace.", avoid: "Don't press individually in a group session. Tell your partners when you're pressing so they can adjust. Press communication makes the press effective." },
    { name: "Press the Pass Not the Player", how: "As an advanced technique — when a pass is made to a third player, press the passer immediately after they've released the ball. Presses the passer before they can support, not the receiver.", avoid: "Don't always press the receiver. Pressing the passer disrupts their ability to support the play forward. It's a higher IQ press that's often more effective." },
    { name: "Press Intensity Maintenance", how: "In a 20-minute training game, track whether your press intensity stays consistent. First 5 minutes (easy) vs last 5 minutes (hard). The mark of a quality presser is consistent intensity throughout.", avoid: "Don't accept declining press intensity as normal. If your press at 18 minutes is half the quality of minute 2, that's a fitness and mentality gap to work on." },
    { name: "Curved Press Approach", how: "Instead of running directly at the ball carrier, run a curved arc that takes away their best passing option and pushes them toward your covering teammate. The arc press is more sophisticated than a straight sprint.", avoid: "Don't turn the curved approach into a slow jog. Even a curved approach must be fast enough to apply genuine pressure. Speed with the right angle, not slow and smart." },
    { name: "Press on GK Distribution", how: "As soon as the goalkeeper picks up the ball or has a back-pass, sprint to press their distribution options. Pressing the GK's options forces them into a long ball — exactly what a high-press team wants.", avoid: "Don't press the goalkeeper directly unless you can win the ball. Pressing GK options restricts choices without exposing you to being beaten easily." },
    { name: "Press After Scoring", how: "After scoring in a training match, immediately press the restart. Intense pressing immediately after a goal — before the opponent resets — exploits their psychological low point.", avoid: "Don't celebrate so long you miss the restart. In a high-press game, the kickoff after a goal is a press opportunity." },
    { name: "Trigger Recognition Game", how: "In a passing game, call out 'press' whenever you see a press trigger in real time: a bad touch, a backwards pass, a player isolated. Training your eyes to see triggers before acting on them.", avoid: "Don't call triggers after the window has passed. The verbal call must happen as the trigger occurs, not 2 seconds later when the ball has already moved." },
    { name: "Press with the Ball vs Without", how: "Alternate between pressing the ball carrier and pressing a player making a run off the ball. Both are types of pressing. Pressing a runner before they receive stops the build-up before it starts.", avoid: "Don't only press the ball. Off-ball pressing — staying tight to a runner — is equally important and often more effective in restricting the opposition's build-up options." },
    { name: "Press Block (Low Block to Press Transition)", how: "Sit in a defensive low-block shape, then on a press trigger (specific signal), break from it and press with intensity. The transition from passive block to active press must be instant.", avoid: "Don't be passive in the low block and then slow to transition. The press trigger is the signal — it must be instant. Delayed transition loses the press window entirely." },
    { name: "Breathing Discipline in Press", how: "Practice controlled breathing during press repetitions — exhale on the sprint, breathe rhythmically, don't hold your breath. Oxygen management during pressing is a real physical factor in maintaining intensity.", avoid: "Don't hold your breath when sprinting in a press. It's a common, unconscious habit. Conscious breathing during pressing drills carries over to games." },
    { name: "Press Duration Drill", how: "How long can you sustain a press? Press a ball carrier and try to keep applying pressure for 15 consecutive seconds. They try to escape, you keep pressing. Tests press endurance.", avoid: "Don't give up after 5 seconds if the ball hasn't moved. Sustained pressing creates the situation for the turnover. Short-burst pressing only works against weak ball carriers." },
    { name: "Press Direction Call", how: "Partner calls 'left' or 'right' as you start your press. You must adjust your angle mid-sprint to approach from the called direction. Trains adaptable press angles.", avoid: "Don't ignore the call because you've already committed to a direction. Adjusting mid-press is a real-game necessity — a ball carrier moves, your angle must adapt." },
    { name: "Press Recovery Speed Test", how: "Sprint to press (10 yards), touch the cone (the 'ball carrier'), sprint back to starting position. How many reps in 60 seconds? Track it. This specific fitness — press-recover-press — is what most players lack.", avoid: "Don't slow the recovery sprint. Both the press and the recovery must be full effort. Half-effort recovery means the next press starts from the wrong position." },
    { name: "Pressing the Turn", how: "A player about to turn to face goal is one of the most important press moments. Practice pressing as they receive — arrive at them exactly as the ball arrives at their feet. They shouldn't have time to turn.", avoid: "Don't arrive late to the turn. You must be within touching distance when the pass is played to them. A press that arrives 2 seconds after the pass gives them time to turn." },
    { name: "Press With Offside Trap", how: "Combine pressing with an offside trap — your team presses the ball, teammates push the defensive line up simultaneously. The press and the line-step are coordinated. Practice the timing.", avoid: "Don't push the line independently of the press. The line only steps if the press is on — otherwise you're offside-trapping with no pressure on the ball, which fails instantly." },
    { name: "Full Game Press Evaluation", how: "After a full training match, review: how many press triggers did you spot correctly? How many presses did you execute at full intensity? How many second balls did you win through pressing?", avoid: "Don't review without specific criteria. 'I pressed well' is not an evaluation. Numbers and specific moments give you real information to work with." },
    { name: "Press the Wide Player Trap", how: "Trap a wide player between you and the sideline. Step toward them at an angle that cuts off the inside pass lane. The sideline is your second defender. Press them toward it.", avoid: "Don't press a wide player by running straight at them — they simply go inside. Your angle must close the inside option and force them to the line." },
    { name: "Press Communication Training", how: "In every pressing session, vocalize: call your press before you make it ('mine'), tell your partner which lane they should cover ('left'), confirm when you've won it ('got it'). Non-negotiable pressing communication.", avoid: "Don't press in silence. Silent pressing is individual pressing. Communicated pressing is team pressing — exponentially more effective." },
  ],
};
// DRILLS PART 2 — PHYSICAL (continued from where part 1 left off)
const DRILLS_PHYSICAL = {
  "Sprint Speed": [
    { name: "Flying 10s", how: "Take a 10-yard running start, then sprint flat out for 10 yards. Removes acceleration and isolates pure top-speed mechanics. 8 reps with full recovery between.", avoid: "Don't use this for acceleration training — it's for top speed. Full rest between reps so your nervous system is fresh each sprint." },
    { name: "40-Yard Dash", how: "Time a 40-yard dash weekly. Standing start. The 40-yard dash is your primary sprint benchmark. Track it and beat it.", avoid: "Don't test when fatigued. Sprint speed tests must be fresh — beginning of a session after thorough warm-up only." },
    { name: "Hill Sprints", how: "Sprint up a 5–10% incline for 20 yards, walk back down. 8 reps. Hill sprints build sprint power better than flat-ground sprints.", avoid: "Don't use hills so steep your mechanics change. 5–10% grade only — not a wall." },
    { name: "Resistance Sprint", how: "Partner lightly holds your hips for 20 yards of resistance sprinting. The resistance builds sprint-specific strength. 6 reps.", avoid: "Don't let your partner pull hard. Light resistance — enough to feel, not enough to alter your sprint mechanics." },
    { name: "Acceleration Sprint (0–10 yards)", how: "Focused 10-yard acceleration. Get to full speed as fast as possible. Forward lean, drive knees, push behind you.", avoid: "Don't stand upright in the first 2 steps. Forward lean and knee drive are everything in acceleration." },
    { name: "Sprint Arm Drive Drill", how: "Standing arm pumps — sprint arm mechanics at full speed, no legs. Drive elbows back sharply, hands relaxed, don't cross your midline. 30 seconds on.", avoid: "Don't let your hands cross your body. Arms pump forward-backward only. Crossing the midline slows you." },
    { name: "40-20-40 Sprint", how: "40-yard sprint, 20-yard walk, 40-yard sprint back. 5 sets. Simulates repeated sprint demands of a game.", avoid: "Don't jog the return leg. Both directions are sprints." },
    { name: "Sprint Endurance Repeats", how: "10 x 30 yards with 30-second rest. Maintain pace on every rep. Late reps build speed endurance.", avoid: "Don't jog the late reps. If you can't maintain pace, reduce reps. Quality sprints beat slow shuffles." },
    { name: "Sprint from Different Starts", how: "Sprint from standing, sitting, lying on your back, lying on your front. Game scenarios force sprints from any position.", avoid: "Don't start casually from any position. Every start must be explosive." },
    { name: "Backpedal to Sprint", how: "Backpedal 5 yards, explode into a 20-yard forward sprint. Mimics defensive recovery transitioning to a counter press.", avoid: "Don't let the backpedal be sloppy. Clean backpedal, then explosive forward drive." },
  ],

  "Explosive First Step": [
    { name: "5-Yard Burst", how: "From standing, explode 5 yards in one direction as fast as possible. Reset. 15 reps. The first 5 yards are when you beat a defender — they're the most important yards.", avoid: "Don't cheat with a walking start. Feet still, then explosive first movement. The start IS the drill." },
    { name: "Jump Squat", how: "Drop to parallel squat, explode upward to maximum height. 4 sets of 6. Builds explosive leg power directly transferable to first-step speed.", avoid: "Don't drop your chest forward. Stay upright in the torso. Power comes from the legs." },
    { name: "Broad Jump", how: "Standing broad jump — jump as far forward as possible, two feet. Land balanced. Measure distance and track weekly. Direct horizontal explosive power measure.", avoid: "Don't land on straight legs. Soft knees on landing." },
    { name: "Box Jump", how: "Jump onto a box (12–24 inches) from standing, both feet. Land softly, step down. 4 sets of 6.", avoid: "Don't jump down from the box — step. The training benefit is the jump up. Jumping down risks knee injury." },
    { name: "Lateral Explosive Step", how: "From standing, explosive lateral step right 3 yards, freeze. Back to center, explosive lateral step left 3 yards. The defensive direction change in its purest form.", avoid: "Don't step before pushing. Drive off your plant foot first, don't shuffle." },
    { name: "Reaction Start Drill", how: "Partner calls a direction. You explode that direction instantly. Random: left, right, forward, back. Reaction time from call to movement is the explosive first step under cognitive load.", avoid: "Don't anticipate. Stay neutral until the call." },
    { name: "Pogo Jumps", how: "Rapid two-foot hops on the spot — stiff ankles, minimal ground contact time. 30 seconds on. Trains ankle stiffness and reactive ground contact critical for explosive first step.", avoid: "Don't use soft, squishy ankle movement. Stiff ankles — the rebound comes from elastic energy." },
    { name: "Depth Jump", how: "Step off a 12-inch box, land, and immediately jump as high as possible. The reactive component trains explosive power from a stretch-shortening cycle.", avoid: "Don't jump off the box. Step off. Ground contact must be minimal — in and out instantly." },
    { name: "Kneeling Start", how: "One knee on the ground. Partner calls 'go'. Explode to your feet and sprint 10 yards. Non-standard start position builds explosive recovery speed.", avoid: "Don't lumber to your feet. The rise and sprint must be one explosive motion." },
    { name: "Lateral Bound", how: "Explosive lateral bound — push off one leg, land on the other as far as possible. 5 bounds one direction, then switch. Builds lateral explosive power.", avoid: "Don't take timid bounds. Maximum effort every bound." },
  ],

  "Stamina": [
    { name: "Fartlek Run", how: "25-minute run with spontaneous pace changes: sprint a telephone pole, jog 3, sprint 2, walk 1. Unstructured variations mimic how soccer stamina is actually used.", avoid: "Don't make every sprint the same length. Vary them — some are 10 yards, some are 50. Mimic the randomness of a real game." },
    { name: "Interval Running (10x200m)", how: "Sprint 200 meters at 80% effort, walk 100 meters, repeat 10 times. Most soccer-specific stamina session — alternating high-effort runs with brief recovery.", avoid: "Don't jog the 200s. At 80% you should be genuinely working. If the last 3 feel like the first 3, you didn't push hard enough." },
    { name: "Aerobic Base Run", how: "30-minute continuous run at conversational pace. Builds your aerobic base — the foundation of all stamina. 3x per week minimum.", avoid: "Don't run too fast. The aerobic base run is specifically low intensity. Pushing hard converts it to a different training stimulus." },
    { name: "Beep Test", how: "Classic 20-meter shuttle beep test. Run back and forth following increasing-pace beeps. Tests and builds soccer-relevant stamina.", avoid: "Don't sprint the early levels. The test escalates — pace yourself through the low levels to survive the high ones." },
    { name: "Yo-Yo Intermittent Test", how: "Like the beep test but with 10-second rest between each shuttle. More soccer-specific because it trains repeated effort with brief recovery — exactly how a game works.", avoid: "Don't use rest time to fully recover. 10 seconds is barely enough. You're training to perform when not fully recovered." },
    { name: "30-30 Running", how: "Sprint 30 seconds at 90% effort, jog 30 seconds. Repeat 15 times. Total 15 minutes. This is the most effective stamina format for soccer players.", avoid: "Don't jog the sprint portion. 90% is genuinely hard. If you're not breathing hard by rep 5, you're not working hard enough." },
    { name: "Long Slow Distance (LSD) Run", how: "45–60 minute run at 60% effort. Builds mitochondrial density and aerobic base over time. Do this once a week in pre-season.", avoid: "Don't run long distances at high intensity. The LSD run is specifically slow. Going too hard makes it a medium-intensity run, which builds less base." },
    { name: "Tempo Run", how: "20-minute run at 75–80% effort — uncomfortable but sustainable. Builds lactate threshold — the pace at which your body switches from aerobic to anaerobic. Raising this threshold directly improves stamina.", avoid: "Don't confuse tempo running with sprinting. Tempo is sustained, uncomfortable but controlled. Sprinting is different." },
    { name: "Stair Climbing Intervals", how: "Sprint up a staircase, walk down. 10 reps. Stair climbing builds stamina and leg strength simultaneously with minimal injury risk.", avoid: "Don't skip the walk-down recovery. The downhill recovery is part of managing the stamina training. Rushing down also risks injury." },
    { name: "Game-Simulation Running", how: "5-minute blocks: 3 minutes moderate jog, 30-second sprint, 30-second walk, 30-second sprint, 30-second walk. Repeat the 5-minute block 8 times. Simulates a game's running pattern.", avoid: "Don't cut sprints short. Each 30-second sprint must be a genuine effort. Clock it if necessary." },
    { name: "Progressive Distance Week", how: "Monday: 2 miles. Wednesday: 2.5 miles. Friday: 3 miles. Each week add 10% to your total distance. Builds running volume progressively and safely.", avoid: "Don't add more than 10% per week. This is the golden rule of running volume increases. More causes overuse injuries." },
    { name: "Two-Ball Running Drill", how: "Jog with ball between your knees (not touching the ground). This absurd constraint forces exaggerated hip drive and knee lift — which transfers directly to sprinting mechanics.", avoid: "Don't let the ball drop and restart casually. The effort to maintain it is the training. Fight for every step." },
    { name: "Recovery Run", how: "After a hard training day, 15–20 minutes of very easy jogging. Recovery runs accelerate muscle recovery by increasing blood flow without adding fatigue.", avoid: "Don't run a recovery run at normal training pace. It defeats the purpose. Easy enough that you could carry on a full conversation." },
    { name: "Repeated Short Sprints (RSS)", how: "20 x 15-meter sprints with 20-second passive rest. This is the most soccer-specific stamina format — short, fast, repeated. GPS research on soccer players shows this is what a game actually demands.", avoid: "Don't reduce the number of reps as you fatigue. 20 is the target. If you must, reduce intensity — but complete all 20." },
    { name: "Stamina Tracking (Resting HR)", how: "Track your resting heart rate every morning. As fitness improves, resting HR drops. A lower resting HR means more cardiovascular efficiency — real stamina improvement made visible.", avoid: "Don't measure after caffeine, stress, or bad sleep. Morning, before getting out of bed, same conditions every day." },
    { name: "Soccer Stamina Game", how: "3v3 or 4v4 with a rule: every player must sprint to the opposite end of the field between each possession. Continuous sprint demand forces stamina under game conditions.", avoid: "Don't walk the sprints between possessions. If you're not sprinting between plays, you're defeating the purpose of the game." },
    { name: "Cycling for Recovery Stamina", how: "30 minutes of easy cycling on rest days. Builds cardiovascular fitness without the impact of running. Protects joints while maintaining aerobic development.", avoid: "Don't use cycling to replace running entirely. Cycling builds general cardio but the running-specific mechanics need running." },
    { name: "Altitude (or Simulation)", how: "If possible, train at altitude or use breathing restriction tools. Altitude training forces the body to adapt by producing more red blood cells — elite athletes use this specifically for stamina.", avoid: "Don't overdo altitude training. Start at low altitude increases. Dramatic altitude changes without acclimatization cause performance drops before gains." },
    { name: "Post-Training Run", how: "After every technical training session, run 2 miles at moderate pace. The combination of technical fatigue + running builds game-specific stamina.", avoid: "Don't skip the post-training run because you're tired from technical work. Game tiredness feels exactly like this — train through it." },
    { name: "Stamina Benchmark Month", how: "Every 4 weeks, do the same stamina test: 2.4km (1.5 mile) timed run. Track your improvement. Seeing times drop is the clearest evidence your stamina is improving.", avoid: "Don't test on different days or conditions. Same time of day, same surface, same warm-up every month for accurate comparison." },
  ],

  "Strength": [
    { name: "Single-Leg Squat", how: "Stand on one leg, lower yourself until your thigh is parallel to the ground (or as low as you can control), stand back up. 3 sets of 8 per leg. Builds the unilateral leg strength that powers every sprint, jump, and direction change.", avoid: "Don't let your knee cave inward — it should track over your second toe. Knee caving is both a weakness indicator and an injury risk." },
    { name: "Bulgarian Split Squat", how: "Rear foot elevated on a bench behind you, front foot forward. Lower your back knee toward the ground. 3 sets of 10 per leg. One of the best single-leg strength builders for soccer players.", avoid: "Don't rush the eccentric (going down) phase. Slow down, fast up. The slow descent builds strength; the fast ascent builds power." },
    { name: "Nordic Hamstring Curl", how: "Kneel on a soft surface with someone holding your ankles. Slowly lower your chest toward the ground by letting your knees extend — resist the fall with your hamstrings. 3 sets of 5. One of the most effective hamstring injury prevention exercises.", avoid: "Don't collapse immediately. The entire point is the slow, resisted lowering phase. Even 5 controlled reps is incredibly hard at first." },
    { name: "Hip Thrust", how: "Upper back on a bench, feet flat, drive your hips up by squeezing your glutes until your body is flat. 4 sets of 12. Builds glute strength which is the primary driver of sprint speed.", avoid: "Don't hyperextend your lower back at the top. Squeeze the glutes and hold a neutral spine. Hyperextension misloads the lower back." },
    { name: "Deadlift (Romanian)", how: "Standing, push your hips back and lower your hands along your shins keeping a flat back. Feel the hamstring stretch. Drive your hips forward to stand. 3 sets of 8. Core posterior chain strength.", avoid: "Don't round your back. A rounded back deadlift is a back injury. Flat spine throughout. If you can't maintain a flat back, reduce the weight." },
    { name: "Lateral Band Walk", how: "Resistance band around ankles, slight squat, walk sideways 15 yards left, 15 right. 3 sets. Builds the hip abductor strength that protects the knee and powers lateral movement.", avoid: "Don't let the band bring your feet together between steps. Maintain constant tension. If the band goes slack, the drill loses its purpose." },
    { name: "Goblet Squat", how: "Hold a weight at your chest. Squat deep — below parallel if your flexibility allows. 3 sets of 10. Builds leg strength with an upright torso position that reinforces proper squat mechanics.", avoid: "Don't let your heels rise. If heels come up, your ankles lack flexibility — work on ankle mobility alongside this." },
    { name: "Step-Up With Knee Drive", how: "Step onto a box, drive your back knee up to hip height at the top, step down. 3 sets of 12 per leg. Combines strength and explosive coordination.", avoid: "Don't push off your back foot on the ground. All the force comes from your front leg on the box. Back foot is just for balance." },
    { name: "Calf Raise (Single Leg)", how: "Stand on one leg on a step, drop your heel below the step, rise onto the ball of your foot. 3 sets of 15 per leg. Builds calf and Achilles strength critical for sprinting and jumping.", avoid: "Don't bounce at the bottom. Full range — down slow, up strong. Bouncing at the bottom risks Achilles strain." },
    { name: "Push-Up Progressions", how: "Regular push-ups → wide-grip → diamond → decline → archer push-up. Progress through variations as you get stronger. Upper body push strength maintains balance with lower body development.", avoid: "Don't sag your hips. Plank-straight body throughout every push-up variation. Hip sagging means your core has disengaged." },
    { name: "Pull-Up / Inverted Row", how: "Hang from a bar and pull your chin above it. Or, use a lower bar for inverted rows. 3 sets to failure. Back strength contributes to sprint mechanics, aerial duels, and shielding.", avoid: "Don't kip or swing. Strict pull-ups only. Kipping trains momentum, not strength." },
    { name: "Plank Hold", how: "Elbows on ground, toes on ground, flat plank position. Hold 60 seconds, 3 sets. Core strength is the foundation of every technical action.", avoid: "Don't let your hips sag or rise. Flat as a board. If you're compensating with your hip position, reduce the hold duration." },
    { name: "Side Plank", how: "Side-lying on one elbow, lift your hips. Flat straight body. Hold 45 seconds per side, 3 sets. Lateral core stability that powers direction changes.", avoid: "Don't let your hips drop toward the ground between the starting lift and the end. It should be flat throughout — not a gradual slope." },
    { name: "Copenhagen Plank", how: "Side plank with top foot on a raised surface (bench). Lift bottom leg toward top. 3 sets of 30 seconds per side. Directly builds the adductor strength that protects groin injuries.", avoid: "Don't let your hips rotate backward. Stack your hips directly on top of each other. Rotation defeats the adductor isolation." },
    { name: "Med Ball Rotational Throw", how: "Standing sideways to a wall, rotate and throw a med ball against it with full rotation. Catch it, rotate back, throw again. 3 sets of 10 each side. Builds rotational core power that drives kicking and passing.", avoid: "Don't use your arms to generate the power. The rotation of your hips and torso generates it — the arms just release it. Arms are the transfer, not the source." },
    { name: "Glute Bridges", how: "Lying on your back, feet flat, drive hips up and squeeze glutes at the top. Single-leg variation to progress. 3 sets of 15. Entry-level glute strength building.", avoid: "Don't use your lower back to push up. Glutes drive it, not your back. If your back is straining, your glutes aren't firing correctly." },
    { name: "Lunge Jumps", how: "Lunge position, jump explosively and switch legs in the air. Land in opposite lunge. 3 sets of 12. Builds explosive unilateral leg power with an aerobic component.", avoid: "Don't land with your front knee past your toes. Soft landing, knee tracking above second toe." },
    { name: "Farmer Carry", how: "Carry heavy weights (or any heavy objects) in both hands for 40 yards. Set down, turn, walk back. 3 trips. Grip, core, and full-body strength in one functional movement.", avoid: "Don't lean to one side. Stay tall and level throughout. Leaning indicates one side is weaker — it's useful diagnostic information." },
    { name: "Resistance Band Hip Extension", how: "Band anchored in front of you, around one ankle. Drive that leg backward against the resistance. 3 sets of 15 per leg. Hip extension strength for kicking power.", avoid: "Don't lean forward to compensate. Stand tall. The lean compensates for hip flexor tightness — stretch your hip flexors too." },
    { name: "Turkish Get-Up", how: "Lie on floor, hold weight above you, stand up without putting the weight down — following a specific sequence. 3 each side. Full body stability, strength, and coordination in one movement.", avoid: "Don't rush the movement sequence. Each stage of the Turkish get-up is a different strength demand. Learn the sequence before adding weight." },
    { name: "Chin to Chest Neck Strengthening", how: "Gentle neck resistance exercises: slow neck flexion, extension, and lateral flexion against light manual resistance from your hand. Builds neck strength for heading duels.", avoid: "Don't use heavy resistance on neck exercises. The neck is delicate. Light, controlled resistance only." },
    { name: "Isometric Wall Squat", how: "Back against wall, thighs parallel to ground. Hold 60 seconds, 3 sets. Isometric leg strength endurance — builds the ability to hold low defensive stance and sprint position for 90 minutes.", avoid: "Don't let your thighs rise above parallel — the harder position (below parallel) is where the gains are." },
    { name: "Explosive Push-Up", how: "Push-up where you push hard enough to leave the ground. Clap if you can. 3 sets of 8. Upper body explosive power — contributes to aerial duels and contact situations.", avoid: "Don't use poor form just to get explosive. The explosive element only helps if the base form is solid." },
    { name: "Single Leg Romanian Deadlift", how: "Balance on one leg. Hinge forward at the hip, other leg extends behind you. 3 sets of 8 per leg. Single-leg posterior chain strength and balance combined.", avoid: "Don't round your back. Flat spine. This is a harder balance challenge than a standard RDL — start slow." },
    { name: "Strength Periodization", how: "Week 1–2: high reps (15), light weight. Week 3–4: medium reps (10), medium weight. Week 5–6: low reps (5), heavy. Cycle the loading to keep making strength gains.", avoid: "Don't train at the same weight and rep count every week indefinitely. Your body adapts and progress stops. Periodize." },
  ],

  "Agility": [
    { name: "5-10-5 Shuttle", how: "5 yards left, 10 yards right, 5 yards back to center. Full speed direction changes. Time yourself. This is the standard agility benchmark used in professional combines.", avoid: "Don't slow on the direction changes — plant hard and drive the opposite way. The plant IS the agility." },
    { name: "T-Drill", how: "Cone setup: start, 10 yards forward, 5 yards left, 10 yards right, 5 yards back, 10 yards back. Sprint, shuffle, shuffle, backpedal. The T-drill covers all movement planes.", avoid: "Don't drift wide on the shuffles. Stay tight to the cone line. Wide shuffles add distance and time." },
    { name: "Box Drill", how: "4 cones in a 5×5 box. Sprint forward, shuffle left, backpedal, shuffle right back to start. 6 reps. Combines all movement patterns in a tight space.", avoid: "Don't stand up between movements. Stay low through all direction changes. Upright between cones is wasted momentum." },
    { name: "Ladder Footwork (In-In-Out-Out)", how: "Two feet in each square, two feet out each square. Down 10 yards, back 10 yards. 3 sets. Develops rapid, coordinated foot patterns.", avoid: "Don't look at your feet. Eyes up through the ladder. Looking down in agility work slows you and builds a bad habit." },
    { name: "Ladder Icky Shuffle", how: "Step in with right, bring left in, step out right, step in left, bring right in, step out left — an alternating in-out pattern through the ladder. 4 sets.", avoid: "Don't rush into the ladder at a pace you can't maintain. Start slow, perfect the pattern, then speed it up progressively." },
    { name: "Reactive Agility (Mirror Drill)", how: "Face a partner, 3 yards apart. They lead, you mirror. No pre-planned pattern — react to their movement. This is the only agility drill that trains reactive agility as opposed to pre-planned agility.", avoid: "Don't try to predict their direction. React to their first step. Prediction makes you guess incorrectly and is slower than true reaction." },
    { name: "Cone Weave", how: "10 cones in a line, 1 yard apart. Weave through at maximum speed. Time it. Track improvement weekly. Pure change-of-direction at speed.", avoid: "Don't cut wide around cones. The tighter you cut each cone, the faster your time. Wide cuts add yards — beat each cone as tightly as possible." },
    { name: "Pro Agility Drill", how: "Standard 5-10-5. Time it. Target: under 4.5 seconds for a field player. Elite field players hit 4.0–4.2. This is a specific measurable agility benchmark.", avoid: "Don't start your timer casually. Use a reliable method — partner with a stopwatch or phone app. Consistent timing is necessary for accurate improvement tracking." },
