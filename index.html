const bibleChapters = [
  {
    id: "ball", title: "The Ball", icon: "⚽", subtitle: "Physics, Spin & Striking",
    sections: [
      { title: "The Magnus Effect — Why The Ball Curves", content: `Every curved ball in soccer is the Magnus Effect in action. When a spinning ball moves through air, its rotation drags air around it. On one side airflow speeds up, on the other it slows down. The pressure difference pushes the ball toward the low-pressure side — the direction of the spin.\n\nThe key rule: a ball curves in the direction it's spinning.\n— Clockwise spin → curves right\n— Counterclockwise spin → curves left\n— Topspin (forward rotation) → dips down\n— Backspin (backward rotation) → floats, travels farther\n\nThe slower the ball travels, the more it curves. Speed reduces the effect. A hard driven shot curves less than a floated one hit with the same spin.` },
      { title: "The Knuckleball — No Spin", content: `Strike the ball with minimal spin and it becomes unpredictable. Without spin, airflow changes constantly as the panel seams rotate. The ball flutters, dips, and moves laterally without warning. Goalkeepers can't predict the path.\n\nHow to do it: Strike through the dead center of the ball with your laces, follow through stiff and straight. Minimal ankle snap. You want the ball to leave your foot with almost no rotation.\n\nUse case: Long range free kicks, shots from outside the box. Ronaldo and Pirlo built careers on this.` },
      { title: "Topspin — The Dipping Shot", content: `Topspin makes the ball dip faster than gravity alone. This is how you drive a shot that starts high and dips under the bar, or keep a hard pass on the ground over distance.\n\nHow to create topspin:\n— Approach at a slight angle (30 degrees)\n— Plant foot slightly ahead of and beside the ball\n— Strike slightly above center with your laces\n— Keep your body over the ball — lean forward\n— The follow-through goes DOWN, not forward\n\nCommon mistake: Leaning back causes backspin and a ballooning shot. Get your body over the ball.` },
      { title: "Backspin — The Chip & Float", content: `Backspin creates lift and a floating effect. Essential for chips over a goalkeeper, lofted through balls, and crosses that hang.\n\nHow to create backspin:\n— Stab underneath the ball with a stiff ankle\n— Shorter, sharper contact — don't follow through\n— Strike the bottom quarter of the ball\n— The ball pops up sharply with backward rotation\n\nThe chip: Same but more exaggerated. Knife under the ball, quick flick. Used to lob a rushing goalkeeper.\n\nNote: Backspin reduces forward speed. Use for precision, not power.` },
      { title: "Sidespin — The Curl & Banana Shot", content: `Sidespin bends free kicks around walls and curls crosses into dangerous areas.\n\nFor a right-footed player:\n— Strike the LEFT side of the ball with inside of foot → curves left to right (inswinging)\n— Strike the RIGHT side with outside of foot (trivela) → curves right to left (outswinging)\n\nHow to curl with inside of foot:\n— Approach from the left\n— Plant foot pointing at target\n— Strike the inside-left quarter of the ball\n— Follow through across your body\n\nThe more off-center you strike, the more curl. The trade-off is less power. Find the balance.` },
      { title: "The Driven Shot — Power & Accuracy", content: `The bread and butter shot.\n\nMechanics:\n1. Approach at 30–45 degree angle\n2. Plant foot beside ball, toes pointing at target, 6–12 inches away\n3. Lock your ankle — foot pointed down, firm\n4. Strike through the CENTER of the ball with laces\n5. Body OVER the ball — don't lean back\n6. Follow through toward target — leg swings high\n7. Land on your kicking foot\n\nPower comes from hip rotation and knee snap — not your foot. Your leg is the whip. Your locked ankle is the tip.\n\nBoth feet: Train weak foot separately with the same attention. You don't need it equal — you need it reliable.` },
      { title: "The Inside Pass — Accuracy First", content: `The foundation of everything. Most passes in a game are inside-foot passes.\n\nMechanics:\n1. Point standing foot at the target\n2. Open kicking foot out — toe pointed sideways\n3. Lock your ankle\n4. Strike through the CENTER of the ball with the flat inside surface\n5. Follow through toward the target\n\nThe inside of your foot is flat and wide — your most accurate striking surface. Use it for passes under 25 yards, any situation where placement beats power.\n\nWall drill: 200 reps each foot daily. Lock ankle, follow through, move target back as accuracy builds.` },
    ],
  },
  {
    id: "formations", title: "Formations", icon: "📋", subtitle: "Shapes, Systems & How To Break Them",
    sections: [
      { title: "How To Read A Formation", content: `Formations are listed back to front, goalkeeper excluded.\n4-3-3 = 4 defenders, 3 midfielders, 3 forwards.\n\nBut formations are starting shapes. In possession a 4-3-3 becomes a 3-5-2. Out of possession a 4-2-3-1 becomes a 4-4-2.\n\nThe real info isn't the formation — it's the ROLES.\n\nNumbers and roles:\n— #4, #5: Center backs\n— #2, #3: Fullbacks (right, left)\n— #6: Defensive midfielder (holds, screens)\n— #8: Box-to-box midfielder (covers everything)\n— #10: Attacking midfielder / playmaker (creates)\n— #7, #11: Wingers\n— #9: Striker` },
      { title: "4-4-2 — The Classic", content: `Four defenders. Four midfielders. Two strikers.\n\nStrengths:\n— Simple structure, easy to organize\n— Two strikers create constant goal threat\n— Two banks of four give solid defensive shape\n\nWeaknesses:\n— Outnumbered in midfield against a 3-man midfield\n— Flat midfield struggles to shift quickly\n\nHow to attack it as a midfielder:\n— Exploit the space BETWEEN their midfield and defensive line\n— Receive there and you have time — mids must turn back, defenders haven't stepped\n— Overload one side then switch quickly\n— Thread through balls between the central mids` },
      { title: "4-3-3 — Possession & Press", content: `Four defenders. Three midfielders. Three forwards. Barcelona's formation.\n\nStrengths:\n— Three forwards press high and create chaos\n— Triangles everywhere — always a passing option\n— Wide forwards pin back opposition fullbacks\n\nWeaknesses:\n— Wide forwards must track back or you're exposed\n— Lone striker can be isolated\n— Requires enormous fitness — pressing from front is exhausting\n\nHow to attack it:\n— Attack the space BEHIND pressing forwards — their aggression creates space behind\n— Switch play quickly — wide areas open with fast movement\n— Lone striker's movement pulls center backs, creating gaps for midfield runners` },
      { title: "4-2-3-1 — The Dominant Modern Formation", content: `Four defenders. Two defensive midfielders (double pivot). Three attacking mids. One striker.\n\nReplaced the 4-4-2 as Europe's dominant formation. Spain's 2010 World Cup side.\n\nStrengths:\n— Double pivot gives stability AND possession control\n— The #10 between the lines is extremely hard to defend\n— Flexible — can press high or sit deep\n— Five midfield players dominate central areas\n\nWeaknesses:\n— Lone striker isolated\n— Fullbacks exposed against wide players\n\nHow to attack it:\n— Flanks are vulnerable — fullbacks often exposed\n— A diamond midfield suffocates the double pivot\n— Quick counters before defensive shape reorganizes` },
      { title: "3-5-2 — Five In Midfield", content: `Three center backs. Two wing-backs. Three central midfielders. Two strikers.\n\nStrengths:\n— Total midfield control\n— Two strikers create double threat\n— Three center-backs provide extra coverage\n\nWeaknesses:\n— Wing-backs cover enormous ground — push them forward and space opens behind\n— Three center-backs overloaded by a front three with width\n\nHow to attack it:\n— Push wing-backs back — remove their attacking contribution\n— Hit behind wing-backs with fast runs when they push forward\n— Play wide — stretch the three center-backs` },
      { title: "The Low Block — How To Break It Down", content: `Some teams just park. Nine or ten men behind the ball, compact, deep.\n\nPrinciples for breaking a low block:\n1. Patience. They want you to rush and make mistakes.\n2. Move the ball quickly — short combinations force their shape to shift. Gaps open.\n3. Switch play FAST. Ball moved wide to wide forces the entire block to move.\n4. Get wide and cross — numbers in the box can beat a low block.\n5. Midfield runners arriving late into the box are hard to track.\n6. Through ball into channels — low blocks sometimes leave space between last defender and the 18.\n\nWhat doesn't work: Individual dribbling into a packed defense. The block collapses on you.` },
    ],
  },
  {
    id: "defending", title: "Defending", icon: "🛡️", subtitle: "Reading Players, 1v1, Pressure",
    sections: [
      { title: "The Fundamentals Of Individual Defense", content: `Defense starts before the attacker gets the ball.\n\nCore principles:\n1. Be goal-side. Always position between attacker and goal.\n2. Delay, don't dive. First job is to slow the attack — buy time for teammates.\n3. Stay on your feet. Committed tackles that miss give the attacker a clear run.\n4. Force a direction. Channel the attacker toward the sideline or weak foot.\n5. Watch the ball, not the feet. Feints happen with feet. The ball tells the truth.\n\nThe jockeying position: Side-on stance, weight on back foot, low center of gravity. You can move in any direction. Never go flat-footed.` },
      { title: "Defending Fast Players", content: `Fast attackers don't need to beat you technically — they need space to run into. Eliminate that space.\n\nThe mistake everyone makes: dropping too deep, inviting the attacker to run at you with momentum.\n\nHow to defend pace:\n1. Get tight EARLY — before they have the ball. Make the first touch difficult.\n2. Force them wide. The sideline is your teammate.\n3. Don't turn and chase. Focus on preventing the moment, not recovering from it.\n4. Angle your run so they must go wide, not through the middle.\n5. Be physical early — fast players often hate physicality. Make it uncomfortable from minute one.\n\nKey shift: You're not trying to win the ball. You're making them predictable.` },
      { title: "Defending Technically Skilled Players", content: `A technically elite dribbler slows down, uses fakes, and waits for you to commit.\n\nGolden rule: Do NOT lunge. They're waiting for it. A lunging defender is a gift.\n\nHow to defend skill:\n1. Patience. Stand them up. Make them make the first move.\n2. Watch the ball, not the body. All feints are done with the body. The ball moves last.\n3. Force them onto their weak foot.\n4. Shrink their space — tight enough they can't turn, not so tight they use your momentum.\n5. When to tackle: Only when they take a heavy touch and ball moves away from their body. Then commit fully.` },
      { title: "Defending Physical Players", content: `Strong attackers try to back into you, hold you off, use their body as a shield.\n\nPrinciples:\n1. Don't engage their back. Stay to the side — force them toward the weaker side.\n2. Arms-length positioning: Too close and they spin you. Too far and they have time to turn.\n3. Be first to the ball. Against a physical player, winning the first touch is everything.\n4. Use your body legally — shoulder to shoulder. A well-timed shoulder can dispossess without fouling.\n5. Force wide. A physical striker is most dangerous centrally.` },
      { title: "The Art Of Pressing", content: `Pressing isn't chasing the ball. Uncoordinated pressing creates more space than it recovers.\n\nPress when:\n— Opponent receives with back to goal\n— They take a heavy first touch\n— Ball goes to a weak-footed player\n— Ball goes wide to a player under pressure\n\nHow to press effectively:\n1. Know where you're forcing the ball BEFORE you press\n2. Cut off the easy pass — approach at angle that blocks the obvious outlet\n3. Teammates must press in coordination\n4. Don't overcommit — if they play through, recover quickly\n\nHigh press wins the ball high but is exhausting. Mid press is more sustainable.` },
    ],
  },
  {
    id: "midfield", title: "The Midfielder", icon: "🧠", subtitle: "Positioning, Vision & The Isagi Principles",
    sections: [
      { title: "What Makes A Midfielder Elite", content: `The average player has direct possession for only 1–3 minutes in 90. What separates elite midfielders:\n\n1. Scanning frequency — Xavi scanned 0.83 times per second. Average players: 3–4 times in 10 seconds. Elite: 6–8 times in 10 seconds.\n\n2. Pre-decisions — By the time the ball arrives, the decision is already made.\n\n3. Body orientation — Always receive with an open body when possible. "Play the way you face."\n\n4. Movement OFF the ball — Where you position yourself without it determines what balls you get.\n\n5. Tempo control — Knowing when to play fast and when to slow down. Both extremes destroy attacks.` },
      { title: "Scanning — The Skill That Separates Everyone", content: `Scanning is checking your shoulders to gather information BEFORE the ball arrives.\n\nWhen you receive with no information: you look down, hesitate, get pressed.\nWhen you receive with a full mental picture: your first touch is purposeful, your decision instant.\n\nHow to build the habit:\n— Force yourself to check both shoulders before every receive\n— Rule: never receive without at least one shoulder check\n— Count your scans in a session until it becomes automatic\n— Target: scan every 3 seconds minimum\n\nWhat to look for:\n— Where is the nearest pressure?\n— Which teammate is open or making a run?\n— Where is the space?\n— What is the defensive shape?\n\nYou're taking a photograph of the field. File it instantly. Act on it.` },
      { title: "Positioning Between The Lines", content: `The most dangerous position for a midfielder: the space between the opponent's midfield and defensive line.\n\nWhy it's dangerous:\n— Midfielders can't press without leaving space behind\n— Defenders can't step out without exposing their line\n— You're facing goal with time and space\n\nHow to get there:\n— Move away from the ball to create angles\n— Time your run to arrive AS the ball is played\n— Use your body to shield defenders when receiving\n\nThe half-space: Between center and wing on each side. Not wide (less danger), not central (most pressure). This is where Iniesta, Modric, De Bruyne operate. Sight of goal AND width to exploit.` },
      { title: "The Isagi Principles — Spatial Dominance", content: `Isagi's weapon isn't skill or pace — it's meta-vision. He sees the field as a system of spaces and vectors before others see them.\n\n1. Before the ball arrives: where is the SPACE? Not the ball. Not the player. The space.\n\n2. Predict where space will open: Fullback pushes forward → space opens behind them. Center-back steps out → space opens behind. Read movement to predict the gap, then move there BEFORE it opens.\n\n3. Exploit the transition moment: The 3–5 seconds after possession changes. Defenses are disorganized. Strike in this window.\n\n4. Create space for others by occupying defenders: Your run doesn't need to end in receiving. If it drags a defender away, that's a successful action.\n\n5. The chain calculation: Calculate two passes ahead before every touch.` },
      { title: "First Touch — The Foundation Of Everything", content: `Your first touch tells everyone on the field who you are.\n\nThe goal: Control the ball into a space that helps your NEXT action.\n\nTypes:\n— Cushion touch: Relax the surface on contact to kill the ball's pace.\n— Directional touch: Redirect with inside or outside as it arrives — already moving it to your next position.\n— First-time pass: The touch IS the pass. Requires pre-scanning.\n\nTraining: Wall work. Control it dead every time. Inside, outside, chest, thigh, laces. Both sides. 100 reps each.\n\nThe test: After receiving, can you immediately look up? Or are you still managing the ball? Still looking down = touch wasn't good enough.` },
      { title: "Tempo — Controlling The Game's Pace", content: `Elite midfielders don't react to the game — they SET the rhythm.\n\nPlay FAST when:\n— Transition moments (just won the ball)\n— Defenders are disorganized\n— A runner is making a timed run\n— You're in space and defense hasn't recovered\n\nSlow DOWN when:\n— Team needs to reorganize shape\n— No forward option available\n— Pressing is coming and fast play increases turnover risk\n\nMost common amateur mistake: Playing fast all the time. This exhausts your team and creates turnovers in dangerous positions.\n\nTop teams play slow to go fast — slow in safe areas, then accelerate into gaps.\n\nYou are the tempo dial. Own it.` },
    ],
  },
  {
    id: "mental", title: "Mental Game", icon: "🔥", subtitle: "Psychology, Pressure & Domination",
    sections: [
      { title: "The Psychology Of Competition", content: `Soccer is played twice — once in the body, once in the mind.\n\nWhat separates competitive players:\n— Composure under pressure: Execute technique when your heart rate is 160 and someone is closing fast.\n— Short memory: Forget bad touches instantly. Dwelling creates more errors.\n— Reading opponents' emotional state: Frustrated? Apply more pressure. Confident? Disrupt their rhythm.\n\nThe composure principle: Your technique only holds under pressure to the level you've practiced it under pressure. Train at speed, under fatigue, with consequences.` },
      { title: "Imposing Yourself Mentally", content: `It's not trash talk. It's actions that make opponents feel the game is already decided.\n\n1. Dominance in the first five minutes: Win your first header. Win your first tackle. Execute your first pass perfectly. Opponents read these signals.\n\n2. Visible composure: When you're calm and they're not, it communicates a power differential without a word.\n\n3. Physicality in legal spaces: Use it early. Make them aware of your presence from the first challenge.\n\n4. Punish every mistake instantly: When they give the ball away, your team transitions immediately.\n\n5. Be unpredictable: If they think they know what you're going to do, they're in control. Change your patterns.` },
      { title: "Visualization — Training The Brain", content: `Your brain cannot fully distinguish between a vividly imagined action and a real one. When you visualize executing a skill, you fire the same neural pathways as when you do it physically.\n\nHow to do it properly:\n1. Be specific. Don't visualize "playing well." Visualize receiving under pressure, taking a directional touch, threading a through ball.\n2. All senses. See the field, hear the crowd, feel the ball, feel the ground.\n3. Include adversity. Visualize a bad touch — then recovering. Your brain needs to rehearse response to failure.\n4. Pre-match: 5–10 minutes before every game or session.\n\nFive minutes every night before sleep. It costs nothing. Over months, it compounds.` },
      { title: "The Transition Mindset", content: `The most dangerous moment in soccer: the 3–5 seconds after possession changes.\n\nWhen you WIN the ball: Transition instantly. Look forward immediately. Attack before the defense organizes. Most goals are scored in transition.\n\nWhen you LOSE the ball: Counter-press immediately. Don't sulk, don't argue, don't stand still. The ball is closest to your team in the moment just after losing it.\n\nThe mindset: Possession doesn't matter. What matters is what you do in the 5 seconds after it changes.\n\nThis is where athleticism and mental sharpness combine. Transitions are your moment.` },
      { title: "Handling Mistakes & Staying In The Game", content: `The most consequential skill in soccer isn't technical. It's moving on instantly from errors.\n\nPlayers who spiral after mistakes are the most dangerous to their own team. One bad pass → anxiety → cautious play → another mistake → spiral.\n\nThe reset process:\n1. Accept: It happened. That's done.\n2. Analyze: Decision error or execution error? File it for later.\n3. Redirect: Where do I need to be RIGHT NOW?\n4. Go: Move. Don't stand still processing.\n\nThe whole process takes 2 seconds. That's all you get before the next moment is upon you.\n\nLong memory is a liability in competition.` },
    ],
  },
  {
    id: "iq", title: "Soccer IQ", icon: "📡", subtitle: "Reading The Game, Space & Time",
    sections: [
      { title: "Space — The Real Currency Of Soccer", content: `The ball is secondary. Space is the game.\n\nEvery tactical decision is about creating space or denying it. Goals come from space. Possession is about managing space. Pressing is about eliminating it.\n\nTypes of space:\n— Behind the defensive line: Most dangerous. Through ball here often leads to goal.\n— Between the lines: Where midfielders operate. Hard to defend.\n— Wide space: Stretches defense. Less directly dangerous but opens central areas.\n— Space created by movement: Running without the ball drags defenders, opening space for others.\n\nThe central question before every action: Where is the space, and how do I attack it or create it?` },
      { title: "Reading Defensive Shape", content: `Understanding how the opposition defends tells you exactly where to attack.\n\nHigh defensive line: Back four sit high. Vulnerability: space in behind for pace.\nDeep defensive line: Protecting the goal. Vulnerability: space in front of defense.\nZonal defense: Attack by creating overloads — two of your players in one zone forces a choice.\nMan marking: Drags defenders out of position with intelligent movement.\n\nBefore every game: Watch how they defend for 10 minutes. Where do they give space? Which player is weakest? Where does their shape break down?` },
      { title: "The Third Man Run", content: `One of the most advanced and effective concepts in soccer.\n\nPlayer A passes to Player B. Player B is marked. But A's pass was a TRIGGER — it signals Player C (the third man) to make a run into space.\n\nThe defender marking B watches the ball. The defender covering C's zone tracks the ball. Neither is watching C's run until it's too late.\n\nHow to use it:\n1. Recognize when a teammate is about to play a pass\n2. Time your run so you arrive in space as the ball reaches the second player\n3. You receive in full stride with space ahead\n\nThis is Isagi's chain calculation in real soccer.` },
      { title: "Overloads & Numerical Superiority", content: `Numerical superiority = more of your players than theirs in a specific area. This creates easy solutions.\n\n2v1 anywhere on the field = the defender cannot stop both. One of you is always free.\n\nHow midfielders create overloads:\n— Positional rotation: Move into areas with fewer defenders\n— Overlapping runs: Give and go. Pass, then run. Receive back in space.\n— Third man combinations: The chain of passes that creates a free player\n\nRecognizing overloads:\n— Constantly count numbers in the immediate area\n— If you see 2v1 developing, exploit it immediately — it closes within 2 seconds\n— Communicate: "You've got time" / "Man on" / "Turn"\n\nThe best midfielders don't wait for overloads. They manufacture them.` },
      { title: "Transition — The Game Within The Game", content: `Modern soccer is increasingly about transitions — moments immediately after possession changes.\n\nOffensive transition (just won the ball):\n— Look forward immediately\n— Play fast if there's space — attack before defense reorganizes\n— Target: exploit the 5-second window before they recover\n\nDefensive transition (just lost the ball):\n— Counter-press immediately\n— Sprint to defensive position if you can't press\n— Delay their attack — buy 5–10 seconds\n\nThe gegenpressing principle: Teams that counter-pressed aggressively after losing the ball effectively had possession 70% of the time. Winning the ball back within 5 seconds is statistically the most dangerous way to create a goal-scoring opportunity.\n\nYour profile — lean, fast, explosive — is perfectly suited to transition moments. This is where you are most dangerous.` },
    ],
  },
];

// ─── SOCCER BIBLE ───────────────────────────────────────────────────────────
function SoccerBible() {
  const [activeChapter, setActiveChapter] = useState(0);
  const [activeSection, setActiveSection] = useState(0);

  const chapter = bibleChapters[activeChapter];

  const handleSearch = (q) => {

    const results = [];
    bibleChapters.forEach((ch, ci) => {
      ch.sections.forEach((sec, si) => {

          results.push({ ci, si, chTitle: ch.title, secTitle: sec.title });

// ─── MATCH JOURNAL ──────────────────────────────────────────────────────────
function MatchJournal() {
  const [entries, setEntries] = useState(() => load("matchJournal", []));
  const [form, setForm] = useState({ date: "", opponent: "", result: "", well: "", exposed: "", next: "" });
  const [adding, setAdding] = useState(false);

  const addEntry = () => {
    if (!form.date) return;
    const newEntries = [{ ...form, id: Date.now() }, ...entries];
    setEntries(newEntries);
    save("matchJournal", newEntries);
    setForm({ date: "", opponent: "", result: "", well: "", exposed: "", next: "" });
    setAdding(false);
  };

  const deleteEntry = (id) => {
    const updated = entries.filter(e => e.id !== id);
    setEntries(updated);
    save("matchJournal", updated);
  };

  const inputStyle = { background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "8px 10px", color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none", width: "100%" };

    <div style={{ padding: "32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>

            {[["date", "DATE", "input", "date"], ["opponent", "OPPONENT", "input", "text"], ["result", "RESULT (e.g. W 3-1)", "input", "text"]].map(([key, label, _, type]) => (

        </div>

        <div style={{ fontSize: 12, color: "#333", padding: "40px 0", textAlign: "center" }}>No matches logged yet. Log your first game.</div>

        <div key={entry.id} style={{ background: "#0d0d0d", borderLeft: "3px solid #00FF87", padding: "16px", marginBottom: 12 }}>

// ─── PROGRESS LOG ───────────────────────────────────────────────────────────
function ProgressLog() {
  const [logs, setLogs] = useState(() => load("progressLogs", []));
  const [jugglingRecord, setJugglingRecord] = useState(() => load("jugglingRecord", 0));
  const [form, setForm] = useState({ date: new Date().toISOString().split("T")[0], type: "Field", duration: "", juggling: "", notes: "", felt: "3" });
  const [adding, setAdding] = useState(false);

  const addLog = () => {
    if (!form.date) return;
    if (form.juggling && parseInt(form.juggling) > jugglingRecord) {
      const newRecord = parseInt(form.juggling);
      setJugglingRecord(newRecord);
      save("jugglingRecord", newRecord);
    }
    const newLogs = [...logs, { ...form, id: Date.now() }];
    setLogs(newLogs);
    save("progressLogs", newLogs);
    setForm({ date: new Date().toISOString().split("T")[0], type: "Field", duration: "", juggling: "", notes: "", felt: "3" });
    setAdding(false);
  };

  const deleteLog = (id) => {
    const updated = logs.filter(l => l.id !== id);
    setLogs(updated);
    save("progressLogs", updated);
  };

  const inputStyle = { background: "#0a0a0a", border: "1px solid #1a1a1a", padding: "8px 10px", color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none", width: "100%" };
  const recentRecord = Math.max(...logs.map(l => parseInt(l.juggling) || 0), jugglingRecord, 0);

  return (
    <div style={{ padding: "32px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24 }}>
        <div>
          <div style={{ fontSize: 10, letterSpacing: 6, color: "#333", marginBottom: 8 }}>EVERY SESSION</div>
          <div style={{ fontSize: 24, fontWeight: 900, color: "#fff" }}>PROGRESS <span style={{ color: "#00FF87" }}>LOG</span></div>
        </div>
        <button onClick={() => setAdding(!adding)} style={{ background: adding ? "#1a1a1a" : "#00FF87", color: adding ? "#666" : "#000", border: "none", padding: "10px 16px", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>
          {adding ? "CANCEL" : "+ LOG SESSION"}
        </button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
        {[
          { label: "Total Sessions", value: logs.length, color: "#00FF87" },
          { label: "Juggling Record", value: recentRecord + " touches", color: "#00BFFF" },
          { label: "This Week", value: logs.filter(l => { const d = new Date(l.date); const now = new Date(); const diff = (now - d) / (1000 * 60 * 60 * 24); return diff <= 7; }).length, color: "#FFD700" },
        ].map((s, i) => (
          <div key={i} style={{ padding: "16px", background: "#0d0d0d", borderLeft: `3px solid ${s.color}` }}>
            <div style={{ fontSize: 24, fontWeight: 900, color: s.color }}>{s.value}</div>
            <div style={{ fontSize: 10, color: "#444", marginTop: 4, letterSpacing: 2 }}>{s.label.toUpperCase()}</div>
          </div>
        ))}
      </div>

      {adding && (
        <div style={{ background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "20px", marginBottom: 24 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 12 }}>
            <div>
              <label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>DATE</label>
              <input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} style={inputStyle} />
            </div>
            <div>
              <label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>TYPE</label>
              <select value={form.type} onChange={e => setForm({ ...form, type: e.target.value })} style={{ ...inputStyle, cursor: "pointer" }}>
                {["Field", "Gym", "Conditioning", "Pickup Game", "Indoor/Room"].map(t => <option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>DURATION (min)</label>
              <input type="number" value={form.duration} onChange={e => setForm({ ...form, duration: e.target.value })} style={inputStyle} />
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
            <div>
              <label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>JUGGLING (touches)</label>
              <input type="number" placeholder={`Current record: ${recentRecord}`} value={form.juggling} onChange={e => setForm({ ...form, juggling: e.target.value })} style={inputStyle} />
            </div>
            <div>
              <label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>FELT (1–5)</label>
              <select value={form.felt} onChange={e => setForm({ ...form, felt: e.target.value })} style={{ ...inputStyle, cursor: "pointer" }}>
                {["1", "2", "3", "4", "5"].map(v => <option key={v}>{v}</option>)}

            </div>
          </div>
          <div style={{ marginBottom: 12 }}>
            <label style={{ fontSize: 10, letterSpacing: 3, color: "#444", marginBottom: 4, display: "block" }}>NOTES</label>
            <textarea value={form.notes} onChange={e => setForm({ ...form, notes: e.target.value })} rows={2} style={{ ...inputStyle, resize: "vertical" }} />
          </div>
          <button onClick={addLog} style={{ background: "#00FF87", color: "#000", border: "none", padding: "10px 20px", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>SAVE</button>
        </div>
      )}

      <div>
        {[...logs].reverse().map(log => (
          <div key={log.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: "1px solid #0d0d0d" }}>

              {log.felt && <div style={{ fontSize: 11, color: "#444" }}>{"★".repeat(parseInt(log.felt))}</div>}
            </div>
            <span onClick={() => deleteLog(log.id)} style={{ fontSize: 10, color: "#222", cursor: "pointer" }}>✕</span>
          </div>
        ))}
        {logs.length === 0 && <div style={{ fontSize: 12, color: "#333", padding: "40px 0", textAlign: "center" }}>No sessions logged yet.</div>}
      </div>
    </div>
  );
}

// ─── GOALS BOARD ─────────────────────────────────────────────────────────────
function GoalsBoard() {
  const [goals, setGoals] = useState(() => load("goals", [
    { id: 1, text: "Win the TSA League", category: "short", done: false },
    { id: 2, text: "Comfortable with both feet", category: "short", done: false },
    { id: 3, text: "Play in a semi-pro league", category: "medium", done: false },
    { id: 4, text: "Become the most dangerous midfielder in every game I play", category: "long", done: false },
  ]));
  const [newGoal, setNewGoal] = useState("");
  const [newCat, setNewCat] = useState("short");

  const toggleGoal = (id) => {
    const updated = goals.map(g => g.id === id ? { ...g, done: !g.done } : g);
    setGoals(updated);
    save("goals", updated);
  };

  const addGoal = () => {
    if (!newGoal.trim()) return;
    const updated = [...goals, { id: Date.now(), text: newGoal, category: newCat, done: false }];
    setGoals(updated);
    save("goals", updated);
    setNewGoal("");
  };

  const deleteGoal = (id) => {
    const updated = goals.filter(g => g.id !== id);
    setGoals(updated);
    save("goals", updated);
  };

  const cats = [
    { key: "short", label: "SHORT TERM", color: "#00FF87", desc: "Next 3 months" },
    { key: "medium", label: "MEDIUM TERM", color: "#FFD700", desc: "Next 1–2 years" },
    { key: "long", label: "LONG TERM", color: "#FF4444", desc: "The vision" },
  ];

  return (
    <div style={{ padding: "32px" }}>
      <div style={{ fontSize: 10, letterSpacing: 6, color: "#333", marginBottom: 8 }}>WRITTEN DOWN. VISIBLE.</div>
      <div style={{ fontSize: 24, fontWeight: 900, color: "#fff", marginBottom: 24 }}>GOALS <span style={{ color: "#00FF87" }}>BOARD</span></div>

      <div style={{ display: "flex", gap: 8, marginBottom: 24 }}>
        <input value={newGoal} onChange={e => setNewGoal(e.target.value)} onKeyDown={e => e.key === "Enter" && addGoal()}
          placeholder="Add a new goal..." style={{ flex: 1, background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "8px 12px", color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none" }} />
        <select value={newCat} onChange={e => setNewCat(e.target.value)} style={{ background: "#0d0d0d", border: "1px solid #1a1a1a", padding: "8px 12px", color: "#aaa", fontFamily: "'Courier New', monospace", fontSize: 12, outline: "none", cursor: "pointer" }}>
          {cats.map(c => <option key={c.key} value={c.key}>{c.label}</option>)}
        </select>
        <button onClick={addGoal} style={{ background: "#00FF87", color: "#000", border: "none", padding: "8px 16px", fontSize: 11, letterSpacing: 2, cursor: "pointer", fontFamily: "'Courier New', monospace" }}>ADD</button>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16 }}>
        {cats.map(cat => (
          <div key={cat.key} style={{ background: "#0a0a0a", border: `1px solid ${cat.color}22` }}>
            <div style={{ padding: "12px 16px", borderBottom: `1px solid ${cat.color}22` }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: cat.color }}>{cat.label}</div>
              <div style={{ fontSize: 10, color: "#333", marginTop: 2 }}>{cat.desc}</div>
            </div>
            <div style={{ padding: "8px" }}>
              {goals.filter(g => g.category === cat.key).map(goal => (
                <div key={goal.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 8px", borderBottom: "1px solid #0d0d0d" }}>
                  <div onClick={() => toggleGoal(goal.id)} style={{
                    width: 14, height: 14, border: `1px solid ${goal.done ? cat.color : "#333"}`,
                    background: goal.done ? cat.color : "transparent", cursor: "pointer", flexShrink: 0,
                  }} />
                  <div style={{ fontSize: 12, color: goal.done ? "#444" : "#888", textDecoration: goal.done ? "line-through" : "none", flex: 1 }}>{goal.text}</div>
                  <span onClick={() => deleteGoal(goal.id)} style={{ fontSize: 10, color: "#222", cursor: "pointer" }}>✕</span>
                </div>
              ))}
              {goals.filter(g => g.category === cat.key).length === 0 && (
                <div style={{ fontSize: 11, color: "#222", padding: "12px 8px" }}>No goals set yet.</div>
              )}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

          {note.observations && (
            <div style={{ marginBottom: 10 }}>
              <div style={{ fontSize: 9, letterSpacing: 3, color: "#444", marginBottom: 4 }}>NOTICED</div>
              <div style={{ fontSize: 12, color: "#666", lineHeight: 1.6 }}>{note.observations}</div>
            </div>
          )}
          {note.apply && (
            <div>
              <div style={{ fontSize: 9, letterSpacing: 3, color: "#444", marginBottom: 4 }}>APPLY TO MY GAME</div>
              <div style={{ fontSize: 12, color: "#666", lineHeight: 1.6 }}>{note.apply}</div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
